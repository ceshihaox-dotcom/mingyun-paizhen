西教堂顶上的天使脸\",\"正教与宫廷\",\"最后陷入\\\"诸侯纷争\\\"\"],\"sensory\":\"高原上一圈石头城堡，方塔、圆楼、城垛，倒像欧洲来的——可建它的是非洲的基督教皇帝。城里教堂的天棚上画着一排排长翅膀的天使脸，几十双眼睛低头望着你。皇帝在堡里设宴，蜂蜜酒一碗碗传，乐手敲着鼓。\",\"note\":\"贡德尔是埃塞俄比亚帝国1636年起的都城，法西利德斯及其后继者修建了一片融合阿克苏姆、葡萄牙、印度风格的石砌城堡（Fasil Ghebbi）。德布雷·伯罕·塞拉西教堂的天使顶画闻名。18世纪后帝权衰微，进入\\\"诸侯纷争\\\"时代。\"}),\n  E({\"id\":\"ck347\",\"name\":\"诺克（最早的赤陶与铁）\",\"en\":\"Nok Culture\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚\",\"era\":\"古典\",\"year\":-500,\"period\":\"约前500-公元200\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"撒哈拉以南最早的赤陶雕像\",\"三角形的眼睛\",\"早期炼铁\",\"尼日利亚中部的高原\",\"后世艺术的源头之一\"],\"sensory\":\"村边窑火正旺，工匠捏出一颗真人大小的陶头——眼睛是三角形的，发梳成一绺一绺，嘴唇厚而平静。不远处另一座炉子在炼铁，鼓风皮囊一鼓一瘪。这些陶像会比烧它们的人活得久——埋在土里两千年还在。\",\"note\":\"诺克文化（今尼日利亚中部）以撒哈拉以南非洲已知最早的赤陶雕像著称，并是西非最早炼铁的地区之一。其雕像风格（如三角形眼睛）被认为影响了后来的伊费、贝宁艺术。多数陶像在田间偶然出土，原始背景信息已散失。\"}),\n  E({\"id\":\"ck348\",\"name\":\"伊费（约鲁巴的青铜头像）\",\"en\":\"Ile-Ife\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚\",\"era\":\"中古\",\"year\":1450,\"period\":\"12-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\",\"宗教·信仰\"],\"atmos\":[\"约鲁巴人的圣城\",\"栩栩如生的铜/黄铜头像\",\"奥杜杜瓦的创世神话\",\"欧洲人误以为出自希腊或\\\"亚特兰蒂斯\\\"\",\"贝宁铸铜术的源头\"],\"sensory\":\"作坊里刚脱模一颗黄铜头像——五官匀称得像活人，脸上一道道细竖纹，嘴唇微张。这写实手艺，几百年后让初见的欧洲人不肯信是非洲人做的，硬说来自希腊、来自沉没的大陆。城里供着创世神奥杜杜瓦——约鲁巴人都说，世界从这里开始。\",\"note\":\"伊费（Ile-Ife）是约鲁巴人的精神圣城，12-15世纪以高度写实的铜、黄铜与赤陶头像闻名。1910年德国人弗罗贝尼乌斯见到后，竟臆测其源自希腊或亚特兰蒂斯——典型的\\\"不信非洲人能为之\\\"。贝宁的铸铜术即学自伊费。\"}),\n  E({\"id\":\"ck349\",\"name\":\"杰内（泥土垒起的大清真寺）\",\"en\":\"Djenné\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马里\",\"era\":\"中古\",\"year\":1850,\"period\":\"约13-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"城市·都会\",\"贸易·商业\"],\"atmos\":[\"撒哈拉以南最古老的城市之一\",\"世界最大的泥砖建筑\",\"墙上插满便于修补的木椽\",\"每年全城动手重抹墙\",\"内陆三角洲的集市\"],\"sensory\":\"尼日尔河内陆三角洲边，一座全用泥垒的大清真寺拔地而起，墙上插满一排排突出的木椽——给人攀上去补墙用的。雨季一过，全城的人都来和泥、抹墙，把被雨水冲软的地方重新糊上。脚下的集市卖着盐、鱼干和金子。\",\"note\":\"杰内（Djenné）与近旁的杰内-杰诺是撒哈拉以南非洲最古老的城市之一。杰内大清真寺是世界上最大的泥砖建筑，墙上突出的棕榈木椽（toron）既是装饰也是维修脚手架；每年雨季后举行全城参与的重抹墙节庆（crépissage）。杰内是与廷巴克图齐名的贸易与学术城。\"}),\n  E({\"id\":\"ck350\",\"name\":\"豪萨城邦·卡诺（靛蓝染坑）\",\"en\":\"Hausa Kano\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚\",\"era\":\"近世\",\"year\":1850,\"period\":\"约14-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"工艺·手艺\",\"城市·都会\"],\"atmos\":[\"夯土高墙环城\",\"用了几百年还在用的靛蓝染坑\",\"皮革与织布\",\"跨撒哈拉商队的南端\",\"后来并入索科托哈里发国\"],\"sensory\":\"环城的夯土墙又高又厚，城门一关谁也进不来。城里一排排圆形染坑挖在地上，盛着发酵的靛蓝，染工把布反复浸进去——手臂从指尖到肘都是青黑色。隔壁有人在硝皮、染革。商队刚从沙漠那头进城，卸下盐和铜。\",\"note\":\"卡诺等豪萨城邦14世纪起是跨撒哈拉贸易的南端枢纽，以夯土城墙、皮革（欧洲所称的\\\"摩洛哥革\\\"多产自此）和靛蓝染布著称。卡诺的科法尔玛塔染坑据传始于15世纪末，至今仍在使用。1804年后多并入索科托哈里发国。\"}),\n  E({\"id\":\"ck351\",\"name\":\"马蓬古布韦（黄金犀牛之丘）\",\"en\":\"Mapungubwe\",\"region\":\"撒哈拉以南非洲\",\"country\":\"南非\",\"era\":\"中古\",\"year\":1075,\"period\":\"约1075-1220\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"贸易·商业\",\"工艺·手艺\"],\"atmos\":[\"大津巴布韦的前身\",\"贴金箔的小犀牛\",\"山顶住贵族·山下住平民的等级\",\"向斯瓦希里海岸出口黄金象牙\",\"气候转干后被弃\"],\"sensory\":\"一座平顶石丘，首领住在顶上，底下的平民要仰头才看得见他。匠人把薄薄的金箔包在木胎上，做成一头巴掌大的犀牛。商队把黄金和象牙运往东边海岸，换回玻璃珠和远方的布。后来雨水越来越少，人们渐渐离开了这座丘。\",\"note\":\"马蓬古布韦（今南非）是南部非洲已知最早出现阶级分化与神圣王权的社会，约11-13世纪。其标志文物\\\"黄金犀牛\\\"（木胎包金箔）曾因种族隔离时代不愿承认非洲文明而被长期冷藏。它是大津巴布韦的前身，约1220年因气候转干被弃。\"}),\n  E({\"id\":\"ck352\",\"name\":\"桑人岩画（恍惚之舞与大羚羊）\",\"en\":\"San Rock Art\",\"region\":\"撒哈拉以南非洲\",\"country\":\"南部非洲\",\"era\":\"史前\",\"year\":0,\"period\":\"通时代（数千年的岩画传统）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"桑人（布须曼）狩猎采集者\",\"岩壁上的大羚羊（eland）\",\"巫医的恍惚之舞\",\"半人半兽的形象\",\"咔哒作响的语言\",\"非洲最古老的连续艺术\"],\"sensory\":\"岩壁背阴处画满了大羚羊，红的、白的，一头叠一头。火堆边，女人拍手打节拍，男人绕圈跳，越跳越急——跳到有人浑身发抖、流鼻血、栽倒，据说他的灵魂正出窍，去与那头大羚羊的力量相会。岩画上就画着这样半人半兽、流鼻血的影子。\",\"note\":\"桑人（San/布须曼）是南部非洲的狩猎采集者，其岩画传统延续数千年，是非洲最古老的连续艺术之一。大羚羊（eland）是核心圣兽；许多画面与巫医的\\\"恍惚之舞\\\"（trance dance）相关——舞者进入恍惚、灵魂出窍，画中半人半兽的形象多被解读为这种体验。\"}),\n  E({\"id\":\"ck353\",\"name\":\"马达加斯加·梅里纳（高原上的南岛王国）\",\"en\":\"Merina Madagascar\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马达加斯加\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"山地·高原\",\"迁徙·流亡\"],\"atmos\":[\"马尔加什语属南岛语系（祖先来自婆罗洲）\",\"高原梯田种稻\",\"安塔那那利佛的木石王宫\",\"翻尸再葬（famadihana）\",\"拉那瓦洛娜女王闭关排外\"],\"sensory\":\"印度洋上的大岛，高原上却是一层层水稻梯田，房子陡顶——和东南亚像得出奇。这里人说的话，远在婆罗洲能找到亲戚。山顶王宫又木又石。村里在办\\\"翻尸节\\\"：把祖先骨殖从墓里请出来，裹上新丝布，抬着跳一段舞，再送回去。\",\"note\":\"马达加斯加的马尔加什人祖先约一两千年前从婆罗洲渡海而来，语言属南岛语系，文化是南岛、非洲与阿拉伯的混合。梅里纳王国18世纪末统一高原，定都安塔那那利佛。翻尸再葬（famadihana）是其独特的祖先崇拜。拉那瓦洛娜一世曾强力排斥欧洲人与基督教。\"}),\n  E({\"id\":\"ck354\",\"name\":\"基督教努比亚（顶住伊斯兰六百年的黑人王国）\",\"en\":\"Christian Nubia\",\"region\":\"撒哈拉以南非洲\",\"country\":\"苏丹·努比亚\",\"era\":\"中古\",\"year\":1350,\"period\":\"6-14世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"战争·军事\",\"贸易·商业\"],\"atmos\":[\"麦罗埃之后努比亚改信基督教（诺巴提亚·马库利亚·阿洛迪亚）\",\"老栋古拉的王座\",\"用弓箭击退阿拉伯军（\\\"射眼者\\\"）\",\"与伊斯兰埃及签\\\"巴克特\\\"和约（史上最长寿的条约·约六百年）\",\"法拉斯教堂壁画上的黑人主教与圣母\"],\"sensory\":\"尼罗河边一座基督教王国的教堂，墙上画着深肤色的主教和圣母，金底子衬着黑面孔。城外，努比亚的弓手以箭术闻名，传说能专射来犯者的眼睛——北边伊斯兰埃及的军队碰了钉子，最后两边没接着打，而是立了个约：你不来攻，我按年送些奴隶和谷物，互通有无。这个约一签，竟管了六百年。\",\"note\":\"麦罗埃衰亡后，努比亚形成诺巴提亚、马库利亚、阿洛迪亚等基督教王国（约6世纪起）。马库利亚（都老栋古拉）以善射的弓手（\\\"射眼者\\\"）击退阿拉伯军，双方于652年订立\\\"巴克特\\\"（Baqt）——一种以贡赋换和平、互市的非战协定，延续约六百年，被视为史上最长寿的条约之一。法拉斯主教座堂的壁画上满是黑肤色的圣徒与圣母。努比亚基督教王国约存续至14-15世纪。\"}),\n  E({\"id\":\"ck355\",\"name\":\"卡内姆-博尔努（乍得湖的铠甲骑兵帝国）\",\"en\":\"Kanem-Bornu\",\"region\":\"撒哈拉以南非洲\",\"country\":\"乍得·博尔努\",\"era\":\"中古\",\"year\":1550,\"period\":\"9-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"贸易·商业\",\"宫廷·王权\"],\"atmos\":[\"乍得湖畔的长寿帝国（塞法瓦王朝近千年）\",\"跨撒哈拉商路通往的黎波里\",\"11世纪改信伊斯兰\",\"裹棉甲·披锁子甲·连马都披甲的重骑兵\",\"藏在帷幕后的\\\"马伊\\\"君主\",\"伊德里斯·阿洛马引入火枪\"],\"sensory\":\"乍得湖边的草原上，一队重骑兵列阵——人裹着厚厚的棉甲，外罩锁子甲，连胯下的马都披着护甲，在烈日下闷得冒汗，冲起来却势不可挡。城里的君主\\\"马伊\\\"深居简出，召见使者时只隔着一道帷幕传话，谁也见不到他的脸。商队正集结，要穿过沙漠把奴隶和象牙运到的黎波里去，换回盐、铜和好马。\",\"note\":\"卡内姆帝国及其继承者博尔努（乍得湖一带）由塞法瓦王朝统治近千年，是非洲存续最久的国家之一。它扼守通往的黎波里的跨撒哈拉商路，11世纪改信伊斯兰。其标志是裹棉甲、披锁子甲、马亦披甲的重骑兵；君主\\\"马伊\\\"隐于帷幕之后。16世纪的伊德里斯·阿洛马引入奥斯曼火枪手，国势再盛。\"}),\n  E({\"id\":\"ck356\",\"name\":\"伊博-乌克武（比贝宁更早的青铜）\",\"en\":\"Igbo-Ukwu\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚·伊博\",\"era\":\"中古\",\"year\":950,\"period\":\"9-10世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"尼日利亚东南伊博地区\",\"比伊费贝宁早数百年的精绝失蜡铸铜\",\"缠满细密纹饰与小虫的礼器\",\"随葬的一位祭司式权贵\",\"远来的玻璃珠（通埃及印度）\",\"与\\\"恩里\\\"祭司王传统相关·权威靠仪式非武力\"],\"sensory\":\"一座墓里，葬着一位显贵——不是武士，是个掌着仪式的人。陪葬的铜器精细得吓人：一只铜罐表面爬满了铸出来的小苍蝇和绳结纹，纹路细如发丝，几百年后的人都想不通怎么一次浇铸成的。串珠是从很远的地方来的，玻璃的，要经过沙漠和海。这地方没有王宫、没有刀兵堆，权威靠的是祭祀和德望。\",\"note\":\"伊博-乌克武（今尼日利亚东南）的遗址（约9-10世纪）出土了极其精湛的失蜡法铸铜礼器，比伊费、贝宁早数百年——器表满布细密纹饰乃至铸出的小虫，工艺令人惊叹。墓主是一位祭司式权贵；随葬的玻璃珠显示其与埃及、印度方向的远程贸易。它常与伊博的\\\"恩里\\\"（Nri）传统相联系：权威源于仪式与德望而非武力。\"}),\n  E({\"id\":\"ck357\",\"name\":\"克诺索斯（米诺斯文明·克里特岛）\",\"en\":\"Minoan Knossos\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"上古\",\"year\":-2000,\"period\":\"约前2000-前1450\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"宫廷·王权\",\"艺术·表演\"],\"atmos\":[\"迷宫般的宫殿\",\"公牛跳跃壁画\",\"线性文字A（未破译）\",\"海上贸易\",\"没有城墙的文明\"],\"sensory\":\"走廊拐来拐去，分不清进出，墙上画着海豚、百合和翻越公牛的人。没有城墙——大海就是城墙。庭院里有人表演跳牛：助跑、抓住冲来的牛角、在牛背上翻一个跟头落地。\",\"note\":\"米诺斯是欧洲最早的宫殿文明。没有城墙，是一种与后来希腊全然不同的安全感。这座宫殿是弥诺陶洛斯迷宫传说的原型。\"}),\n  E({\"id\":\"ck358\",\"name\":\"迈锡尼\",\"en\":\"Mycenae\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"上古\",\"year\":-1600,\"period\":\"约前1600-前1200\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"战争·军事\",\"死亡·葬仪\"],\"atmos\":[\"狮门\",\"竖穴墓黄金面具\",\"特洛伊战争的发动者（如果历史上有的话）\",\"线性文字B\"],\"sensory\":\"狮门顶上两头石狮夹着一根柱子，俯视来人。卫城建在山丘上，城墙是大块巨石垒的——后来的希腊人说，只有独眼巨人搬得动这些石头。有人从竖穴墓底取出一张黄金面具，死者的脸被锤进金箔，永远定格。\",\"note\":\"谢里曼发掘时以为那张金面具是“阿伽门农的脸”——当然不是。但迈锡尼确实是荷马史诗那个世界的考古对应。\"}),\n  E({\"id\":\"ck359\",\"name\":\"特洛伊（青铜时代晚期·如果它发生过的话）\",\"en\":\"Troy\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"上古\",\"year\":-1150,\"period\":\"约前13-前12世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"史诗与考古的交叉\",\"特洛伊第VIIa层（被毁的那一层）\",\"木马是传说但城确实被毁了\"],\"sensory\":\"城比你想的小，但城墙又高又厚。城下的平原一直铺到海边，希腊人的船拖上了滩，营帐据说已经扎了很多年。今天空气里有一种不对劲的安静。\",\"note\":\"考古学确认了特洛伊VIIa层有被暴力摧毁的痕迹。战争是否真的发生过、是否与荷马所述相关，仍有争议。体验重点是\\\"传说和真实之间的缝隙\\\"。\"}),\n  E({\"id\":\"ck360\",\"name\":\"雅典（伯利克里时代·黄金时代）\",\"en\":\"Periclean Athens\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-450,\"period\":\"前5世纪中\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"艺术·表演\"],\"atmos\":[\"帕特农神庙正在建造\",\"民主制（但只限男性公民）\",\"苏格拉底在市场上聊天\",\"戏剧节\"],\"sensory\":\"卫城上的神庙正在砌，新凿的大理石在日头下白得刺眼，柱子还裹着脚手架。山下的阿哥拉有人在争辩，一个光脚老人拦住过路人发问，把人一个个问到哑口无言。剧场里在演悲剧，演员戴着面具，声音从面具张开的口部放大。\",\"note\":\"帕特农神庙在伯利克里时代是\\\"崭新的\\\"——涂着鲜艳的颜色（不是现在的白色）。雅典民主排斥了女性、奴隶和外邦人。\"}),\n  E({\"id\":\"ck361\",\"name\":\"斯巴达（古典时期）\",\"en\":\"Classical Sparta\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-350,\"period\":\"前6-前4世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"奴役·压迫\",\"女性空间\"],\"atmos\":[\"军事社会\",\"黑劳士（国家奴隶）\",\"阿戈革训练制度\",\"妇女相对自由（可拥有财产）\",\"“带着盾牌回来\",\"或者躺在盾牌上回来”\"],\"sensory\":\"没有城墙——斯巴达人说，士兵的胸膛就是城墙。男孩满七岁离家，编进集体里训练。连饭也一起吃：一锅黑乎乎的猪血汤，一个外邦人尝过后说，现在他懂斯巴达人为什么不怕死了。姑娘们也在运动场上赛跑、摔跤——这在别的希腊城邦无法想象。\",\"note\":\"斯巴达把个人彻底交给城邦，是古代最极端的一场社会试验，与雅典恰成两极。\"}),\n  E({\"id\":\"ck362\",\"name\":\"温泉关之战\",\"en\":\"Battle of Thermopylae\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-480,\"period\":\"前480\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"边塞·边疆\"],\"atmos\":[\"列奥尼达斯\",\"三百斯巴达人（实际有几千希腊联军）\",\"波斯大军\",\"\\\"在阴影中作战\\\"\"],\"sensory\":\"山隘窄得只容几人并肩——几百人就能把它堵死。对面是数不清的波斯营帐，一直铺到看不见的远处。有人说波斯人的箭多到能遮住太阳；旁边的斯巴达人答：那好，我们就在阴影里打。\",\"note\":\"温泉关是古代最著名的以寡敌众。守到最后的不止三百斯巴达人，还有七百忒斯庇亚人留下来一起战死。\"}),\n  E({\"id\":\"ck363\",\"name\":\"奥林匹亚（奥运会）\",\"en\":\"Olympia, the Games\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-776,\"period\":\"前776-公元393（通时代）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"节庆·仪式\",\"宗教·信仰\"],\"atmos\":[\"四年一度\",\"裸体竞技\",\"城邦休战\",\"宙斯巨像（世界七大奇迹）\",\"橄榄花冠\"],\"sensory\":\"赛场上的人都赤身上阵，抹了油，沾着沙。跑道是夯实的沙土。看台上挤满各城邦来的人，这几天，城邦之间所有的仗都停了。冠军拿到的不是奖牌，是一顶野橄榄枝编的环。宙斯神庙里坐着一尊象牙和黄金做的巨像——据说他要是站起来，头会顶穿屋顶。\",\"note\":\"古代奥运会与现代版本几乎没有相似之处——裸体、只限男性、宗教性质、战争期间休战。\"}),\n  E({\"id\":\"ck364\",\"name\":\"德尔斐（神谕）\",\"en\":\"Oracle at Delphi\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-350,\"period\":\"前8-前4世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"女性空间\"],\"atmos\":[\"阿波罗神庙\",\"皮提亚女祭司\",\"\\\"认识你自己\\\"\",\"神谕的模糊性\",\"世界的肚脐\"],\"sensory\":\"神庙建在帕尔纳索斯山坡上，下临深谷。女祭司坐在青铜三脚架上，脚下岩缝里渗出气味，让她陷入恍惚。她吐出的字含混不清，由祭司编成诗句递出来。一个国王来问该不该出兵，回答是：你若出兵，将毁掉一个大帝国。哪个帝国？没有说。\",\"note\":\"德尔斐的神谕是古希腊决策文化的核心——从军事到殖民都要先来问神。神谕的模糊性本身就是一种体验。\"}),\n  E({\"id\":\"ck365\",\"name\":\"叙拉古（西西里·希腊殖民地）\",\"en\":\"Syracuse\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-250,\"period\":\"前5-前3世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"学问·书写\",\"海洋·港口\"],\"atmos\":[\"阿基米德的城市\",\"与迦太基和罗马的争夺\",\"拉托米亚采石场（关雅典战俘的露天牢）\",\"希腊世界最强的城邦之一\"],\"sensory\":\"大港比雅典的还宽。阿基米德蹲在沙地上画圆——传说他造过点燃敌船的镜阵，和把战船从水里钩起来掀翻的吊臂。露天采石场底下关着雅典来的战俘，晒了一天又一天，有人因为会背欧里庇得斯的台词被放了出去。\",\"note\":\"叙拉古是希腊世界被低估的巨头。阿基米德的发明（虽然部分可能是传说）以及采石场关雅典战俘的细节都是极好的体验点。\"}),\n  E({\"id\":\"ck366\",\"name\":\"亚历山大东征·伊苏斯/高加米拉\",\"en\":\"Alexander's Conquests\",\"region\":\"地中海·古典\",\"country\":\"跨区域\",\"era\":\"古典\",\"year\":-333,\"period\":\"前333/前331\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"殖民·帝国\"],\"atmos\":[\"马其顿方阵\",\"大流士三世\",\"“一剑斩断戈耳迪之结”\",\"年轻的征服者\"],\"sensory\":\"一个二十几岁的人骑着马冲在最前，朝着对面国王的位置直插过去。马蹄扬起的尘土厚得看不清人。据说打赢后，他在波斯王帐里翻出一只镶宝石的匣子，原是盛香料的，他拿来装那卷荷马史诗。\",\"note\":\"亚历山大的个人体验角度比\\\"大帝叙事\\\"更有趣——一个二十几岁的人在征服世界。\"}),\n  E({\"id\":\"ck367\",\"name\":\"巴克特里亚（希腊-大夏·中亚的希腊人）\",\"en\":\"Greco-Bactria\",\"region\":\"地中海·古典\",\"country\":\"阿富汗\",\"era\":\"古典\",\"year\":-150,\"period\":\"前3-前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"迁徙·流亡\"],\"atmos\":[\"阿富汗的希腊王国\",\"希腊雕塑遇见佛教\",\"弥兰陀王（那先比丘经）\",\"最远的希腊\"],\"sensory\":\"兴都库什山以北的城里立着希腊式的柱廊、剧场和体育场，街上的人却穿着中亚的袍子。一尊石像：希腊式的身体，结着佛的手印。据说国王和一位佛教僧人当众辩了一场，一问一答记了下来。\",\"note\":\"巴克特里亚是希腊文化最东端的存在——犍陀罗佛教艺术的直接前驱。\\\"希腊人怎么跑到阿富汗来的？\\\"这个问题本身就是体验。\"}),\n  E({\"id\":\"ck368\",\"name\":\"罗马（共和国中期·布匿战争前后）\",\"en\":\"Republican Rome\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-150,\"period\":\"前3-前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"殖民·帝国\",\"律法·审判\"],\"atmos\":[\"元老院\",\"公民兵\",\"汉尼拔的威胁\",\"\\\"迦太基必须毁灭\\\"\",\"征服地中海\"],\"sensory\":\"元老院里一群老人争来争去——有个老头不管发言谈什么，末了总要加一句：迦太基必须毁灭。街上的兵刚从战场回来，他们既是农民也是士兵，打完仗就回去种地。罗马广场上临时搭起木看台，中间几对角斗士见血——还没有后来圆形竞技场那样的规模。\",\"note\":\"共和国时代的罗马比帝国时代更\\\"粗糙\\\"——还没有帝国的华丽，但已经有了帝国的野心。\"}),\n  E({\"id\":\"ck369\",\"name\":\"庞贝（被掩埋之前）\",\"en\":\"Pompeii\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-79,\"period\":\"公元79之前\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"饮食·宴席\",\"城市·都会\"],\"atmos\":[\"维苏威火山脚下的富庶小城\",\"壁画\",\"小酒馆\",\"涂鸦\",\"妓院\",\"面包房\",\"选举海报\"],\"sensory\":\"石板街上压着深深的车辙，过街踏石之间留着车轮磨出的缝。墙上用炭写着涂鸦：“卢修斯爱克劳迪娅”。面包房的圆面包烤前盖了店家的戳，切成几牙卖。街角小酒馆的柜台嵌着一排陶瓮，分装不同的热食和热酒。城里好几面墙还围着脚手架——十七年前一场地震震塌的，到现在没补完，谁也没多想。\",\"note\":\"庞贝是人类日常生活最完整的考古快照——涂鸦、面包、选举广告、宠物，一切都被火山灰冻结。\"}),\n  E({\"id\":\"ck370\",\"name\":\"庞贝最后一天\",\"en\":\"Pompeii's Last Day\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":79,\"period\":\"公元79年8月24日\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"灾变·瘟疫\",\"末世·终结\"],\"atmos\":[\"维苏威爆发\",\"火山碎屑流\",\"小普林尼的记载\",\"城市被埋\",\"一千七百年后重见天日\"],\"sensory\":\"过了正午，天忽然黑下来。白色的浮石像雹子一样砸在屋顶上，越积越厚，压塌房梁。灰落下来像下雪，吸进去呛人。地一阵阵发抖。有人把枕头顶在头上往海边跑，有人钻进屋里、地窖里躲。天快亮时热浪到了——滚烫的气浪贴着地面，从山上扑下来。\",\"note\":\"小普林尼的记载是人类历史上第一份详细的火山爆发目击报告。\"}),\n  E({\"id\":\"ck371\",\"name\":\"罗马帝国·黄金时代（图拉真/哈德良）\",\"en\":\"Imperial Rome\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":150,\"period\":\"1-2世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"殖民·帝国\",\"医疗·身体\"],\"atmos\":[\"万神殿\",\"竞技场\",\"公共浴场\",\"帝国全盛\",\"五贤帝\",\"罗马和平\"],\"sensory\":\"万神殿穹顶正中开着一个圆口，下雨时水直接落进殿里，地上留了排水的孔。浴场不止是洗澡的地方：连着图书馆、健身房、列柱花园，泡上一天也出得来。圆形竞技场的座位按身份排——前排石椅留给元老，最高一圈站着奴隶和女人。街上走着帝国各处来的人，不列颠人、叙利亚人、努比亚人，各说各的话。\",\"note\":\"罗马浴场是进入帝国日常的最好入口——洗浴、社交、读书、运动、谈生意都在这里发生。\"}),\n  E({\"id\":\"ck372\",\"name\":\"罗马·角斗场（日常的一天）\",\"en\":\"Day at the Colosseum\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":350,\"period\":\"1-4世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"死亡·葬仪\"],\"atmos\":[\"角斗士（不全是奴隶）\",\"兽猎\",\"午间处决\",\"观众的大拇指\",\"\\\"我们即将死去的人向你致敬\\\"\"],\"sensory\":\"五万人的吼声压下来。上午斗兽，正午拖出死囚处决，等角斗士成对走进场子，日头已经偏西。脚下铺着沙，吸血用的。两个人隔几步站定，盯着对方，等裁判的手势。看台上有人嗑着豆子看热闹。\",\"note\":\"角斗不是每次都死人——角斗士训练成本很高，杀太多不经济。但死亡确实是娱乐的一部分。体验角度可以是观众、角斗士或地下通道的工作人员。\"}),\n  E({\"id\":\"ck373\",\"name\":\"基督教迫害·罗马地下墓穴\",\"en\":\"Roman Catacombs\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":250,\"period\":\"1-3世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"死亡·葬仪\",\"奴役·压迫\"],\"atmos\":[\"地下墓穴（catacomb）\",\"早期基督教\",\"秘密聚会\",\"鱼符号\",\"殉教者\"],\"sensory\":\"地下几层深。油灯的光在窄道里晃，两壁凿满放棺的龛。壁画很简单：一条鱼、一只羊、一个肩上扛着羊的牧人。一群人围着新埋下的同伴低声唱诵。头顶上是帝国的大理石和喧嚣，这底下，一种新信仰在死者中间生长。\",\"note\":\"早期基督教的\\\"地下\\\"体验——在帝国的地表之下生长。\"}),\n  E({\"id\":\"ck374\",\"name\":\"罗马·西部帝国最后的日子\",\"en\":\"Fall of Rome\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":450,\"period\":\"5世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"战争·军事\"],\"atmos\":[\"蛮族入侵\",\"410年西哥特人洗劫罗马\",\"最后的皇帝（罗慕路斯·奥古斯都路斯）\",\"一个时代的终结\"],\"sensory\":\"城比从前冷清了——关了几座浴场，街上人也稀。先是传言，说蛮族又往这边来了。然后他们真来了：夜里有人从里头打开了城门。三天里，金子和圣物被搬空。但第二天太阳照旧升起——世界没有终结，只是换了。\",\"note\":\"罗马帝国的\\\"陷落\\\"不是一个瞬间事件——对当时的人来说可能更像一个缓慢的退化过程。\"}),\n  E({\"id\":\"ck375\",\"name\":\"君士坦丁堡（查士丁尼时代）\",\"en\":\"Justinian's Constantinople\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"中古\",\"year\":550,\"period\":\"6世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"律法·审判\",\"宫廷·王权\"],\"atmos\":[\"圣索菲亚大教堂建成\",\"查士丁尼法典\",\"妓女出身的皇后狄奥多拉\",\"尼卡暴动\",\"最后一次试图恢复罗马帝国\"],\"sensory\":\"圣索菲亚刚落成——穹顶又浅又宽，底下绕一圈四十扇窗，光灌进来，满墙金箔马赛克发亮；当时的人说，这穹顶不像砌在墙上，倒像一根金链从天上吊着。皇帝正盘算收复西边的旧土，城里却闹起了暴动。皇后说：帝王的紫袍是最好的裹尸布——宁可死在这里，也不逃。\",\"note\":\"圣索菲亚大教堂\\\"刚建成\\\"的状态——穹顶的工程奇迹在当时引发的震撼。\"}),\n  E({\"id\":\"ck376\",\"name\":\"君士坦丁堡（中期·希腊火与城墙）\",\"en\":\"Byzantine Constantinople\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"中古\",\"year\":1050,\"period\":\"7-11世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"工艺·手艺\"],\"atmos\":[\"希腊火（秘密武器）\",\"狄奥多西城墙\",\"抵御阿拉伯人和保加利亚人\",\"帝国缩小但首都依然辉煌\"],\"sensory\":\"城墙是三道：护城河、矮一些的外墙、再到高大的内墙，据说挡住过所有来犯的人。水军手里有一样别处没有的东西——一种泼到水面上还在烧、浇水越浇越旺的火，从船头的铜管里喷出去。敌人的舰队在金角湾口被烧成灰烬。那火怎么配的，没几个人知道。\",\"note\":\"希腊火的配方至今是谜。狄奥多西城墙在火药发明前从未被正面攻破。\"}),\n  E({\"id\":\"ck377\",\"name\":\"第四次十字军·君士坦丁堡被洗劫\",\"en\":\"Sack of Constantinople, 1204\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"中古\",\"year\":1204,\"period\":\"1204\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"基督徒攻击基督徒\",\"威尼斯人主导\",\"圣物被抢\",\"青铜马被运到威尼斯\",\"拜占庭元气大伤\"],\"sensory\":\"十字军本是去圣地的，最后攻破的却是基督教世界最大的城。教堂被搬空，圣像上的金银被撬下来熔成锭。有人把赛马场上那四匹青铜马吊下来，装船运往威尼斯。街上有人跪着哭，有人扛着抢来的东西走。\",\"note\":\"第四次十字军是中世纪史上最荒谬的事件之一——基督教军队洗劫了基督教世界最伟大的城市。\"}),\n  E({\"id\":\"ck378\",\"name\":\"君士坦丁堡陷落\",\"en\":\"Fall of Constantinople\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1453,\"period\":\"1453\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"宗教·信仰\"],\"atmos\":[\"穆罕默德二世\",\"巨炮\",\"城墙被攻破\",\"最后一个拜占庭皇帝战死城墙\",\"中世纪的终结\"],\"sensory\":\"石头炮弹一发发砸在城墙上——这么大的炮没人见过，几天就轰开了挺立千年的城墙。皇帝扯掉身上的紫袍，认不出谁是谁地冲进乱军里，再没回来。圣索菲亚里挤满了人，做着最后一场弥撒——直到大门被撞开。\",\"note\":\"1453年通常被视为中世纪的终结点之一。最后的拜占庭皇帝君士坦丁十一世的死亡是历史上最戏剧性的\\\"最后一天\\\"之一。\"}),\n  E({\"id\":\"ck379\",\"name\":\"伊特鲁里亚（罗马之前的意大利）\",\"en\":\"The Etruscans\",\"region\":\"地中海·古典\",\"country\":\"意大利·伊特鲁里亚\",\"era\":\"古典\",\"year\":-250,\"period\":\"约前7-前3世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"饮食·宴席\"],\"atmos\":[\"托斯卡纳一带的城邦\",\"彩绘墓室里的宴饮（豹之墓）\",\"女人与男人同席斜倚饮酒（希腊人看不惯）\",\"看肝占卜（haruspex）\",\"把斗兽·拱券·占卜传给罗马\",\"能拼读却读不太懂的语言\"],\"sensory\":\"墓室四壁画着宴会——男男女女斜倚在卧榻上一同举杯，乐手吹着双管笛，这景象让讲究\\\"女人别上桌\\\"的希腊人直摇头。祭司捧着一只青铜做的羊肝模型，照上面分好的格子端详刚宰的牲口内脏，要从中读出神意。这些人写的字母认得出，话却没人完全听得懂。\",\"note\":\"伊特鲁里亚人是罗马兴起前意大利中部的城邦文明（约前9-前1世纪），以彩绘墓室（如塔尔奎尼亚\\\"豹之墓\\\"）、金工和占卜著称。其女性地位较高、可与男子同席宴饮，令希腊人侧目。看肝占卜、斗兽、拱券、占卜礼仪、托加袍乃至早期罗马诸王都受其影响。伊特鲁里亚文字可拼读，但语言至今未能完全释读。\"}),\n  E({\"id\":\"ck380\",\"name\":\"佩加蒙（希腊化的大祭坛与羊皮纸）\",\"en\":\"Pergamon\",\"region\":\"地中海·古典\",\"country\":\"帕加马\",\"era\":\"古典\",\"year\":-150,\"period\":\"前3-前2世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"艺术·表演\",\"医疗·身体\"],\"atmos\":[\"阿塔罗斯王朝\",\"陡峭卫城上的宙斯大祭坛（巨人之战浮雕）\",\"仅次于亚历山大里亚的大图书馆\",\"被断了纸草供应才改用羊皮纸（parchment）\",\"医神阿斯克勒庇俄斯的疗养所\",\"名医盖伦的故乡\"],\"sensory\":\"山崖陡得几乎垂直，神庙、剧场顺着坡一层层叠上去。卫城顶上一座巨大的祭坛，浮雕里诸神和巨人扭打成一团，几乎要从石头里挣出来。图书馆的书库一架架排开——羊皮刮薄磨光，一张张抄上字：埃及人不卖纸草了，这里的人就用这个。城下还有一处供病人静养、解梦治病的圣所。\",\"note\":\"佩加蒙是希腊化时代阿塔罗斯王朝的都城（前3-前2世纪，后遗赠罗马）。陡峭卫城上的宙斯大祭坛以\\\"巨人之战\\\"浮雕闻名。其图书馆规模仅次于亚历山大里亚；传说埃及为打压它而禁运纸草，佩加蒙遂改良羊皮纸（parchment一词即源于Pergamon）。城内的阿斯克勒庇俄斯疗养所是著名的\\\"医院\\\"，名医盖伦即生于此。\"}),\n  E({\"id\":\"ck381\",\"name\":\"米利都·爱奥尼亚（自然哲学的诞生）\",\"en\":\"Miletus & Ionia\",\"region\":\"地中海·古典\",\"country\":\"希腊·爱奥尼亚\",\"era\":\"古典\",\"year\":-550,\"period\":\"前6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"海洋·港口\",\"城市·都会\"],\"atmos\":[\"小亚细亚西岸的爱奥尼亚商港\",\"泰勒斯·阿那克西曼德·阿那克西美尼\",\"第一次不靠神话而靠\\\"道理\\\"解释世界\",\"\\\"万物本原是什么\\\"\",\"最早的世界地图\",\"爱奥尼亚起义点燃希波战争\"],\"sensory\":\"海港里挤着各地来的船，码头边却有人在争一桩怪问题：万物到底由什么变来？有人说是水，有人说是某种没有边界的东西。他们不抬出神来解释打雷下雨，只想找出背后的\\\"道理\\\"。一个人摊开一张刻在铜板上的图——据说那是头一回有人把整个有人住的世界画进一张图里。\",\"note\":\"米利都是小亚细亚西岸的爱奥尼亚希腊商港，前6世纪诞生了西方最早的自然哲学：泰勒斯（\\\"本原是水\\\"、据传预言日食）、阿那克西曼德（\\\"无限定\\\"apeiron、绘最早的世界地图）、阿那克西美尼。他们首次尝试不靠神话、而以自然本身解释世界，被视为科学与哲学的开端。前499年的爱奥尼亚起义引爆了希波战争。\"}),\n  E({\"id\":\"ck382\",\"name\":\"渡过卢比孔（凯撒与共和国的崩塌）\",\"en\":\"Caesar's Rubicon\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-50,\"period\":\"前1世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\",\"革命·变革\"],\"atmos\":[\"凯撒征服高卢\",\"前49年带兵渡卢比孔河（\\\"骰子已掷下\\\"）\",\"与庞培内战\",\"终身独裁\",\"前44年三月十五日元老院遇刺\",\"屋大维继起·共和变帝制\"],\"sensory\":\"一支军团停在一条不起眼的小河边——按法律，将军不得带兵越它回意大利。统帅勒马迟疑了一下，随即说了句\\\"骰子已经掷下\\\"，催马过河。几年后他成了终身独裁官。三月十五那天，他走进元老院，议员们围拢上来，刀子从四面八方扎下——其中一把，握在他最信任的人手里。\",\"note\":\"尤利乌斯·凯撒征服高卢后，于前49年率军渡过卢比孔河（\\\"alea iacta est\\\"，骰子已掷下），与庞培爆发内战并获胜，成为终身独裁官。前44年3月15日（\\\"三月中\\\"）他在元老院被布鲁图斯等人刺杀。其后屋大维（奥古斯都）胜出，罗马共和国终结、转入帝制。\"}),\n  E({\"id\":\"ck383\",\"name\":\"尼禄与罗马大火（公元64）\",\"en\":\"Nero's Great Fire\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":64,\"period\":\"公元64\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"宫廷·王权\",\"宗教·信仰\"],\"atmos\":[\"尼禄皇帝\",\"罗马城大火烧了好几天\",\"\\\"皇帝在火光中奏乐而歌\\\"的传言\",\"嫁祸基督徒并酷刑处死\",\"火后清地修建奢华的\\\"金宫\\\"（Domus Aurea）\",\"艺术家皇帝\"],\"sensory\":\"火从竞技场一带烧起，顺着挤挨的木屋一路蔓延，烧了一天又一天，半座城化成焦土。人群逃命的当口，传开一句话：皇帝在高处望着火光，弹着琴、唱着特洛伊焚城的歌。为平息众怒，他把纵火罪名扣到一群叫\\\"基督徒\\\"的人头上，钉上十字架、裹油点成夜里的火炬。火场清出的大片地，很快动工修一座金碧辉煌的新宫。\",\"note\":\"公元64年罗马大火延烧数日，焚毁大半座城。尼禄\\\"在火中弹唱\\\"多半是后世敌意的传说（他实际组织了赈济），但他借机将纵火罪推给基督徒、施以酷刑处死，是基督教史上第一次大迫害（塔西佗有载）。火后他在清出的土地上兴建奢华的\\\"金宫\\\"。这位\\\"艺术家皇帝\\\"最终于68年被迫自尽。\"}),\n  E({\"id\":\"ck384\",\"name\":\"凯尔特·爱尔兰（修道院时代）\",\"en\":\"Monastic Ireland\",\"region\":\"欧洲\",\"country\":\"爱尔兰\",\"era\":\"中古\",\"year\":850,\"period\":\"6-9世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"海岛修道院\",\"凯尔特十字架\",\"《凯尔斯之书》\",\"学者避难所\",\"欧洲黑暗时代的光\"],\"sensory\":\"大西洋边的岩石小岛，一座石头修道院。修士俯在羊皮纸上，笔尖极细，描出缠住字母的蛇形花纹——金、蓝、红。门外只有风和海鸥。大陆上的典籍在一卷卷散失，这座岛上的人还在一页页抄。\",\"note\":\"爱尔兰修道院在欧洲\\\"黑暗时代\\\"保存了大量古典知识。《凯尔斯之书》的装饰手抄本是中世纪艺术巅峰。\"}),\n  E({\"id\":\"ck385\",\"name\":\"维京·斯堪的纳维亚（出航前）\",\"en\":\"Viking Scandinavia\",\"region\":\"欧洲\",\"country\":\"北欧\",\"era\":\"中古\",\"year\":850,\"period\":\"8-9世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"宗教·信仰\"],\"atmos\":[\"龙头长船\",\"卢恩符文\",\"北欧神话的日常化\",\"冬天很长\",\"人祭（布洛特）\"],\"sensory\":\"峡湾边在造船——龙头装上船首，船底弧线浅得能直接拖上沙滩。夜长，火堆边有人讲奥丁如何用一只眼睛换来智慧。另一个人蹲在石头上刻卢恩符文。海上来的冬风割脸。\",\"note\":\"维京人出海前的生活——造船、北欧神话、极端气候下的日常。\"}),\n  E({\"id\":\"ck386\",\"name\":\"维京·林迪斯法恩修道院袭击\",\"en\":\"Lindisfarne Raid\",\"region\":\"欧洲\",\"country\":\"英国\",\"era\":\"中古\",\"year\":793,\"period\":\"793\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"维京时代开端的标志事件\",\"北方来的异教徒\",\"修道院被洗劫\",\"欧洲的震惊\"],\"sensory\":\"平静的早晨，海面上冒出几艘船——船首是龙头。修士还没回过神。圣坛被搬空，有人倒在血里，有人被绳子捆走卖作奴隶。消息一路传到法兰克宫廷——从没有人敢碰修道院。\",\"note\":\"维京时代的\\\"第一天\\\"。\"}),\n  E({\"id\":\"ck387\",\"name\":\"查理曼的亚琛宫廷\",\"en\":\"Charlemagne's Aachen\",\"region\":\"欧洲\",\"country\":\"德国\",\"era\":\"中古\",\"year\":750,\"period\":\"8世纪末-9世纪初\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"学问·书写\"],\"atmos\":[\"加洛林文艺复兴\",\"查理曼学习读写（据说学得很费劲）\",\"八角礼拜堂\",\"统一欧洲的最后尝试（在拿破仑之前）\"],\"sensory\":\"高大的法兰克国王坐在八角形礼拜堂里。他学写字学得晚，枕头底下压着蜡板，夜里摸黑练。宫廷里有从约克请来的学者教拉丁文。撑起穹顶的石柱，是从罗马和拉文纳的旧宫殿上拆运来的。\",\"note\":\"加洛林文艺复兴是中世纪欧洲第一次有意识地\\\"恢复\\\"古典知识的尝试。\"}),\n  E({\"id\":\"ck388\",\"name\":\"克吕尼/熙笃修道院（修道院生活）\",\"en\":\"Cluny Monastery\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"中古\",\"year\":1150,\"period\":\"10-12世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"祈祷与劳动（ora et labora）\",\"时辰祈祷\",\"抄写室\",\"药草园\",\"静默规则\"],\"sensory\":\"钟声划分一天——凌晨两点爬起来做头一堂祈祷。抄写室里只有笔尖蹭过羊皮纸的沙沙声。午饭在静默中吃，一个修士在高声诵读经文。药草园里飘着薰衣草、鼠尾草和迷迭香的气味。\",\"note\":\"叮叮猫有过类似主题（\\\"穿越回中世纪当修道院院长\\\"）。修道院的时间结构是\\\"时辰祈祷\\\"——一天被祈祷分成八段。\"}),\n  E({\"id\":\"ck389\",\"name\":\"诺曼征服后的英格兰\",\"en\":\"Norman Conquest\",\"region\":\"欧洲\",\"country\":\"英国\",\"era\":\"中古\",\"year\":1150,\"period\":\"1066-12世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"律法·审判\"],\"atmos\":[\"威廉一世\",\"黑斯廷斯战役\",\"征服者在北方的\\\"北方劫掠\\\"\",\"末日审判书\",\"诺曼城堡\"],\"sensory\":\"新来的领主不讲你的话——他们讲法语。你的田被重新分了出去。山坡上正起一座石头城堡，你的木屋落在它的阴影里。一队人挨家挨户登记：每头牛、每块地、每个人。\",\"note\":\"诺曼征服是从被征服者（盎格鲁-撒克逊平民）视角最有冲击力的——你的语言、你的领主、你的法律一夜之间全变了。\"}),\n  E({\"id\":\"ck390\",\"name\":\"中世纪大教堂工地（沙特尔/科隆）\",\"en\":\"Gothic Cathedral Works\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"中古\",\"year\":1350,\"period\":\"12-14世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\"],\"atmos\":[\"哥特式建筑\",\"飞扶壁\",\"彩色玻璃\",\"几代人的工程\",\"石匠行会\"],\"sensory\":\"脚手架一直搭到云里。石匠凿着石块，每块都刻着自己的记号。彩色玻璃刚嵌上去，阳光穿过来，整座中殿浸成一片蓝和红。这座教堂已经盖了八十年，还没盖完。\",\"note\":\"哥特大教堂是中世纪最壮观的\\\"工地\\\"——建设周期超过百年，几代工匠一辈子只见到教堂的一部分。\"}),\n  E({\"id\":\"ck391\",\"name\":\"中世纪集市（香槟集市）\",\"en\":\"Champagne Fairs\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"中古\",\"year\":1250,\"period\":\"12-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"节庆·仪式\"],\"atmos\":[\"法兰西香槟地区\",\"意大利商人遇上佛兰德商人\",\"汇票的雏形\",\"欧洲最早的国际贸易节点\"],\"sensory\":\"帐篷和货棚排满整座镇子。这边是佛兰德的羊毛布，那边是意大利的丝绸。钱币最麻烦——各地铸的都不一样——于是有人用一张写了字的纸条顶替（汇票）。食摊上摆着没见过的东西，说是从东方运来的香料。\",\"note\":\"香槟集市是中世纪欧洲经济全球化的起点——汇票（后来发展为银行体系）就是在这里诞生的。\"}),\n  E({\"id\":\"ck392\",\"name\":\"黑死病·欧洲\",\"en\":\"The Black Death\",\"region\":\"欧洲\",\"country\":\"跨区域\",\"era\":\"中古\",\"year\":1347,\"period\":\"1347-1353\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"灾变·瘟疫\",\"死亡·葬仪\"],\"atmos\":[\"三分之一人口死亡\",\"鞭笞者\",\"犹太人被当替罪羊\",\"劳动力短缺改变了社会结构\",\"死亡之舞\"],\"sensory\":\"（此坐标感官锚点从略——体验角度为幸存者视角：空了的房子、无人收割的田、教堂里堆不下的棺材）\",\"note\":\"极重坐标。黑死病不仅是瘟疫——它从根本上改变了欧洲的社会结构（劳动力短缺导致农奴制松动）。\"}),\n  E({\"id\":\"ck393\",\"name\":\"文艺复兴佛罗伦萨（美第奇时代）\",\"en\":\"Renaissance Florence\",\"region\":\"欧洲\",\"country\":\"意大利\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"美第奇银行\",\"布鲁内莱斯基穹顶\",\"波提切利\",\"达芬奇的工坊\",\"人文主义\"],\"sensory\":\"穹顶刚合龙，从底下仰望，像没有支撑地悬在半空。工坊里一个年轻人在画板上落笔——用的是左手。旁边另一人在凿一块大理石。楼上账房里，银行家在记账——这座城的画与雕像，都靠他的钱养着。\",\"note\":\"文艺复兴佛罗伦萨的体验核心是\\\"工坊\\\"——达芬奇、米开朗基罗等人是工匠出身，不是后来意义上的\\\"艺术家\\\"。\"}),\n  E({\"id\":\"ck394\",\"name\":\"威尼斯（共和国全盛期）\",\"en\":\"Venetian Republic\",\"region\":\"欧洲\",\"country\":\"意大利\",\"era\":\"近世\",\"year\":1550,\"period\":\"14-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"工艺·手艺\"],\"atmos\":[\"总督宫\",\"兵工厂（世界最早的流水线）\",\"玻璃岛穆拉诺\",\"嘉年华面具\",\"东方贸易垄断\"],\"sensory\":\"城建在水上，到处是船，看不见一辆马车。兵工厂的船坞连成一线，船壳顺着水道往前移，每过一站就被装上一截，一天能下水一艘桨帆战船。穆拉诺岛上有人在炉口吹玻璃——匠人不准离岛，配方是国家机密。嘉年华一到，满城戴面具，跟你搭话的不知是总督还是乞丐。\",\"note\":\"威尼斯兵工厂是工业革命前的\\\"工厂\\\"。穆拉诺岛的玻璃匠不得离岛——工业间谍在中世纪就是死罪。\"}),\n  E({\"id\":\"ck395\",\"name\":\"维滕贝格（马丁·路德·宗教改革）\",\"en\":\"Luther's Wittenberg\",\"region\":\"欧洲\",\"country\":\"德国\",\"era\":\"近世\",\"year\":1517,\"period\":\"1517\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"革命·变革\"],\"atmos\":[\"九十五条论纲\",\"赎罪券\",\"印刷术的传播力\",\"\\\"这是我的立场\\\"\",\"基督教永久分裂\"],\"sensory\":\"有人在教堂门上钉了一张纸——上面写着九十五条反对意见。以前这种事会被忽略——但有人把它拿去印了。一周之内整个德意志都在讨论。\",\"note\":\"印刷术使宗教改革成为可能——路德的文章在几周内传遍欧洲。\\\"第一次\\\"——第一次大规模的媒体事件。\"}),\n  E({\"id\":\"ck396\",\"name\":\"里斯本/塞维利亚（大航海出发港）\",\"en\":\"Ports of Discovery\",\"region\":\"欧洲\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\"],\"atmos\":[\"达伽马\",\"麦哲伦\",\"香料贸易\",\"卡拉维尔帆船\",\"出发时不知道能不能回来\"],\"sensory\":\"港口里有人在往船上装补给——够吃六个月的咸肉和饼干。出发的人跟家人告别——有些人知道一半的船不会回来。帆上画着十字。目的地是一张画了一半的地图上的空白处。\",\"note\":\"大航海的体验核心是\\\"出发\\\"——不知道前方有什么。\"}),\n  E({\"id\":\"ck397\",\"name\":\"荷兰黄金时代·阿姆斯特丹\",\"en\":\"Golden Age Amsterdam\",\"region\":\"欧洲\",\"country\":\"荷兰\",\"era\":\"近世\",\"year\":1650,\"period\":\"17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"艺术·表演\"],\"atmos\":[\"东印度公司\",\"伦勃朗的工坊\",\"郁金香泡沫\",\"运河\",\"世界第一个证券交易所\",\"宗教宽容\"],\"sensory\":\"运河边的仓库堆满东方来的香料和瓷器。交易所里有人买卖东印度公司的股份；街市和酒馆里，另一群人疯抢一种叫郁金香的球茎——一颗的价钱够买下一栋运河边的房子。画家在阁楼里作画，光从朝北的窗子进来。\",\"note\":\"郁金香泡沫（1637）是人类历史上第一次有记录的投机泡沫。\"}),\n  E({\"id\":\"ck398\",\"name\":\"凡尔赛宫（路易十四）\",\"en\":\"Versailles, Louis XIV\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近世\",\"year\":1650,\"period\":\"17世纪末-18世纪初\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"节庆·仪式\"],\"atmos\":[\"太阳王\",\"镜厅\",\"宫廷礼仪到极致\",\"国王的起床是公共仪式\",\"贵族被困在金笼子里\"],\"sensory\":\"国王每天起床是一场公开仪式——这位递衬衫，那位递长袜，每一步都由固定的贵族经手。镜厅点起两万支蜡烛，镜子把光映成两倍。花园大得要骑马才逛得完。可厕所不够用，有人就在走廊拐角解决。\",\"note\":\"凡尔赛的辉煌与肮脏并存——最华丽的宫殿、最恶劣的卫生条件。宫廷礼仪是一种政治控制工具。\"}),\n  E({\"id\":\"ck399\",\"name\":\"启蒙时代的巴黎咖啡馆\",\"en\":\"Enlightenment Paris\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近世\",\"year\":1750,\"period\":\"18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"饮食·宴席\"],\"atmos\":[\"伏尔泰\",\"卢梭\",\"百科全书派\",\"沙龙文化\",\"咖啡代替了酒\",\"理性的时代\"],\"sensory\":\"咖啡馆里争得面红耳赤——上帝到底存不存在？国王的权力又是从哪儿来的？有人在编一部百科全书，要把人世间所有的知识装进一套书。女主人的沙龙里，哲学家和贵族同坐一桌，这一刻谁也不问谁的出身。\",\"note\":\"启蒙时代的咖啡馆继承了奥斯曼帝国的传统——公共辩论空间。\"}),\n  E({\"id\":\"ck400\",\"name\":\"法国大革命·巴黎（1789）\",\"en\":\"French Revolution, 1789\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近代\",\"year\":1789,\"period\":\"1789\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"市井·庶民\"],\"atmos\":[\"攻占巴士底狱\",\"人权宣言\",\"面包暴动\",\"断头台还没来\"],\"sensory\":\"巴士底狱里其实没关几个犯人——真正要紧的是攻下它这件事。街上的人在喊——自由，平等。面包贵得离谱。有人当众念一份刚写出来的文件：人生来自由，权利平等。这说法是新的。\",\"note\":\"大革命的\\\"第一天\\\"——还没有恐怖统治，还只有希望。\"}),\n  E({\"id\":\"ck401\",\"name\":\"恐怖统治·巴黎\",\"en\":\"Reign of Terror\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近代\",\"year\":1793,\"period\":\"1793-1794\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"律法·审判\",\"死亡·葬仪\"],\"atmos\":[\"断头台\",\"罗伯斯庇尔\",\"革命吞噬自己的孩子\",\"恐惧笼罩巴黎\"],\"sensory\":\"革命广场上的断头台一天也没停。昨天还站在台上演讲的人，今天躺上去伸长了脖子。有人说革命还得继续清洗下去。有人已经不敢再开口。\",\"note\":\"与大革命初期形成残酷对照。\\\"革命自噬\\\"的体验。\"}),\n  E({\"id\":\"ck402\",\"name\":\"工业革命·曼彻斯特\",\"en\":\"Industrial Manchester\",\"region\":\"欧洲\",\"country\":\"英国\",\"era\":\"近代\",\"year\":-1750,\"period\":\"18世纪末-19世纪前半\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"奴役·压迫\"],\"atmos\":[\"棉纺厂\",\"童工\",\"煤烟\",\"蒸汽机\",\"工人阶级诞生\",\"恩格斯在这里写了《英国工人阶级状况》\"],\"sensory\":\"厂房里机器轰鸣，说话听不见，全靠打手势。棉絮在空中飘得像雪。有些工人还是孩子，手指细，钻得进机器缝里掏堵住的棉团。厂外的天是灰的，煤烟把太阳压成一个模糊的圆点。\",\"note\":\"工业革命的\\\"另一面\\\"——不是发明家和企业家，而是工厂里的工人和童工。\"}),\n  E({\"id\":\"ck403\",\"name\":\"维也纳会议后的沙龙（1815）\",\"en\":\"Congress of Vienna\",\"region\":\"欧洲\",\"country\":\"奥地利\",\"era\":\"近代\",\"year\":1814,\"period\":\"1814-1815\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"节庆·仪式\"],\"atmos\":[\"拿破仑被流放后的欧洲重组\",\"外交舞会\",\"梅特涅\",\"\\\"会议在跳舞但不在前进\\\"\"],\"sensory\":\"全欧洲的外交官都聚在维也纳，白天在桌上谈判，晚上在厅里跳舞。据说他们正划定往后五十年的欧洲版图。华尔兹刚时兴，有人嫌它搂得太近。\",\"note\":\"维也纳会议重塑了拿破仑后的欧洲秩序——但手段是舞会、宴席和密室谈判。\"}),\n  E({\"id\":\"ck404\",\"name\":\"爱尔兰大饥荒\",\"en\":\"Irish Great Famine\",\"region\":\"欧洲\",\"country\":\"爱尔兰\",\"era\":\"近代\",\"year\":1845,\"period\":\"1845-1852\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"灾变·瘟疫\",\"迁徙·流亡\"],\"atmos\":[\"马铃薯晚疫病\",\"百万人饿死\",\"百万人移民\",\"英国政府的不作为/恶意\",\"\\\"棺材船\\\"\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"极重坐标。饥荒十年间（1841–1851）爱尔兰人口从八百二十万跌到六百五十万——约一百万人饿死或病死，逾百万人渡海移民；此后几十年的持续外流，又把人口一路拖向四百万。灾难的根源不只是天灾——英国的粮食出口政策和地主制度是核心。\"}),\n  E({\"id\":\"ck405\",\"name\":\"1848年革命·维也纳/巴黎/柏林\",\"en\":\"Revolutions of 1848\",\"region\":\"欧洲\",\"country\":\"跨区域\",\"era\":\"近代\",\"year\":1848,\"period\":\"1848\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"市井·庶民\"],\"atmos\":[\"民族之春\",\"自由主义与民族主义同时爆发\",\"街垒\",\"\\\"旧秩序在颤抖\\\"\",\"最终失败\"],\"sensory\":\"几个月里，半个欧洲的街头都竖起街垒——维也纳、巴黎、柏林、布达佩斯。学生和工人并肩站着。各国君主都坐不安稳。可不到一年，这些革命几乎全部失败——旧秩序比看上去结实得多。\",\"note\":\"1848是欧洲革命传统的高潮和转折——\\\"旧制度的最后一次全面挑战在全面失败\\\"。\"}),\n  E({\"id\":\"ck406\",\"name\":\"1900年巴黎世博会\",\"en\":\"Paris Exposition, 1900\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"世纪之交\",\"year\":1900,\"period\":\"1900\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"节庆·仪式\",\"城市·都会\"],\"atmos\":[\"新世纪开端\",\"电力照明\",\"自动扶梯\",\"柴油发动机\",\"艺术新风格\",\"全球来客\"],\"sensory\":\"整座城被电灯点亮——电光比烛火亮得多，而且不抖。有一截会自己往上走的楼梯。展馆里摆着全世界的东西：日本的漆器、最新的机器，还有把殖民地的人圈进栅栏供人参观的“活人展”。所有人都相信，二十世纪会是最好的世纪。\",\"note\":\"1900年世博会是\\\"进步乐观主义\\\"的巅峰——十四年后第一次世界大战会粉碎这种乐观。\"}),\n  E({\"id\":\"ck407\",\"name\":\"一战·西线战壕\",\"en\":\"Western Front Trenches\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"世纪之交\",\"year\":1914,\"period\":\"1914-1918\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"死亡·葬仪\"],\"atmos\":[\"堑壕战\",\"无人区\",\"毒气\",\"\\\"圣诞停火\\\"\",\"一代人被消耗\"],\"sensory\":\"（此坐标感官锚点从略——体验角度为堑壕中的等待：泥泞、老鼠、间歇的炮声、写家信）\",\"note\":\"极重坐标。体验角度限定为堑壕中的日常等待（而非战斗场面）——恐惧、无聊和泥泞的混合。圣诞停火是一个可能的更轻松切入点。\"}),\n  E({\"id\":\"ck408\",\"name\":\"魏玛柏林（1920s）\",\"en\":\"Weimar Berlin\",\"region\":\"欧洲\",\"country\":\"德国\",\"era\":\"世纪之交\",\"year\":1920,\"period\":\"1920s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"性·情色\"],\"atmos\":[\"卡巴莱\",\"包豪斯\",\"通胀\",\"爵士乐\",\"表现主义\",\"自由与混乱\",\"纳粹还在角落里\"],\"sensory\":\"夜总会里，穿男装的女人和穿女装的男人一起旋转。包豪斯的教室里，有人在画不带一丝装饰的家具——他们说这就是未来。可早上买一块面包的钱，到下午只够买半块。街角一群穿制服的年轻人在集会，嗓门一天比一天大。\",\"note\":\"魏玛柏林是\\\"自由的最后几年\\\"——文化爆发与政治灾难同时酝酿。\"}),\n  E({\"id\":\"ck409\",\"name\":\"二战·伦敦闪电战\",\"en\":\"The London Blitz\",\"region\":\"欧洲\",\"country\":\"英国\",\"era\":\"世纪之交\",\"year\":1940,\"period\":\"1940-1941\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"轰炸\",\"防空洞\",\"地铁站过夜\",\"灯火管制\",\"消防队\",\"日常中的英雄主义\"],\"sensory\":\"防空警报响起。地铁站台上躺满了人，带着毯子和热水瓶。头顶一声闷响——又一栋楼塌了。早上钻出来，昨天还在的面包店成了一堆砖。可隔壁的酒馆居然开着门，黑板上写着“照常营业”。\",\"note\":\"闪电战体验角度是平民——防空洞、地铁站、\\\"照常营业\\\"的倔强。\"}),\n  E({\"id\":\"ck410\",\"name\":\"柏林墙倒塌\",\"en\":\"Fall of the Berlin Wall\",\"region\":\"欧洲\",\"country\":\"德国\",\"era\":\"战后·当代\",\"year\":1989,\"period\":\"1989\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"节庆·仪式\"],\"atmos\":[\"东西德统一\",\"冷战结束\",\"人群涌过检查站\",\"凿墙\",\"历史在电视直播中发生\"],\"sensory\":\"有人说边界开了——起初没人敢信。接着人群涌向检查站。卫兵不知所措。有人爬上墙头，在墙上跳舞。有人抡起锤子凿墙，敲下的混凝土碎块成了纪念品。墙两边的人都在哭。\",\"note\":\"20世纪最具希望感的\\\"第一次\\\"之一。\"}),\n  E({\"id\":\"ck411\",\"name\":\"基辅罗斯（第聂伯河上的瓦良格之路）\",\"en\":\"Kievan Rus\",\"region\":\"欧洲\",\"country\":\"基辅罗斯\",\"era\":\"中古\",\"year\":1250,\"period\":\"9-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"贸易·商业\",\"河流·水乡\"],\"atmos\":[\"瓦良格（北欧）人沿第聂伯河南下\",\"\\\"从瓦良格到希腊\\\"的水路\",\"弗拉基米尔受洗皈依东正教（988）\",\"基辅圣索菲亚大教堂\",\"蜂蜜·毛皮·蜡的贸易\",\"1240年被蒙古夷平\"],\"sensory\":\"宽阔的河上，北边来的长船满载毛皮和蜡，要一路划到南边的拜占庭去换丝绸和银币。河岸上新起一座金顶教堂，墙上贴满金底的圣像马赛克——大公刚带全城人下河受了洗，说从今只拜一个神。集市上斯拉夫语、北欧话、希腊话混在一起。\",\"note\":\"基辅罗斯是东斯拉夫人第一个国家，由北欧瓦良格人（留里克家族）沿\\\"从瓦良格到希腊\\\"的第聂伯河商路建立。988年弗拉基米尔大公受洗，引入拜占庭东正教，奠定了俄、乌、白俄的宗教与文化底色。基辅圣索菲亚大教堂即此时兴建。1240年基辅被蒙古（拔都）攻陷夷平。\"}),\n  E({\"id\":\"ck412\",\"name\":\"诺夫哥罗德（桦树皮信件的商人共和国）\",\"en\":\"Novgorod Republic\",\"region\":\"欧洲\",\"country\":\"俄罗斯·诺夫哥罗德\",\"era\":\"中古\",\"year\":1450,\"period\":\"12-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"贸易·商业\",\"学问·书写\"],\"atmos\":[\"市民大会（veche）选官·\\\"主公大诺夫哥罗德\\\"\",\"写在桦树皮上的日常信件\",\"汉萨同盟的商站\",\"躲过蒙古铁蹄\",\"亚历山大·涅夫斯基拒退十字军\",\"圣像画\"],\"sensory\":\"广场上钟一敲，市民聚拢开会，连请来的王公也能被轰走。街市泥地里埋着一卷卷桦树皮——上面用硬笔划着字：欠债的、求爱的、母亲骂儿子的，寻常人也会写。汉萨商人的院子里堆着蜡和毛皮。蒙古的兵没打到这片沼泽林子来。\",\"note\":\"诺夫哥罗德共和国（约1136-1478）由市民大会（veche）选举官员、延请并罢免王公，自称\\\"主公大诺夫哥罗德\\\"。出土的大量桦树皮文书显示普通市民也能读写，内容从账目到情书无所不包。它是汉萨同盟东端商站，靠沼泽与林地躲过蒙古直接征服，最终被莫斯科的伊凡三世吞并。\"}),\n  E({\"id\":\"ck413\",\"name\":\"伊凡雷帝的莫斯科（圣瓦西里与特辖军）\",\"en\":\"Ivan the Terrible\",\"region\":\"欧洲\",\"country\":\"俄罗斯\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"第一位\\\"全俄沙皇\\\"\",\"攻灭喀山·圣瓦西里大教堂\",\"特辖区（oprichnina）的黑衣骑兵恐怖\",\"洗劫诺夫哥罗德\",\"盛怒中打死亲生儿子\",\"\\\"第三罗马\\\"\"],\"sensory\":\"红场边新起一座教堂，几个洋葱顶拧着花、刷着艳色，像一团凝住的火焰——是为打下喀山修的。城里人却低头快走：一队黑袍黑马的人巡过，马鞍上拴着扫帚和狗头，想抓谁就抓谁，没人敢问。宫里的沙皇喜怒无常，传说他失手打死了亲生儿子。\",\"note\":\"伊凡四世（雷帝，1547年加冕为首位\\\"全俄沙皇\\\"）攻灭喀山、阿斯特拉罕汗国，为纪念胜利修建圣瓦西里大教堂。他设特辖区（oprichnina），以黑衣骑兵（马鞍挂扫帚与狗头）施行恐怖统治，1570年血洗诺夫哥罗德，晚年盛怒中打死太子。莫斯科以\\\"第三罗马\\\"自居，确立沙皇专制。\"}),\n  E({\"id\":\"ck414\",\"name\":\"托莱多（三教共存与翻译之城）\",\"en\":\"Toledo\",\"region\":\"欧洲\",\"country\":\"西班牙\",\"era\":\"中古\",\"year\":1250,\"period\":\"12-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"基督徒收复后穆斯林·犹太人·基督徒共处\",\"托莱多翻译院\",\"把阿拉伯文的希腊典籍译成拉丁文传回欧洲\",\"三面环河的台地古城\",\"钢剑名匠\"],\"sensory\":\"城建在三面环河的高岩上。一座院子里几个学者围着一卷阿拉伯文手稿：懂阿拉伯语的犹太人先口译成本地话，旁边教士再落笔写成拉丁文——亚里士多德、医书、星表就这么一部部传回北边。街上清真寺、会堂和教堂隔不了几步，铁匠铺淬着名闻远近的好剑。\",\"note\":\"托莱多1085年归卡斯蒂利亚后，一度保持穆斯林、犹太人、基督徒\\\"三教共存\\\"（convivencia）。12-13世纪的托莱多翻译院把大量阿拉伯文（及经阿拉伯保存的希腊）典籍——亚里士多德、欧几里得、医学、天文——译为拉丁文，是古典学问回流西欧的关键通道。\"}),\n  E({\"id\":\"ck415\",\"name\":\"哈布斯堡西班牙·黄金世纪\",\"en\":\"Habsburg Spain\",\"region\":\"欧洲\",\"country\":\"西班牙\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"艺术·表演\",\"殖民·帝国\"],\"atmos\":[\"腓力二世与埃斯科里亚尔宫\",\"美洲白银涌入\",\"\\\"日不落帝国\\\"\",\"塞万提斯/委拉斯开兹/格列柯的黄金世纪\",\"宗教裁判所与\\\"血统纯净\\\"\",\"无敌舰队的覆灭\"],\"sensory\":\"马德里近郊一座灰石大宫，方正冷峻，既是王宫也是修道院，国王在里头像修士一样办公、祈祷。港口卸下一箱箱从美洲运来的白银，可它们多半转手就流去还债、打仗了。画室里画家给侏儒和公主画像。街角有人被宗教裁判所带走——只因祖上是改信的犹太人。\",\"note\":\"16-17世纪哈布斯堡西班牙是横跨欧美的\\\"日不落\\\"帝国。腓力二世修建埃斯科里亚尔宫，美洲（波托西）白银源源涌入却多耗于战争与债务。这也是文学艺术的\\\"黄金世纪\\\"（塞万提斯、委拉斯开兹、格列柯）；与之并存的是宗教裁判所、\\\"血统纯净\\\"之查与1588年无敌舰队的惨败。\"}),\n  E({\"id\":\"ck416\",\"name\":\"波兰立陶宛联邦（贵族共和与翼骑兵）\",\"en\":\"Polish-Lithuanian Commonwealth\",\"region\":\"欧洲\",\"country\":\"波兰·立陶宛\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"律法·审判\",\"战争·军事\"],\"atmos\":[\"选王制·贵族（szlachta）民主\",\"一票否决（liberum veto）\",\"欧洲最大的犹太人避风港\",\"克拉科夫瓦维尔城堡\",\"背插巨翅的翼骑兵\",\"欧洲面积最大的国家之一\"],\"sensory\":\"旷野上一队骑兵冲来，背后插着高高的羽翅，疾驰时呼呼作响，像一片扑过来的怪鸟。这国家没有世袭的王——贵族们聚在一起选，一个人喊\\\"不准\\\"，整场议事就得作罢。城里的犹太社区比别处都大、都安稳，会堂烛火彻夜不熄。瓦维尔山上的王宫俯瞰河湾。\",\"note\":\"波兰立陶宛联邦（1569年卢布林联合）是选王制的\\\"贵族共和国\\\"，贵族（szlachta）享\\\"黄金自由\\\"，一票否决（liberum veto）可瘫痪议会。它以宗教宽容著称，是当时欧洲最大的犹太人聚居与避难地；翼骑兵是其标志性重骑兵。鼎盛时为欧洲面积最大的国家之一，18世纪末被三次瓜分而亡。\"}),\n  E({\"id\":\"ck417\",\"name\":\"汉萨同盟（没有国家的贸易帝国）\",\"en\":\"Hanseatic League\",\"region\":\"欧洲\",\"country\":\"德意志·汉萨\",\"era\":\"中古\",\"year\":1450,\"period\":\"13-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"海洋·港口\",\"城市·都会\"],\"atmos\":[\"吕贝克为首的波罗的海·北海商业城市联盟\",\"宽肚的柯克商船\",\"各地的商站（kontor）\",\"咸鳕鱼·鲱鱼·琥珀·毛皮\",\"没有君主只有商人\",\"布鲁日到诺夫哥罗德\"],\"sensory\":\"码头上，宽肚子的柯克船一艘接一艘卸货：成桶的咸鲱鱼、晒硬的鳕鱼、北方的琥珀和毛皮。仓库账房里，几座城市的商人在核对契约——他们不效忠哪位国王，只认彼此的盟约和信誉。同样的砖砌山墙房，从布鲁日一直排到波罗的海对岸。\",\"note\":\"汉萨同盟是13-15世纪以吕贝克为首、覆盖波罗的海与北海的商业城市联盟，在伦敦、布鲁日、卑尔根、诺夫哥罗德等地设商站（kontor）。它垄断咸鱼、谷物、木材、毛皮、琥珀贸易，用柯克船运货——是一个\\\"没有国家、只有城市与商人\\\"的贸易网络，15世纪后渐衰。\"}),\n  E({\"id\":\"ck418\",\"name\":\"文艺复兴的教皇罗马（西斯廷的天顶）\",\"en\":\"Papal Rome\",\"region\":\"欧洲\",\"country\":\"意大利·罗马\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"宫廷·王权\"],\"atmos\":[\"尤利乌斯二世\\\"战神教皇\\\"\",\"米开朗基罗仰画西斯廷天顶\",\"拉斐尔的壁画\",\"重建圣彼得大教堂\",\"卖赎罪券筹款（点燃路德）\",\"1527年罗马之劫\"],\"sensory\":\"礼拜堂里搭着高高的脚手架，一个人仰躺在顶上，颜料滴到脸上，一笔笔画着天顶——亚当伸出的指尖快要碰到上帝。隔壁旧的圣彼得大教堂被拆了重建，烧钱如流水。为筹钱，教廷的人正满欧洲叫卖赎罪券——海那头一个德意志修士已经气得要写点什么了。\",\"note\":\"16世纪初的罗马是文艺复兴鼎盛之地：尤利乌斯二世延请米开朗基罗绘西斯廷天顶（1508-1512）、拉斐尔作壁画、布拉曼特重建圣彼得大教堂。重建工程靠贩卖赎罪券筹资，直接激起1517年路德的抗议。1527年神圣罗马皇帝的哗变军队洗劫罗马，盛世骤止。\"}),\n  E({\"id\":\"ck419\",\"name\":\"萨米·拉普兰（驯鹿与鼓声）\",\"en\":\"The Sami\",\"region\":\"欧洲\",\"country\":\"北欧·萨米\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以前近代最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"北欧最北的原住民（旧称\\\"拉普人\\\"）\",\"跟着驯鹿群转场的西达（siida）\",\"尖顶帐篷lavvu\",\"独特的约伊克（joik）吟唱\",\"诺埃迪萨满的鼓被传教士烧毁\",\"鲜艳的gákti服饰\",\"被强制基督教化与同化\"],\"sensory\":\"极地的雪原上，一大群驯鹿在迁徙，牧人跟着走，住的是能随时拆装的尖顶帐篷。夜里有人哼起一种古怪的调子——约伊克，不是唱给谁听，而是用声音\\\"成为\\\"那个人、那头鹿、那座山。从前萨满会敲一面画满符号的鼓占卜通灵，可那些鼓后来大多被传教士当作魔物烧掉了。\",\"note\":\"萨米人是北欧极北（挪威、瑞典、芬兰北部及俄罗斯科拉半岛，合称萨普米）的原住民，旧称\\\"拉普人\\\"（现视为贬称）。他们半游牧式地随驯鹿群转场，住尖顶帐篷lavvu，以独特的约伊克（joik）吟唱著称——一种\\\"成为\\\"对象而非描述对象的声音。萨满（noaidi）的符文鼓多被基督教传教士焚毁；近代萨米长期遭强制同化。\"}),\n  E({\"id\":\"ck420\",\"name\":\"高卢·德鲁伊与维钦托利\",\"en\":\"Gauls & Druids\",\"region\":\"欧洲\",\"country\":\"高卢·凯尔特\",\"era\":\"古典\",\"year\":-50,\"period\":\"前1世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"战争·军事\",\"学问·书写\"],\"atmos\":[\"铁器时代的大陆凯尔特人\",\"橡树林里的德鲁伊祭司（口传不立文字·掌祭祀与律法）\",\"槲寄生·活人献祭的传说\",\"山顶土堡（oppidum）\",\"维钦托利联合高卢抗凯撒\",\"阿莱西亚之围的投降\",\"金颈圈与猎头\"],\"sensory\":\"橡树林深处，白袍的德鲁伊割下槲寄生，主持祭典——这些祭司什么都靠脑子记，一个字不写，却管着祭祀、断案和算历。罗马人说他们会把活人塞进柳条编的巨人里烧掉，真假难辨。山顶的木栅大寨里，各部落头一回推举一个共主，要合力把凯撒赶出去。可最后那场围城，他骑马出阵，把武器丢在征服者脚下。\",\"note\":\"铁器时代的大陆凯尔特人（拉坦诺文化）以德鲁伊祭司著称——他们掌祭祀、律法与学问，全凭口传不立文字，在橡树林中举行仪式（槲寄生、据凯撒记载有活人献祭）。前52年维钦托利联合高卢诸部反抗凯撒，兵败阿莱西亚之围后出降。凯尔特人以金颈圈、精美金工和\\\"猎头\\\"（割取敌首）的风习闻名。\"}),\n  E({\"id\":\"ck421\",\"name\":\"保加利亚·西里尔字母的诞生\",\"en\":\"Birth of Cyrillic\",\"region\":\"欧洲\",\"country\":\"保加利亚\",\"era\":\"中古\",\"year\":950,\"period\":\"9-10世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"第一保加利亚帝国\",\"鲍里斯一世受洗皈依东正教\",\"西美昂大帝的文化盛世\",\"奥赫里德与普雷斯拉夫的文书学校\",\"西里尔与美多德弟子据其名造西里尔字母\",\"古教会斯拉夫语典籍\",\"字母从这里传向斯拉夫世界\"],\"sensory\":\"修道院的缮写室里，僧人伏案抄经，用的是一套新造的字母——为斯拉夫语量身定做，好让经文不必再借希腊文或拉丁文。这套字以一位传教士\\\"西里尔\\\"命名。学者们把希腊的典籍一部部译过来，又写下自己的。从这间屋子出去的字母，日后会被罗斯人、塞尔维亚人一并用上，写满半个斯拉夫世界。\",\"note\":\"第一保加利亚帝国的鲍里斯一世于864年受洗、引入东正教，其子西美昂大帝（893-927）开创文化盛世。西里尔与美多德的弟子（克莱门特、瑙姆等）在奥赫里德、普雷斯拉夫的文书学校里，于早期格拉哥里字母基础上发展出以\\\"西里尔\\\"命名的字母，奠定古教会斯拉夫语文献。这套字母此后为俄、塞等斯拉夫民族沿用至今。\"}),\n  E({\"id\":\"ck422\",\"name\":\"冰岛·阿尔庭与萨迦\",\"en\":\"Althing & Sagas\",\"region\":\"欧洲\",\"country\":\"冰岛\",\"era\":\"中古\",\"year\":1250,\"period\":\"10-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"宗教·信仰\",\"迁徙·流亡\"],\"atmos\":[\"北欧人渡海拓殖的火山岛\",\"930年立\\\"阿尔庭\\\"（世界最古老的议会之一）\",\"没有国王的自由邦\",\"辛格韦德利的\\\"法律石\\\"上诵法\",\"公元1000年议会表决全岛改信基督教\",\"血亲复仇与冰岛萨迦\",\"无树的熔岩荒原\"],\"sensory\":\"一片没有树的黑色熔岩荒原，裂谷间立着一块高石——每年夏天，全岛的自由民聚到这里开\\\"阿尔庭\\\"。没有国王，\\\"诵法人\\\"站在石上，把全部法律一条条背给众人听，纠纷也在这儿评断。公元一千年那回，全岛要不要弃旧神改信基督，竟是在这议事会上表决定下的。漫长冬夜里，人们一遍遍讲着家族世仇的故事，后来都写成了萨迦。\",\"note\":\"冰岛由北欧人于9-10世纪渡海拓殖，930年在辛格韦德利创设\\\"阿尔庭\\\"（Alþingi），是世界上最古老的议会之一，开启了无国王的\\\"冰岛自由邦\\\"。诵法人站在\\\"法律石\\\"上背诵法律。公元1000年，全岛改信基督教是经阿尔庭表决和平决定的。冰岛的家族萨迦与斯诺里的《埃达》保存了大量北欧神话与世仇叙事。\"}),\n  E({\"id\":\"ck423\",\"name\":\"奥尔梅克（中美洲之母文明）\",\"en\":\"The Olmec\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"上古\",\"year\":-1500,\"period\":\"约前1500-前400\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"丛林·热带\",\"工艺·手艺\",\"宗教·信仰\"],\"atmos\":[\"巨石人头像\",\"橡胶球戏\",\"玉米文明的源头\",\"中美洲第一个复杂社会\"],\"sensory\":\"丛林边的空地上立着一颗石头人头——比人还高，几十吨重，厚嘴唇、宽鼻子，头上是头盔状的帽子。空地另一头有人在打球，用胯把沉甸甸的橡胶球顶来顶去，不许用手。玉米地一直铺到林子脚下。\",\"note\":\"奥尔梅克是中美洲后续文明（玛雅、阿兹特克）的文化母体。巨石人头用的玄武岩采自数十公里外的山区，如何运来、如何雕成至今没有定论。\"}),\n  E({\"id\":\"ck424\",\"name\":\"蒂卡尔（玛雅古典期）\",\"en\":\"Maya Tikal\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"古典\",\"year\":250,\"period\":\"约250-900\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\",\"战争·军事\"],\"atmos\":[\"丛林中的金字塔\",\"象形文字（大部分已破译）\",\"天文历法\",\"血祭\",\"城邦战争\"],\"sensory\":\"从金字塔顶望出去，丛林树冠铺成一片绿色的海，别的城邦的塔尖从远处林子里戳出来。脚下的石碑刻着国王的血统和战功——他用黄貂鱼的尖刺穿过舌头，血滴在树皮纸上，烧给神。\",\"note\":\"玛雅文字是美洲唯一的完整书写系统。血祭（国王自身放血）是宗教义务。\"}),\n  E({\"id\":\"ck425\",\"name\":\"玛雅·古典期崩溃\",\"en\":\"Maya Collapse\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"中古\",\"year\":800,\"period\":\"约800-1000\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"灾变·瘟疫\",\"丛林·热带\"],\"atmos\":[\"城市被弃\",\"原因至今争议（旱灾/战争/生态崩溃）\",\"丛林吞噬金字塔\"],\"sensory\":\"城市空了——不像被攻破的样子，人就是渐渐走光了。水池干了。玉米种不活了。丛林开始从城市边缘往里长——十年后石碑被藤蔓缠住，一百年后金字塔变成了长满树的小山。\",\"note\":\"玛雅古典期崩溃是人类历史上最大的文明\\\"消失\\\"谜团之一——不是被征服，而是被抛弃。\"}),\n  E({\"id\":\"ck426\",\"name\":\"特诺奇提特兰（阿兹特克帝国）\",\"en\":\"Aztec Tenochtitlan\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"近世\",\"year\":1550,\"period\":\"14-16世纪初\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"湖中之城\",\"水上菜畦（奇南帕）\",\"大神庙（血祭）\",\"特拉特洛尔科大市场\",\"人口二十万以上\"],\"sensory\":\"一座建在湖心的城，几条堤道伸向岸边。市场上几万人在买卖，可可豆当钱使。大神庙的台阶上结着暗红的痂。湖面上一格一格的菜畦——奇南帕——青菜长得正好。远处两座雪山在蓝天下发亮。\",\"note\":\"特诺奇提特兰在科尔特斯到达时是世界上最大的城市之一——比伦敦大。人祭是真实的但不应成为唯一标签。\"}),\n  E({\"id\":\"ck427\",\"name\":\"特诺奇提特兰的陷落\",\"en\":\"Fall of Tenochtitlan\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"近世\",\"year\":1521,\"period\":\"1521\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"灾变·瘟疫\",\"战争·军事\"],\"atmos\":[\"科尔特斯\",\"天花\",\"特拉斯卡拉盟友\",\"莫克特苏马二世\",\"湖中之城变成废墟\"],\"sensory\":\"先来的是疾病——一种从没见过的病，长红疹的人一个接一个死去。然后是陌生的人——骑着没见过的动物，穿着铁衣服。湖水被尸体堵住了。城市在燃烧。几个月后，这座湖上之城变成了一座新城市的地基。\",\"note\":\"美洲原住民人口因旧世界疾病锐减约90%。天花比军事征服更致命。特诺奇提特兰的废墟上建起了墨西哥城。\"}),\n  E({\"id\":\"ck428\",\"name\":\"库斯科/马丘比丘（印加帝国）\",\"en\":\"Inca Cusco\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪初\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"山地·高原\",\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"太阳神殿\",\"没有文字但有结绳记事（奇普）\",\"安第斯山脉\",\"驼马\",\"梯田农业\"],\"sensory\":\"海拔很高——呼吸有点费劲。石墙的缝隙里插不进一片刀刃。没有轮子、没有铁、没有文字——但帝国从厄瓜多尔延伸到智利。信使用结绳传递信息——每个绳结代表一个数字或意思。远处的梯田从山脚一直修到云里。\",\"note\":\"印加帝国是人类历史上最大的\\\"无文字帝国\\\"。奇普（结绳记事）的完整破译至今未完成。马丘比丘在西班牙征服者到来时可能已经被弃用。\"}),\n  E({\"id\":\"ck429\",\"name\":\"印加帝国的灭亡\",\"en\":\"Fall of the Inca\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"近世\",\"year\":1532,\"period\":\"1532-1533\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"战争·军事\",\"末世·终结\"],\"atmos\":[\"皮萨罗\",\"卡哈马卡伏击\",\"阿塔瓦尔帕被俘\",\"一间屋子的赎金（金银填满房间）\",\"帝国解体\"],\"sensory\":\"广场上有几千印加战士——没有武器，因为他们来见的是\\\"客人\\\"。然后枪响了。国王被抓了。他答应用金子填满一间屋子来赎自己。金子来了——但他还是被杀了。\",\"note\":\"卡哈马卡伏击是\\\"文明碰撞\\\"最残酷的案例之一——168个西班牙人俘获了一个帝国的皇帝。\"}),\n  E({\"id\":\"ck430\",\"name\":\"卡霍基亚（密西西比文化）\",\"en\":\"Cahokia\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"中古\",\"year\":1050,\"period\":\"约1050-1350\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"宗教·信仰\"],\"atmos\":[\"北美最大的前哥伦布城市\",\"僧人丘（巨大的土丘）\",\"玉米农业\",\"太阳历\",\"人口过万\"],\"sensory\":\"一座巨大的土丘——比你见过的任何建筑都大，是用篮子一筐一筐堆起来的。城市周围是一圈木桩围栏。有人在观察日出的位置——木柱排成的圆圈是一种日历。\",\"note\":\"卡霍基亚鼎盛时期人口可能超过伦敦。它的存在打破了\\\"北美没有城市文明\\\"的成见。\"}),\n  E({\"id\":\"ck431\",\"name\":\"伊洛魁联盟\",\"en\":\"Iroquois Confederacy\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"近世\",\"year\":1750,\"period\":\"15-18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"女性空间\"],\"atmos\":[\"五部落联盟（后增至六部落）\",\"长屋\",\"母系长老选酋长\",\"大和平法则\",\"口传宪法\"],\"sensory\":\"长屋很长——里面住着整个母系家族。女性长老在选举新的酋长——男性参选，女性投票。联盟议事会上每个部落有同等发言权。据说很远的地方有人在写一部新宪法——借鉴了这里的制度。\",\"note\":\"伊洛魁联盟的政治结构被认为影响了美国宪法的设计。女性在政治中的核心角色在当时世界上极为罕见。\"}),\n  E({\"id\":\"ck432\",\"name\":\"普利茅斯殖民地（清教徒）\",\"en\":\"Plymouth Colony\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"近世\",\"year\":1620,\"period\":\"1620s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"迁徙·流亡\",\"宗教·信仰\"],\"atmos\":[\"五月花号\",\"第一个冬天（半数人死亡）\",\"感恩节原型\",\"与万帕诺亚格人的关系\"],\"sensory\":\"第一个冬天有一半人死了。春天有一个原住民走过来——他说英语。他教你怎么种玉米。秋天的时候收成够了，一起吃了一顿饭。但这个关系不会永远这样。\",\"note\":\"感恩节的\\\"原型\\\"故事——但后续的殖民扩张和原住民灭绝使这个故事变得远比表面复杂。\"}),\n  E({\"id\":\"ck433\",\"name\":\"淘金热·旧金山/萨克拉门托\",\"en\":\"California Gold Rush\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"近代\",\"year\":1848,\"period\":\"1848-1855\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"市井·庶民\",\"城市·都会\"],\"atmos\":[\"四九年淘金客（forty-niners）\",\"一夜暴富与一夜破产\",\"华人矿工\",\"帐篷城市\",\"法律真空\"],\"sensory\":\"整条河谷都是人——蹲在水边淘洗沙砾。有人找到了一颗——金色的，在阳光下闪。帐篷城市一夜之间冒出来又消失。有人发了财，更多人没有。有些面孔来自很远的东方——他们被叫做\\\"celestials\\\"。\",\"note\":\"淘金热是19世纪全球人口流动的缩影——包括大量华人矿工。\"}),\n  E({\"id\":\"ck434\",\"name\":\"美国南方种植园\",\"en\":\"Antebellum Plantation\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"迁徙·流亡\"],\"atmos\":[\"棉花种植\",\"奴隶制\",\"大宅与奴隶小屋\",\"地下铁路（逃亡网络）\"],\"sensory\":\"（此坐标感官锚点从略——体验角度限定为被奴役者视角）\",\"note\":\"极重坐标。体验角度严格限定为被奴役者/逃亡者视角。\"}),\n  E({\"id\":\"ck435\",\"name\":\"波托西银矿（西属美洲）\",\"en\":\"Potosí Silver Mines\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"玻利维亚\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"贸易·商业\",\"山地·高原\"],\"atmos\":[\"\\\"富得像波托西\\\"\",\"世界白银供给的一半\",\"米塔制（强制劳动）\",\"原住民矿工\",\"海拔四千米\"],\"sensory\":\"海拔太高了——头疼，喘不上气。银山像被啃过——到处是矿洞。矿工进去的时候嚼古柯叶——据说能扛住缺氧和饥饿。城里有歌剧院和教堂——用银子装饰的。但矿洞里的人平均活不过几年。\",\"note\":\"波托西的白银流入全球经济改变了世界——中国明朝的白银货币化、西班牙的通胀、全球贸易网络的形成都与此相关。\"}),\n  E({\"id\":\"ck436\",\"name\":\"海地革命·圣多明各\",\"en\":\"Haitian Revolution\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"海地\",\"era\":\"近代\",\"year\":1791,\"period\":\"1791-1804\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"奴役·压迫\",\"战争·军事\"],\"atmos\":[\"杜桑·卢维杜尔\",\"奴隶起义建国\",\"打败拿破仑派来的远征军\",\"美洲第一个永久废除奴隶制的独立国家\"],\"sensory\":\"种植园在烧——是奴隶们自己点的火。他们不再是奴隶了。一个当过奴隶的人当上了将军，打败了当时世界上最强的军队。1804年元旦，一个新国家宣告成立。它叫海地——原住民的词，意思是“多山之地”，不是殖民者起的名。\",\"note\":\"海地革命是人类历史上唯一一次奴隶起义成功建国的案例。常被主流历史叙事忽略。\"}),\n  E({\"id\":\"ck437\",\"name\":\"波利尼西亚航海者（太平洋远航）\",\"en\":\"Polynesian Navigators\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"太平洋诸岛\",\"era\":\"古典\",\"year\":-1000,\"period\":\"约前1000-1300\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"迁徙·流亡\",\"工艺·手艺\"],\"atmos\":[\"星象导航\",\"双体独木舟\",\"太平洋三角（夏威夷/新西兰/复活节岛）\",\"没有指南针跨越最大海洋\"],\"sensory\":\"双体独木舟在太平洋上。夜里看星星定方位——不同的星星在不同的季节升起。海浪的方向、云的形状、鸟的飞行路线都是信息。你不知道前方有没有陆地——但导航者说一定有。几周后，海平线上出现了一座山。\",\"note\":\"波利尼西亚人在没有文字、没有金属工具、没有指南针的条件下殖民了太平洋——人类迁徙史上最壮观的航海成就。\"}),\n  E({\"id\":\"ck438\",\"name\":\"复活节岛（拉帕努伊）\",\"en\":\"Rapa Nui\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"太平洋诸岛\",\"era\":\"中古\",\"year\":1000,\"period\":\"约1000-1600\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\",\"灾变·瘟疫\"],\"atmos\":[\"摩艾石像\",\"棕榈林消失（人砍叠加鼠啃）\",\"鸟人祭仪\",\"极端隔离的文明\"],\"sensory\":\"石像排列在海边——背朝大海，面朝内陆，像在守护什么。整座岛上几乎没有树了。有人在采石场用石斧雕刻一尊新的石像——但搬运它比雕刻它更难。据说他们用木头滚筒运——但木头快用完了。\",\"note\":\"复活节岛长期被当作“文明自毁”的样板——为造摩艾砍光森林、招致生态崩溃。近年研究推翻了这套说法：棕榈林消失更主要是随人偷渡上岛的波利尼西亚鼠啃食棕榈种子所致，而岛民人口与文化的真正崩溃发生在欧洲人到来之后，源于外来疾病和奴隶劫掠。\"}),\n  E({\"id\":\"ck439\",\"name\":\"毛利·新西兰（欧洲人到达前）\",\"en\":\"Pre-contact Māori\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"新西兰\",\"era\":\"中古\",\"year\":1300,\"period\":\"约1300-1769\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\",\"战争·军事\"],\"atmos\":[\"瓦卡（独木舟/战舟）\",\"哈卡舞\",\"毛利会堂（wharenui）\",\"纹面（tā moko）\",\"绿石（pounamu/软玉）\",\"猎恐鸟\"],\"sensory\":\"会堂的每一根柱子和横梁上都刻着祖先的脸——眼睛是鲍鱼壳镶的。有人在刺面——骨制工具在皮肤上凿出螺旋纹路，每条线都记录着身份和家族。远处有人在追一种大鸟——比人还高，不会飞。\",\"note\":\"毛利文化的视觉标识（纹面、木雕、翡翠）极为鲜明。恐鸟在毛利人到达后约两百年内灭绝。\"}),\n  E({\"id\":\"ck440\",\"name\":\"澳大利亚原住民（梦创时代·通史）\",\"en\":\"Aboriginal Dreamtime\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"澳大利亚\",\"era\":\"史前\",\"year\":0,\"period\":\"通时代（六万年以上的持续文化）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"学问·书写\"],\"atmos\":[\"梦创时代（Dreamtime）\",\"岩画\",\"回力标\",\"火棍耕作\",\"歌之路（Songlines）\",\"人类最古老的持续文化\"],\"sensory\":\"岩壁上画着手印和动物——有些画的颜料已经几万年了。长老在教一首歌——这首歌就是一张地图，唱完它你就能穿越整片沙漠。有人在用火烧草地——不是破坏，是用火来管理土地，让新草长出来吸引猎物。\",\"note\":\"澳大利亚原住民文化是人类现存最古老的持续文化——超过六万年。歌之路（用歌曲导航的地图系统）是人类认知史上最独特的发明之一。\"}),\n  E({\"id\":\"ck441\",\"name\":\"跨大西洋奴隶贸易·中间通道（船上）\",\"en\":\"The Middle Passage\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1850,\"period\":\"16-19世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"海洋·港口\",\"贸易·商业\"],\"atmos\":[\"几周的航行\",\"挤在船舱底\",\"三角贸易\",\"人变成货物\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"极重坐标。体验角度限定为被贩卖者。船舱条件是人类历史上最极端的非人化体验之一。\"}),\n  E({\"id\":\"ck442\",\"name\":\"朝圣之路·卡米诺·德·圣地亚哥\",\"en\":\"Camino de Santiago\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"跨区域\",\"era\":\"中古\",\"year\":0,\"period\":\"中世纪-通时代\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"迁徙·流亡\"],\"atmos\":[\"比利牛斯山到圣地亚哥\",\"贝壳标记\",\"修道院驿站\",\"各国朝圣者同行\",\"八百公里步行\"],\"sensory\":\"脚疼了。走了两个星期了。路上有来自各个国家的人——法兰克人、德意志人、英格兰人，语言不通但方向一致。修道院里有热汤和一张床。明天继续走。据说到了圣地亚哥，所有的罪都会被洗净。\",\"note\":\"朝圣之路是中世纪欧洲最重要的朝圣路线，至今仍有数万人每年行走。\\\"路上\\\"母题的经典。\"}),\n  E({\"id\":\"ck443\",\"name\":\"大航海·麦哲伦海峡（船上）\",\"en\":\"Magellan's Strait\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1520,\"period\":\"1520\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"殖民·帝国\"],\"atmos\":[\"人类第一次环球航行\",\"麦哲伦死在菲律宾\",\"出发270人回来18人\",\"海峡里的暴风\"],\"sensory\":\"海峡很窄——两边是积雪的山。水流像要把船吞掉。有一艘船掉头回西班牙了——船上的人不想继续了。剩下的人继续走——进入了一片你没见过的大海。太平静了。所以你管它叫\\\"太平洋\\\"。\",\"note\":\"麦哲伦本人没走完全程——他死在菲律宾的麦克坦岛（宿务旁的小岛），当地酋长拉普拉普的战士杀了他。270人出发，只有18人乘“维多利亚号”回到西班牙。这是人类第一次绕地球航行一周。\"}),\n  E({\"id\":\"ck444\",\"name\":\"特奥蒂瓦坎（众神之城）\",\"en\":\"Teotihuacan\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"古典\",\"year\":-100,\"period\":\"约前100-公元550\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"太阳金字塔与月亮金字塔\",\"亡灵大道\",\"多族群杂居的公寓大院\",\"羽蛇神庙下的殉葬\",\"建造者与语言成谜\"],\"sensory\":\"一条笔直的大道贯穿全城，两头各立一座金字塔——大的那座底边和胡夫金字塔差不多宽。十几万人住在一片片带天井的大院里，墙上抹着红泥、画着美洲豹。亡灵大道尽头有人在抹灰起墙。没人知道这城原来叫什么、谁在统治。\",\"note\":\"特奥蒂瓦坎鼎盛时是西半球最大的城市之一，居民来自中美洲各地。它的文字、语言、统治者身份至今不明——\\\"特奥蒂瓦坎\\\"是几百年后阿兹特克人起的名，意为\\\"众神诞生之地\\\"，他们以为这城是神造的。\"}),\n  E({\"id\":\"ck445\",\"name\":\"蒙特阿尔万（萨波特克山城）\",\"en\":\"Monte Albán\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"古典\",\"year\":-500,\"period\":\"约前500-公元800\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"宗教·信仰\"],\"atmos\":[\"削平山顶建的城\",\"\\\"舞者\\\"浮雕石板（实为被杀的战俘）\",\"中美洲最早的文字与历法之一\",\"俯瞰瓦哈卡三河谷\"],\"sensory\":\"整座山顶被削平，铺成一个巨大的广场，四面围着石砌平台。神庙墙脚嵌着一排石板，刻着扭曲的裸体人形——你以为是舞者，凑近才看清是被开膛的战俘，旁边凿着一行行小符号。山下三条河谷的村子尽收眼底。\",\"note\":\"蒙特阿尔万是萨波特克文明的都城。\\\"舞者\\\"（Danzantes）浮雕长期被误认作舞蹈场面，现多认为刻的是被杀戮、献祭的敌方首领；石板上的符号属中美洲最早的书写系统之一。\"}),\n  E({\"id\":\"ck446\",\"name\":\"奇琴伊察（后古典玛雅）\",\"en\":\"Chichén Itzá\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"中古\",\"year\":1250,\"period\":\"约9-13世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"城市·都会\",\"艺术·表演\"],\"atmos\":[\"库库尔坎金字塔（春分蛇影爬下台阶）\",\"献祭圣井\",\"最大的球场\",\"托尔特克风格的羽蛇与查克穆尔卧像\"],\"sensory\":\"春分日落时，金字塔的台阶边缘投下一段段三角阴影，连成一条扭动的蛇身，爬到塔底的蛇头石雕上。城北一口幽深的天然井，井底沉着金器和人骨——抛下去献给雨神的。球场大得能装下一座神庙。\",\"note\":\"奇琴伊察是后古典期玛雅最大的城市，混入了来自中部墨西哥（托尔特克）的风格。\\\"春分蛇影\\\"是库库尔坎（羽蛇神）金字塔的天文设计；圣井（Cenote Sagrado）中打捞出大量祭品与人骨。\"}),\n  E({\"id\":\"ck447\",\"name\":\"卡拉尔（美洲最古老的城市）\",\"en\":\"Caral\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"上古\",\"year\":-2600,\"period\":\"约前2600-前2000\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"宗教·信仰\"],\"atmos\":[\"与埃及金字塔同期\",\"六座土石平顶金字塔\",\"没有陶器\",\"未见战争痕迹\",\"芦苇与棉花\",\"可能最早的奇普\"],\"sensory\":\"沙漠河谷里立着几座平顶土台，最大的一座要爬好一阵才到顶。这里没人用陶罐——煮东西是把烧热的石头丢进葫芦。台子上有人吹一支秃鹫骨做的笛子。找遍全城找不到城墙，也没有兵器。\",\"note\":\"卡拉尔（小北/Norte Chico文明）是美洲已知最古老的城市文明，约与吉萨金字塔同期。它没有陶器，至今未发现武器或城防、未见战争迹象。出土的一截打结绳子可能是奇普（结绳记事）的最早实物。\"}),\n  E({\"id\":\"ck448\",\"name\":\"纳斯卡（荒原上的巨画）\",\"en\":\"Nazca Lines\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"古典\",\"year\":-100,\"period\":\"约前100-公元800\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"沙漠·绿洲\"],\"atmos\":[\"蜂鸟·猴子·蜘蛛的巨型地画\",\"扒开红石露出浅地\",\"地下暗渠（puquios）取水\",\"割下的\\\"战利品头颅\\\"\"],\"sensory\":\"地面上只看见一条条笔直的浅线，认不出名堂——要升到高处，才看出是只几百米长的蜂鸟、一只卷尾的猴子。画法很简单：把地表暗红的碎石扒开，露出底下浅色的地。沙漠不下雨，有人顺螺旋井口下到地底，去取暗渠里的水。\",\"note\":\"纳斯卡地画（Nazca Lines）靠移走地表氧化的红色砾石、露出浅色地面绘成，因当地极度干旱少雨而存留两千年。地下暗渠（puquios）至今仍在供水。纳斯卡文化也以割取\\\"战利品头颅\\\"著称。\"}),\n  E({\"id\":\"ck449\",\"name\":\"蒂亚瓦纳科（的的喀喀湖畔）\",\"en\":\"Tiwanaku\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"玻利维亚\",\"era\":\"古典\",\"year\":950,\"period\":\"约6-10世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"山地·高原\",\"工艺·手艺\"],\"atmos\":[\"海拔近四千米\",\"太阳门（整块石头凿成\",\"刻着持杖神）\",\"巨石精密拼接\",\"抬田农业\",\"安第斯诸帝国的祖型\"],\"sensory\":\"海拔近四千米，喘气都费劲，湖面蓝得发黑。一道门由整块石头凿成，门楣刻着手持双杖、放射光芒的神。巨石之间用铜钉扣住，缝里插不进指甲。湖边一垄垄抬高的田埂夹着水沟，夜里水汽护着庄稼，霜冻冻不死。\",\"note\":\"蒂亚瓦纳科是的的喀喀湖南岸的高原祭祀中心，\\\"太阳门\\\"上的持杖神形象影响了后来的瓦里与印加。抬田（suka kollus）农业利用沟渠蓄热抗霜，让作物能在高寒湖区生长。\"}),\n  E({\"id\":\"ck450\",\"name\":\"昌昌（奇穆的泥砖大城）\",\"en\":\"Chan Chan\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"中古\",\"year\":900,\"period\":\"约900-1470\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"宗教·信仰\"],\"atmos\":[\"世界最大的土坯城\",\"十座带高墙的宫城\",\"墙面压印海浪与鱼鸟\",\"金银匠\",\"向海献童\",\"最终被印加吞并\"],\"sensory\":\"放眼全是夯泥的高墙，一座挨一座，墙头比人高几倍，全城不见一块石头。墙面压印着一排排海浪、游鱼和海鸟。匠人把金子捶成薄片。海边沙地里，祭司给一队孩子和小驼羊抹上红颜料——风浪太久没停了。\",\"note\":\"昌昌（Chan Chan）是奇穆王国的都城，前哥伦布美洲最大的土坯城市。近海的万查基托遗址埋着数百名被献祭的儿童与幼驼，可能与厄尔尼诺引发的灾害有关。约1470年被印加征服。\"}),\n  E({\"id\":\"ck451\",\"name\":\"查科峡谷（祖先普韦布洛人）\",\"en\":\"Chaco Canyon\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"中古\",\"year\":850,\"period\":\"约850-1150\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"博尼托大屋（数百间房的巨型石砌建筑）\",\"笔直的大路通向四方\",\"夏至冬至的光影对位\",\"绿松石与远来的金刚鹦鹉\",\"突然被弃\"],\"sensory\":\"峡谷底一座半月形大屋，石头垒了四五层、几百间房，住的人却不多。地上一圈圈半埋的圆地穴是聚会的所在。一道笔直的宽路朝正北劈过荒原，从不绕弯。墙缝里嵌着绿松石珠，屋里养着一只从南方两千里外运来的红羽鹦鹉。\",\"note\":\"查科峡谷是祖先普韦布洛人（Ancestral Puebloan）的中心，博尼托大屋（Pueblo Bonito）有六百多间房。笔直的大路网与建筑的天文朝向用途仍有争议。约1150年前后因长期干旱被弃，居民是今日普韦布洛各族的祖先。\"}),\n  E({\"id\":\"ck452\",\"name\":\"西北海岸的夸富宴（图腾柱与赠礼）\",\"en\":\"Potlatch Coast\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"北美西北海岸\",\"era\":\"近代\",\"year\":1850,\"period\":\"通时代（体验上以18-19世纪最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"节庆·仪式\",\"工艺·手艺\",\"海洋·港口\"],\"atmos\":[\"雪松图腾柱\",\"夸富宴（potlatch·靠送礼乃至毁财显威望）\",\"雪松独木舟\",\"熏鲑鱼\",\"海达/特林吉特/夸夸嘉夸\",\"曾被殖民政府立法禁止\"],\"sensory\":\"海边立着一排雪松雕的高柱，叠着乌鸦、熊、鲸的脸，眼睛镶着鲍鱼壳。长屋里在办大宴——主人把成山的毛毯、铜板一件件送出去，送得越多越体面，有人索性把财物砸了、烧了。屋外的架子上挂满剖开熏干的鲑鱼。\",\"note\":\"西北海岸的海达、特林吉特、夸夸嘉夸等族靠丰沛的鲑鱼资源养出复杂的等级社会。夸富宴（potlatch）通过大规模赠送、销毁财物来确立和炫示地位，曾被加拿大（1885-1951）与美国立法禁止。\"}),\n  E({\"id\":\"ck453\",\"name\":\"大平原的马背岁月\",\"en\":\"The Horse Nations\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"北美大平原\",\"era\":\"近代\",\"year\":1700,\"period\":\"约1700-1880\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"迁徙·流亡\",\"战争·军事\"],\"atmos\":[\"西班牙人逃散的马传到北方\",\"追着野牛群迁徙\",\"圆锥皮帐篷（tipi）\",\"科曼奇与拉科塔的骑兵\",\"只存在约一百五十年的生活方式\"],\"sensory\":\"马是新来的——一两代人前还没有。如今整族人跟着野牛群走，皮帐篷一天就能拆装、驮上马背。猎手贴着马背冲进牛群，一箭放倒一头。入夜，圆锥帐篷里一圈人传着烟斗。没人料到这样的日子只够过几代人。\",\"note\":\"平原骑马游猎文化是欧洲马匹（1680年普韦布洛起义后大量北传）催生的——在此之前平原各族徒步狩猎。这套生活方式约1750年成形，随19世纪野牛被近乎猎绝、各族被迫迁入保留地而终结，前后仅约一百五十年。\"}),\n  E({\"id\":\"ck454\",\"name\":\"泰诺人（哥伦布遇见的第一群人）\",\"en\":\"The Taíno\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"加勒比\",\"era\":\"近世\",\"year\":1250,\"period\":\"约13世纪-1500（接触于1492）\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"殖民·帝国\",\"灾变·瘟疫\"],\"atmos\":[\"木薯与吊床\",\"橡胶球赛（batey）\",\"泽米神像\",\"酋长（cacique）\",\"1492年第一次接触\",\"数十年内近乎灭绝\"],\"sensory\":\"海边村子晒着木薯饼，吊床拴在两棵树之间。空地上两队人用胯和肩顶一只橡胶球，不许落地。屋里供着一尊三角形的木石神像。海平线上飘来三片从没见过的大帆——船上的人胡须很长，盯着你脖子上的金子看。\",\"note\":\"泰诺人（Taíno）是哥伦布1492年登陆时最先遇到的加勒比原住民。木薯、吊床（hamaca）、飓风（huracán）、独木舟（canoa）等词都源自他们的语言。随强制劳役（encomienda）与天花传入，泰诺人口在数十年内近乎灭绝。\"}),\n  E({\"id\":\"ck455\",\"name\":\"图伊汤加（太平洋上的海洋霸权）\",\"en\":\"Tu'i Tonga\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"汤加\",\"era\":\"中古\",\"year\":1200,\"period\":\"约1200-1500\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"宫廷·王权\",\"工艺·手艺\"],\"atmos\":[\"图伊汤加王朝\",\"跨越上千公里收贡的海上霸权\",\"巨石三梁门（Ha'amonga 'a Maui）\",\"阶梯状石砌王陵（langi）\",\"独木舟舰队\"],\"sensory\":\"双体大独木舟从远岛回来，舱里装着进贡的红羽毛、席子和食物。海湾边立着一座三块巨石搭成的门——两根立柱顶着一根横梁，每块都有几十吨重。岸上一级级方石垒起的平台，底下埋着历代图伊汤加王。\",\"note\":\"图伊汤加（Tu'i Tonga）王朝在13-15世纪建立起跨越斐济、萨摩亚等地的海上贡纳网络，有\\\"汤加海洋帝国\\\"之称。三梁石门（Ha'amonga 'a Maui）与阶梯王陵（langi）是其遗存，巨石如何搬运、立起仍存争议。\"}),\n  E({\"id\":\"ck456\",\"name\":\"卡美哈梅哈统一夏威夷\",\"en\":\"Kamehameha's Hawaii\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"夏威夷\",\"era\":\"近代\",\"year\":1778,\"period\":\"1778-1810\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\",\"殖民·帝国\"],\"atmos\":[\"库克船长闯入（1778）并殒命于此（1779）\",\"火枪与火炮改写岛屿战争\",\"努阿努断崖之战\",\"卡普禁忌体系\",\"羽毛披风与神庙\"],\"sensory\":\"白人的大船头一回靠岸，带来铁、火枪，也带来没人扛得住的新病。一个酋长把这些武器攥到手，驾着排成一线的战舟去打别的岛。最后一仗，败的一方被逼到山脊断崖边，身后是几百尺的空。他披着金红羽毛织的斗篷，岛屿头一次归于一人。\",\"note\":\"1778年库克船长是有记载第一个到达夏威夷的欧洲人，次年在凯阿拉凯夸湾与岛民的冲突中被杀。卡美哈梅哈一世借助欧洲火器与顾问，于1795年努阿努（Nu'uanu）之战将敌方逼下帕利断崖，至1810年统一全部群岛。\"}),\n  E({\"id\":\"ck457\",\"name\":\"因纽特·图勒（冰上的猎人）\",\"en\":\"Thule Inuit\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"北极·因纽特\",\"era\":\"中古\",\"year\":1650,\"period\":\"约11-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"工艺·手艺\",\"迁徙·流亡\"],\"atmos\":[\"图勒文化（现代因纽特的祖先）\",\"从阿拉斯加横扫北极到格陵兰\",\"皮艇（qajaq）与捕鲸大舟（umiak）\",\"可脱卸尖头的捕鲸叉\",\"雪屋（iglu）与海豹油灯\",\"狗拉雪橇\",\"没有农业没有金属的极寒生存\"],\"sensory\":\"海面封冰，一个人趴在冰窟窿边等了大半天，海豹一冒头就出叉。雪屋里点着一盏弯月形的石灯，烧海豹油，把一小方天地烘得能脱下皮袄。外头零下几十度，狗蜷成一圈。夏天换住兽皮帐篷，男人划着绷海豹皮的小艇出海，叉那比船还大的鲸。\",\"note\":\"图勒文化（约11-17世纪）是现代因纽特人的直系祖先，自阿拉斯加沿北极一路扩张到格陵兰，取代了更早的多塞特人。他们靠捕鲸（可脱卸倒钩的鱼叉）、猎海豹、狗拉雪橇与皮艇在无农业、几乎无金属的极地生存；冬居雪屋或草皮屋、夏住兽皮帐，海豹油石灯（qulliq）是光与热的来源。\"}),\n  E({\"id\":\"ck458\",\"name\":\"南马都尔（太平洋的玄武岩巨城）\",\"en\":\"Nan Madol\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"密克罗尼西亚·波纳佩\",\"era\":\"中古\",\"year\":1650,\"period\":\"约12-17世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"海洋·港口\"],\"atmos\":[\"波纳佩外礁上的人工岛群\",\"用六棱玄武岩柱像码木头一样叠成的墙\",\"近百座岛·\\\"太平洋的威尼斯\\\"\",\"绍德雷尔王朝的权力与祭祀中心\",\"巨石怎么搬来成谜\"],\"sensory\":\"礁盘上凭空起出近百座小岛，岛与岛之间是水道，要划独木舟来往。墙是用一根根六棱的黑色玄武岩柱交错叠起来的，像码柴垛，最重的一根有几十吨。这里住着王和祭司，办丧仪、通神灵，平民不得擅入。那些石柱采自岛另一头，怎么运过海、垒这么高，没人说得清。\",\"note\":\"南马都尔位于密克罗尼西亚波纳佩岛外礁，是约12-17世纪绍德雷尔（Saudeleur）王朝的政治宗教中心，由近百座人工岛组成，被称\\\"太平洋的威尼斯\\\"。其建筑用天然六棱玄武岩柱交错垒叠而成，巨石（每根可达数十吨）的采运与堆砌方式至今成谜。\"}),\n  E({\"id\":\"ck459\",\"name\":\"雅浦石币（搬不动的钱）\",\"en\":\"Yap Stone Money\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"密克罗尼西亚·雅浦\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代（近代记载最详）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"工艺·手艺\",\"海洋·港口\"],\"atmos\":[\"雅浦岛的\\\"费\\\"（rai）巨型石轮\",\"石灰岩凿成·大的高过人\",\"采自四百公里外的帕劳·靠独木舟运回（常有沉没）\",\"价值看来历与运送中死过几个人\",\"易主却不挪动石头\"],\"sensory\":\"村口立着一块中间凿孔的大石轮，比人还高，谁也搬不动它。它是钱——岛上最值钱的钱。这石头不是本地的，是先人冒死划船去四百公里外的岛上凿来、捆在木筏上拖回来的，路上翻过船、死过人，所以越发金贵。今天它换了主人，可没人去挪它——大家都记得它现在归谁，记着就行。\",\"note\":\"雅浦岛（密克罗尼西亚）以\\\"费\\\"（rai）石币闻名：石灰岩凿成的中孔大圆盘，大者高逾人、重达数吨。石料采自约四百公里外的帕劳，靠独木舟、木筏运回，途中常有损失，其价值取决于来历、大小与运送中付出的代价（包括人命）。交易时石头通常原地不动，所有权靠口传公认转移——常被经济学引为\\\"货币是共识\\\"的范例。\"}),\n  E({\"id\":\"ck460\",\"name\":\"新几内亚高地（最后被\\\"发现\\\"的百万人）\",\"en\":\"New Guinea Highlands\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"巴布亚新几内亚\",\"era\":\"世纪之交\",\"year\":1930,\"period\":\"通时代（体验上以1930年代首次接触最浓）\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"节庆·仪式\",\"山地·高原\"],\"atmos\":[\"被丛林群山封闭的高地谷地\",\"外界一直以为没人住\",\"1930年代探金的白人撞见上百万人\",\"靠红薯养活的密集人口\",\"\\\"大人物\\\"靠送猪积累威望\",\"羽冠·贝壳·猪的盛宴（辛辛/sing-sing）\"],\"sensory\":\"云雾缭绕的高地谷里，层层叠叠的红薯田，住着密密麻麻的人——外面的世界却一直当这里是无人的荒山。直到几个找金子的白人翻进山来，双方都愣住了：当地人以为见了祖灵或天人。盛大的节庆上，男人插着天堂鸟的羽冠、挂满贝壳，把一长列猪牵出来当众宰杀馈赠——谁送得多，谁就是\\\"大人物\\\"。\",\"note\":\"新几内亚中部高地的谷地人口密集（靠红薯/甘薯供养），却因群山阻隔长期与外界隔绝，外界一度以为是无人区。1930年代利希兄弟等人探金深入，才\\\"发现\\\"了约百万高地居民，留下著名的首次接触影像。这里没有世袭酋长，权势靠\\\"大人物\\\"以猪宴、贝壳的馈赠竞争积累；盛装羽饰的\\\"辛辛\\\"（sing-sing）庆典极为绚烂。\"}),\n  E({\"id\":\"ck461\",\"name\":\"查文·德万塔尔（安第斯第一个大神庙）\",\"en\":\"Chavín de Huántar\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"上古\",\"year\":-900,\"period\":\"约前900-前200\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"山地·高原\"],\"atmos\":[\"安第斯最早传遍各地的宗教艺术风格\",\"地下迷宫般的石砌回廊\",\"暗室中央的\\\"兰宋\\\"獠牙神石柱\",\"引水道做出的轰鸣回响\",\"圣佩德罗仙人掌致幻\",\"獠牙的猫科与猛禽图案\"],\"sensory\":\"神庙是实心的石头台基，里头却藏着一层层不见天日的窄回廊。摸黑走到最深处，一根四米多高的白石柱立在十字交叉的暗室正中——一个咧着獠牙、头发是蛇的神俯视着你。祭司事先嚼了仙人掌，眼前晃着幻象；引进岩缝的水流在回廊里轰轰回响，分不清是水声还是神在说话。\",\"note\":\"查文文化（约前900-前200）以秘鲁高地的查文·德万塔尔神庙为中心，是安第斯第一个传播范围极广的宗教艺术风格（\\\"查文地平线\\\"）。神庙内部是错综的地下回廊，核心暗室立着獠牙神\\\"兰宋\\\"（Lanzón）石柱。祭司借圣佩德罗仙人掌（含麦司卡林）入幻，并用引水道制造回响烘托神秘。獠牙猫科与猛禽是其标志图案。\"}),\n  E({\"id\":\"ck462\",\"name\":\"马普切（挡住印加又挡住西班牙的人）\",\"en\":\"The Mapuche\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"智利·马普切\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"迁徙·流亡\",\"宗教·信仰\"],\"atmos\":[\"智利中南部\",\"唯一在毛莱河挡住印加扩张\",\"又抗住西班牙三百年（阿劳科战争）\",\"战俘出身的toqui劳塔罗以西式骑兵战术反杀征服者\",\"女性居多的machi萨满\",\"银饰与ruca木屋\"],\"sensory\":\"森林与河谷交界，一座座圆木和茅草搭的长屋。西班牙人来了，起初横冲直撞，可这里的人很快也骑上了马、学会了对方的打法。一个当过俘虏、摸透了西班牙骑兵的青年成了战争首领，回头把不可一世的征服者打死在战场上。往后三百年，殖民者始终没能真正越过那条河。\",\"note\":\"马普切人居于智利中南部，是少有的既在毛莱河一线挡住印加扩张、又抵抗西班牙长达约三百年（阿劳科战争）的民族。战争首领（toqui）劳塔罗曾为瓦尔迪维亚的俘从，习得西班牙骑兵战术后倒戈，于1553年将其击杀。马普切迅速吸收马匹与铁器，machi（萨满，多为女性）主持仪式。直到1880年代才被智利、阿根廷以武力\\\"平定\\\"。\"}),\n  E({\"id\":\"ck463\",\"name\":\"阿兹特克·Ahuianime与性法律\",\"en\":\"Aztec Ahuianime\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"近世\",\"year\":1550,\"period\":\"14-16世纪初\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"律法·审判\",\"宗教·信仰\"],\"atmos\":[\"Ahuianime（\\\"快乐的女人\\\"/妓女·合法存在但社会地位低）\",\"极严格的通奸法（妻子通奸=死刑·石砸）\",\"Cihuacoatl（蛇女神·生育与性的双面性）\",\"婚前性教育由长老传授\",\"性被视为\\\"泥泞的/有污染性的\\\"但又是必需的\"],\"sensory\":\"特拉特洛尔科大市场的角落里有Ahuianime——\\\"快乐的女人\\\"。她们涂着嘴唇，嚼着树胶（chicle），在公开场合存在但被正经人回避。在另一边，一个年轻男人在接受长老的训话——婚前的性教育，讲的是\\\"什么是正确的结合\\\"\\\"什么是会让神愤怒的\\\"。阿兹特克人把性叫做\\\"泥泞之事\\\"（tlazolli）——它是肮脏的，但也是必要的。这种矛盾存在于每一条法律里：通奸=死刑（石砸），但Ahuianime=合法。\",\"note\":\"阿兹特克的性法律是前哥伦布美洲中最严格的——通奸对女性是死刑（石砸或绞死），对男性也可能是死刑。但Ahuianime（妓女）是合法的社会存在——她们服务于未婚战士。\\\"Tlazolli\\\"（泥泞/污染）是阿兹特克性观念的核心概念——性本身是\\\"脏的\\\"，但在婚姻框架内是必要的和被接受的。这与基督教的\\\"原罪\\\"观念有平行但不相同之处。阿兹特克的性教育由长老在仪式中传授——内容包括何时结婚、如何对待配偶、什么性行为是可接受的。\"}),\n  E({\"id\":\"ck464\",\"name\":\"莫切（秘鲁·情色陶器）\",\"en\":\"Moche Erotic Pottery\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"古典\",\"year\":100,\"period\":\"约100-700\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"工艺·手艺\",\"死亡·葬仪\"],\"atmos\":[\"莫切文明（Moche·前印加·秘鲁北海岸）\",\"Huaco erótico（情色陶器·大量描绘性行为）\",\"肛交是最常被描绘的行为（不是阴道性交）\",\"死亡与性的关联\",\"\\\"骷髅在做爱\\\"\"],\"sensory\":\"一个陶壶——精致的红陶，上面雕刻着两个人正在交合。不是你预期的方式——是从后面。旁边另一个陶壶上，一个骷髅在自慰。再旁边，一个女人在和一个半人半动物的存在做爱。这些不是藏起来的——它们是墓葬品，和死者一起埋的。莫切人显然觉得性和死亡之间有某种联系——但具体是什么，没有文字记录。\",\"note\":\"莫切情色陶器（Huaco erótico）是前哥伦布美洲最令人惊异的艺术传统——数以千计的陶器精确描绘了各种性行为。有趣的是，肛交的描绘远多于阴道性交——有学者认为这与避孕有关，也有学者认为与宗教/宇宙观有关（肛交=非生殖=与死亡世界的连接）。骷髅从事性行为的图案也很常见——性和死亡在莫切宇宙观中似乎是关联的。这些陶器作为墓葬品出土——它们是给死者的，不是给活人看的。莫切没有文字，所以解读完全依赖考古推测。\"}),\n  E({\"id\":\"ck465\",\"name\":\"波利尼西亚·Mahu与殖民前的性开放\",\"en\":\"Polynesian Māhū\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"太平洋诸岛\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代（体验上取库克船长到达前最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"殖民·帝国\"],\"atmos\":[\"Mahu（第三性别·男性出生但以女性身份生活·被社区尊重）\",\"婚前性行为被接受甚至鼓励\",\"Arioi（塔希提的表演者社团·性自由+不生育）\",\"库克船长的水手的震惊记录\",\"传教士到来后一切改变\"],\"sensory\":\"岛上有一个人——他出生时是男孩，但现在以女性身份生活。没有人觉得奇怪——他/她是Mahu，这是一种被承认的存在方式。年轻人在结婚前可以自由地有性关系——这被视为\\\"学习\\\"。有一个叫Arioi的社团——他们到处旅行表演，性自由是他们的核心规则之一，但不允许生育（怀孕的成员必须堕胎或杀婴——这个规则很残酷）。然后白人的船来了。水手们震惊了。传教士们更震惊了。一百年后，这些传统大部分都消失了。\",\"note\":\"波利尼西亚（特别是塔希提、夏威夷、萨摩亚）的殖民前性文化是世界上文献记录最详细的\\\"非西方性规范\\\"案例之一——因为库克船长（1769年）及其后的欧洲探险者留下了大量震惊的第一手记录。Mahu（第三性别）在多个波利尼西亚社会中被承认——他们通常承担特定的社会和灵性角色。塔希提的Arioi社团是一个独特的现象——宗教性的表演者团体，实行性自由但严禁生育。基督教传教士到达后系统性地压制了这些传统。夏威夷的Aikāne（男性之间的亲密关系·常出现在酋长阶层）也有大量记录。\"}),\n  E({\"id\":\"ck466\",\"name\":\"北美原住民·Two-Spirit（两灵人）\",\"en\":\"Two-Spirit Traditions\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美国\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"殖民·帝国\"],\"atmos\":[\"Two-Spirit（1990年代的泛原住民术语·各民族有各自的词）\",\"Winkte（拉科塔）\",\"Nádleehí（纳瓦霍）\",\"Hwame（莫哈维）\",\"被社区承认的第三/第四性别角色\",\"通常具有灵性/治疗/仪式功能\",\"殖民者的系统性迫害\"],\"sensory\":\"Winkte——一个穿着女性服装的拉科塔男性。他/她在仪式中有特殊角色——被认为能同时看到男性和女性的世界。社区中有人向他/她求助治病。他/她有丈夫——另一个男人。在拉科塔的世界观里，Winkte不是\\\"异常\\\"——是一种神赐的存在方式。殖民者到来后给他们取了一个欧洲的词——Berdache（来自波斯语，有贬义）。传教士说这是罪。寄宿学校的目标之一就是消灭这种存在。\",\"note\":\"Two-Spirit是1990年在温尼伯原住民聚会上被采纳的泛原住民术语——用来替代殖民者强加的贬义词\\\"Berdache\\\"。重要的是，每个原住民民族有自己的概念和词汇：拉科塔的Winkte、纳瓦霍的Nádleehí、莫哈维的Hwame等等——它们不完全相同，也不能简单等同于现代的LGBTQ+概念。Two-Spirit通常指在性别表达上跨越二元界限的个体，在很多民族中具有特殊的灵性/仪式角色。殖民者和传教士系统性地迫害这些个体——寄宿学校（以\\\"文明化\\\"为名强制同化原住民儿童）是最暴力的工具之一。\"}),\n  E({\"id\":\"ck467\",\"name\":\"印加·Aclla（太阳贞女）\",\"en\":\"Inca Sun Virgins\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪初\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"宗教·信仰\"],\"atmos\":[\"Aclla（被选中的女人·太阳贞女）\",\"Acllahuasi（贞女之家·类似修道院）\",\"为太阳神因蒂服务/为印加王服务\",\"最美的女孩从8-10岁被选中\",\"编织\",\"酿造chicha啤酒\",\"可能被献祭/可能被赐给贵族\"],\"sensory\":\"她八岁时被选中——因为她长得好看。被带到Acllahuasi——一座只有女人的建筑。她在这里学编织、酿chicha（玉米啤酒）、服侍太阳神。她不能离开。她不能结婚——除非印加王决定把她赐给某个有功的贵族。有些Aclla被选中在仪式上献祭——据说是最高的荣誉。\",\"note\":\"Aclla制度是印加帝国中最制度化的\\\"女性身体国有化\\\"——最美的女孩从幼年被选入Acllahuasi，学习为国家和宗教服务。Aclla分等级：最高等的服侍太阳神（保持贞洁），较低等的被赐给有功的贵族或军官作为妻妾。部分Aclla可能在Capacocha仪式中被献祭（安第斯冰冻木乃伊中发现了证据）。这个制度介于修道院和后宫之间——既有宗教色彩又有政治功能。西班牙征服后Acllahuasi被改为基督教修道院——建筑用途没变，管理者变了。\"}),\n  E({\"id\":\"ck468\",\"name\":\"安第斯·Quariwarmi（双灵祭司与Chuqui Chinchay）\",\"en\":\"Andean Quariwarmi\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"秘鲁\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（取印加帝国时期最浓）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"殖民·帝国\"],\"atmos\":[\"quariwarmi（\\\"男-女\\\"·跨性别祭司）\",\"侍奉Chuqui Chinchay（雌雄同体的美洲豹·山的主人）\",\"主持仪式中的同性结合\",\"被视作沟通两界的中介\",\"西班牙征服后被当作\\\"鸡奸\\\"焚杀\"],\"sensory\":\"高山的神龛前，一个穿戴介于男女之间的祭司在主持仪式——人们叫他quariwarmi，\\\"男而女者\\\"。他侍奉的神叫Chuqui Chinchay，一头雌雄同体的美洲豹，山的主人。在安第斯人看来，能同时是两者的人，才站得到男与女、生与死两个世界的中间。后来西班牙人来了，只看见一桩该烧死的\\\"罪\\\"。\",\"note\":\"quariwarmi（克丘亚语\\\"男-女\\\"）是安第斯的第三性别仪式专家，侍奉与美洲豹、山神相关的雌雄同体神祇Chuqui Chinchay，在仪式中扮演沟通男女、生死两界的中介，有时主持同性的仪式性结合。西班牙编年史家（如Guaman Poma）记录了他们；殖民者以\\\"鸡奸\\\"罪名对安第斯此类人施以火刑。与北美的Two-Spirit是各自独立的传统，不可简单等同。\"}),\n  E({\"id\":\"ck469\",\"name\":\"阿兹特克·花之君王Xochipilli\",\"en\":\"Xochipilli, Flower Prince\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"墨西哥\",\"era\":\"近世\",\"year\":1550,\"period\":\"14-16世纪初\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"Xochipilli（\\\"花之君\\\"·欢愉/歌舞/致幻之花的神）\",\"Xochiquetzal（爱与花的女神·欢愉女子的守护者）\",\"用\\\"花\\\"隐喻欢爱与迷醉\",\"致幻植物的迷狂\",\"与男性之爱的关联（学界有争议）\"],\"sensory\":\"一尊盘腿的神像，浑身刻满花——凑近认得出，那些不是寻常的花，是会让人看见幻象的菌子和牵牛花籽。他叫Xochipilli，掌管歌、舞、游戏和欢愉。阿兹特克人用\\\"花\\\"来说那些不便明说的事：欢爱、迷醉、短暂的好时光。神庙另一侧供着花与爱的女神Xochiquetzal，欢愉女子（ahuianime）奉她为主。\",\"note\":\"Xochipilli（\\\"花之君\\\"）是阿兹特克掌管艺术、歌舞、游戏、欢愉与致幻之花的神，著名石像通体刻着可致幻的植物。\\\"花\\\"（xochitl）在纳瓦特尔语中是欢爱与迷醉的隐喻。Xochiquetzal则是爱、美与花的女神，欢愉女子（ahuianime）的守护者。部分学者把Xochipilli与男性同性之爱相关联，但此说存在争议。与严苛的性法律一条（\\\"阿兹特克·Ahuianime与性法律\\\"）互为正反两面。\"}),\n  E({\"id\":\"ck470\",\"name\":\"夏威夷·Aikāne（酋长的男性爱侣）\",\"en\":\"Hawaiian Aikane\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"夏威夷\",\"era\":\"近代\",\"year\":-1850,\"period\":\"18-19世纪（库克到达前后记录最详）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"殖民·帝国\"],\"atmos\":[\"aikāne（酋长身边公开而体面的男性亲密伴侣）\",\"与异性婚姻并行不悖\",\"库克船队军官别扭的记录\",\"卡美哈梅哈本人亦有aikāne\",\"传教士到来后被压制\"],\"sensory\":\"库克的船一靠岸，岛上的酋长就开口，要船上某个年轻水手做他的aikāne——身边的男性爱侣。军官们在日记里写得别别扭扭：这里的男人有妻有子，同时公开有一个同性的爱人，谁都不觉得有什么不对。据说连后来统一群岛的卡美哈梅哈，身边也有这样的人。\",\"note\":\"aikāne是前殖民夏威夷酋长阶层公开、受尊重的男性亲密伴侣关系，与异性婚姻并存。库克船队的航海日志记录了酋长向欧洲水手\\\"索求\\\"aikāne而令军官困惑的情形；文献提到卡美哈梅哈一世本人亦有aikāne。基督教传教士到来后此类关系被系统压制。它与第三性别的Mahu不是一回事。\"}),\n  E({\"id\":\"ck471\",\"name\":\"因纽特·换偶与合伙婚（极地的结盟）\",\"en\":\"Inuit Co-marriage\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"北极·因纽特\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"迁徙·流亡\"],\"atmos\":[\"传统因纽特的临时换偶/合伙婚\",\"把性与生存·结盟绑在一起\",\"出门远行被主人\\\"借\\\"妻\",\"由此结成拟亲属的同盟\",\"雪屋共寝的低私密\",\"并非随意而是有规矩的制度\"],\"sensory\":\"极地里活下去要靠人。一个男人长途出猎，借宿在另一家——主人按老规矩把妻子\\\"借\\\"给他过夜，既是待客，也是结一门亲：从此两家算是连了筋的同盟，往后彼此照应。这不是放纵，是有规矩的安排。雪屋里一家人挤在一张大睡台上，本也谈不上什么私密，孩子在身边，灯火幽幽。\",\"note\":\"部分传统因纽特群体存在制度化的临时换偶与\\\"合伙婚\\\"（co-marriage）：并非随意，而是把性、待客与结盟绑在一起——远行的男子可能被东道主\\\"借\\\"以妻室，由此在两个家庭间结成拟亲属式的长期同盟，在严酷环境中互为依靠。雪屋共寝空间紧凑，私密性近乎不存在。这类习俗须放回\\\"生存与结盟\\\"的语境理解，不宜猎奇。\"}),\n  E({\"id\":\"ck472\",\"name\":\"特罗布里恩群岛（马林诺夫斯基笔下的爱欲）\",\"en\":\"Trobriand Islands\",\"region\":\"美洲·大洋洲·跨区域\",\"country\":\"美拉尼西亚·特罗布里恩\",\"era\":\"近代\",\"year\":1950,\"period\":\"通时代（20世纪初田野记录最详）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"女性空间\"],\"atmos\":[\"美拉尼西亚的母系岛群\",\"马林诺夫斯基《野蛮人的性生活》\",\"青春期起公开而自由的婚前性\",\"未婚男女的\\\"单身屋\\\"（bukumatula）\",\"以山药和小礼物求爱\",\"\\\"爱情魔法\\\"\",\"当地一度否认性交与怀孕的因果\"],\"sensory\":\"礁湖边的村子，年轻人到了年纪就搬进专给未婚男女幽会的小屋，今天和这个、明天和那个，长辈不拦，只等慢慢配成对。求爱要送山药、送槟榔、念一段\\\"爱情魔法\\\"的咒。一个远道来的白人学者蹲在这里住了几年，把这一切细细记下，写成一本让欧洲人脸红的书。岛上人却说：孩子是祖灵送进母亲身体的，跟那桩事没关系。\",\"note\":\"特罗布里恩群岛（美拉尼西亚，巴布亚新几内亚东侧）的母系社会，因人类学家马林诺夫斯基的名著《野蛮人的性生活》（1929）而广为人知：青春期起婚前性自由而公开，未婚者在\\\"单身屋\\\"（bukumatula）幽会，以山药、小礼物和\\\"爱情魔法\\\"求爱，逐步走向婚姻。当地传统观念一度否认性交与受孕的因果，认为孩子由祖灵送入母体——是人类学关于性与亲属制度的经典案例。\"}),\n  E({\"id\":\"ck473\",\"name\":\"蒙古·抢婚与可敦的权力\",\"en\":\"Bride Capture & Khatuns\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":1350,\"period\":\"12-14世纪（通时代也可）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"婚恋·求爱\",\"宫廷·王权\",\"性·情色\"],\"atmos\":[\"掠妻传统（铁木真之妻孛儿帖被蔑儿乞人掠走）\",\"可敦（khatun·正妻）的政治权力\",\"多妻制中的等级排列\",\"斡儿朵（后宫帐群）\",\"妻子继承制（收继婚）\"],\"sensory\":\"妻子在夜里被掳走。他点齐所有能上马的人连夜去追——不全为了爱（也许也有），妻子被抢是侮辱，不回应就是示弱。追回来时，她已怀了别人的孩子。那孩子日后照样养在他帐中，当作亲生。\",\"note\":\"孛儿帖被掠事件是蒙古秘史中最重要的叙事之一——她在蔑儿乞人手中怀的术赤的血统问题困扰了蒙古帝国几代人。蒙古的收继婚（父死则子娶其庶母）在汉文化视角中是乱伦，在蒙古是合法制度——妻子是家产的一部分，同时妻子也有权拒绝（虽然实际上很难）。可敦在蒙古帝国中拥有巨大权力——窝阔台的皇后脱列哥那、蒙哥的母亲唆鲁禾帖尼都实际统治过帝国。\"}),\n  E({\"id\":\"ck474\",\"name\":\"突厥·草原女性的自由（伊斯兰化之前）\",\"en\":\"Unveiled Steppe Women\",\"region\":\"中亚·草原\",\"country\":\"欧亚草原\",\"era\":\"中古\",\"year\":950,\"period\":\"6-10世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"草原·游牧\",\"女性空间\",\"性·情色\"],\"atmos\":[\"突厥/回鹘女性不戴面纱\",\"与男性同骑同饮同猎\",\"可贺敦（可汗之妻）参与国事\",\"阿拉伯旅行者的震惊记录\",\"\\\"她们的女人不遮面\",\"也不避男人\\\"\"],\"sensory\":\"帐篷外面有女人在骑马——骑得比有些男人还好。她没有遮脸。她在和几个男人一起喝马奶酒，大笑。一个从南方来的商人呆住了——在他的家乡，女人不会出现在这种场合。可汗的妻子坐在可汗旁边，使节向她行礼，和向可汗的礼一样。\",\"note\":\"伊斯兰化之前的突厥/蒙古社会中，女性的行动自由和社会参与度远高于同时代的中原和中东。阿拉伯旅行者伊本·巴图塔在14世纪访问金帐汗国时惊讶于突厥女性的\\\"放肆\\\"——不戴面纱、与男性同坐。这种性别关系随着伊斯兰化逐渐改变。体验核心是\\\"两种性别体系碰撞时的相互震惊\\\"。\"}),\n  E({\"id\":\"ck475\",\"name\":\"丝路·驿站之夜\",\"en\":\"Caravanserai Nights\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代（取唐宋/蒙古时期最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"贸易·商业\",\"艺术·表演\",\"性·情色\"],\"atmos\":[\"商队驿站（caravanserai）\",\"粟特商人的宴饮\",\"丝路上的歌舞与陪侍\",\"驿站里的临时伴侣\",\"各文化混杂的夜晚\"],\"sensory\":\"驿站的院子里升了火。今夜歇在这里的有粟特商人、波斯人、唐朝的使节。有人弹起了琵琶，一个粟特女人开始跳胡旋舞——转得像陀螺。酒是葡萄酒。粟特人说\\\"不会喝酒的人不会做生意\\\"。夜深了，有人往暗处走去——驿站提供的不只是住宿。\",\"note\":\"粟特人是丝路最核心的商人群体——他们不只是做货物贸易，也经营娱乐。粟特的歌舞传入唐朝成为宫廷流行。驿站（caravanserai/客栈）是丝路上各种文化和欲望交汇的节点——货物、信息、音乐和性在同一个院子里流通。\"}),\n  E({\"id\":\"ck476\",\"name\":\"蒙古·斡儿朵（后宫帐群）\",\"en\":\"The Mongol Ordo\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":1350,\"period\":\"13-14世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"女性空间\",\"性·情色\"],\"atmos\":[\"斡儿朵（ordo·可汗的帐篷群/后宫）\",\"每位妻子有独立帐篷和领地\",\"可汗在各帐篷间轮流\",\"妃嫔来自被征服民族\",\"忽必烈的\\\"选秀\\\"制度\"],\"sensory\":\"可汗的营地不是一个帐篷——是一片帐篷的城市。每个正妻有自己的一组帐篷、自己的仆从、自己的牧群。可汗今晚去第三斡儿朵——那是从西夏带回来的公主的帐篷。第一斡儿朵的正妻面无表情地喝着马奶酒。她的权力不因为可汗今晚不在而减少——所有政令还是要经她的手。\",\"note\":\"蒙古帝国的斡儿朵制度不同于定居帝国的后宫——每位妻子拥有独立的经济单位（帐篷群+牧群+仆从），可汗在各斡儿朵间轮流。正妻（大可敦）的权力往往超过其他所有妻子之和。忽必烈时期还建立了定期的\\\"选秀\\\"制度——从弘吉剌部选拔美女入宫，被选中者的家族获得政治利益。\"}),\n  E({\"id\":\"ck477\",\"name\":\"帖木儿帝国·撒马尔罕的宴与舞\",\"en\":\"Timurid Samarkand Feasts\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"近世\",\"year\":1350,\"period\":\"14世纪末-15世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"饮食·宴席\",\"性·情色\"],\"atmos\":[\"帖木儿的宫廷宴会\",\"西班牙使节克拉维约的记录\",\"成群的妻妾\",\"宴席上的歌舞\",\"帖木儿\\\"虽然瘸腿但精力极旺\\\"\"],\"sensory\":\"宴席摆在花园里——地毯铺在草地上。帖木儿虽然瘸了一条腿，但坐在最高处，旁边是他的几位妻子。有舞女在表演——来自波斯、来自印度、来自格鲁吉亚。西班牙来的使节在偷偷记笔记——他写道，这个宴席的奢华超出了他的想象力。酒被倒了一杯又一杯——虽然这些人名义上是穆斯林。\",\"note\":\"西班牙使节克拉维约（Clavijo）的出使记是帖木儿宫廷最详细的外来者记录——他对宴席的描写包括食物、酒、音乐、舞蹈和帖木儿诸妻的出场顺序。帖木儿本人据说精力极旺——即使年老体衰后仍有新的婚姻和征服。\"}),\n  E({\"id\":\"ck478\",\"name\":\"胡姬·胡旋（唐人酒肆里的西域舞）\",\"en\":\"Sogdian Dancers\",\"region\":\"中亚·草原\",\"country\":\"粟特·中亚\",\"era\":\"中古\",\"year\":850,\"period\":\"中古（唐·8-9世纪最盛）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"市井·庶民\"],\"atmos\":[\"来自西域的\\\"胡姬\\\"当垆卖酒\",\"旋转如风的胡旋舞\",\"深目高鼻·薄纱艳裙\",\"长安东市西市的胡风酒肆\",\"诗人争相题咏\",\"异域风情被高度情欲化\"],\"sensory\":\"酒肆里垆边站着一个西域来的姑娘，眼睛深、鼻梁高，笑着招呼客人买酒。乐声一起，另一个女子踩上一张小圆毯，就着鼓点飞快旋转，薄纱裙摆撑成一圈，转得人看花了眼也不停。满座的少年郎看直了眼，有人当场提笔要为她写诗。胡地的酒、胡地的舞、胡地的女子，是这座城里最时髦的销魂物。\",\"note\":\"唐代长安、洛阳的酒肆多有西域来的\\\"胡姬\\\"当垆卖酒，李白等诗人屡屡题咏（\\\"胡姬貌如花，当垆笑春风\\\"）。源自中亚（粟特、康国等）的胡旋舞以女子在小圆毯上急速旋转著称，风靡宫廷与坊间。异域的容貌、酒与舞被唐人高度审美化、情欲化，是丝路文化交融在身体与欲望层面的投影。与公开坐标\\\"粟特商人\\\"同源。\"}),\n  E({\"id\":\"ck479\",\"name\":\"春秋·临淄女闾（管仲设官营妓院）\",\"en\":\"Linzi's State Brothels\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":-650,\"period\":\"前7世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"市井·庶民\",\"贸易·商业\"],\"atmos\":[\"管仲设\\\"女闾七百\\\"\",\"国营妓院鼻祖\",\"齐国财政手段\",\"女奴与歌舞\",\"性产业的制度化\"],\"sensory\":\"临淄东郭的巷子里，有涂了脂粉的女人在门口招手。空气里有酒气和廉价的熏香。一个商人付完钱正系腰带出来。\",\"note\":\"人类历史上最早有据可查的官营性产业之一。体验角度可以是\\\"一种欲望被制度化管理的瞬间\\\"——不猎奇，重点是制度设计的冷静和从业者的日常。\"}),\n  E({\"id\":\"ck480\",\"name\":\"汉·房中术时代\",\"en\":\"Han Bedchamber Arts\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪-2世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"医疗·身体\",\"学问·书写\"],\"atmos\":[\"马王堆房中术帛书\",\"性事作为养生术\",\"\\\"采阴补阳\\\"\",\"素女经\",\"医术与床术不分\",\"合气之术\"],\"sensory\":\"一个方士在给人讲解——认真得像在讲医书。因为这本来就是医书。旁边的人在做笔记，表情严肃。\",\"note\":\"汉代把性当成一门正式的学问来研究，态度极其正经。马王堆出土的房中术帛书是实物证据。体验角度是\\\"在一个性不羞耻的时代听一堂正经的性教育课\\\"。\"}),\n  E({\"id\":\"ck481\",\"name\":\"魏晋·男风与名士之美\",\"en\":\"Wei-Jin Male Beauty\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":450,\"period\":\"3-5世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\"],\"atmos\":[\"看杀卫玠\",\"潘安掷果盈车\",\"男性审美巅峰\",\"傅粉施朱\",\"裸袒之风\",\"竹林七贤的放浪形骸\",\"男色风尚\"],\"sensory\":\"一个极其好看的年轻男人坐着牛车经过，路边有人往车里扔水果和花。他脸上涂了粉，唇上有色——没人觉得奇怪。\",\"note\":\"魏晋是中国历史上男性审美最张扬的时代。可与\\\"建康（东晋·士族风流）\\\"坐标配对——一个侧重清谈书法，一个侧重身体审美与性别表达。竹林七贤的裸袒饮酒也是身体解放的一部分。\"}),\n  E({\"id\":\"ck482\",\"name\":\"武周·洛阳（武则天与面首）\",\"en\":\"Wu Zetian's Favorites\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":690,\"period\":\"690-705\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"女皇\",\"面首（男宠）\",\"权力与性别颠倒\",\"薛怀义（和尚出身）\",\"张昌宗张易之兄弟\\\"面如莲花\\\"\",\"上官婉儿\",\"控鹤监（官方男宠机构）\"],\"sensory\":\"朝堂上坐着一个女人，所有人都向她行礼。宫里有几个格外好看的年轻男人出入——他们的权力比大臣还大。大臣们在殿外等候，要等里面的人先出来。\",\"note\":\"中国历史上性别权力结构唯一一次完全翻转。控鹤监是武则天专门设立的机构，本质上是官方化的男宠制度。体验可以从两个角度切入——权力顶端的女人如何享用男色，以及被\\\"享用\\\"的男人在这个结构里的真实处境。\"}),\n  E({\"id\":\"ck483\",\"name\":\"唐·平康坊（长安红灯区）\",\"en\":\"Tang Pingkang Ward\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":850,\"period\":\"8-9世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"城市·都会\",\"艺术·表演\"],\"atmos\":[\"三曲（北曲南曲中曲）\",\"名妓与诗人\",\"科举放榜夜狂欢\",\"鱼玄机\",\"\\\"一夜帝王\\\"\",\"诗酒风流与皮肉生意并存\"],\"sensory\":\"坊门刚开，巷子里灯笼次第亮起来。有人在楼上弹琵琶。新科进士们呼朋引伴往里涌——今夜他们花得起。楼里传出笑声和丝竹声，有人从二楼的帘子后面探出头来看。\",\"note\":\"平康坊不只是色情场所——它是唐代文学、音乐、社交的核心场景之一。北曲最高端，名妓精通诗词歌赋；南曲最市井。很多唐传奇的爱情故事发生在这里。科举放榜后的平康坊之夜是唐代最狂欢的时刻。\"}),\n  E({\"id\":\"ck484\",\"name\":\"唐·华清池（杨贵妃时代）\",\"en\":\"Huaqing Hot Springs\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":740,\"period\":\"740s\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"艺术·表演\"],\"atmos\":[\"温泉\",\"贵妃出浴\",\"荔枝快递\",\"霓裳羽衣曲\",\"帝妃之恋\",\"\\\"春寒赐浴华清池\",\"温泉水滑洗凝脂\\\"\",\"海棠汤\"],\"sensory\":\"温泉的蒸汽模糊了视线。水面上飘着花瓣。有人在池边弹奏一支你没听过的曲子——据说是皇帝自己写的。远处有快马驰来——驿站送荔枝的。空气潮湿温热，带着硫磺和花瓣的气息。\",\"note\":\"中国历史上最著名的情欲意象之一。华清池本身是皇家温泉行宫，杨贵妃的海棠汤遗址至今尚在。体验重点不是偷窥，是\\\"一个帝国最奢靡的私密空间的氛围\\\"——温泉、音乐、美人、权力交织在蒸汽里。\"}),\n  E({\"id\":\"ck485\",\"name\":\"明·秦淮风月（晚明青楼文化巅峰）\",\"en\":\"Qinhuai Courtesans\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪末-17世纪中\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"城市·都会\",\"艺术·表演\"],\"atmos\":[\"秦淮八艳\",\"柳如是/顾横波/李香君/陈圆圆\",\"名妓与名士\",\"青楼与政治\",\"春宫画\",\"金瓶梅的世界\",\"画舫笙歌\"],\"sensory\":\"秦淮河上画舫灯火通明。有女人在船头唱曲，嗓音穿过水面。岸边某个书局在偷偷卖一本带插图的禁书。河面上倒映着两岸的红灯笼，船轻轻晃着。\",\"note\":\"晚明秦淮河文化是中国性文化最\\\"精致\\\"的形态——不只是皮肉生意，是一整套审美、情感和社交系统。秦淮八艳很多人诗词书画俱佳，她们与复社文人的关系亦情亦政。明亡时她们中有人殉国、有人出家、有人随夫抗清——\\\"情书\\\"和\\\"最后一天\\\"母题可以叠加，既风月又壮烈。\"}),\n  E({\"id\":\"ck486\",\"name\":\"缠足·三寸金莲\",\"en\":\"Bound Feet\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以明清最浓）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"医疗·身体\"],\"atmos\":[\"从幼年缠起的脚\",\"\\\"三寸金莲\\\"的审美\",\"藏在绣鞋里几乎不示人\",\"文人的\\\"香莲\\\"品评与迷恋\",\"被赋予情色意味的步态\",\"剧痛与不可逆\"],\"sensory\":\"一个五六岁的女孩，脚被一层层布缠紧，脚趾折向脚心——往后每隔些天还要缠得更紧，疼到夜里睡不着。长大后，那双脚被裹进小小的绣花鞋里，几乎从不让人看见。男人们却为它着迷：写谱品评，把那摇晃迟缓的步子说成最勾人的样子。脚下的真相——畸形、溃烂、终生的疼——被绣鞋盖着，没人愿意提。\",\"note\":\"缠足约自宋代兴起，明清遍及汉族各阶层，女孩通常四到八岁开始缠裹，使足骨变形成\\\"三寸金莲\\\"。它既是婚配市场上的硬通货与阶层标志，也被文人高度情色化（各种\\\"香莲\\\"品评）——裹足的步态、绣鞋、不示人的私密都被赋予欲望意味；与此同时它给女性带来终身的剧痛与残疾。体验设计应正视这层痛苦与强制，不浪漫化。清末民初在反缠足运动中逐渐废止。\"}),\n  E({\"id\":\"ck487\",\"name\":\"古埃及·都灵情色纸草（世界最古老的色情画）\",\"en\":\"Turin Erotic Papyrus\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"古典\",\"year\":-1150,\"period\":\"约前1150（新王国·拉美西斯时期）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\"],\"atmos\":[\"都灵情色纸草（Papyrus 55001）\",\"12个体位的连环画\",\"夸张的生殖器\",\"妓院场景？讽刺画？祭司的私藏？\",\"\\\"古代AV\\\"\"],\"sensory\":\"一张纸莎草上画着一男一女——不，很多对。他们在做各种姿势的爱。男人的那个东西画得大得离谱。女人的表情看起来……挺开心的。这到底是什么——一本说明书？一个笑话？还是画师下班后的消遣？没人知道。它被发现在代尔美迪纳附近——就是那个画师和石匠住的工人村。\",\"note\":\"都灵情色纸草是世界上现存最古老的\\\"色情\\\"绘画（约前1150年）——全长2.6米、宽25厘米，分两部分：前三分之一是动物扮演人类的讽刺画（\\\"颠倒世界\\\"），后三分之二是12幅性交场景。关键细节：画中男性被描绘为\\\"秃顶、矮胖、邋遢\\\"且生殖器夸大到荒谬——完全不符合古埃及的审美标准，这强烈支持它是讽刺/喜剧作品而非\\\"说明书\\\"。女性角色可能全是乐师。发现地点在工匠村代尔美迪纳附近。目前收藏在都灵埃及博物馆，长期不公开展出。\"}),\n  E({\"id\":\"ck488\",\"name\":\"古埃及·敏神祭典（丰收的勃起之神）\",\"en\":\"Festival of Min\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":0,\"period\":\"通时代（取新王国最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"节庆·仪式\"],\"atmos\":[\"敏神（Min·丰收与性之神）\",\"永远勃起的神像\",\"丰收节上公开的性仪式\",\"法老在敏神像前\\\"播种\\\"\",\"莴苣=催情符号\"],\"sensory\":\"节日。一尊神像被抬出神庙——他是黑色的，一只手举在头上，另一只手握着……他永远勃起的阳具。这是敏神——庄稼、矿藏和男性力量的保护者。法老在他面前执行仪式——据说要证明自己的\\\"播种能力\\
