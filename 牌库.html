document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

hemes\":[\"海洋·港口\",\"贸易·商业\"],\"atmos\":[\"长江天险\",\"海上贸易初芽\",\"江南开发早期\",\"佛教传入南方\"],\"sensory\":\"建业比你想象的小，江风很大。码头上停着从交州来的船，正卸下象牙、珍珠和成捆的香料。\",\"note\":\"东吴是海上丝绸之路的早期参与者，视角独特。\"}),\n  E({\"id\":\"ck25\",\"name\":\"西晋洛阳（太康之治/八王之乱前夜）\",\"en\":\"Western Jin Luoyang\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":280,\"period\":\"280-304\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"饮食·宴席\",\"末世·终结\"],\"atmos\":[\"石崇斗富\",\"金谷园\",\"短暂统一后的奢靡\",\"灾难正在靠近\"],\"sensory\":\"宴席上有人捧出一株二尺高的珊瑚炫耀，另一个人抄起铁如意把它打碎，转头命仆人抬出自己六七株更高的。\",\"note\":\"太康年间的洛阳是一场\\\"盛世幻觉\\\"——短暂统一后，所有人都在拼命享乐。\"}),\n  E({\"id\":\"ck26\",\"name\":\"永嘉之乱·衣冠南渡\",\"en\":\"Yongjia Exodus\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":311,\"period\":\"311-317\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"战争·军事\",\"末世·终结\"],\"atmos\":[\"洛阳再次被焚\",\"北方沦陷\",\"士族南逃\",\"旧世界彻底结束\"],\"sensory\":\"路上全是往南走的人。有人背着一箱书简，有人什么都没带。渡口的船不够了。\",\"note\":\"中国历史上最大规模的人口南迁之一。\"}),\n  E({\"id\":\"ck27\",\"name\":\"建康（东晋·士族风流）\",\"en\":\"Eastern Jin Jiankang\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":317,\"period\":\"317-420\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"艺术·表演\",\"宫廷·王权\"],\"atmos\":[\"王谢堂前燕\",\"乌衣巷\",\"清谈\",\"书法\",\"山水审美觉醒\",\"兰亭集序\"],\"sensory\":\"秦淮河边的大宅里有人在慢悠悠地聊天，话题从老庄突然跳到了今天的天气。有人在练字——写得极快，像在画画。\",\"note\":\"魏晋风度的实体化。体验重点是士族的审美生活和\\\"不正经的高雅\\\"。\"}),\n  E({\"id\":\"ck28\",\"name\":\"北魏平城/洛阳\",\"en\":\"Northern Wei Capitals\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":386,\"period\":\"386-534\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"革命·变革\",\"工艺·手艺\"],\"atmos\":[\"鲜卑汉化\",\"云冈石窟/龙门石窟正在开凿\",\"孝文帝改革\",\"游牧与农耕的碰撞\"],\"sensory\":\"石窟里有人在凿佛像，锤声在山壁间回响。街上有人穿鲜卑服，有人穿汉服，有人混着穿。\",\"note\":\"文化碰撞最激烈的时代之一。孝文帝禁止鲜卑语鲜卑服——\\\"禁忌\\\"母题绝配。\"}),\n  E({\"id\":\"ck29\",\"name\":\"大兴城（隋文帝时期）\",\"en\":\"Sui Daxing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":581,\"period\":\"581-604\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\"],\"atmos\":[\"新城刚建好\",\"开皇之治\",\"科举雏形\",\"天下刚统一的秩序感\"],\"sensory\":\"一座崭新的城——木料还泛着新茬，街道宽得有些空旷。来应考的年轻人正满城找客舍。\",\"note\":\"科举制的最初形态出现在这个时候。\\\"第一次考试\\\"。\"}),\n  E({\"id\":\"ck30\",\"name\":\"大运河工地\",\"en\":\"Grand Canal Works\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":605,\"period\":\"605-610\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"河流·水乡\"],\"atmos\":[\"百万民夫\",\"通济渠/永济渠\",\"杨广\",\"壮举与暴政的一体两面\"],\"sensory\":\"挖了一整天，腰已经直不起来了。河道的形状正在泥土中慢慢显现。有人在岸边用鞭子催促。\",\"note\":\"和秦始皇陵工地类似——伟大工程的另一面。\"}),\n  E({\"id\":\"ck31\",\"name\":\"初唐长安（贞观年间）\",\"en\":\"Early Tang Chang'an\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":627,\"period\":\"627-649\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"贞观之治\",\"万国来朝的开端\",\"国子监\",\"玄奘出发/归来\"],\"sensory\":\"朱雀大街上走过一队外国使节，有人围观议论他们的服饰。城里有好几座新建的佛寺。\",\"note\":\"盛唐的前奏。气质比盛唐更\\\"新\\\"更\\\"紧\\\"——刚从乱世出来的认真劲。\"}),\n  E({\"id\":\"ck32\",\"name\":\"盛唐长安（开元-天宝前期）\",\"en\":\"High Tang Chang'an\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":713,\"period\":\"713-750\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"贸易·商业\",\"艺术·表演\"],\"atmos\":[\"西市胡商\",\"胡旋舞\",\"曲江宴饮\",\"坊市制\",\"诗人满街走\",\"最世界主义的中国城市\"],\"sensory\":\"西市里波斯商人在卖宝石，胡姬在酒肆门口招呼客人。空气里混着烤羊肉、香料和花香。坊门快关了，有人在催促。\",\"note\":\"唐代体验的\\\"招牌坐标\\\"。感官浓度极高。\"}),\n  E({\"id\":\"ck33\",\"name\":\"安史之乱中的长安\",\"en\":\"Chang'an in Rebellion\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":756,\"period\":\"756-757\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"迁徙·流亡\"],\"atmos\":[\"玄宗出逃\",\"马嵬坡\",\"叛军入城\",\"杜甫困长安\",\"繁华碎裂\"],\"sensory\":\"西市空了，昨天还在卖胡饼的铺子门板紧闭，炉子也凉了。坊墙根下有人在烧东西——一捆捆的文书，灰被风吹得到处都是。叛军的巡骑从朱雀大街过去，马蹄声很响。有人扒着门缝往外看，又赶紧缩回去。墙上还贴着半张没撕干净的旧告示。\",\"note\":\"和盛唐长安是同一座城的正反面。\"}),\n  E({\"id\":\"ck34\",\"name\":\"敦煌（唐·吐蕃/归义军时期）\",\"en\":\"Tang Dunhuang\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":950,\"period\":\"7-10世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\",\"沙漠·绿洲\"],\"atmos\":[\"莫高窟正在被画\",\"商队歇脚\",\"东西方的气味混合\",\"藏经洞封闭之前\"],\"sensory\":\"洞窟里有画师在调石青和朱砂，矿物颜料的气味闷在窟里散不掉。外面的沙砾晒得发烫，一进洞却是阴凉。壁画上飞天的衣带刚上完色，还是湿的。\",\"note\":\"体验重点是\\\"一幅壁画正在被创作的过程\\\"。\"}),\n  E({\"id\":\"ck35\",\"name\":\"扬州（晚唐）\",\"en\":\"Late Tang Yangzhou\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":850,\"period\":\"9世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"贸易·商业\",\"末世·终结\"],\"atmos\":[\"扬一益二\",\"盐商\",\"夜市\",\"运河码头\",\"繁华但唐已显疲态\"],\"sensory\":\"运河上的船灯连成一线。盐商宴席上摆着窖冰镇过的饮子。可城门一入夜就闩死，城外的路没人敢走。\",\"note\":\"晚唐扬州是一种\\\"末世繁华\\\"——知道大厦将倾但今夜先喝完这杯酒。\"}),\n  E({\"id\":\"ck36\",\"name\":\"广州（唐·蕃坊）\",\"en\":\"Guangzhou Foreign Quarter\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":850,\"period\":\"8-9世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"阿拉伯商人聚居区\",\"海上贸易\",\"蕃坊自治\",\"清真寺与佛寺并立\"],\"sensory\":\"码头上的话你一句听不懂——阿拉伯语、波斯语、梵语搅在一起。海风里裹着乳香和沉香的味道。\",\"note\":\"唐代广州的蕃坊是中国最早的大规模外国人聚居区。多元文化体验点。\"}),\n  E({\"id\":\"ck37\",\"name\":\"南唐金陵\",\"en\":\"Southern Tang Jinling\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":937,\"period\":\"937-975\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"末世·终结\",\"艺术·表演\"],\"atmos\":[\"词人皇帝李煜\",\"精致的小朝廷\",\"城外已有宋兵\",\"末日前的风雅\"],\"sensory\":\"宫里在排一支新曲子，丝竹声从殿里飘出来，词是皇帝亲笔填的。廊下宫人捧着熏笼来回走，沉水香的烟一缕缕的。可花园角落里，几个内侍正低声议论——说宋军的旗子已经能在江北望见了。曲子还在反复同一句，没人敢去打断。\",\"note\":\"\\\"一个注定灭亡的小王朝的最后几年\\\"——极致的美与极致的脆弱。\"}),\n  E({\"id\":\"ck38\",\"name\":\"前蜀/后蜀成都\",\"en\":\"Shu Kingdom Chengdu\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":907,\"period\":\"907-965\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\"],\"atmos\":[\"花间词派\",\"蜀锦\",\"偏安的富足\",\"芙蓉花城\"],\"sensory\":\"满城芙蓉开得正盛，锦江边的染坊晾着一匹匹蜀锦，红的、靛青的、明黄的。城里没人提外面的仗。\",\"note\":\"五代乱世中的\\\"世外桃源\\\"。\"}),\n  E({\"id\":\"ck39\",\"name\":\"北宋汴京\",\"en\":\"Northern Song Bianjing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":960,\"period\":\"960-1127\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"市井·庶民\",\"艺术·表演\"],\"atmos\":[\"清明上河图的世界\",\"瓦舍勾栏\",\"夜市不设禁\",\"相国寺集市\",\"勾栏瓦子说书\"],\"sensory\":\"虹桥下的汴河挤满了船。夜市一直开到三更——烤肉、冰糖、炒栗子的香味飘出很远。有人在瓦子里说书，围了一圈人。\",\"note\":\"中国古代城市生活的巅峰体验。感官密度极高。\"}),\n  E({\"id\":\"ck40\",\"name\":\"靖康之变·汴京陷落\",\"en\":\"Fall of Bianjing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1126,\"period\":\"1126-1127\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"金兵围城\",\"二帝被俘\",\"开封的冬天极冷\",\"靖康耻\"],\"sensory\":\"城里断粮好些天了。街边有人拆自家的门板劈柴，火堆上熬着稀得照见人影的粥。大雪下了一整天，雪地里能闻到烧焦的木头味。城北方向时不时传来号角和闷响，没人往那边看。米铺早关了，巷口排队领粥的人裹着好几层，跺脚搓手，谁也不出声。\",\"note\":\"和北宋汴京形成残酷对照。\"}),\n  E({\"id\":\"ck41\",\"name\":\"南宋临安\",\"en\":\"Southern Song Lin'an\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1138,\"period\":\"1138-1276\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"市井·庶民\",\"河流·水乡\"],\"atmos\":[\"西湖\",\"御街\",\"偏安繁华\",\"暖风熏得游人醉\",\"茶坊点茶\"],\"sensory\":\"西湖上的画舫慢慢挪。御街两侧的铺子从绫罗到吃食一字排开。有人端着一碗刚出锅的宋嫂鱼羹，醋香飘过来。\",\"note\":\"一边是\\\"直把杭州作汴州\\\"的享乐，一边是收复北方的执念——但日常体验里，繁华是真的。\"}),\n  E({\"id\":\"ck42\",\"name\":\"泉州（宋-元）\",\"en\":\"Quanzhou, Zayton Port\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1350,\"period\":\"11-14世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"海上丝绸之路最大港口\",\"阿拉伯商人\",\"多宗教共存\",\"刺桐城\"],\"sensory\":\"港口里停满了来自各地的船。清真寺的宣礼声和佛寺的钟声几乎同时响起。街上有人在卖来自南洋的香料。\",\"note\":\"马可·波罗笔下与亚历山大齐名的大港之一。真正的国际都市。\"}),\n  E({\"id\":\"ck43\",\"name\":\"崖山之战\",\"en\":\"Battle of Yamen\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1279,\"period\":\"1279\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"死亡·葬仪\"],\"atmos\":[\"南宋最后一战\",\"十万人蹈海\",\"陆秀夫负帝投海\",\"崖山之后无中国（争议说法）\"],\"sensory\":\"海面上漂着碎木、衣冠和浮尸，一直漂到看不见的地方，海水是浑浊的暗红。烧了一半的战船还在冒烟，桅杆斜插在浪里。风很大，带着血腥和海盐的味道。礁石上有人瘫坐着哭，也有人一句话不说，望着那片漂满人的海。\",\"note\":\"极重。南宋灭亡的最后一刻。\"}),\n  E({\"id\":\"ck44\",\"name\":\"辽上京/中京\",\"en\":\"Khitan Liao Capital\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1150,\"period\":\"10-12世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"城市·都会\"],\"atmos\":[\"契丹双轨制\",\"草原与城市的混合\",\"捺钵（四时迁徙宫帐）\",\"鹰猎\"],\"sensory\":\"一半是帐篷一半是房子的城市。皇帝的行帐今天搬到了湖边——整个朝廷跟着走。\",\"note\":\"契丹的\\\"一国两制\\\"非常独特——同一个国家两套完全不同的生活方式。\"}),\n  E({\"id\":\"ck45\",\"name\":\"金中都（女真入主中原后）\",\"en\":\"Jurchen Zhongdu\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1153,\"period\":\"1153-1215\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"宫廷·王权\"],\"atmos\":[\"女真汉化\",\"北方的另一个\\\"中国\\\"\",\"海陵王迁都\",\"完颜亮的野心\"],\"sensory\":\"这座城和你听说过的汴京有几分像，可街上的人说话带着北方的硬腔，还有人剃了顶、脑后垂着辫子，是你没见过的样式。\",\"note\":\"一个征服者在学被征服者的生活方式。\"}),\n  E({\"id\":\"ck46\",\"name\":\"西夏兴庆府\",\"en\":\"Tangut Xingqing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1038,\"period\":\"1038-1227\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"末世·终结\"],\"atmos\":[\"党项人\",\"自创文字\",\"佛教王国\",\"贺兰山下\",\"被蒙古灭国后几乎全灭\"],\"sensory\":\"贺兰山的轮廓在夕阳里压成一道黑线。城里店铺的招牌上，是一种笔画像汉字、却一个都认不出的方块文字。\",\"note\":\"西夏文明几乎被蒙古人完全抹除——\\\"消失的声音\\\"母题的极致案例。\"}),\n  E({\"id\":\"ck47\",\"name\":\"元大都\",\"en\":\"Yuan Dadu, Khanbaliq\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1271,\"period\":\"1271-1368\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"艺术·表演\",\"殖民·帝国\"],\"atmos\":[\"草原皇帝的汉地首都\",\"色目人\",\"马可波罗\",\"四等人制\",\"元杂剧\"],\"sensory\":\"大都的街道比你去过的任何城市都宽。有蒙古人骑马在街上走，有波斯商人在铺子里交易，有汉人在戏台上演杂剧。\",\"note\":\"一个\\\"世界帝国\\\"的首都——混杂感是核心体验。\"}),\n  E({\"id\":\"ck48\",\"name\":\"元末起义（红巾军/朱元璋崛起）\",\"en\":\"Red Turban Rebellion\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1351,\"period\":\"1351-1368\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"天下大乱\",\"红巾军\",\"朱元璋从乞丐到皇帝\",\"群雄逐鹿\"],\"sensory\":\"路上全是逃难的人，挑着担、推着独轮车，孩子骑在行李上。各色旗号的队伍来回开拔——红巾裹头的、打白莲旗的、说不清归谁的。田里的稻子烂在水里没人收，沟渠边浮着死牲口的腥气。有人凑过来压低声音问你是哪边的，眼睛先扫过你的鞋和手。\",\"note\":\"中国历史上\\\"底层翻盘\\\"最极端的案例。\"}),\n  E({\"id\":\"ck49\",\"name\":\"明初南京\",\"en\":\"Early Ming Nanjing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"中古\",\"year\":1368,\"period\":\"1368-1421\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"宫廷·王权\",\"城市·都会\"],\"atmos\":[\"朱元璋的城\",\"从战乱中站起来的秩序感\",\"高压统治\",\"锦衣卫\",\"洪武大案\"],\"sensory\":\"城墙高得压下来。街上静得反常——没人敢大声说话。只有秦淮河边还亮着零星的灯火。\",\"note\":\"朱元璋的统治下，秩序和恐惧并存。\"}),\n  E({\"id\":\"ck50\",\"name\":\"永乐北京（紫禁城刚落成）\",\"en\":\"Yongle Beijing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":-1421,\"period\":\"1421前后\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"城市·都会\"],\"atmos\":[\"紫禁城新建成\",\"郑和下西洋出发地\",\"万国来朝\",\"迁都争议\"],\"sensory\":\"一座巨大的宫殿群刚刚完工，红墙金瓦的油漆味还没散尽。有人说这座城会成为天下的中心。\",\"note\":\"紫禁城\\\"崭新\\\"的样子——没有六百年包浆的那个版本。\"}),\n  E({\"id\":\"ck51\",\"name\":\"郑和船队（海上）\",\"en\":\"Zheng He's Fleet\",\"region\":\"东亚·中国\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1405,\"period\":\"1405-1433\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\"],\"atmos\":[\"宝船\",\"七下西洋\",\"最大的远洋舰队\",\"外交与贸易\",\"满剌加/古里/东非\"],\"sensory\":\"你站在一艘九桅的大船上，桅杆高得要仰起头才看得到顶。甲板下塞着几百号人。海平线上浮起一道你不认识的海岸。\",\"note\":\"严格说是\\\"跨区域\\\"坐标，但以明朝视角为主体放在这里。\"}),\n  E({\"id\":\"ck52\",\"name\":\"明中晚期苏州\",\"en\":\"Late Ming Suzhou\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"工艺·手艺\",\"学问·书写\"],\"atmos\":[\"园林\",\"刻书坊\",\"昆曲\",\"江南士绅的精致生活\",\"文徵明的世界\"],\"sensory\":\"一座园子里有假山、有水、有竹。主人在听昆曲，唱的是你听不太懂的吴语。隔壁有人在刻书——雕版上是一幅精致的插画。\",\"note\":\"明代苏州是\\\"文人生活\\\"的极致形态。\"}),\n  E({\"id\":\"ck53\",\"name\":\"万历年间的景德镇\",\"en\":\"Wanli Jingdezhen\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪晚期\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"瓷都\",\"青花瓷\",\"外销瓷\",\"窑火昼夜不息\",\"制瓷七十二道工序\"],\"sensory\":\"整座镇子笼罩在窑烟里。到处是瓷片碎屑。有人在极其小心地往一个白坯上画青花图案——手不能抖。\",\"note\":\"景德镇当时是全球最大的瓷器产地。体验\\\"一件外销瓷从画坯到装船\\\"的全过程。\"}),\n  E({\"id\":\"ck54\",\"name\":\"明末北京（崇祯末年）\",\"en\":\"Beijing 1644\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1644,\"period\":\"1644\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"李自成进城\",\"崇祯吊死煤山\",\"改朝换代的那一天\",\"京城百姓的视角\"],\"sensory\":\"今天街上很安静。听说皇帝死了。很快有人骑马进了城——旗号是你没见过的。\",\"note\":\"中国历史上朝代更替\\\"最戏剧性的一天\\\"之一。\"}),\n  E({\"id\":\"ck55\",\"name\":\"嘉定三屠/扬州十日\",\"en\":\"Yangzhou Massacre\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1645,\"period\":\"1645\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"死亡·葬仪\",\"奴役·压迫\"],\"atmos\":[\"剃发令\",\"满清入关后的屠城\",\"头发与尊严\",\"\\\"留头不留发\\\"\"],\"sensory\":\"（此坐标感官锚点从略——落地时由AI根据母题调整）\",\"note\":\"非常重的坐标。冲突模式专属。体验角度应该是平民视角——\\\"一纸命令改变所有人的身体\\\"。\"}),\n  E({\"id\":\"ck56\",\"name\":\"康熙年间北京\",\"en\":\"Kangxi's Beijing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1650,\"period\":\"17世纪晚期-18世纪初\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"宫廷·王权\",\"宗教·信仰\"],\"atmos\":[\"康熙帝\",\"传教士在宫廷\",\"九子夺嫡前夜\",\"旗人生活\",\"京城八旗\"],\"sensory\":\"胡同里有人提着鸟笼遛弯。茶馆里两个人对着棋盘。远处紫禁城的红墙被太阳照得发亮。一个穿西洋衣服的人走过——听说是进宫给皇帝修钟的。\",\"note\":\"清初稳定期的北京日常。传教士在宫廷是一个独特的文化接触点。\"}),\n  E({\"id\":\"ck57\",\"name\":\"乾隆年间的扬州（盐商文化）\",\"en\":\"Qianlong Yangzhou\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1750,\"period\":\"18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"饮食·宴席\",\"艺术·表演\"],\"atmos\":[\"两淮盐商\",\"瘦西湖\",\"扬州八怪\",\"极尽奢华\",\"乾隆南巡\"],\"sensory\":\"盐商家的花园比你见过的任何园子都奢华。晚宴上有从一千里外快马运来的鲜鱼。一个穷画家在角落里给人画扇面。\",\"note\":\"清代扬州盐商的奢靡程度超出现代人想象。\\\"扬州八怪\\\"就是这种极端贫富差距的副产品。\"}),\n  E({\"id\":\"ck58\",\"name\":\"广州十三行\",\"en\":\"Canton Thirteen Factories\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1750,\"period\":\"18世纪中-19世纪中\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"海洋·港口\"],\"atmos\":[\"唯一对外贸易口岸\",\"洋货与茶叶\",\"东西方商人混居\",\"行商制度\"],\"sensory\":\"珠江边的商馆飘着各国旗帜。空气里有茶叶、鸦片和海风的气味。一个英国商人正在跟一个中国行商讨价还价——中间还隔着一个翻译。\",\"note\":\"清代\\\"闭关锁国\\\"的唯一窗口。文化碰撞与商业博弈。\"}),\n  E({\"id\":\"ck59\",\"name\":\"鸦片战争前后的广州/虎门\",\"en\":\"Opium War Canton\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1839,\"period\":\"1839-1842\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"殖民·帝国\",\"末世·终结\"],\"atmos\":[\"林则徐禁烟\",\"虎门销烟\",\"英军炮舰\",\"\\\"三千年未有之变局\\\"的开端\"],\"sensory\":\"海滩上挖了几口大池子，泡在里面的鸦片正被石灰和盐化掉，呛得人睁不开眼。远处海面上停着几艘从没见过的铁壳船，没挂帆也能动。\",\"note\":\"近代中国的起点。体验角度是\\\"目击一个旧世界的秩序被打破\\\"。\"}),\n  E({\"id\":\"ck60\",\"name\":\"太平天国天京\",\"en\":\"Taiping Heavenly Capital\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1853,\"period\":\"1853-1864\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"革命·变革\",\"战争·军事\"],\"atmos\":[\"天王府\",\"男女分营\",\"拜上帝教\",\"一个中国农民想象中的天国\",\"内讧\"],\"sensory\":\"南京改了名，叫\\\"天京\\\"。街上的规矩全翻了——男女分开住，不许喝酒抽烟，见面要称\\\"兄弟\\\"\\\"姊妹\\\"。有人在背一本没听过的经。\",\"note\":\"人类历史上最血腥的内战之一。体验角度可以是\\\"一个普通南京市民发现自己突然活在一套全新规则里\\\"。\"}),\n  E({\"id\":\"ck61\",\"name\":\"晚清上海（租界时期）\",\"en\":\"Late Qing Shanghai\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪后半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"殖民·帝国\",\"市井·庶民\"],\"atmos\":[\"租界\",\"电灯初现\",\"黄包车\",\"中西碰撞\",\"弄堂里的日常\",\"买办文化\"],\"sensory\":\"马路一边是洋楼和煤气灯，另一边是弄堂和馄饨摊。有人在看一份奇怪的东西——印在纸上的，叫\\\"报纸\\\"。\",\"note\":\"两个时代、两种文明在同一条街上共存。\"}),\n  E({\"id\":\"ck62\",\"name\":\"清末北京（庚子年）\",\"en\":\"Boxer Rebellion Beijing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"近代\",\"year\":1900,\"period\":\"1900\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\",\"殖民·帝国\"],\"atmos\":[\"义和团\",\"八国联军\",\"慈禧西逃\",\"刀枪不入的信仰与现实的碰撞\"],\"sensory\":\"街上有人扎着红巾练拳，说刀枪进不了身、挡得住洋枪。远处一阵阵炮声。宫里在连夜收拾细软，太监进进出出。\",\"note\":\"旧中国最荒诞也最悲壮的时刻之一。\"}),\n  E({\"id\":\"ck63\",\"name\":\"辛亥革命·武昌\",\"en\":\"Wuchang Uprising\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"世纪之交\",\"year\":1911,\"period\":\"1911\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"末世·终结\"],\"atmos\":[\"枪响了\",\"剪辫子\",\"两千年帝制终结\",\"一夜之间换旗号\"],\"sensory\":\"听到了枪声，但不确定从哪个方向来的。有人在跑。第二天早上，衙门上面的旗换了。\",\"note\":\"帝制终结的那一天。\"}),\n  E({\"id\":\"ck64\",\"name\":\"民国北京\",\"en\":\"Republican Beijing\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"世纪之交\",\"year\":1912,\"period\":\"1912-1928\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"革命·变革\",\"市井·庶民\"],\"atmos\":[\"五四运动\",\"新文化\",\"胡同与大学\",\"白话文运动\",\"最后的文人与最初的知识分子\"],\"sensory\":\"北大红楼前有人在发传单。胡同里的老生活照旧——磨剪子的吆喝声没变。茶馆里有人在争论——用白话文还是文言文。\",\"note\":\"新与旧最密集地交织的年代。\"}),\n  E({\"id\":\"ck65\",\"name\":\"1930s上海\",\"en\":\"1930s Shanghai\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"世纪之交\",\"year\":1930,\"period\":\"1930s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"艺术·表演\",\"殖民·帝国\"],\"atmos\":[\"摩登与暗流\",\"百乐门与亭子间\",\"租界末期\",\"电影黄金时代\",\"左翼文学\"],\"sensory\":\"霓虹灯在外滩亮起来。有人穿旗袍走进一家咖啡馆。弄堂深处有人在听收音机——播的是周璇的歌。但报纸头版印着让人不安的消息。\",\"note\":\"和晚清上海是同一座城但气质完全不同，各占一个坐标。\"}),\n  E({\"id\":\"ck66\",\"name\":\"西南联大（昆明）\",\"en\":\"Lianda, Wartime Kunming\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"世纪之交\",\"year\":1938,\"period\":\"1938-1946\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"战争·军事\",\"迁徙·流亡\"],\"atmos\":[\"战时南迁\",\"铁皮屋顶教室\",\"最好的大学在最烂的条件下\",\"跑警报日常\"],\"sensory\":\"空袭警报又响了，所有人往山上跑。教授把讲义夹在胳膊下。等警报解除，回来继续上课。铁皮屋顶上的雨声大到听不见讲课。\",\"note\":\"战争中的学术乌托邦。体验角度是\\\"在最糟糕的条件下做最好的事\\\"。\"}),\n  E({\"id\":\"ck67\",\"name\":\"三星堆（青铜神树与纵目面具）\",\"en\":\"Sanxingdui\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"上古\",\"year\":-1300,\"period\":\"约前1300-前1100\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"城市·都会\"],\"atmos\":[\"纵目突睛的青铜面具\",\"几米高的青铜神树\",\"黄金面罩与金杖\",\"成堆砸碎焚埋的祭祀坑\",\"有玉无文字的古蜀国\"],\"sensory\":\"祭祀坑边，匠人把一棵几米高的青铜树立起来，枝上挂着鸟和果。旁边摊着一排面具——眼珠凸出眼眶老长，耳朵尖尖支棱着，不像任何活人的脸。一根包金的木杖刻着鱼和鸟。这里的人不写字，没人说得清他们拜什么。\",\"note\":\"三星堆是商代古蜀国的祭祀中心，与中原同期却风格迥异——青铜神树、纵目面具、金面罩都不见于其他中国遗址。器物多被有意砸碎、焚烧后成坑掩埋，原因不明；古蜀无传世文字，身份与信仰至今是谜。2021年新坑发掘再度轰动。\"}),\n  E({\"id\":\"ck68\",\"name\":\"吐蕃·逻些（拉萨）\",\"en\":\"Tibetan Lhasa\",\"region\":\"东亚·中国\",\"country\":\"吐蕃\",\"era\":\"中古\",\"year\":850,\"period\":\"7-9世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"宫廷·王权\",\"山地·高原\"],\"atmos\":[\"松赞干布建大昭寺\",\"文成公主与尺尊公主\",\"新创的藏文\",\"高原上的军事帝国\",\"763年一度攻入长安\"],\"sensory\":\"海拔三千多米，阳光晒得脸生疼，风一刮嘴唇就裂。一座新庙刚立起来，门前的人转着经、磕着长头，庙里供着东边唐朝送来的佛像。城外营地里披甲的骑兵在集结——前些年他们一路打进长安，立了个皇帝又退回来。\",\"note\":\"吐蕃帝国由松赞干布在7世纪奠基，文成公主入藏带来唐朝工匠与佛像，大昭寺即此时所建。吐蕃曾长期与唐争夺西域、河西，763年一度攻陷长安。藏文也在这一时期参照印度字母创制。\"}),\n  E({\"id\":\"ck69\",\"name\":\"南诏·大理（苍山洱海间）\",\"en\":\"Nanzhao & Dali\",\"region\":\"东亚·中国\",\"country\":\"南诏·大理\",\"era\":\"中古\",\"year\":1250,\"period\":\"8-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"边塞·边疆\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"洱海边的白蛮·乌蛮\",\"崇圣寺三塔\",\"天宝战争大败唐军\",\"段氏大理国\",\"阿吒力密教\",\"茶马与象兵\"],\"sensory\":\"洱海一片亮蓝，对岸苍山顶上还压着雪。湖边立着三座白塔，最高那座的尖顶映在水里。市集上有人牵着驮茶的马，也有人赶着大象。庙里僧人念经混着梵语腔。这里的王姓段——山那头的唐、宋，都没真管到这儿。\",\"note\":\"南诏（唐代）与继之的大理国（宋代）是洱海一带以白、彝先民为主的独立王国。南诏曾在天宝战争中重创唐军（唐军死伤近二十万）；大理段氏崇佛，阿吒力密教盛行，崇圣寺三塔留存至今。直到元灭大理才纳入中原版图。\"}),\n  E({\"id\":\"ck70\",\"name\":\"马王堆（不腐的辛追夫人）\",\"en\":\"Mawangdui Tombs\",\"region\":\"东亚·中国\",\"country\":\"中国\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"工艺·手艺\",\"医疗·身体\"],\"atmos\":[\"千年不腐的女尸\",\"T形帛画（引魂升天）\",\"素纱襌衣轻得能折进掌心\",\"帛书房中与医方\",\"轪侯一家\"],\"sensory\":\"一层套一层的漆棺打开，最里头躺着一位夫人——皮肤还有弹性，关节还能动，像刚下葬不久。棺盖盖着一幅T形帛画，画着日月、龙和她升天的样子。陪葬的丝衣薄得几乎透明，一整件攥在手里只一小团。漆盒里封着写在帛上的医方。\",\"note\":\"马王堆汉墓（长沙）是西汉轪侯利苍一家的墓。一号墓女主人辛追的遗体两千年不腐，举世罕见；T形帛画是早期\\\"魂魄升天\\\"观念的杰作；三号墓出土大量帛书，含《老子》古本与房中、医方文献，是研究汉代知识与身体观的一手材料。\"}),\n  E({\"id\":\"ck71\",\"name\":\"三内丸山（绳文中期）\",\"en\":\"Jōmon Sannai-Maruyama\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"史前\",\"year\":-3500,\"period\":\"约前3500-前2000\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"竖穴住居\",\"栗子栽培\",\"翡翠交易\",\"巨大木柱\",\"定居狩猎采集\"],\"sensory\":\"六根巨大的栗木柱矗立在聚落中央，比所有住居都高。空气里飘着烤栗子和熏鱼的烟味。有人在打磨一块从远方换来的翡翠。\",\"note\":\"日本新石器的代表遗址。绳文人并非纯游猎——他们已经在栽培植物、建造大型建筑。\"}),\n  E({\"id\":\"ck72\",\"name\":\"吉野里（弥生中期）\",\"en\":\"Yayoi Yoshinogari\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"古典\",\"year\":-250,\"period\":\"约前3世纪-前1世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"水稻耕作\",\"环濠集落\",\"铜剑铜矛\",\"战争的影子\",\"邪马台国前夜\"],\"sensory\":\"水田里，有人弯着腰插秧。聚落外围着一圈壕沟，沟沿插满削尖的木桩。瞭望楼上立着值守的人。\",\"note\":\"从狩猎采集到农耕定居的转折，也是战争开始日常化的时期。\"}),\n  E({\"id\":\"ck73\",\"name\":\"邪马台国（卑弥呼时代）\",\"en\":\"Yamatai of Himiko\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"古典\",\"year\":250,\"period\":\"约3世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"卑弥呼\",\"鬼道\",\"魏志倭人传\",\"女王的神谕\",\"邪马台国所在地之争\"],\"sensory\":\"帷幕后面有人在说话，谁也看不见她的脸。满屋的人都屏息听着。外面，有人刚渡海归来，带回一面铜镜。\",\"note\":\"日本史上最神秘的存在之一。所在地至今都未能确定，但作为一段体验，它的浓度极高。\"}),\n  E({\"id\":\"ck74\",\"name\":\"大和（古坟时代中期）\",\"en\":\"Kofun Yamato\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"古典\",\"year\":450,\"period\":\"4-5世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"宫廷·王权\",\"工艺·手艺\"],\"atmos\":[\"前方后圆坟\",\"大王权力\",\"渡来人的技术\",\"马具与铁器\",\"倭五王\"],\"sensory\":\"山丘上，成百的人正在堆起一座巨大的、钥匙孔形状的土丘。坡下，从海对岸来的工匠在锻打铁器，火星四溅。\",\"note\":\"巨大古坟的营造是国家级工程。渡来人带来的技术，是浓度很高的体验点。\"}),\n  E({\"id\":\"ck75\",\"name\":\"飞鸟（推古朝·圣德太子时代）\",\"en\":\"Asuka of Shōtoku\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":593,\"period\":\"593-628\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"宫廷·王权\",\"学问·书写\"],\"atmos\":[\"接纳佛教\",\"冠位十二阶\",\"遣隋使\",\"飞鸟寺\",\"大陆文化汹涌涌入\"],\"sensory\":\"小小的盆地里，一座寺院刚刚落成，瓦顶在日光下泛青。渡海而来的百济工匠还爬在檐上做最后的收尾。石板路上官员急步走过，冠帽的颜色标示着等级。\",\"note\":\"日本初次开始意识到\\\"国家\\\"这一概念的时期。一切都从模仿大陆开始。\"}),\n  E({\"id\":\"ck76\",\"name\":\"飞鸟（大化改新/壬申之乱）\",\"en\":\"Asuka, Taika Reform\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":645,\"period\":\"645-672\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"宫廷·王权\",\"律法·审判\"],\"atmos\":[\"苏我氏暗杀\",\"天智与天武\",\"古代最大的政变\",\"向律令国家转型\"],\"sensory\":\"宫中一片骚动——有人在大殿上被当场诛杀，传闻飞快散开。没过多久，连官职的名称都换了一套。\",\"note\":\"决定了日本历史走向的一场政变。\"}),\n  E({\"id\":\"ck77\",\"name\":\"平城京（奈良）\",\"en\":\"Heijō-kyō, Nara\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":710,\"period\":\"710-784\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"遣唐使归国\",\"正仓院宝物\",\"天平文化\",\"鉴真东渡\",\"东大寺大佛建立\"],\"sensory\":\"新都城还带着木料的清香。大佛殿那边传来铸造的声响。从遣唐使船上下来的人，怀里抱着一件从没见过的乐器。\",\"note\":\"正仓院的宝物是\\\"当时国际交流的实物\\\"。大佛建立是巨大的国家工程，施工途中的感官体验十分浓烈。\"}),\n  E({\"id\":\"ck78\",\"name\":\"遣唐使船上\",\"en\":\"Kentōshi Voyage\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":850,\"period\":\"7-9世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"宗教·信仰\"],\"atmos\":[\"拼上性命的渡海\",\"四艘同行未必都到得了岸\",\"最澄空海\",\"等候季风\"],\"sensory\":\"船比想象中要小。浪头漫过甲板。有人在向佛祈祷。出发的四艘船里，能抵达对岸的会是——。\",\"note\":\"古代的遣唐使船危险得惊人。是\\\"路上\\\"母题的极致。\"}),\n  E({\"id\":\"ck79\",\"name\":\"平安京（初期·迁都直后）\",\"en\":\"Early Heian-kyō\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":-850,\"period\":\"794-9世纪前半\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\"],\"atmos\":[\"崭新的都城\",\"棋盘格的街道\",\"空海最澄的宗教改革\",\"唐风依然浓厚\"],\"sensory\":\"崭新的都城整整齐齐排成棋盘格，但西边的右京地势低洼，还是没人落脚的荒地。寺院的钟每响一次，狗就吠一阵。\",\"note\":\"平安京最初是作为\\\"模仿唐朝的都市\\\"起步的，从这里开始逐渐和风化。\"}),\n  E({\"id\":\"ck80\",\"name\":\"平安京（中期·源氏物语的世界）\",\"en\":\"Heian-kyō of Genji\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1050,\"period\":\"10-11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"婚恋·求爱\",\"学问·书写\"],\"atmos\":[\"贵族的季节感\",\"假名文学\",\"御帘与牛车\",\"熏香品评\",\"情书\",\"物哀\"],\"sensory\":\"御帘的另一侧有人的气息。熏香沁进了衣物。有人对着庭院里的虫鸣写和歌，墨香未干。\",\"note\":\"诞生了世界最早的长篇小说的那种空气。感官以嗅觉（熏香）和听觉（虫鸣）为中心。\"}),\n  E({\"id\":\"ck81\",\"name\":\"平安京（院政期·末法思想）\",\"en\":\"Late Heian-kyō\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1150,\"period\":\"11-12世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"末世·终结\",\"宫廷·王权\"],\"atmos\":[\"末法之世\",\"净土信仰\",\"平等院凤凰堂\",\"白河法皇\\\"天下三不如意\\\"\",\"武士的崛起\"],\"sensory\":\"贵族们争先恐后地修建阿弥陀堂。人人都说\\\"这世道要到头了\\\"，可宇治川畔那座凤凰堂，倒映在水池里，屋脊的金凤迎着光。\",\"note\":\"末法思想——这是一个\\\"相信世界即将终结\\\"的社会的日常。但建筑反而被推向了极致的美，是一种悖论。\"}),\n  E({\"id\":\"ck82\",\"name\":\"源平合战（坛之浦）\",\"en\":\"Battle of Dan-no-ura\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1185,\"period\":\"1185\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"海洋·港口\",\"革命·变革\"],\"atmos\":[\"平氏灭亡\",\"安德天皇投水\",\"海战\",\"红旗与白旗\",\"贵族时代的终结\"],\"sensory\":\"海面铺满红色的旗——不，白旗渐渐多了起来。一个女人抱着年幼的孩子，站上了船舷。\",\"note\":\"象征着贵族社会终结的一瞬。\"}),\n  E({\"id\":\"ck83\",\"name\":\"镰仓（武家政权初期）\",\"en\":\"Early Kamakura\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1250,\"period\":\"12-13世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"宗教·信仰\",\"战争·军事\"],\"atmos\":[\"质实刚健\",\"禅宗传入\",\"镰仓五山\",\"北条执权政治\",\"御家人的生活\"],\"sensory\":\"和京都比起来，一切都简朴而小巧。但空气不一样——武士们一大早就在拉弓。禅寺传来诵经声。\",\"note\":\"\\\"武士之都\\\"的日常。和京都的对比格外鲜明。\"}),\n  E({\"id\":\"ck84\",\"name\":\"蒙古袭来（文永·弘安之役）\",\"en\":\"Mongol Invasions, Hakata\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1274,\"period\":\"1274/1281\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"海洋·港口\"],\"atmos\":[\"元寇\",\"博多湾\",\"铁炮（震天雷）\",\"神风\",\"异国的军势\"],\"sensory\":\"博多的海岸上出现了一支从没见过的船队。突然，半空中有什么东西炸开了——一种从未听过的声响。马匹受惊乱窜。\",\"note\":\"日本初次直面大规模外敌入侵的经历。\\\"铁炮\\\"是日本人第一次亲眼见到的爆炸物。\"}),\n  E({\"id\":\"ck85\",\"name\":\"南北朝的京都\",\"en\":\"Nanboku-chō Kyoto\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1336,\"period\":\"1336-1392\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\"],\"atmos\":[\"两个天皇\",\"楠木正成\",\"太平记的世界\",\"京都沦为战场\"],\"sensory\":\"为了哪一个天皇才是正统，整座城都分裂了。武士放火烧了寺院。昨天的盟友，今天的敌人。\",\"note\":\"围绕\\\"正统性\\\"之争的日常。\"}),\n  E({\"id\":\"ck86\",\"name\":\"北山文化的京都（足利义满）\",\"en\":\"Kitayama Kyoto\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1350,\"period\":\"14世纪末-15世纪初\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"贸易·商业\",\"宫廷·王权\"],\"atmos\":[\"金阁寺\",\"能乐的集大成\",\"日明贸易\",\"北山殿的华美\",\"世阿弥\"],\"sensory\":\"贴满金箔的楼阁倒映在池水里。能舞台上戴着面具的人缓缓地动着。动作慢得出奇，反而让人移不开眼。\",\"note\":\"能乐作为一种\\\"观看\\\"的体验，极其独特。\"}),\n  E({\"id\":\"ck87\",\"name\":\"东山文化的京都（足利义政）\",\"en\":\"Higashiyama Kyoto\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪后半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"工艺·手艺\"],\"atmos\":[\"银阁寺\",\"侘寂\",\"书院造\",\"枯山水\",\"茶道的雏形\",\"应仁之乱前后\"],\"sensory\":\"银阁上并没有贴银箔——是故意的。庭院里的白砂在月光下泛着青白的光。山下的京都才从十年战乱里缓过来，满城瓦砾，唯独这一方庭院是静的。\",\"note\":\"应仁之乱把京都烧成废墟之后，义政仍在城外靠加征赋役营造东山山庄。在残破之上经营极致的美。\"}),\n  E({\"id\":\"ck88\",\"name\":\"应仁之乱的京都\",\"en\":\"Ōnin War Kyoto\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1467,\"period\":\"1467-1477\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"城市·都会\",\"革命·变革\"],\"atmos\":[\"十年的巷战\",\"京都化为焦土\",\"下克上的开端\",\"公家的没落\",\"\\\"战国\\\"的揭幕\"],\"sensory\":\"隔壁的宅邸在燃烧，可街那头有人照旧在卖米——打仗归打仗，肚子还是要填。\",\"note\":\"京都这座城用了十年烧成灰烬。但也有很多居民没有逃走，一直住了下来。\"}),\n  E({\"id\":\"ck89\",\"name\":\"堺（商人自治都市）\",\"en\":\"Free City of Sakai\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"城市·都会\",\"工艺·手艺\"],\"atmos\":[\"会合众的自治\",\"铁炮锻造\",\"南蛮贸易\",\"千利休的茶\",\"环濠都市\"],\"sensory\":\"这座城没有城主，商人们自己管自己。锻造场里叮叮当当打着铁。葡萄牙船上卸下从没见过的点心。\",\"note\":\"战国时代唯一一座\\\"不由武士支配的城市\\\"。\"}),\n  E({\"id\":\"ck90\",\"name\":\"种子岛（铁炮传来）\",\"en\":\"Tanegashima Guns\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1543,\"period\":\"1543\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"战争·军事\",\"海洋·港口\"],\"atmos\":[\"葡萄牙人漂流上岸\",\"初见铁炮\",\"岛上铁匠拆解仿制\",\"改变日本战争的一天\"],\"sensory\":\"海滩上有一艘陌生的船。船上人的相貌和这里的人完全不同。他们手里拿着的棍子发出轰鸣，远处的靶子上开了个洞。\",\"note\":\"\\\"第一次\\\"母题的完美坐标。铁匠把它拆解、复制的过程令人叹为观止。\"}),\n  E({\"id\":\"ck91\",\"name\":\"安土城（织田信长）\",\"en\":\"Nobunaga's Azuchi\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1576,\"period\":\"1576-1582\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"革命·变革\",\"战争·军事\"],\"atmos\":[\"天下布武\",\"天主阁\",\"南蛮寺\",\"乐市乐座\",\"信长的革新与暴力\"],\"sensory\":\"俯瞰琵琶湖的山顶上，矗立着一座谁也没见过的建筑。走进去，满眼是金与青的浓艳彩绘。从最高一层望出去，整片湖光尽收眼底——这里的主人，天天都看着这样的景色吗。\",\"note\":\"安土城已不复存在。是\\\"废墟之前\\\"——如今只剩石垣的地方，曾经拥有完整姿态的那个时候。\"}),\n  E({\"id\":\"ck92\",\"name\":\"本能寺之变（京都）\",\"en\":\"Honnō-ji Incident\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1582,\"period\":\"1582\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\"],\"atmos\":[\"明智光秀谋反\",\"是非已无从论\",\"天下走向在一夜之间改变\"],\"sensory\":\"天还没亮。寺院四面被军队围住，里头开始冒烟。整座京都都醒了，人们交头接耳，不知道出了什么事。\",\"note\":\"日本史上最著名的\\\"一夜\\\"之一。\"}),\n  E({\"id\":\"ck93\",\"name\":\"大坂城下町（秀吉时代）\",\"en\":\"Hideyoshi's Osaka\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1583,\"period\":\"1583-1598\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宫廷·王权\",\"市井·庶民\"],\"atmos\":[\"黄金茶室\",\"大坂城\",\"刀狩\",\"太阁检地\",\"出兵朝鲜的出发地\"],\"sensory\":\"茶室里里外外贴满金箔——茶碗是金的，墙也是金的。听说这屋子的主人出身是个农民。城下町正一天天热闹起来，新铺子一家挨着一家。\",\"note\":\"从农民到天下人。秀吉那种\\\"暴发户的美学\\\"，作为一种体验十分独特。\"}),\n  E({\"id\":\"ck94\",\"name\":\"出兵朝鲜（名护屋城/釜山）\",\"en\":\"Imjin War, Nagoya\",\"region\":\"东亚·日本\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1592,\"period\":\"1592-1598\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"海洋·港口\"],\"atmos\":[\"文禄·庆长之役\",\"十五万大军\",\"肥前名护屋\",\"渡海的足轻\"],\"sensory\":\"一年多前这里还是个渔村，如今石垣垒起天守，海岸排满阵屋。号令传下来，你这一队登船。海那头是朝鲜，谁也没去过。\",\"note\":\"从足轻（最底层的士兵）的视角出发。\"}),\n  E({\"id\":\"ck95\",\"name\":\"江户（家康的城市建设期）\",\"en\":\"Ieyasu's Edo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1590,\"period\":\"1590s-1610s\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\"],\"atmos\":[\"填埋湿地\",\"城与町同时营建\",\"天下普请\",\"从全国汇聚而来的工匠\"],\"sensory\":\"这里不久前还是一片芦苇荡。如今民夫挑土填地、开掘濠沟、按绳墨划出街区。上千把夯槌此起彼伏地落下，声音叠成一片。\",\"note\":\"东京的\\\"原点\\\"。世界级特大都市从一片空荡荡的湿地上拔地而起的那一刻。\"}),\n  E({\"id\":\"ck96\",\"name\":\"岛原之乱\",\"en\":\"Shimabara Rebellion\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1637,\"period\":\"1637-1638\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"战争·军事\"],\"atmos\":[\"切支丹起义\",\"天草四郎\",\"原城围城\",\"转向锁国的转折点\"],\"sensory\":\"困守城中的人里有孩子，手里攥着十字架。城外是幕府军，旗帜与阵列望不到头。\",\"note\":\"信仰与镇压。是幕府决定锁国政策的直接导火索。\"}),\n  E({\"id\":\"ck97\",\"name\":\"元禄的江户\",\"en\":\"Genroku Edo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1688,\"period\":\"1688-1704\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"市井·庶民\",\"饮食·宴席\"],\"atmos\":[\"町人文化大爆发\",\"歌舞伎\",\"近松门左卫门\",\"赤穗浪士\",\"井原西鹤\",\"与上方的对抗\"],\"sensory\":\"戏园子里座无虚席。演员一摆出\\\"见得\\\"的亮相姿势，观众就喊出他的屋号。散场路上去荞麦面馆吃上一碗。邻座的客人正在议论赤穗浪士的传闻。\",\"note\":\"江户町人文化的第一次大爆发。\\\"看、吃、玩\\\"三样俱全。\"}),\n  E({\"id\":\"ck98\",\"name\":\"吉原（江户中期）\",\"en\":\"Yoshiwara, Edo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"性·情色\",\"女性空间\",\"奴役·压迫\"],\"atmos\":[\"游郭\",\"花魁道中\",\"浮世绘的模特\",\"繁华背后的卖身年契\"],\"sensory\":\"穿过大门便是另一个世界。花魁在樱花下盛装巡游，打挂层层叠叠，高齿木屐踩出外八字。可格子窗后头，另一些女人隔着木栏望出来。\",\"note\":\"华丽与剥削的双重结构。是一个把台前与幕后都看尽的坐标。\"}),\n  E({\"id\":\"ck99\",\"name\":\"参勤交代的旅途\",\"en\":\"Sankin-kōtai Road\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"市井·庶民\",\"饮食·宴席\"],\"atmos\":[\"大名行列\",\"东海道五十三次\",\"宿场町\",\"开道吆喝\\\"伏地——伏地——\\\"\",\"旅途的饮食\"],\"sensory\":\"大名的队列要经过，路边的人都伏地行礼。队列过去后，宿场町又恢复了平日的热闹。在茶屋换上新草鞋，吃一块当地名产的年糕。\",\"note\":\"移动本身成为体验的坐标。东海道的宿场多达五十三处。\"}),\n  E({\"id\":\"ck100\",\"name\":\"出岛（长崎）\",\"en\":\"Dejima, Nagasaki\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1641,\"period\":\"1641-1854\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"海洋·港口\",\"学问·书写\"],\"atmos\":[\"扇形人工岛\",\"荷兰商馆\",\"兰学的入口\",\"通往西洋唯一的窗口\",\"商馆长的报告\"],\"sensory\":\"一座石桥连着岸，桥头有番所看守。住在岛上的荷兰人轻易出不去。可经这扇形小岛流进来的西洋学问，引着全国求知的人往长崎赶。\",\"note\":\"锁国之中\\\"唯一的孔洞\\\"。\"}),\n  E({\"id\":\"ck101\",\"name\":\"化政期的江户\",\"en\":\"Kasei Edo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1804,\"period\":\"1804-1830\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"市井·庶民\",\"工艺·手艺\"],\"atmos\":[\"葛饰北斋\",\"歌川广重\",\"浮世绘黄金期\",\"泷泽马琴\",\"大众文化的成熟\",\"长屋生活\"],\"sensory\":\"版元的店头摆出了新的浮世绘——听说一幅画浪的画很受好评。在长屋的井边和隔壁的大婶闲话家常。今晚是路边摊的天妇罗。\",\"note\":\"葛饰北斋画出\\\"神奈川冲浪里\\\"前后那段日子的空气。日常之中就有艺术。\"}),\n  E({\"id\":\"ck102\",\"name\":\"天保大饥荒（江户）\",\"en\":\"Tenpō Famine\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1833,\"period\":\"1833-1839\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"灾变·瘟疫\",\"革命·变革\",\"市井·庶民\"],\"atmos\":[\"歉收\",\"米价飞涨\",\"大盐平八郎之乱\",\"捣毁暴动\",\"幕藩体制的动摇\"],\"sensory\":\"米店门口排起了长队。价钱比昨天翻了一倍。远处传来什么东西被砸毁的声音。\",\"note\":\"饥荒同时冲击城市和乡村。是\\\"日常逐渐崩坏的过程\\\"。\"}),\n  E({\"id\":\"ck103\",\"name\":\"黑船来航（浦贺）\",\"en\":\"Perry's Black Ships\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1853,\"period\":\"1853\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"海洋·港口\",\"革命·变革\"],\"atmos\":[\"佩里\",\"蒸汽船\",\"\\\"惊醒太平之眠\\\"\",\"炮舰外交\",\"两百年的锁国走到尽头\"],\"sensory\":\"海湾对面有四艘黑色的船。它们吐着烟——没有帆却在动。聚到海边的人们一句话也说不出来。\",\"note\":\"遭遇\\\"从未见过之物\\\"的体验。\"}),\n  E({\"id\":\"ck104\",\"name\":\"幕末的京都\",\"en\":\"Bakumatsu Kyoto\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1860,\"period\":\"1860s\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"战争·军事\",\"城市·都会\"],\"atmos\":[\"尊攘派与佐幕派\",\"新选组\",\"池田屋事件\",\"天诛\",\"暗杀成为日常的都城\"],\"sensory\":\"夜里走在京都很危险。一转过街角就有血迹。新选组那身浅葱色锯齿纹的羽织从对面走来。\",\"note\":\"京都成为\\\"暗杀与政变之城\\\"的那几年。\"}),\n  E({\"id\":\"ck105\",\"name\":\"戊辰战争（会津若松城）\",\"en\":\"Boshin War, Aizu\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1868,\"period\":\"1868\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"死亡·葬仪\"],\"atmos\":[\"白虎队\",\"围城\",\"被新时代吞没的旧时代武士\",\"饭盛山\"],\"sensory\":\"炮弹一发发落进城里，闷响接连不断。城下町烧起来了，黑烟糊住了半边天。饭盛山上，一队十几岁的少年趴在草里往城那边望——只看得见烟，看不清天守还在不在。有人抽刀，有人在哭。山下传来枪声，越来越近。秋天的草已经发黄。\",\"note\":\"是最为痛切地体验到\\\"旧时代终结\\\"的地方之一。\"}),\n  E({\"id\":\"ck106\",\"name\":\"文明开化的东京\",\"en\":\"Bunmei-kaika Tokyo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1870,\"period\":\"1870s-1880s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"城市·都会\",\"饮食·宴席\"],\"atmos\":[\"煤气灯\",\"牛肉火锅\",\"散切短发\",\"鹿鸣馆\",\"洋装与和装混杂\",\"\\\"敲一敲散切头\",\"便能听见文明开化的声音\\\"\"],\"sensory\":\"昨天还是武士的人，今天穿上了西式长礼服。从没吃过牛肉的老人战战兢兢地走进牛肉火锅店。银座点起了煤气灯——明明是夜里却亮堂堂的。\",\"note\":\"一切都是\\\"第一次\\\"的时代。过渡期的混乱与亢奋。\"}),\n  E({\"id\":\"ck107\",\"name\":\"鹿鸣馆之夜\",\"en\":\"Rokumeikan Nights\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近代\",\"year\":1883,\"period\":\"1883-1887\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"艺术·表演\"],\"atmos\":[\"欧化主义的极致\",\"跳华尔兹的日本人\",\"为修改条约而上演的表演\",\"不习惯洋装\"],\"sensory\":\"水晶吊灯下流淌着华尔兹。头一回换上洋装的人踩了舞伴的裙裾，赶忙赔笑。乐声不停，舞步还跟不上。\",\"note\":\"\\\"模仿西洋、好让列强认可\\\"的那个时代的象征空间。\"}),\n  E({\"id\":\"ck108\",\"name\":\"大正浪漫的东京\",\"en\":\"Taishō Romance Tokyo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":-1912,\"period\":\"1912-1923（震灾前）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"女性空间\",\"艺术·表演\"],\"atmos\":[\"摩登女郎·摩登男孩\",\"咖啡馆文化\",\"女性解放的开端\",\"浅草歌剧\",\"大正民主\"],\"sensory\":\"咖啡馆里短发女子端着咖啡，邻桌在谈新出的小说。浅草的活动写真馆前排起长队。街上洋装与和服擦肩而过。\",\"note\":\"日本的\\\"摩登时代\\\"。自由的空气最为轻盈的那段短暂时期。\"}),\n  E({\"id\":\"ck109\",\"name\":\"关东大地震\",\"en\":\"Great Kantō Earthquake\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":1923,\"period\":\"1923\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"灾变·瘟疫\",\"死亡·葬仪\",\"城市·都会\"],\"atmos\":[\"里氏7.9级\",\"东京毁灭\",\"火灾旋风\",\"虐杀朝鲜人\",\"十万人以上死亡\"],\"sensory\":\"地面还在余震，脚下的路裂着缝。烟雾遮住了天，明明是白天却一片昏黄。火从四面卷过来，热浪扑脸，空气里全是焦味和灰。人群挤在一起往河边和空地逃，背着包袱、拖着孩子。远处有人喊着口号，声音里带着戾气——有人开始拦路盘问口音。\",\"note\":\"自然灾害＋社会暴力。\"}),\n  E({\"id\":\"ck110\",\"name\":\"昭和现代主义的东京\",\"en\":\"Shōwa Modern Tokyo\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":-1920,\"period\":\"1920s后半-1930s前半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"市井·庶民\"],\"atmos\":[\"银座摩登\",\"情色怪诞荒诞\",\"地铁开通\",\"百货店文化\",\"军靴的脚步声还在远方\"],\"sensory\":\"银座百货店的电梯女郎微笑着报出楼层。屋顶游乐园里孩子在玩耍。可报摊上的号外，标题里开始出现远方的战事。\",\"note\":\"华美与不安的共存。是\\\"或许还来得及\\\"的时代。\"}),\n  E({\"id\":\"ck111\",\"name\":\"后方的生活（战时下的日常）\",\"en\":\"Wartime Home Front\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":1937,\"period\":\"1937-1945\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"配给制\",\"邻组\",\"灯火管制\",\"千人针\",\"学徒动员\",\"疏散\",\"空袭\"],\"sensory\":\"在配给的队伍里排着队。糖已经好几个月没见过了。隔壁的大婶在缝千人针。夜里不能点灯。\",\"note\":\"从\\\"战场\\\"以外的\\\"后方日常\\\"来描写战争的体验。回避战斗描写，聚焦于生活的变化。\"}),\n  E({\"id\":\"ck112\",\"name\":\"冲绳战（平民视角）\",\"en\":\"Battle of Okinawa\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":1945,\"period\":\"1945\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"死亡·葬仪\"],\"atmos\":[\"地面战\",\"自然壕（gama）\",\"姬百合学徒队\",\"平民的牺牲\",\"铁之暴风\"],\"sensory\":\"（此坐标感官锚点从略——落地时由AI根据母题调整）\",\"note\":\"极其沉重的坐标。冲绳战是日本国内唯一一场大规模地面战，平民牺牲者之多是其特征。体验限定于平民视角。\"}),\n  E({\"id\":\"ck113\",\"name\":\"高野山（通史）\",\"en\":\"Mount Kōya\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":850,\"period\":\"9世纪-至今（体验上以中世最为浓厚）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"山地·高原\"],\"atmos\":[\"空海\",\"真言密教\",\"奥之院\",\"高野圣\",\"山上的宗教都市\",\"杉木林\"],\"sensory\":\"山上有一座城镇。走在巨大的杉树之间，苔藓、线香与雾气的味道混在一起。奥之院的灯笼浮现在黑暗中。\",\"note\":\"\\\"场所本身\\\"成为坐标的例子。跨时代地浓郁。\"}),\n  E({\"id\":\"ck114\",\"name\":\"熊野古道（中世的巡礼）\",\"en\":\"Kumano Kodō\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1350,\"period\":\"11-14世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"山地·高原\"],\"atmos\":[\"蚁之熊野参拜\",\"上皇与庶民走着同一条路\",\"通往净土的入口\"],\"sensory\":\"在石板山路上走了好几天。前面后面都是巡礼者的队列。雾中浮现出一座朱红色的鸟居。\",\"note\":\"\\\"路上\\\"母题的日本版。一条超越身份的巡礼之路。\"}),\n  E({\"id\":\"ck115\",\"name\":\"伊势参拜（江户时代）\",\"en\":\"Ise Pilgrimage\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"饮食·宴席\",\"市井·庶民\"],\"atmos\":[\"托福参拜\",\"私自参拜\",\"东海道\",\"伊势乌冬\",\"御师的接待\"],\"sensory\":\"\\\"一生总要去一次伊势神宫\\\"。沿参宫街道的茶屋歇脚吃年糕，在宿场洗去脚上的风尘，终于望见了五十铃川。\",\"note\":\"江户时代的\\\"旅行\\\"。是庶民唯一能够合法远行的借口。\"}),\n  E({\"id\":\"ck116\",\"name\":\"虾夷地·阿伊努（送熊灵之祭）\",\"en\":\"Ainu Mosir\",\"region\":\"东亚·日本\",\"country\":\"日本·阿伊努\",\"era\":\"近世\",\"year\":1850,\"period\":\"通时代（体验上以17-19世纪最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"边塞·边疆\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"阿伊努（北海道原住民·非和人）\",\"送熊灵之祭（iyomante）\",\"口传英雄史诗（yukar）\",\"唇周与手背的刺青\",\"与和人/山丹的交易\",\"松前藩的盘剥\"],\"sensory\":\"木栅里养着一头从小喂大的小熊——今天要把它的灵魂送回神那边，人们围着跳舞、敬酒、再放箭。女人嘴唇周围有一圈青色刺青，手背也是。老人一句接一句吟着很长的故事，调子像唱。海边停着和人的船，来换鲑鱼和海带。\",\"note\":\"阿伊努是北海道（及库页岛、千岛）的原住民，语言、信仰、相貌都与和人不同。送熊灵之祭（iyomante）、口传史诗（yukar）、女性的唇周刺青是其文化标志。江户时代松前藩垄断对阿伊努贸易并加以盘剥，近代更遭强制同化。\"}),\n  E({\"id\":\"ck117\",\"name\":\"平泉·奥州藤原（北方的黄金乡）\",\"en\":\"Hiraizumi\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1150,\"period\":\"12世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"宫廷·王权\",\"工艺·手艺\"],\"atmos\":[\"中尊寺金色堂（满贴金箔）\",\"北方的黄金与骏马\",\"奥州藤原四代\",\"源义经的末路\",\"1189年被源赖朝所灭\"],\"sensory\":\"一座佛堂从里到外贴满金箔，柱子、佛龛、台座，连暗处都闪着金光，与堂外雪原刺眼地对照。北方出金、出好马，这一族靠它富了四代，想在京都之外另起一座净土。可山外的大军快到了——藏在这儿的那位落难武将，眼看也保不住。\",\"note\":\"奥州藤原氏12世纪以平泉为中心，靠东北的黄金与马匹积累巨富，中尊寺金色堂是其遗产。源义经兵败后投奔于此，终被出卖。1189年源赖朝以追讨义经为名灭奥州藤原，统一东国。马可·波罗\\\"黄金之国\\\"的传说或与北方产金有关。\"}),\n  E({\"id\":\"ck118\",\"name\":\"石见银山（喂养世界的白银）\",\"en\":\"Iwami Ginzan\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"工艺·手艺\",\"山地·高原\"],\"atmos\":[\"山坳里的银矿\",\"从大陆传来的灰吹法精炼\",\"一度供给世界白银的大头\",\"葡萄牙与明朝商人争抢\",\"坑道里短命的矿工\"],\"sensory\":\"山坳里到处是往里钻的坑口，烟火气混着硫磺味。工匠把矿石和铅一起熔了，再吹火把铅烧走，底下留下亮白的银——这法子是从海那边学来的。山下码头，葡萄牙人和明朝商人都在等这批银。坑道又矮又闷，进去的人熬不了几年。\",\"note\":\"石见银山16-17世纪盛产白银，巅峰时可能占世界白银产量相当一部分。其灰吹法（cupellation）精炼技术经由朝鲜、中国传入。这些白银大量流向明朝，是当时东亚-全球白银贸易的重要一环。今为世界遗产。\"}),\n  E({\"id\":\"ck119\",\"name\":\"古朝鲜·王险城（卫满朝鲜）\",\"en\":\"Wiman Joseon\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"边塞·边疆\",\"工艺·手艺\"],\"atmos\":[\"燕地流亡者建国\",\"铁器文化\",\"汉朝压力\",\"半岛北部\",\"朝鲜之名的最早实体\"],\"sensory\":\"城里有两种口音的人——一种从鸭绿江以北来的，一种是本地的。铁器作坊的火光彻夜不息。南边有商人带来了稻米和磨制的玉。\",\"note\":\"半岛有文字记载的最早政权之一。文化混合感是核心体验。\"}),\n  E({\"id\":\"ck120\",\"name\":\"三韩（弁韩·铁的产地）\",\"en\":\"Samhan Iron Lands\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"古典\",\"year\":-50,\"period\":\"前1世纪-3世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"工艺·手艺\"],\"atmos\":[\"铁的出口\",\"倭人也来买铁\",\"小国林立\",\"集市\",\"原始部落联盟\"],\"sensory\":\"河边的冶铁场浓烟滚滚。有人从海对面来——说着你听不懂的语言，指着铁锭比划数量。铁在这里就是钱。\",\"note\":\"弁韩（后来的伽耶地区）是东亚最重要的铁产地之一，倭、汉、三韩各部都来这里买铁。\"}),\n  E({\"id\":\"ck121\",\"name\":\"高句丽·国内城/丸都城\",\"en\":\"Goguryeo Gungnae\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"古典\",\"year\":450,\"period\":\"1-5世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"山地·高原\",\"战争·军事\",\"艺术·表演\"],\"atmos\":[\"山城\",\"壁画古墓\",\"骑马民族\",\"好太王碑\",\"与中原王朝的拉锯\"],\"sensory\":\"山上的城墙顺着山脊起伏。城里的人穿着窄袖短衣，腰挎刀，骑术极好。墓室里有人在画壁画——骑马射猎的场景，颜色鲜艳得惊人。\",\"note\":\"高句丽壁画墓是体验核心。骑马民族的尚武气质与精美壁画的反差。\"}),\n  E({\"id\":\"ck122\",\"name\":\"百济·泗沘（扶余）\",\"en\":\"Baekje Sabi\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":538,\"period\":\"538-660\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"南朝风雅\",\"佛教美术巅峰\",\"百济微笑\",\"与日本的深层联系\",\"灭亡前的精致\"],\"sensory\":\"锦江边的都城不大，但寺庙里的佛像温柔得不可思议——嘴角微微上翘。有工匠正在准备东渡日本，据说那边的王室请他们去建寺。\",\"note\":\"百济微笑指瑞山磨崖如来三尊像中央释迦佛的笑容，是东亚佛教造像的代表之一。百济对日本飞鸟文化的影响极深。\"}),\n  E({\"id\":\"ck123\",\"name\":\"百济灭亡·落花岩\",\"en\":\"Fall of Baekje\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":660,\"period\":\"660\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"战争·军事\",\"死亡·葬仪\"],\"atmos\":[\"唐罗联军\",\"三千宫女（传说）\",\"扶余落城\",\"白村江之战前奏\"],\"sensory\":\"锦江边的悬崖上传来哭声，断断续续。城已经破了，扶余城方向冒着黑烟，唐罗联军的旗帜在城头上换了。崖顶上站了不少人，宫装的女子一个挨一个，江风把她们的裙裾吹得贴在身上。江水在崖下打着旋，很深。有人闭着眼往前迈了一步。\",\"note\":\"落花岩传说（三千宫女投江）虽然是后世附会，但作为\\\"一个国家灭亡的最后一刻\\\"极具体验价值。\"}),\n  E({\"id\":\"ck124\",\"name\":\"伽耶（金官伽耶/大伽耶）\",\"en\":\"Gaya Confederacy\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"古典\",\"year\":550,\"period\":\"1-6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\"],\"atmos\":[\"铁器王国\",\"伽耶琴\",\"洛东江流域\",\"不是统一的\\\"国家\\\"而是联盟\",\"日本和百济之间的缓冲\"],\"sensory\":\"洛东江边的工坊里，有人在锻造铁甲——手法跟北边的高句丽不太一样。另一间屋子里，有人在弹一种弦乐器，声音比你听过的任何乐器都清亮。\",\"note\":\"伽耶容易被三国叙事吞没，但它的铁器和伽耶琴是独立的体验点。\"}),\n  E({\"id\":\"ck125\",\"name\":\"新罗·庆州（统一前夜·善德女王时代）\",\"en\":\"Silla, Queen Seondeok\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":650,\"period\":\"7世纪中\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"女性空间\",\"战争·军事\"],\"atmos\":[\"瞻星台\",\"善德女王\",\"金冠\",\"花郎制度\",\"三国统一战争的前奏\",\"唐朝结盟\"],\"sensory\":\"一座瓶形的石塔矗立在宫殿附近——据说是用来观星的。年轻的花郎们在练剑，脸上化了妆。女王的使节刚从唐朝回来。\",\"note\":\"善德女王是东亚罕见的女性统治者。花郎制度（贵族青年军事集团）的审美非常独特——尚武与化妆并存。\"}),\n  E({\"id\":\"ck126\",\"name\":\"庆州（统一新罗鼎盛期）\",\"en\":\"Unified Silla Gyeongju\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":850,\"period\":\"7-9世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"城市·都会\",\"艺术·表演\"],\"atmos\":[\"佛国寺\",\"石窟庵\",\"雁鸭池\",\"东亚佛教艺术高峰\",\"瓦当满城\"],\"sensory\":\"整座城市都是寺庙和宫殿。佛国寺的石阶刚完工，白色的花岗岩在阳光下刺眼。石窟庵里的本尊佛面朝大海——海风从洞口吹进来。\",\"note\":\"庆州在鼎盛期号称\\\"城中无一间草屋\\\"。佛教美术的感官浓度极高。\"}),\n  E({\"id\":\"ck127\",\"name\":\"张保皋·清海镇\",\"en\":\"Jang Bogo's Cheonghae\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":850,\"period\":\"9世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"奴役·压迫\"],\"atmos\":[\"海上王\",\"黄海贸易网\",\"肃清掠卖新罗人的海盗\",\"莞岛\",\"唐罗日三角贸易\"],\"sensory\":\"小岛上的要塞扼住整条海路。港口里停着去唐朝的船、去日本的船。一个出身寒微、曾在唐朝带兵的人，如今是这条航路的主人。\",\"note\":\"张保皋是东亚海洋史上的传奇人物。出身微贱，赴唐从军做到武将，归国设清海镇，肃清掠卖新罗人为奴的海盗，掌控黄海贸易。\"}),\n  E({\"id\":\"ck128\",\"name\":\"统一新罗末期（后三国分裂）\",\"en\":\"Later Three Kingdoms\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":850,\"period\":\"9世纪末-935\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"战争·军事\"],\"atmos\":[\"王权衰落\",\"地方豪族割据\",\"弓裔\",\"甄萱\",\"后百济与后高句丽\",\"庆州的黄昏\"],\"sensory\":\"庆州的寺庙还在，但有些已经没有僧人了。路上有溃兵。听说北边有人自立为王，南边也有。\",\"note\":\"统一新罗的瓦解期。体验点在中央失控、豪族割据，旧都庆州由盛转衰。\"}),\n  E({\"id\":\"ck129\",\"name\":\"开城（高丽前期·光宗/成宗）\",\"en\":\"Goryeo Kaesong\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1050,\"period\":\"10-11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"学问·书写\",\"贸易·商业\"],\"atmos\":[\"科举制引入\",\"佛教国家\",\"高丽青瓷初期\",\"与宋辽的外交平衡\",\"开城商人\"],\"sensory\":\"开城的松岳山下铺展着新建的宫殿。科举考场里有年轻人在磨墨。城外有契丹的使节团——和宋朝的使节前后脚到的。\",\"note\":\"高丽在宋辽之间的外交平衡术。\"}),\n  E({\"id\":\"ck130\",\"name\":\"高丽青瓷工坊（康津/扶安）\",\"en\":\"Goryeo Celadon Kilns\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1150,\"period\":\"11-12世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\"],\"atmos\":[\"翡色青瓷\",\"镶嵌技法\",\"世界陶瓷史巅峰之一\",\"窑火\",\"秘色\"],\"sensory\":\"窑口飘出的热气扭曲了空气。有人在白坯上用极细的工具刻出鹤的轮廓，然后填入白土。烧出来会是什么颜色？——像雨后天空的那种青绿色。\",\"note\":\"高丽镶嵌青瓷是世界陶瓷史上的独创技法。手艺母题的绝佳坐标。\"}),\n  E({\"id\":\"ck131\",\"name\":\"蒙古入侵·江华岛朝廷\",\"en\":\"Ganghwa Island Court\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1231,\"period\":\"1231-1270\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\",\"迁徙·流亡\"],\"atmos\":[\"蒙古六次入侵\",\"王室避居江华岛\",\"大陆上的百姓被屠\",\"雕版大藏经在战火中完成\"],\"sensory\":\"江华岛的宫殿很小。对岸就是大陆——能看到冒烟的村庄。但岛上的寺庙里，僧人在一字一字地雕刻经版。八万多块。\",\"note\":\"高丽大藏经（八万大藏经）在蒙古入侵期间完成——战火中的信仰行为。极为动人。\"}),\n  E({\"id\":\"ck132\",\"name\":\"元干涉期的高丽\",\"en\":\"Yuan-era Goryeo\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1270,\"period\":\"1270-1356\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"宫廷·王权\"],\"atmos\":[\"高丽王成为元朝驸马\",\"蒙古服饰语言渗入\",\"辫发胡服\",\"征日本的出发港\"],\"sensory\":\"王宫里的礼仪变了——有些是高丽的，有些是蒙古的。国王的衣服变了。年轻贵族开始留蒙古式发型。有人在港口准备远征日本的船队。\",\"note\":\"与北魏汉化镜像——这次是\\\"被蒙古化\\\"。文化身份的挣扎。\"}),\n  E({\"id\":\"ck133\",\"name\":\"汉阳建都（太祖李成桂）\",\"en\":\"Founding of Hanyang\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1394,\"period\":\"1394-1398\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"宫廷·王权\"],\"atmos\":[\"新王朝新首都\",\"景福宫建造\",\"儒教立国\",\"废佛\",\"四大门\",\"风水选址\"],\"sensory\":\"北岳山下正在建一座新宫殿。风水师说这里龙脉极佳。城墙沿着山脊建，工人们在北大门附近作业。旧朝的佛寺被拆了，木材用来盖新建筑。\",\"note\":\"一个王朝的第一天。旧信仰（佛教）被新正统（儒教）取代的物理过程。\"}),\n  E({\"id\":\"ck134\",\"name\":\"世宗时代的汉阳\",\"en\":\"Sejong's Hanyang\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1418,\"period\":\"1418-1450\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宫廷·王权\"],\"atmos\":[\"训民正音（韩文字母）创制\",\"测雨器\",\"日晷\",\"浑天仪\",\"集贤殿\",\"科学与文字的黄金时代\"],\"sensory\":\"集贤殿里有人在反复试验一种新文字——据说是王上亲自设计的，让不识字的百姓也能读写。院子里立着一个奇怪的铜制仪器，用来量雨。\",\"note\":\"世宗大王时代是朝鲜半岛的\\\"第一次\\\"井喷期——韩文字母是人类历史上极罕见的\\\"从零设计的文字系统\\\"。\"}),\n  E({\"id\":\"ck135\",\"name\":\"两班贵族的日常（朝鲜中期）\",\"en\":\"Yangban Joseon\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"饮食·宴席\",\"奴役·压迫\"],\"atmos\":[\"儒学社会\",\"书院\",\"族谱\",\"冠婚丧祭\",\"严格的身份等级\",\"酱缸与腌菜瓮\"],\"sensory\":\"一座瓦房的院子里，女眷们在腌菜——白菜和萝卜码进瓮里，撒上粗盐，院角的酱缸冒着发酵的气味。男主人在书房里读朱熹。院墙外是另一个世界——奴婢们的草屋矮得直不起腰。\",\"note\":\"朝鲜王朝是\\\"最儒教的社会\\\"。体验点在于感受儒教秩序渗透进日常的每一个缝隙。\"}),\n  E({\"id\":\"ck136\",\"name\":\"壬辰倭乱（文禄庆长之役·朝鲜视角）\",\"en\":\"Imjin War\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1592,\"period\":\"1592-1598\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"海洋·港口\"],\"atmos\":[\"丰臣秀吉入侵\",\"李舜臣龟船\",\"义兵蜂起\",\"国土焦土化\",\"被掠走的陶工\"],\"sensory\":\"南边传来消息——倭军已经渡海了。汉阳在二十天内就沦陷了。国王北逃。但海上，一个将领用一种你没见过的战船击退了敌舰队——船背覆着铁板，钉满尖锥。\",\"note\":\"与日本的朝鲜出兵坐标是同一事件的另一面。龟船是重要体验点。被掠走的朝鲜陶工后来成为日本陶瓷的始祖。\"}),\n  E({\"id\":\"ck137\",\"name\":\"朝鲜陶工在日本（萨摩/有田）\",\"en\":\"Captive Korean Potters\",\"region\":\"东亚·朝鲜\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1598,\"period\":\"1598之后\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"工艺·手艺\"],\"atmos\":[\"被掠工匠\",\"异国的窑\",\"朝鲜白瓷变成日本有田烧\",\"沈壽官家族\"],\"sensory\":\"窑是日本式的，但烧出来的东西像家乡。周围人说的话你慢慢能听懂一些了。你的孩子已经不太会说朝鲜语了。\",\"note\":\"跨文化坐标。战争的长尾效应——一个工匠的流亡变成了一个产业的诞生。\"}),\n  E({\"id\":\"ck138\",\"name\":\"丙子胡乱·南汉山城\",\"en\":\"Siege of Namhansanseong\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1636,\"period\":\"1636-1637\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"山地·高原\"],\"atmos\":[\"清军入侵\",\"仁祖避入南汉山城\",\"四十五天困守\",\"三田渡屈辱投降\"],\"sensory\":\"山城里的粮食快吃完了。城外是清军的营帐，一眼望不到边。有人主张死战，有人主张投降。最后，王在寒风中走出城门，向清帝行三跪九叩之礼。\",\"note\":\"朝鲜历史上最屈辱的一刻之一。体验角度是被困城中的漫长等待和最终的选择。\"}),\n  E({\"id\":\"ck139\",\"name\":\"英祖·正祖时代的汉阳（朝鲜文艺复兴）\",\"en\":\"Joseon Renaissance Hanyang\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1750,\"period\":\"18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"艺术·表演\",\"城市·都会\"],\"atmos\":[\"实学运动\",\"水原华城建设\",\"朝鲜通信使\",\"中人文化兴起\",\"金弘道的风俗画\"],\"sensory\":\"画师在画一幅乡村场景——摔跤的农夫、洗衣的妇女，都是最平常的人。水原城外正在建一座新式城墙，用了起重机——据说是从西洋书里学来的设计。\",\"note\":\"朝鲜的\\\"启蒙时期\\\"。水原华城的建筑技术融合了东西方，是极好的体验点。\"}),\n  E({\"id\":\"ck140\",\"name\":\"朝鲜通信使·路上（对日外交）\",\"en\":\"Joseon Tongsinsa Mission\",\"region\":\"东亚·朝鲜\",\"country\":\"跨区域\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"海洋·港口\",\"学问·书写\"],\"atmos\":[\"汉阳到江户的旅程\",\"海路与陆路\",\"沿途日本民众的围观\",\"文化交流与傲慢\"],\"sensory\":\"对马岛到大阪的船上能看到日本的海岸线。每到一处都有人围观——他们没见过朝鲜人。有日本文人递上来一张纸请你写汉诗。\",\"note\":\"路上母题。朝鲜通信使的旅程本身就是一次跨文化体验。\"}),\n  E({\"id\":\"ck141\",\"name\":\"天主教迫害（辛酉迫害/丙寅迫害）\",\"en\":\"Catholic Persecutions\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":1801,\"period\":\"1801/1866\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"律法·审判\"],\"atmos\":[\"西学\",\"天主教传入\",\"殉教\",\"丙寅洋扰\",\"朝鲜锁国的强化\"],\"sensory\":\"有人在地窖里偷偷做弥撒。门外是巡逻的差役。上个月有三个人因为这个被斩首了。一本从北京带回来的书被小心地藏在瓮下面。\",\"note\":\"朝鲜的天主教是\\\"没有传教士的传教\\\"——朝鲜学者自己从中国带回教义并自行受洗。极为独特的宗教传播案例。\"}),\n  E({\"id\":\"ck142\",\"name\":\"江华岛条约前后（开港）\",\"en\":\"Ganghwa Treaty, 1876\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":-1876,\"period\":\"1876前后\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"革命·变革\"],\"atmos\":[\"日本军舰逼迫开国\",\"云扬号事件\",\"不平等条约\",\"闭关锁国的终结\",\"开化派vs卫正斥邪派\"],\"sensory\":\"港口来了外国军舰，炮口对着炮台。一份条约签了下来——条款没人能完全读懂。城里有人说该开国通商了，也有人攥着奏疏，要拼死上书斥退倭洋。\",\"note\":\"与日本的黑船来航、中国的鸦片战争互为映照——东亚三国被迫开国的平行体验。\"}),\n  E({\"id\":\"ck143\",\"name\":\"大韩帝国·光武改革\",\"en\":\"Korean Empire, Gwangmu\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":1897,\"period\":\"1897-1910\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"殖民·帝国\",\"城市·都会\"],\"atmos\":[\"最后的独立\",\"电灯电车引入\",\"独立门\",\"日俄角力\",\"乙巳条约\"],\"sensory\":\"都城里通了电车，铁轨从西大门一直铺到清凉里。景福宫里点起了电灯，夜里也亮着。但日本公使馆越扩越大，街上的日本军人越来越多。\",\"note\":\"一个古老王国试图自我现代化，但时间不够了。\"}),\n  E({\"id\":\"ck144\",\"name\":\"日治初期·汉城\",\"en\":\"Early Colonial Seoul\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"世纪之交\",\"year\":1910,\"period\":\"1910s-1920s\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"城市·都会\"],\"atmos\":[\"国权丧失\",\"武断统治\",\"宪兵警察\",\"土地调查事业\",\"朝鲜总督府在景福宫前建起\",\"汉城改称京城\"],\"sensory\":\"景福宫的正门前，立起一座巨大的西洋式建筑——朝鲜总督府。光化门被整个挪走了。街上的招牌、街道的名字，都换成了日语。有人低声说，别忘了这些地方本来叫什么。\",\"note\":\"殖民统治的日常化——体验\\\"一个国家消失的过程\\\"是怎样一种感受。\"}),\n  E({\"id\":\"ck145\",\"name\":\"三一运动\",\"en\":\"March First Movement\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"世纪之交\",\"year\":1919,\"period\":\"1919\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"殖民·帝国\"],\"atmos\":[\"独立万岁\",\"塔洞公园\",\"非暴力\",\"柳宽顺\",\"全国扩散\",\"日本镇压\"],\"sensory\":\"人群聚集在公园里。有人展开一份文件开始念——独立宣言书。然后所有人一起喊\\\"万岁\\\"。日本警察冲过来了。\",\"note\":\"韩国独立运动的象征性时刻。\"}),\n  E({\"id\":\"ck146\",\"name\":\"日治时期的普通日常（1930s–40s）\",\"en\":\"Colonial Korea 1930s\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"世纪之交\",\"year\":-1930,\"period\":\"1930s–1940s前半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"市井·庶民\",\"城市·都会\"],\"atmos\":[\"创氏改名\",\"朝鲜语被压制\",\"京城（汉城）的摩登与殖民\",\"朝鲜人的双重生活\"],\"sensory\":\"学校里老师说今天起要用日本名字。回到家里，祖母还是叫你原来的名字。收音机里放着日语广播，隔壁传来有人偷偷唱阿里郎的声音。\",\"note\":\"殖民日常——不是英雄叙事，而是普通人如何在两种身份之间生活。\"}),\n  E({\"id\":\"ck147\",\"name\":\"光复与分断前夜\",\"en\":\"Liberation and Division\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"战后·当代\",\"year\":1945,\"period\":\"1945-1948\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"殖民·帝国\"],\"atmos\":[\"日本投降\",\"光复的狂喜\",\"三八线\",\"美苏分治\",\"同一个民族被分成两半\"],\"sensory\":\"日本人走了！大街上有人在哭有人在笑。但几周后，北边来了苏联兵，南边来了美国兵。有人说以后不能随便过那条线了。\",\"note\":\"从光复到分断的极短时间内，整个半岛的情绪从狂喜到困惑到恐惧。\"}),\n  E({\"id\":\"ck148\",\"name\":\"朝鲜战争·平民视角\",\"en\":\"Korean War Civilians\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"战后·当代\",\"year\":1950,\"period\":\"1950-1953\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"迁徙·流亡\"],\"atmos\":[\"同族相残\",\"兴南撤退\",\"1·4后退（再陷首尔）\",\"难民南下\",\"离散家族\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"极重坐标。体验限定为平民视角——难民、离散家族、突然被卷入战争的普通人。不涉及具体军事行动描写。\"}),\n  E({\"id\":\"ck149\",\"name\":\"海印寺·八万大藏经（通史）\",\"en\":\"Haeinsa Tripitaka\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1250,\"period\":\"13世纪至今（体验上以高丽制作期最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"伽倻山深处\",\"八万多块经版\",\"七百年未腐\",\"木版印刷的奇迹\"],\"sensory\":\"山路很长。到了才发现，这座寺庙最珍贵的东西不是佛像，而是一间间长长的木架子，上面整齐地码着八万多块木板。每一块上都刻满了经文。空气干燥，据说这座建筑的通风设计让木板七百年不朽。\",\"note\":\"与制作时期（蒙古入侵期）和保存空间（海印寺）双重体验。\"}),\n  E({\"id\":\"ck150\",\"name\":\"济州岛（海女文化·通史）\",\"en\":\"Jeju Haenyeo\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以朝鲜王朝-近现代最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"女性空间\",\"海洋·港口\"],\"atmos\":[\"海女\",\"素潜采集\",\"母系社会色彩\",\"黑色火山岩\",\"石头老爷爷（多尔哈鲁邦）\",\"风与水\"],\"sensory\":\"黑色的岩石海岸。一群女人不穿潜水服就跳进了冰冷的海里。她们能憋气很久。上来的时候带着海胆和鱼。男人们在岸上看着。\",\"note\":\"济州海女文化是UNESCO非遗。女性主导的生产方式在东亚极为罕见。\"}),\n  E({\"id\":\"ck151\",\"name\":\"渤海国（海东盛国）\",\"en\":\"Balhae Kingdom\",\"region\":\"东亚·朝鲜\",\"country\":\"渤海\",\"era\":\"中古\",\"year\":950,\"period\":\"7-10世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"边塞·边疆\",\"贸易·商业\"],\"atmos\":[\"高句丽遗民与靺鞨建国\",\"横跨中国东北·朝鲜北部·滨海边疆\",\"五京制\",\"向唐与日本遣使\",\"926年亡于契丹\"],\"sensory\":\"北国的城，冬天长得很。宫城仿着唐朝样式，街道横平竖直。使团正要出发——一队去长安，一队跨海去日本，带着貂皮、人参和好马。城里有人是高句丽后裔，有人是靺鞨部族，说着不全一样的话。没人想到契丹的兵就要来了。\",\"note\":\"渤海国（698-926）由高句丽遗民大祚荣联合靺鞨建立，疆域横跨今中国东北、朝鲜半岛北部与俄罗斯滨海地区，仿唐制设五京，文化繁盛，被称\\\"海东盛国\\\"。926年为契丹（辽）所灭；其历史归属至今为中、朝、韩学界所争。\"}),\n  E({\"id\":\"ck152\",\"name\":\"东学农民运动（甲午年的锄头与火枪）\",\"en\":\"Donghak Uprising\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":1894,\"period\":\"1894\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"战争·军事\",\"市井·庶民\"],\"atmos\":[\"全琫准\",\"东学（反洋反腐的本土信仰）\",\"农民举旗\",\"\\\"除暴安良·逐灭倭夷\\\"\",\"引来清日两军\",\"甲午战争的导火索\"],\"sensory\":\"田里的人放下锄头，举起竹枪和旗子。他们信东学——既反贪官，也反洋人和东洋人。先打赢了官军，占了全州城。可朝廷慌了，向清朝借兵，日本的兵也跟着开进来。两国军队在朝鲜的土地上对上了，火枪对着竹枪。\",\"note\":\"东学农民运动（1894）是朝鲜规模最大的农民起义，由东学教徒全琫准领导，矛头指向贪腐官府与外来势力。朝廷请清朝出兵镇压，日本随即出兵，直接引爆甲午（中日）战争，朝鲜半岛的近代命运由此转折。\"}),\n  E({\"id\":\"ck153\",\"name\":\"原住民部落（大航海时代前）\",\"en\":\"Indigenous Formosa\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"史前\",\"year\":-1550,\"period\":\"史前-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"山地·高原\",\"工艺·手艺\",\"艺术·表演\"],\"atmos\":[\"南岛语族\",\"出草/猎首\",\"粟作与芋头\",\"纹面\",\"口传叙事\",\"太平洋的风\"],\"sensory\":\"山很高，森林里有你没见过的蝴蝶和鸟。部落在山腰，面朝大海。有人在编织一块鲜艳的布——红色的图案像太阳。长老在唱一首歌，没有文字，但每个人都会跟着唱。\",\"note\":\"台湾原住民属南岛语族，语言学证据显示南岛语族可能从台湾出发扩散至整个太平洋。\\\"第一次\\\"母题的一个独特角度。\"}),\n  E({\"id\":\"ck154\",\"name\":\"大员（荷兰东印度公司·热兰遮城）\",\"en\":\"Dutch Fort Zeelandia\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近世\",\"year\":1624,\"period\":\"1624-1662\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"贸易·商业\",\"海洋·港口\"],\"atmos\":[\"荷兰人的堡垒\",\"鹿皮贸易\",\"荷兰人向平埔族取得土地\",\"糖与鹿\",\"传教士学原住民语\"],\"sensory\":\"红砖城堡面朝海峡。荷兰人在城堡里算账——鹿皮的出口量。城外的汉人移民在种甘蔗。平埔族的部落头目刚和荷兰人签了一份他看不懂的文件。\",\"note\":\"荷兰殖民时期的台湾是东亚海上贸易网络的一个节点——荷兰人、汉人、日本人、原住民四方互动。\"}),\n  E({\"id\":\"ck155\",\"name\":\"明郑·东宁王国\",\"en\":\"Koxinga's Tungning\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近世\",\"year\":1662,\"period\":\"1662-1683\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"战争·军事\",\"殖民·帝国\"],\"atmos\":[\"国姓爷\",\"驱逐荷兰人\",\"反清复明的海上基地\",\"汉人大量移入\",\"最后的明朝领土\"],\"sensory\":\"热兰遮城换了旗。涌来了很多从大陆来的人——有些是兵，有些是逃难的。他们说对岸已经是清朝了，但这里还是大明的土地。\",\"note\":\"明郑是\\\"明朝遗民在海岛上重建秩序\\\"的体验——郑成功驱逐荷兰人后，数万军民渡海迁台，把这里经营成反清复明的最后基地。\"}),\n  E({\"id\":\"ck156\",\"name\":\"清治时期·鹿港/艋舺\",\"en\":\"Qing Lukang\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近世\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"宗教·信仰\",\"海洋·港口\"],\"atmos\":[\"一府二鹿三艋舺\",\"闽南移民社会\",\"宗族械斗\",\"妈祖信仰\",\"番界\"],\"sensory\":\"鹿港的港口挤满了从泉州来的商船。天后宫的香火浓得睁不开眼。巷子很窄——据说是为了防风。有人在吵架——漳州人和泉州人又打起来了。\",\"note\":\"清代台湾的汉人社会以宗族和原乡认同为核心，漳泉械斗是日常。鹿港是当时最繁华的港口。\"}),\n  E({\"id\":\"ck157\",\"name\":\"牡丹社事件前后的原住民领域\",\"en\":\"Mudan Incident\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近代\",\"year\":-1874,\"period\":\"1874前后\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"山地·高原\",\"战争·军事\",\"边塞·边疆\"],\"atmos\":[\"日本出兵台湾\",\"琉球漂流民被杀\",\"\\\"番地\\\"不属清国的借口\",\"原住民被卷入国际纠纷\"],\"sensory\":\"山里的生活照旧，但山下来了穿奇怪衣服的人——不是平地的汉人，是更远的地方来的。有人说他们在找几年前杀了一船海上漂来的人的那个部落。\",\"note\":\"原住民视角——他们按照自己的规则行事（处理入侵领地的漂流者），却因此被卷入清日之间的国际事件。\"}),\n  E({\"id\":\"ck158\",\"name\":\"日治初期·台北\",\"en\":\"Early Colonial Taipei\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近代\",\"year\":1895,\"period\":\"1895-1910s\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"战争·军事\",\"城市·都会\"],\"atmos\":[\"马关条约割让\",\"台湾民主国（拒日割台\",\"年号\\\"永清\\\"\",\"昙花一现）\",\"武装抗日\",\"基础设施建设开始\",\"殖民现代化\"],\"sensory\":\"城里换了统治者。新来的人在测量土地、修铁路、盖官厅。有人在山里继续打游击。城里的人开始学日语——有些人学得很快。\",\"note\":\"殖民统治的\\\"建设与暴力并存\\\"——铁路、下水道、公共卫生和武力镇压同时进行。\"}),\n  E({\"id\":\"ck159\",\"name\":\"日治中期·台北/嘉义\",\"en\":\"Colonial Taipei 1920s\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"世纪之交\",\"year\":1920,\"period\":\"1920s-1930s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"艺术·表演\"],\"atmos\":[\"台湾文化协会\",\"摩登台北\",\"嘉义农林棒球队（KANO）\",\"皇民化前的相对自由期\"],\"sensory\":\"台北的咖啡馆里有人在读台语白话文杂志。电影院在放日本片。嘉义的棒球场上，日本人、汉人、原住民在同一支球队里——这在别的地方不太能想象。\",\"note\":\"KANO（嘉农棒球队的多族群组成）是一个独特的文化交叉点。\"}),\n  E({\"id\":\"ck160\",\"name\":\"战后初期·二二八\",\"en\":\"228 Incident\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"战后·当代\",\"year\":1947,\"period\":\"1947\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"战争·军事\",\"革命·变革\"],\"atmos\":[\"光复后的失望\",\"省籍矛盾\",\"私烟查缉引发的冲突\",\"全岛蔓延\",\"清乡\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"台湾战后历史的关键转折点。体验角度限定为平民视角——\\\"刚经历了'光复'的喜悦，却发现新来的人和想象中不一样\\\"。感官锚点留空，由AI根据母题调整。\"}),\n  E({\"id\":\"ck161\",\"name\":\"首里城（琉球王国鼎盛期）\",\"en\":\"Shuri Castle, Ryukyu\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"宫廷·王权\"],\"atmos\":[\"万国津梁\",\"中继贸易\",\"中国册封使\",\"守礼门\",\"三线（三味线原型）\",\"泡盛\"],\"sensory\":\"首里城的石墙曲线柔和，不像日本的城。城门上有匾额写着\\\"守礼之邦\\\"——中国字。宫殿里在准备迎接北京来的使节。港口停着去暹罗、去马六甲的船。有人在弹一种三弦乐器，声音和中国的三弦不太一样。\",\"note\":\"琉球是东亚/东南亚海上贸易网络的关键中间人。\\\"万国津梁\\\"钟铭是其自我定位——以桥梁自居。\"}),\n  E({\"id\":\"ck162\",\"name\":\"琉球·册封使来访\",\"en\":\"Ryukyu Investiture Mission\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪（通时代，取任一次册封）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"节庆·仪式\",\"饮食·宴席\",\"艺术·表演\"],\"atmos\":[\"中国皇帝派使节来册封\",\"那霸港的接待\",\"冠船\",\"琉球舞踊\",\"宴席上的外交\"],\"sensory\":\"中国的大船进港了——琉球人叫它\\\"冠船\\\"。全城出动迎接。宴席上有琉球菜也有中国菜。有人表演舞踊——动作很慢，手的姿势比身体更重要。使节大约要住半年。\",\"note\":\"册封仪式是琉球与中国关系的核心。使节驻留期间的文化交流非常浓密。\"}),\n  E({\"id\":\"ck163\",\"name\":\"琉球处分（王国灭亡）\",\"en\":\"Annexation of Ryukyu\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近代\",\"year\":1879,\"period\":\"1879\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"宫廷·王权\",\"末世·终结\"],\"atmos\":[\"明治政府废琉球藩置冲绳县\",\"尚泰王被带到东京\",\"首里城降旗\",\"\\\"以后没有琉球国了\\\"\"],\"sensory\":\"日本的官员来了，说以后这里不叫琉球，叫冲绳县。国王走了——被带去东京。有人在首里城的城墙上站了很久，看着旗被降下来。\",\"note\":\"一个独立王国的最后一天。与日本的冲绳战坐标形成前后呼应。\"}),\n  E({\"id\":\"ck164\",\"name\":\"那霸·辻（花街·战前）\",\"en\":\"Naha Tsuji Quarter\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"世纪之交\",\"year\":1850,\"period\":\"19世纪末-1944\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"性·情色\",\"女性空间\",\"艺术·表演\"],\"atmos\":[\"那霸的花街（辻）\",\"尾类（琉球艺妓）\",\"三线音乐\",\"冲绳料理\",\"战前的冲绳文化\"],\"sensory\":\"石板小路上飘来三线的乐声。辻的尾类正在招待客人——虽与艺妓相似，舞和歌却全然不同。空气里满是泡盛的气味。这条街一年之后将荡然无存。\",\"note\":\"辻在1944年10月的空袭中被彻底摧毁。「废墟之前」——如今空无一物的地方，还活着的那段时光。\"}),\n  E({\"id\":\"ck165\",\"name\":\"对马（日朝之间）\",\"en\":\"Tsushima, Between Realms\",\"region\":\"东亚·台湾琉球\",\"country\":\"日本\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代（体验上以中古-近世最浓）\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"边塞·边疆\"],\"atmos\":[\"宗氏\",\"朝鲜通信使的中转地\",\"倭寇的据点\",\"日朝贸易的窗口\",\"两国之间\"],\"sensory\":\"这座岛同时属于两边，又哪边都不属于。天晴时朝北望得见朝鲜，朝南就是九州。码头上日语和朝鲜话混在一处。\",\"note\":\"对马本身就是日朝的「之间」。无论在文化上还是语言上，都是一处混合的空间。\"}),\n  E({\"id\":\"ck166\",\"name\":\"澳门（东西接触点）\",\"en\":\"Macau Contact Port\",\"region\":\"东亚·台湾琉球\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1850,\"period\":\"16-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"葡萄牙人的居留地\",\"天主教堂与妈祖庙\",\"鸦片与香料\",\"东亚最古老的欧洲殖民地\"],\"sensory\":\"坡上是教堂，坡下是中国的庙。同一条街上，葡萄牙语的招牌和汉字的招牌并排挂着。这里到底是中国，还是欧洲——既不属于哪一边，又两边都是。\",\"note\":\"与广州十三行不同，在这里欧洲人是「定居」的。四百年的混血文化。\"}),\n  E({\"id\":\"ck167\",\"name\":\"大肚王国（原住民的邦联）\",\"en\":\"Kingdom of Middag\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾·原住民\",\"era\":\"近世\",\"year\":1650,\"period\":\"17世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"边塞·边疆\",\"宫廷·王权\",\"战争·军事\"],\"atmos\":[\"台湾中部平埔诸社的跨部落联盟\",\"首领\\\"大肚王\\\"（Quataong）\",\"先后周旋于荷兰人与郑氏\",\"1670年沙辘之役被郑军血腥镇压\",\"被外来政权记下却少有自述的原住民政权\"],\"sensory\":\"中部平原上，好几个村社听一位共主号令——荷兰人、汉人都叫他\\\"大肚王\\\"。他不轻易让外人穿过自己的地界。先是红毛人来立约，后是从海上来的郑家兵要开垦、要征粮。村社起来反抗，结果一个庄被烧成白地，人几乎被杀绝。外来文书里记着这个\\\"王国\\\"，它自己却几乎没留下声音。\",\"note\":\"大肚王国是17世纪台湾中部由巴布拉、巴布萨等平埔族村社组成的跨部落联盟，首领被荷、汉文献称\\\"大肚王\\\"（Quataong）。它先后与荷兰东印度公司、郑氏政权周旋；1670年沙辘之役遭郑军血腥镇压而衰亡。它是台湾原住民少见的\\\"政权\\\"形态，却几乎只存在于外来者的记载里。\"}),\n  E({\"id\":\"ck168\",\"name\":\"琉球·万国津梁（海上转口的枢纽）\",\"en\":\"Ryukyu Entrepôt\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"城市·都会\"],\"atmos\":[\"琉球王国的贸易黄金期\",\"\\\"万国津梁之钟\\\"\",\"那霸港的转口贸易\",\"向明朝朝贡换取贸易特权\",\"把日本刀银·中国瓷丝·南洋香料苏木转手\",\"闽人三十六姓的久米村\"],\"sensory\":\"那霸港里桅樯如林，一艘船刚从南洋回来，卸下成捆的苏木和胡椒；旁边一艘正装上日本的刀和银，要送去福建朝贡换瓷器、丝绸。小岛自己不产这些，全靠两头转手赚差价。城里有一片专住华人的村子，账册、领航都靠他们。王宫的钟上铸着一句话：这岛是连接万国的桥。\",\"note\":\"15-16世纪是琉球王国的贸易黄金期。它本身物产有限，却靠向明朝朝贡取得贸易特权，在那霸港做转口生意：把日本的刀、银，中国的瓷、丝，与东南亚的香料、苏木来回转手。1458年铸于首里城的\\\"万国津梁之钟\\\"以\\\"琉球乃连接万国之桥梁\\\"自许。久米村的闽人三十六姓后裔承担航海与文书。\"}),\n  E({\"id\":\"ck169\",\"name\":\"卑南·史前台湾（玉的部落）\",\"en\":\"Prehistoric Taiwan\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾·原住民\",\"era\":\"史前\",\"year\":-2300,\"period\":\"约前2300-前300\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"死亡·葬仪\",\"市井·庶民\"],\"atmos\":[\"台湾东部的卑南文化\",\"台湾最大的史前聚落\",\"石板棺成排埋在屋下\",\"台湾玉做的玦形耳饰与人兽形玉玦\",\"与铁器时代的十三行文化遥相呼应\",\"汉人来之前数千年的岛屿生活\"],\"sensory\":\"聚落沿山坡铺开，一栋栋石板屋。屋子地板底下，整齐排着一具具石板拼成的棺，先人就埋在住处脚下。匠人正打磨一块淡绿的台湾玉，做成开口的环形耳饰，还有两人顶着一只兽的小玉坠。海那边的人还不知道，这岛上的日子已经过了几千年。\",\"note\":\"卑南文化（约前2300-前300，台东）是台湾规模最大的史前聚落之一，以屋下成排的石板棺与精美的台湾玉器（玦形耳饰、人兽形玉玦）闻名。稍晚的十三行文化（约公元200-1500，淡水河口）则是台湾唯一确认的炼铁遗址。它们勾勒出汉人到来以前、岛屿数千年的原住民生活。\"}),\n  E({\"id\":\"ck170\",\"name\":\"东山文化（铜鼓时代）\",\"en\":\"Đông Sơn Drums\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"古典\",\"year\":-600,\"period\":\"约前600-前200\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"河流·水乡\",\"工艺·手艺\"],\"atmos\":[\"铜鼓\",\"水稻\",\"红河三角洲\",\"稻作文明的独立源头\",\"船纹与鸟纹\"],\"sensory\":\"有人在敲一面巨大的铜鼓——上面刻满了船、鸟和穿羽饰的人。鼓声在河谷里回荡。水田一直延伸到河边。\",\"note\":\"东山铜鼓是东南亚青铜文明的标志。越南文明的独立源头。\"}),\n  E({\"id\":\"ck171\",\"name\":\"征氏姐妹起义\",\"en\":\"Trưng Sisters' Revolt\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"古典\",\"year\":40,\"period\":\"40-43\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"女性空间\"],\"atmos\":[\"征侧征贰\",\"反抗东汉统治\",\"骑象出征（传说）\",\"越南最早的民族英雄\",\"短暂独立\"],\"sensory\":\"一个女人站在象背上，手持剑，身后是一支混杂的军队。她们赶走了中国太守。但马援的大军已经从北方出发了。\",\"note\":\"越南民族意识的原点。征氏姐妹在越南的地位相当于圣女贞德。\"}),\n  E({\"id\":\"ck172\",\"name\":\"交趾·中国统治下的日常\",\"en\":\"Giao Chỉ Under China\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"古典\",\"year\":-111,\"period\":\"前111-938（跨度极大，取某一截面）\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"市井·庶民\",\"宗教·信仰\"],\"atmos\":[\"郡县制\",\"中国化与本土文化的暗流\",\"士燮治交州\",\"佛教南传中转站\",\"热带的中国边疆\"],\"sensory\":\"这里名义上是中国的郡县，但出了城就完全不同。城里的人学着写汉字、穿汉服；城外的人纹身、嚼槟榔、拜本地的神。寺庙里的僧人说，经书是从印度来的，经过这里再传去中国。\",\"note\":\"越南作为\\\"中国的一部分\\\"长达千年，但从未被完全同化。双重身份的日常。\"}),\n  E({\"id\":\"ck173\",\"name\":\"白藤江之战（吴权击败南汉）\",\"en\":\"Battle of Bạch Đằng\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":938,\"period\":\"938\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"河流·水乡\"],\"atmos\":[\"在河底插满铁尖木桩\",\"潮汐战术\",\"越南独立的起点\",\"一千年北属的终结\"],\"sensory\":\"河水正在退潮。敌人的战船冲过来——然后突然停住了，船底被水下的尖桩刺穿。河面上全是搁浅的船和落水的人。\",\"note\":\"白藤江战术（利用潮汐和水下木桩）后来又用了两次击败蒙古和明军。越南军事史的标志。\"}),\n  E({\"id\":\"ck174\",\"name\":\"华闾（丁朝/前黎朝）\",\"en\":\"Hoa Lư Capital\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":968,\"period\":\"968-1009\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"山地·高原\",\"宫廷·王权\"],\"atmos\":[\"喀斯特地貌中的首都\",\"石灰岩山峰\",\"越南的第一个统一王朝\",\"陆地上的下龙湾\"],\"sensory\":\"首都藏在群山之间——到处是拔地而起的石灰岩尖峰，河流在山谷中蜿蜒。像一座天然的城堡。\",\"note\":\"华闾的地形本身就是体验——这是世界上最戏剧性的首都选址之一。\"}),\n  E({\"id\":\"ck175\",\"name\":\"升龙/河内（李朝）\",\"en\":\"Lý Thăng Long\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1010,\"period\":\"1010-1225\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"宗教·信仰\"],\"atmos\":[\"龙飞上天（迁都传说）\",\"独立越南的第一座真正首都\",\"文庙国子监\",\"佛教鼎盛\"],\"sensory\":\"新都城叫\\\"升龙\\\"——据说建城的人在这里看到了金龙飞升。文庙里有年轻人在准备科举。独柱寺立在一根石柱上，像一朵莲花浮在水面。\",\"note\":\"越南的科举和文庙直接移植自中国，但建筑风格已经开始走向独立的热带审美。\"}),\n  E({\"id\":\"ck176\",\"name\":\"陈朝抗蒙（三次击退蒙古）\",\"en\":\"Trần Mongol Wars\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1258,\"period\":\"1258/1285/1288\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"河流·水乡\"],\"atmos\":[\"蒙古三征安南\",\"陈兴道（陈国峻）\",\"坚壁清野\",\"白藤江再次决战\",\"\\\"杀鞑\\\"刺在手臂上\"],\"sensory\":\"城里的人把粮食藏进山里然后撤退。升龙是空城。蒙古人进来了——但找不到食物也找不到人。等他们饿到撤退的时候，河上的尖桩又在等着。据说士兵们把\\\"杀鞑\\\"两个字刺在手臂上。\",\"note\":\"越南是少数成功抵抗蒙古入侵的国家之一（三次全胜）。坚壁清野+白藤江战术的组合。\"}),\n  E({\"id\":\"ck177\",\"name\":\"陈朝日常（鼎盛期）\",\"en\":\"Trần-era Đại Việt\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1350,\"period\":\"13-14世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"艺术·表演\",\"河流·水乡\"],\"atmos\":[\"字喃（越南本土文字）发展\",\"水上木偶戏\",\"红河稻作\",\"佛教与民间信仰并存\"],\"sensory\":\"水田上有人在操控水上木偶——木偶从水面下的帘幕后面出来，在水上跳舞打仗。晚上寺庙里有人在用一种不是汉字的文字抄写诗歌。\",\"note\":\"字喃是越南本土创制的文字（基于汉字结构），水上木偶戏是越南独有的艺术形式。\"}),\n  E({\"id\":\"ck178\",\"name\":\"明朝占领期的交趾\",\"en\":\"Ming Occupation\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1407,\"period\":\"1407-1427\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"奴役·压迫\"],\"atmos\":[\"永乐帝灭胡朝\",\"第二次北属\",\"文化掠夺\",\"大越国号被取消\",\"酝酿反抗\"],\"sensory\":\"中国官员在搜集书籍和工匠——运回中国。寺庙的铜钟被熔掉铸成武器。有人在山里悄悄联络。\",\"note\":\"明朝占领越南二十年，是越南民族记忆中的第二次\\\"北属\\\"。黎利的抗明起义由此而生。\"}),\n  E({\"id\":\"ck179\",\"name\":\"黎利起义·蓝山（后黎朝建立）\",\"en\":\"Lam Sơn Uprising\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1418,\"period\":\"1418-1428\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"丛林·热带\"],\"atmos\":[\"蓝山起义\",\"十年抗明战争\",\"还剑湖传说（神龟收回宝剑）\",\"越南的\\\"朱元璋\\\"\"],\"sensory\":\"蓝山的丛林里藏着一支起义军。领袖说他得到了一把神剑。十年之后，他站在升龙城里，把剑还给了湖里的神龟——或者故事是这么说的。\",\"note\":\"还剑湖传说是河内最核心的文化符号。\"}),\n  E({\"id\":\"ck180\",\"name\":\"郑阮分治时期的顺化\",\"en\":\"Trịnh–Nguyễn Huế\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"边塞·边疆\",\"迁徙·流亡\"],\"atmos\":[\"南北分裂\",\"阮主在南方\",\"灵江界线\",\"占婆遗民\",\"越南的南进运动\"],\"sensory\":\"顺化的城墙面朝北方——那是对手的方向。城南是新开发的土地，以前属于占婆人。市场上有占婆人、华人、日本人混居。\",\"note\":\"越南的南北分治（郑主vs阮主）持续了两百年。南方的顺化/会安是多元文化混合区。\"}),\n  E({\"id\":\"ck181\",\"name\":\"会安（国际贸易港）\",\"en\":\"Hội An Port\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1750,\"period\":\"16-18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\"],\"atmos\":[\"日本人街\",\"中国人街\",\"来远桥（日本桥）\",\"海上贸易\",\"丝绸与陶瓷\",\"葡萄牙传教士\"],\"sensory\":\"小小的港口城市里有三种建筑风格——日式的木屋、中式的会馆、越南的长条屋。来远桥上有人在做买卖。一个葡萄牙传教士在用越南语布道——发音很奇怪。\",\"note\":\"会安是东亚海上贸易网络的缩影。来远桥至今仍在。\"}),\n  E({\"id\":\"ck182\",\"name\":\"西山朝起义（阮惠北伐击清）\",\"en\":\"Tây Sơn Rebellion\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近代\",\"year\":1771,\"period\":\"1771-1789\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"市井·庶民\"],\"atmos\":[\"三兄弟农民起义\",\"推翻郑阮\",\"光中帝阮惠\",\"春节奇袭清军二十万\",\"越南拿破仑\"],\"sensory\":\"大年初五。清军以为还在过年——然后营帐被冲破了。阮惠从顺化出发到升龙，行军速度快到清军不敢相信。\",\"note\":\"1789年阮惠在春节期间击败二十万清军，是越南军事史上最传奇的战役之一。\"}),\n  E({\"id\":\"ck183\",\"name\":\"顺化皇城（阮朝鼎盛期）\",\"en\":\"Nguyễn Imperial Huế\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近代\",\"year\":-1850,\"period\":\"19世纪前半\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"城市·都会\"],\"atmos\":[\"仿紫禁城\",\"香江\",\"皇陵\",\"科举\",\"越南最后一个王朝的全盛期\"],\"sensory\":\"皇城的午门看起来像北京的——但更小、颜色更鲜艳，而且被热带植物包围着。香江上有龙舟缓缓驶过。宫里的规矩完全照搬中国，但空气里是热带的湿热和花香。\",\"note\":\"越南版紫禁城——结构模仿北京，但审美已经完全热带化。\"}),\n  E({\"id\":\"ck184\",\"name\":\"法国入侵·西贡陷落\",\"en\":\"French Conquest of Saigon\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近代\",\"year\":1858,\"period\":\"1858-1862\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"战争·军事\"],\"atmos\":[\"拿破仑三世\",\"传教士被杀为借口\",\"蒸汽军舰\",\"南圻割让\",\"越南殖民化开始\"],\"sensory\":\"西贡的河面上出现了铁壳军舰。城墙挡不住大炮。签了条约之后，法国人开始在城里修直直的马路——穿过了原来的街区。\",\"note\":\"与中国鸦片战争、日本黑船来航、朝鲜江华岛的同型体验——但越南失去的更彻底。\"}),\n  E({\"id\":\"ck185\",\"name\":\"法属印度支那·河内（殖民日常）\",\"en\":\"French Colonial Hanoi\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近代\",\"year\":1880,\"period\":\"1880s-1940s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"城市·都会\",\"饮食·宴席\"],\"atmos\":[\"法式建筑与越南街巷\",\"咖啡滴漏\",\"法棍面包\",\"还剑湖边的法国人\",\"双重社会\"],\"sensory\":\"法国人在湖边的咖啡馆喝咖啡。越南人在老城的三十六街做小生意。两个世界隔着一条马路。一种新的咖啡冲泡方式正在这里发明——用铝制滴漏壶，加炼乳。\",\"note\":\"越南的法棍面包（bánh mì）和滴漏咖啡都是殖民时期的\\\"文化混血\\\"产物，至今是越南的标志。\"}),\n  E({\"id\":\"ck186\",\"name\":\"奠边府（1954）\",\"en\":\"Điện Biên Phủ\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"战后·当代\",\"year\":1954,\"period\":\"1954\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"山地·高原\",\"市井·庶民\"],\"atmos\":[\"胡志明\",\"武元甲\",\"法军要塞被围\",\"自行车运补给上山\",\"殖民时代的终结\"],\"sensory\":\"（此坐标感官锚点从略——体验角度为越南民工用自行车推弹药翻越山岭的后勤视角，而非战斗描写）\",\"note\":\"越南独立战争的决定性战役。体验角度限定为后勤/民间支前视角——数万民工用自行车将物资推过丛林山路送到前线。\"}),\n  E({\"id\":\"ck187\",\"name\":\"湄公河三角洲（越南南进的终点）\",\"en\":\"Mekong Delta Frontier\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"河流·水乡\",\"边塞·边疆\",\"迁徙·流亡\"],\"atmos\":[\"水上市场\",\"新开垦的处女地\",\"越南人/华人/高棉人混居\",\"河网密布\",\"水上人家\"],\"sensory\":\"到处是水——河道就是马路。船就是房子。天亮前水上市场已经开始了——菠萝堆成小山，有人在船上煮粉。这里的人说话口音和北方完全不同。\",\"note\":\"湄公河三角洲直到18-19世纪才被越南完全纳入版图，之前是高棉（柬埔寨）的领土。多民族混居的新边疆。\"}),\n  E({\"id\":\"ck188\",\"name\":\"下龙湾（通史）\",\"en\":\"Hạ Long Bay\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"山地·高原\"],\"atmos\":[\"一千六百座石灰岩岛屿\",\"龙降传说\",\"渔民的水上村落\",\"海盗藏身处\",\"世界级地质奇观\"],\"sensory\":\"雾里浮出一座又一座石山——像从海里长出来的。渔船在山脚之间穿行。有人住在漂浮的木屋里，一辈子没上过岸。\",\"note\":\"场所型坐标。下龙湾的渔民生活和喀斯特地貌本身就是极致的感官体验。\"}),\n  E({\"id\":\"ck189\",\"name\":\"河仙·鄚玖（明遗民的湄公河口港）\",\"
