en\":\"Hà Tiên\",\"region\":\"东亚·越南\",\"country\":\"越南·河仙\",\"era\":\"近世\",\"year\":1750,\"period\":\"18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"迁徙·流亡\"],\"atmos\":[\"明朝遗民鄚玖在暹罗湾畔开埠\",\"招徕华·越·高棉·马来商人\",\"名义上臣属阮主又向暹罗·真腊纳贡\",\"其子鄚天赐办\\\"招英阁\\\"诗社\",\"夹在三国之间的自治港\"],\"sensory\":\"暹罗湾边一座新港，主事的是个不肯剃发降清、漂洋过海来的广东人。码头上华人、越人、高棉人、马来人混着做买卖，赌坊、米行、盐场都热闹。这地方说不清归谁——既给南边的阮主上表，又给暹罗、真腊送礼，谁也不真管得着。港主的儿子风雅，召文人结社吟诗，把这南海一隅写进诗里。\",\"note\":\"河仙（Hà Tiên）由明朝遗民鄚玖（Mạc Cửu，广东人，拒不降清而南渡）于约1700年在暹罗湾畔开埠，招徕华、越、高棉、马来商人，成为湄公河口一处繁荣的多族群自治港。它名义上臣属越南阮主，同时向暹罗、真腊纳贡周旋于三方之间。其子鄚天赐（Mạc Thiên Tứ）创\\\"招英阁\\\"诗社，文风远播。后并入越南版图。\"}),\n  E({\"id\":\"ck190\",\"name\":\"红河三角洲的水乡村庄\",\"en\":\"Red River Delta\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以前近代最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"河流·水乡\",\"市井·庶民\",\"节庆·仪式\"],\"atmos\":[\"红河三角洲的水稻村\",\"竹篱环绕的村落\",\"村口的榕树·水井·村社祠堂（đình）\",\"防洪的堤圩\",\"水上木偶戏\",\"农历节庆与稻作节律\"],\"sensory\":\"一圈密竹篱把村子围起来，进出只一道门。村口一棵老榕树下有口井，旁边是村社祠堂——红白喜事、议事拜神都在这儿。水田一望无际，秧苗插得齐整，水牛踩着泥走。逢年过节，村塘里支起小台，艺人藏在齐腰深的水里操纵木偶，让它们在水面上耕田、舞龙，锣鼓和水花一起响。\",\"note\":\"红河三角洲是越南文明的核心农业区，水稻村庄是其千年不变的庶民底色：竹篱环村，村口\\\"榕树·水井·村社祠堂（đình）\\\"是公共生活的中心，靠堤圩系统抵御红河泛滥。水上木偶戏（múa rối nước）是这片水乡独有的民间艺术。越南的坐标多为王朝与抗争，这里补一处稻作日常。\"}),\n  E({\"id\":\"ck191\",\"name\":\"摩亨佐达罗\",\"en\":\"Mohenjo-daro\",\"region\":\"南亚\",\"country\":\"巴基斯坦\",\"era\":\"上古\",\"year\":-2500,\"period\":\"约前2500-前1900\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"河流·水乡\"],\"atmos\":[\"大浴池\",\"网格状街道\",\"排水系统\",\"印章文字（未破译）\",\"没有宫殿也没有神庙？\"],\"sensory\":\"街道横平竖直、直角相交，每家都有排水道通向大街下方的暗渠。城中央是一座巨大的砖砌浴池，所有人都到那里沐浴。一个工匠在滑石印章上刻一头公牛。没有人能告诉你这些刻符是什么意思——四千年后也没有人能。\",\"note\":\"印度河文明是人类最早的城市规划范例之一，但文字至今未被破译，没有已知的国王或战争记录。这种\\\"一切都在，但我们什么都不知道\\\"的感觉非常独特。\"}),\n  E({\"id\":\"ck192\",\"name\":\"哈拉帕\",\"en\":\"Harappa\",\"region\":\"南亚\",\"country\":\"巴基斯坦\",\"era\":\"上古\",\"year\":-2600,\"period\":\"约前2600-前1900\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"陶器作坊\",\"标准化砖块\",\"贸易网络延伸到两河流域\",\"农业与牧业\"],\"sensory\":\"窑里烧出的砖块块块一样大，像同一副模子里磕出来的。有人在清点一批要装船的货物，它们要走很远的海路，去一个你连名字都听不懂的地方。\",\"note\":\"与摩亨佐达罗并列的印度河文明双城。标准化砖块暗示了某种看不见的管理体系。\"}),\n  E({\"id\":\"ck193\",\"name\":\"恒河流域（后期吠陀时代）\",\"en\":\"Late Vedic Ganges\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":-1000,\"period\":\"约前1000-前600\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"雅利安人东进\",\"种姓制度雏形\",\"森林中的苦行者\",\"火祭\",\"奥义书哲学\"],\"sensory\":\"密林边缘的空地上，有人围着祭火吟诵经文——不是唱，是一种介于说和唱之间的声音，音调被一代代精确地固定下来。远处一个苦行者坐在树下一动不动。空气里有酥油落进火里的甜腻气味。\",\"note\":\"吠陀经典是口传的——声音本身就是神圣的。\\\"消失的声音\\\"母题的完美对应。\"}),\n  E({\"id\":\"ck194\",\"name\":\"王舍城/舍卫城（佛陀时代）\",\"en\":\"Rajagriha of the Buddha\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":-450,\"period\":\"前6-前5世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"悉达多\",\"竹林精舍\",\"祇园精舍\",\"六师外道\",\"沙门思潮\",\"一切旧秩序在被质疑\"],\"sensory\":\"一个穿赭色衣袍的人赤脚走过街市，手里捧着一只钵。有人往钵里放进食物。他在一棵树下坐下，开始对身边的人说话。人渐渐围拢过来听。\",\"note\":\"佛陀时代的北印度是一个思想大爆发的时代——类似中国的春秋战国。佛教只是其中一支。\"}),\n  E({\"id\":\"ck195\",\"name\":\"华氏城（孔雀王朝·阿育王）\",\"en\":\"Ashoka's Pataliputra\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":-250,\"period\":\"前3世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"宗教·信仰\"],\"atmos\":[\"阿育王石柱\",\"法敕（岩石上的敕令）\",\"羯陵伽战争的忏悔\",\"以法治国\",\"遣使四方传佛法\"],\"sensory\":\"城门口立着一根磨光的石柱，顶上蹲着一头狮子。柱身刻着字——国王说，他不再发动战争了。据说他在一场大屠杀之后变了一个人。有僧人带着他的教法渡海南下，去南边那座大岛。\",\"note\":\"阿育王是\\\"由暴君转为仁王\\\"的最著名案例。他的石柱刻文是印度最早的可读文字记录。\"}),\n  E({\"id\":\"ck196\",\"name\":\"犍陀罗（贵霜帝国）\",\"en\":\"Kushan Gandhara\",\"region\":\"南亚\",\"country\":\"巴基斯坦\",\"era\":\"古典\",\"year\":250,\"period\":\"1-3世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"希腊化佛教艺术\",\"佛像第一次被雕刻出人形\",\"丝绸之路西端之一\",\"迦腻色伽王\"],\"sensory\":\"工匠正在雕一尊佛像——脸是希腊人的脸，衣褶像罗马石像，手势却是印度的。商队来来往往，说着你听不懂的话——希腊语、梵语，还有中亚某种语言。\",\"note\":\"佛像在这里第一次有了\\\"人的面孔\\\"——之前佛教不雕刻佛陀本人。希腊艺术+佛教内容的混合。\"}),\n  E({\"id\":\"ck197\",\"name\":\"那烂陀（笈多王朝-波罗王朝）\",\"en\":\"Nalanda Mahavihara\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1150,\"period\":\"5-12世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\"],\"atmos\":[\"世界最古的大学\",\"万名学僧\",\"玄奘留学地\",\"佛教哲学的最高学府\",\"图书馆\"],\"sensory\":\"一座庞大的红砖建筑群——这不是寺庙，是学校。回廊里挤满辩论的人，白衣的、赭衣的、各种颜色的僧袍。藏书楼高九层。一个从东方来的僧人刚到——他走了很远的路，只为看这里的书。\",\"note\":\"那烂陀大学存在了近八百年，是中世纪世界最大的学术中心之一。玄奘在此留学五年。1193年被突厥军队焚毁。\"}),\n  E({\"id\":\"ck198\",\"name\":\"鹿野苑/菩提伽耶（佛教圣地·通史）\",\"en\":\"Sarnath & Bodh Gaya\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":0,\"period\":\"通时代（取佛教鼎盛期最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"节庆·仪式\"],\"atmos\":[\"初转法轮/成道处\",\"朝圣者\",\"石窟与精舍\",\"来自东亚东南亚的僧人\"],\"sensory\":\"菩提树下有人打坐入定。树很老了——据说这棵树，或它的后代，见证过那个人开悟的一刻。各地来的僧人绕塔而行，有人用汉语诵经，有人用巴利语，有人用藏语。\",\"note\":\"场所型坐标。佛教的原点空间。\"}),\n  E({\"id\":\"ck199\",\"name\":\"笈多时代的华氏城（古典黄金时代）\",\"en\":\"Gupta Pataliputra\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":550,\"period\":\"4-6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"艺术·表演\"],\"atmos\":[\"梵语文学巅峰\",\"迦梨陀娑\",\"十进制与零的发明\",\"阿旃陀石窟正在被画\",\"印度教复兴\"],\"sensory\":\"宫廷里有人在朗诵梵语诗——语言本身像音乐。学者在推算行星的轨道，用的是一种包含\\\"零\\\"的数字系统。远处山中的石窟，画师借着油灯画壁画。\",\"note\":\"笈多时代被称为\\\"印度的黄金时代\\\"。零和十进制的发明改变了人类文明。阿旃陀壁画与敦煌壁画同期。\"}),\n  E({\"id\":\"ck200\",\"name\":\"阿旃陀石窟（正在被绘制）\",\"en\":\"Ajanta Caves\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":150,\"period\":\"2世纪-6世纪（第二期最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"艺术·表演\",\"宗教·信仰\"],\"atmos\":[\"悬崖上的石窟\",\"壁画\",\"佛传故事\",\"暗中作画\",\"被遗忘又被重新发现\"],\"sensory\":\"弯腰钻进石窟，外面的天光在身后暗下去。借着油灯和从洞口反射进来的光，你看见墙上画满了人——菩萨的眼睛在暗中注视你。颜料的气味混着岩石的湿冷。\",\"note\":\"阿旃陀在5世纪末被遗弃后，直到1819年才被一名英国军官在打猎时偶然发现。\\\"消失又重现\\\"的坐标。\"}),\n  E({\"id\":\"ck201\",\"name\":\"朱罗王朝的坦贾武尔\",\"en\":\"Chola Thanjavur\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1250,\"period\":\"10-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"海洋·港口\"],\"atmos\":[\"布里哈迪斯瓦拉神庙\",\"铜雕舞蹈湿婆\",\"海上帝国（远征斯里兰卡和东南亚）\",\"南印度的黄金时代\"],\"sensory\":\"一座巨大的石砌神庙——主塔在阳光下像一座山。庙里有人跳着一种你没见过的舞，手和眼睛的动作比身体更要紧。铜匠正在浇铸一尊舞着的神像：一脚抬起，四臂张开。\",\"note\":\"朱罗王朝是南印度/泰米尔文明的巅峰。铜铸舞王湿婆像（Nataraja）是印度艺术最著名的形象之一。\"}),\n  E({\"id\":\"ck202\",\"name\":\"德里苏丹国（突厥入侵后）\",\"en\":\"Delhi Sultanate\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1206,\"period\":\"1206-1526\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"战争·军事\"],\"atmos\":[\"伊斯兰与印度教的碰撞\",\"库特布塔\",\"那烂陀焚毁的余波\",\"苏菲派传入\"],\"sensory\":\"旧神庙被拆了，石料拿去砌新的清真寺——你能在柱子上认出印度教的旧雕刻。宣礼塔上传来的唤拜声，是这片土地从前没听过的。城郊的空地上，一个苏菲派圣者在歌唱，印度教徒和穆斯林都停下来听。\",\"note\":\"破坏与融合并存。苏菲派成为印度教和伊斯兰之间的桥梁。\"}),\n  E({\"id\":\"ck203\",\"name\":\"毗奢耶那伽罗（南印度印度教帝国）\",\"en\":\"Vijayanagara Empire\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1550,\"period\":\"14-16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"战争·军事\"],\"atmos\":[\"最后的印度教大帝国\",\"亨比废墟（当时的繁华）\",\"德干高原\",\"抵抗苏丹国\"],\"sensory\":\"花岗岩巨石之间，铺开一座大得不可思议的城。街上是大象、商人、舞者、士兵。市集上的宝石成堆地卖。但北边的苏丹国一直在打过来。\",\"note\":\"亨比现在是一片壮观的废墟。\\\"废墟之前\\\"——它还是一座活的城市的时候。\"}),\n  E({\"id\":\"ck204\",\"name\":\"阿格拉/德里（阿克巴大帝）\",\"en\":\"Akbar's Agra\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1556,\"period\":\"1556-1605\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"宗教融合实验（din-i ilahi）\",\"细密画工坊\",\"多宗教廷臣\",\"法塔赫布尔西格里\"],\"sensory\":\"宫廷里，印度教学者、穆斯林神学家、耶稣会传教士坐在一起辩论。皇帝在一旁听——他自己创了一种新宗教。画坊里，波斯画师教印度学徒画细密画，两种笔法正在长成一种。\",\"note\":\"阿克巴的宗教融合实验在世界史上极为罕见。法塔赫布尔西格里（胜利之城）是他建了又废弃的理想城市。\"}),\n  E({\"id\":\"ck205\",\"name\":\"法塔赫布尔西格里（被放弃的理想城市）\",\"en\":\"Fatehpur Sikri\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1571,\"period\":\"1571-1585\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宫廷·王权\"],\"atmos\":[\"十四年的首都\",\"缺水而废弃\",\"完美建成又完全空置\",\"印度教与伊斯兰建筑融合\"],\"sensory\":\"一座完美的城——宫殿、清真寺、庭院，全是新的。但水不够用。十四年后，所有人都走了。风穿过空荡荡的庭院。\",\"note\":\"一座\\\"被设计出来又被放弃\\\"的城市。废墟之前/最后一天的变体——这次是城市自己被抛弃。\"}),\n  E({\"id\":\"ck206\",\"name\":\"泰姬陵建造（沙贾汗时期）\",\"en\":\"Building the Taj Mahal\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1632,\"period\":\"1632-1653\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"死亡·葬仪\",\"婚恋·求爱\"],\"atmos\":[\"为亡妻建陵\",\"二十年施工\",\"两万工匠\",\"白色大理石\",\"爱与权力的纪念碑\"],\"sensory\":\"亚穆纳河边的工地上，白色大理石一块块往上砌。工匠把半宝石——红玉髓、青金石、玛瑙——嵌进石面，拼成花纹，每一朵花要用几十块石头。皇帝每天来看进度。他在为一个已经不在的人造这一切。\",\"note\":\"泰姬陵\\\"正在被建造\\\"的状态。手艺母题的极致——两万工匠、二十年工期。\"}),\n  E({\"id\":\"ck207\",\"name\":\"莫卧儿衰落期的德里（纳迪尔沙赫入侵）\",\"en\":\"Sack of Delhi, 1739\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1739,\"period\":\"1739\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"波斯入侵者洗劫德里\",\"孔雀宝座被抢走\",\"光之山钻石\",\"帝国名存实亡\"],\"sensory\":\"满街都在抢。波斯兵从皇宫里搬出金银珠宝——还有那座著名的孔雀宝座。莫卧儿皇帝还坐在殿里，但他已经什么都管不了了。\",\"note\":\"莫卧儿帝国实质性终结的时刻。\"}),\n  E({\"id\":\"ck208\",\"name\":\"阿姆利则·金庙（锡克教）\",\"en\":\"Golden Temple, Amritsar\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪末-通时代\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"饮食·宴席\"],\"atmos\":[\"哈尔曼迪尔·萨希布（金庙）\",\"圣典池\",\"免费食堂（兰加尔）\",\"锡克教平等理念\"],\"sensory\":\"一座金色的建筑浮在水池中央，金光落在水面上。食堂里几千人席地而坐，一起吃饭——不分种姓、不分宗教、不分贫富。大锅里的扁豆咖喱够喂一座城。\",\"note\":\"金庙的兰加尔（免费食堂）至今每天喂食十万人。\\\"所有人平等地坐在地上吃同样的食物\\\"是一个极强的体验点。\"}),\n  E({\"id\":\"ck209\",\"name\":\"普拉西战役前后的加尔各答\",\"en\":\"Battle of Plassey\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近代\",\"year\":-1757,\"period\":\"1757前后\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"战争·军事\",\"贸易·商业\"],\"atmos\":[\"东印度公司\",\"克莱武\",\"孟加拉纳瓦布\",\"黑洞事件\",\"英国统治印度的开端\"],\"sensory\":\"恒河三角洲的贸易站变成了要塞。穿红衣的英国兵在操练。本地的纳瓦布以为自己在跟一群商人打交道——直到这群商人带来了军队。\",\"note\":\"英国殖民印度的起点。一个\\\"贸易公司变成了统治者\\\"的过程。\"}),\n  E({\"id\":\"ck210\",\"name\":\"英属印度·加尔各答（殖民鼎盛期）\",\"en\":\"Colonial Calcutta\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪–20世纪初\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"城市·都会\",\"学问·书写\"],\"atmos\":[\"大英帝国的第二城\",\"维多利亚纪念堂\",\"孟加拉文艺复兴\",\"泰戈尔家族\",\"种姓与殖民的双重压迫\"],\"sensory\":\"维多利亚式的建筑沿着胡格利河一字排开。穿西装的印度绅士走进一座图书馆。河边的火葬堆日夜不熄。两个世界叠在同一片空间里——英国人的俱乐部和印度人的贫民窟，只隔一条街。\",\"note\":\"加尔各答的孟加拉文艺复兴是印度现代知识分子运动的起点——拉姆·莫汉·罗伊、泰戈尔家族。\"}),\n  E({\"id\":\"ck211\",\"name\":\"1857年印度大起义（兵变/第一次独立战争）\",\"en\":\"Indian Mutiny, 1857\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近代\",\"year\":1857,\"period\":\"1857\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"宗教·信仰\"],\"atmos\":[\"章西女王\",\"涂油子弹\",\"东印度公司统治的终结\",\"莫卧儿帝国最后的皇帝\"],\"sensory\":\"兵营里传开一个消息——新发的子弹要用牙咬开弹壳，封口的油脂是猪油和牛油。穆斯林士兵和印度教士兵一起拒绝了。然后枪响了——只是这一次，枪口对准的是英国军官。\",\"note\":\"印度近代史的分水岭。一颗子弹引发的宗教禁忌问题摧毁了一个帝国（东印度公司被解散，英国王室直接接管）。\"}),\n  E({\"id\":\"ck212\",\"name\":\"英属印度·铁路旅行\",\"en\":\"Railways of the Raj\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪后半-20世纪初\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"市井·庶民\"],\"atmos\":[\"殖民铁路网\",\"不同等级车厢的种姓/种族隔离\",\"持票仍因肤色被请出头等车厢\"],\"sensory\":\"火车站巨大而嘈杂。头等车厢里坐着英国人，二等车厢是印度绅士，三等车厢里人挤着人。站台上有人卖茶——陶杯盛的，喝完往地上一摔就碎。火车穿过棉田和芒果林。\",\"note\":\"印度铁路是殖民遗产，但也是印度日常生活至今的核心。车厢里的社会分层是殖民印度的缩影。\"}),\n  E({\"id\":\"ck213\",\"name\":\"贝拿勒斯/瓦拉纳西（恒河·通史）\",\"en\":\"Varanasi on the Ganges\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"死亡·葬仪\",\"河流·水乡\"],\"atmos\":[\"恒河沐浴\",\"火葬台阶（ghat）\",\"生与死同在\",\"世界上持续有人居住最久的城市之一\"],\"sensory\":\"天还没亮，台阶上已经有人走进恒河。水很浑。有人在祈祷，有人在洗衣服，有人在烧尸体——生和死挨得这么近。日出的时候整条河变成金色。钟声和诵经声从四面八方传来。\",\"note\":\"场所型坐标。瓦拉纳西的感官浓度可能是这个库里最高的。\"}),\n  E({\"id\":\"ck214\",\"name\":\"盐地行军/食盐进军（甘地）\",\"en\":\"Gandhi's Salt March\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"世纪之交\",\"year\":1930,\"period\":\"1930\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"律法·审判\"],\"atmos\":[\"非暴力不合作\",\"380公里步行\",\"到海边捡一把盐\",\"大英帝国的盐税\",\"简单行为的巨大力量\"],\"sensory\":\"一个瘦老头拄着拐杖在走路。后面跟着的人越来越多。走了二十四天。到了海边，他弯腰捡起一把盐。就这样。但这个动作让整个帝国紧张了。\",\"note\":\"人类历史上最著名的非暴力抗议之一。\\\"捡一把盐\\\"这个动作的简单性和其政治后果的巨大反差。\"}),\n  E({\"id\":\"ck215\",\"name\":\"印巴分治\",\"en\":\"Partition of India\",\"region\":\"南亚\",\"country\":\"跨区域\",\"era\":\"战后·当代\",\"year\":1947,\"period\":\"1947\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"革命·变革\",\"战争·军事\"],\"atmos\":[\"独立与分裂同日\",\"难民潮\",\"教派暴力\",\"拉德克利夫线\",\"一夜之间你的邻居变成了另一个国家的人\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"极重坐标。人类历史上最大规模的人口迁徙之一（1400万人流离失所）。体验角度限定为平民/难民视角。\"}),\n  E({\"id\":\"ck216\",\"name\":\"阿努拉德普勒（僧伽罗王朝）\",\"en\":\"Anuradhapura\",\"region\":\"南亚\",\"country\":\"斯里兰卡\",\"era\":\"古典\",\"year\":-350,\"period\":\"前4世纪-11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"菩提树分枝（据说从印度移植来的佛陀菩提树）\",\"巨大的白色佛塔\",\"灌溉水库系统\",\"上座部佛教圣地\"],\"sensory\":\"一座白色的半球形建筑高耸入云——不是神庙，是佛塔；它整个是实心的，只在深处埋着一颗舍利。旁边有一棵很老的菩提树，据说是从佛陀开悟的那棵圣树上折下枝条、渡海移种来的。\",\"note\":\"斯里兰卡是上座部佛教最早的传播地之一。阿努拉德普勒的菩提树据说是世界上有记载的最古老的人工种植树木。\"}),\n  E({\"id\":\"ck217\",\"name\":\"锡吉里耶（狮子岩）\",\"en\":\"Sigiriya, Lion Rock\",\"region\":\"南亚\",\"country\":\"斯里兰卡\",\"era\":\"古典\",\"year\":450,\"period\":\"5世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"艺术·表演\"],\"atmos\":[\"弑父篡位者的空中宫殿\",\"巨石上的城堡\",\"云中仕女壁画\",\"偏执的王\"],\"sensory\":\"一块巨大的岩石拔地而起。岩壁上画着半裸的女人，颜色还很鲜艳。山顶上是一座宫殿——据说建它的人弑父篡了位，怕被逃去远方的兄弟带兵杀回来，才把住处搬上了天。入口是一头巨大的狮子，人从它张开的嘴里走进去。\",\"note\":\"锡吉里耶是一个弑父者在恐惧中建造的空中堡垒——建筑学奇迹的心理动机是罪与恐惧。\"}),\n  E({\"id\":\"ck218\",\"name\":\"康提（最后的僧伽罗王国）\",\"en\":\"Kingdom of Kandy\",\"region\":\"南亚\",\"country\":\"斯里兰卡\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"节庆·仪式\",\"山地·高原\"],\"atmos\":[\"佛牙寺\",\"佛牙节（Esala Perahera）\",\"山中王国\",\"最后被英国灭亡的斯里兰卡王朝\"],\"sensory\":\"山谷里的小城，到处是寺庙。今天是佛牙节——大象披着金布，驮着供奉佛牙的金匣在街上游行。鼓声震得胸腔发颤。火把照亮整条街。\",\"note\":\"佛牙节是亚洲最壮观的宗教游行之一。感官浓度极高——大象、鼓声、火把、金布。\"}),\n  E({\"id\":\"ck219\",\"name\":\"梅瓦尔的堡垒与jauhar（拉杰普特的荣誉）\",\"en\":\"Mewar & Jauhar\",\"region\":\"南亚\",\"country\":\"印度·拉杰普特\",\"era\":\"近世\",\"year\":1650,\"period\":\"14-17世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"拉杰普特的山顶巨堡（奇陶尔加尔/库姆巴尔加尔）\",\"城破前女子集体投火自尽（jauhar）·男子披橙袍死战（saka）\",\"梅瓦尔的拉纳·普拉塔普抗莫卧儿\",\"哈尔迪加蒂之战\",\"宁死不降的家族荣誉\"],\"sensory\":\"山顶上一座望不到边的石堡，城墙顺着崖壁起伏。围城打到最后一夜，城里点起巨大的柴堆——披着嫁衣的女人一个接一个走进火里，不愿落入敌手。天亮，男人们穿上橙红的袍子，冲出城门赴死。山外，那位戴头巾的王侯仍带残部躲进林子，不肯向北方的皇帝低头。\",\"note\":\"拉杰普特诸邦以拉贾斯坦的山顶巨堡（奇陶尔加尔、库姆巴尔加尔等）和\\\"宁死不辱\\\"的荣誉观著称。城将破时，女子集体投火自尽称\\\"jauhar\\\"，男子披橙袍死战称\\\"saka\\\"，奇陶尔曾数次上演。梅瓦尔的拉纳·普拉塔普长期抵抗阿克巴，哈尔迪加蒂之战（1576）后退入山林坚持不降。\"}),\n  E({\"id\":\"ck220\",\"name\":\"葡属果阿（\\\"金色果阿\\\"与宗教裁判所）\",\"en\":\"Portuguese Goa\",\"region\":\"南亚\",\"country\":\"印度·果阿\",\"era\":\"近世\",\"year\":1750,\"period\":\"16-18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"宗教·信仰\",\"海洋·港口\"],\"atmos\":[\"阿尔布开克1510年攻取\",\"\\\"金色果阿\\\"东方第一大港\",\"博姆耶稣大教堂与圣方济各·沙勿略的遗体\",\"葡印混血的天主教社会\",\"果阿宗教裁判所的酷烈\",\"香料与改宗\"],\"sensory\":\"热带海港边耸着欧洲式的白色大教堂，钟声压过棕榈林。教堂里供着一位传教士不腐的遗体，信众排队来吻。街上走着葡萄牙人、印度人和他们的混血后代，都受了洗、取了葡式名字。可城另一头的裁判所阴森森的——被指\\\"暗地里还拜旧神\\\"的改宗者，正被带进去受审。\",\"note\":\"1510年阿尔布开克攻取果阿，使之成为葡萄牙\\\"印度领地\\\"（Estado da Índia）的中心，16-17世纪号\\\"金色果阿\\\"，是东方最大的港市之一。博姆耶稣大教堂安放圣方济各·沙勿略的遗体。这里形成了葡印混血的天主教社会，同时果阿宗教裁判所（1560-1812）以酷烈审讯改宗者著称。\"}),\n  E({\"id\":\"ck221\",\"name\":\"克什米尔（梵学与苏菲的山谷）\",\"en\":\"Kashmir Valley\",\"region\":\"南亚\",\"country\":\"克什米尔\",\"era\":\"中古\",\"year\":1450,\"period\":\"8-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\",\"山地·高原\"],\"atmos\":[\"雪山环抱的湖谷\",\"沙拉达梵学中心与字体\",\"马尔丹太阳神庙（拉利塔迪亚）\",\"湿婆教与佛教并盛\",\"女神秘诗人拉尔·黛德\",\"印度教-苏菲交融的\\\"里希\\\"传统\",\"宽容的苏丹\\\"巴德沙阿\\\"\"],\"sensory\":\"雪峰围着一片高山湖谷，湖上浮着采菱角的小船。古庙的石柱列成一圈，朝着太阳升起的方向。学堂里僧侣抄写梵文经卷，用的是这山谷自创的字体。村口一个披散头发、几乎赤身的女子边走边唱——她的短歌一半像湿婆的教诲，一半像苏菲的呢喃，山两边的人都听得懂。\",\"note\":\"克什米尔山谷长期是梵学重镇（沙拉达学派与字体），拉利塔迪亚王8世纪建马尔丹太阳神庙。这里湿婆派、佛教先后兴盛，又孕育出印度教与苏菲交融的\\\"里希\\\"传统——14世纪女神秘诗人拉尔·黛德（Lal Ded）的短诗为印、穆两教共尊。15世纪苏丹宰因·阿比丁（\\\"巴德沙阿\\\"）以宽容著称。\"}),\n  E({\"id\":\"ck222\",\"name\":\"波隆纳鲁沃（僧伽罗的水库之城）\",\"en\":\"Polonnaruwa\",\"region\":\"南亚\",\"country\":\"斯里兰卡\",\"era\":\"中古\",\"year\":1250,\"period\":\"11-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"河流·水乡\"],\"atmos\":[\"阿努拉德普勒之后的第二古都\",\"波罗迦罗摩巴忽的巨型蓄水库（\\\"波罗迦罗摩海\\\"）\",\"加尔寺崖壁凿出的卧佛立佛\",\"圆形佛龛（vatadage）\",\"\\\"一滴雨水都不该不经使用就流入大海\\\"\"],\"sensory\":\"一片大得望不到对岸的人工湖，水面映着椰林——全靠土坝拦蓄雨季的水，旱季再放给稻田。岸边一道整块岩石凿出的佛像群：一尊横卧的大佛安详闭眼，旁边一尊立佛双臂交叠。城里圆形的佛龛一圈石柱围着舍利塔。国王说过：一滴雨水也不该白白流进海里。\",\"note\":\"波隆纳鲁沃是斯里兰卡继阿努拉德普勒之后的第二古都（11-13世纪），波罗迦罗摩巴忽一世大兴水利，修建巨型蓄水库\\\"波罗迦罗摩海\\\"，名言\\\"一滴雨水都不该不经使用就流入大海\\\"。加尔寺（Gal Vihara）整石凿出的卧佛、立佛是僧伽罗佛教艺术的杰作。\"}),\n  E({\"id\":\"ck223\",\"name\":\"锡克帝国·拉合尔（旁遮普之狮）\",\"en\":\"Sikh Empire\",\"region\":\"南亚\",\"country\":\"印度·锡克\",\"era\":\"近代\",\"year\":1801,\"period\":\"1801-1839\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"兰季德·辛格统一旁遮普\",\"独眼的\\\"旁遮普之狮\\\"\",\"卡尔萨军配欧洲教官与火炮\",\"金庙贴金\",\"光之山钻石（柯依诺尔）\",\"锡克王宽容统治穆斯林为主的旁遮普\",\"辛格死后败于英国\"],\"sensory\":\"拉合尔的城堡里，一位独眼的君王盘腿坐着——个子不高，却没人敢小看他。校场上锡克士兵列阵操练，请来的欧洲军官喊着口令，新铸的火炮一字排开。城北金庙的圆顶刚贴上金箔，日头下晃眼。他腰间据说藏着那颗著名的大钻石。这片穆斯林居多的土地，眼下由一位锡克王统着，倒也相安。\",\"note\":\"兰季德·辛格（1801-1839在位）统一旁遮普，建立锡克帝国，定都拉合尔，人称\\\"旁遮普之狮\\\"。他的卡尔萨军队聘欧洲教官、配近代火炮，是当时南亚少有能与英国抗衡的本土力量。他给阿姆利则金庙贴金，拥有光之山（柯依诺尔）钻石；以锡克之身宽容统治穆斯林为主的旁遮普。其死后帝国在英锡战争中败亡。\"}),\n  E({\"id\":\"ck224\",\"name\":\"占婆·美山圣地\",\"en\":\"Champa, Mỹ Sơn\",\"region\":\"东南亚\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1250,\"period\":\"7-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"印度教湿婆崇拜\",\"红砖塔群\",\"占族舞蹈\",\"海上贸易\",\"沉香出口\"],\"sensory\":\"丛林里一片空地，红砖塔拔地而起。砖缝里没有灰浆，砖咬着砖，不知道怎么粘住的。塔身上雕着起舞的神，手臂弯成弧形。空气里浮着沉香的香气，又苦又甜。\",\"note\":\"占婆的建筑技术（无灰浆砖砌）至今是谜。沉香贸易是其经济命脉。\"}),\n  E({\"id\":\"ck225\",\"name\":\"占婆灭亡（越南南进）\",\"en\":\"Fall of Champa\",\"region\":\"东南亚\",\"country\":\"越南\",\"era\":\"近世\",\"year\":1471,\"period\":\"1471\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"迁徙·流亡\"],\"atmos\":[\"越南后黎朝南下\",\"占婆最后的首都被攻破\",\"一个文明的终结\",\"占族流散\"],\"sensory\":\"城破了，越南人的军队涌进来。有人抱着神像往南跑——再往南还留着一小块地，能撑上几百年，迟早也会被追上。\",\"note\":\"占婆都城阇盘（Vijaya）1471年被攻破，作为大国就此终结；残部退守南方的宾童龙，苟延到1832年才被阮朝最终吞并。占族至今散居越南南部与柬埔寨——\\\"消失的声音\\\"。\"}),\n  E({\"id\":\"ck226\",\"name\":\"吴哥（高棉帝国鼎盛期）\",\"en\":\"Khmer Angkor\",\"region\":\"东南亚\",\"country\":\"柬埔寨\",\"era\":\"中古\",\"year\":1250,\"period\":\"9-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"吴哥窟\",\"吴哥通王城\",\"巴戎寺的微笑面孔\",\"世界最大的宗教建筑\",\"水利帝国\"],\"sensory\":\"护城河宽得像一条湖。走过长长的堤道，五座莲花形的塔尖从丛林上方浮现。墙上刻满了浮雕——战争、日常生活、天堂与地狱，绵延几百米。巴戎寺的石头面孔从四面八方注视着你——都在微笑。\",\"note\":\"吴哥是中世纪世界最大的城市（鼎盛期人口可能达百万）。水利系统（baray）是帝国的命脉。\"}),\n  E({\"id\":\"ck227\",\"name\":\"吴哥·周达观眼中的真腊\",\"en\":\"Zhou Daguan's Angkor\",\"region\":\"东南亚\",\"country\":\"柬埔寨\",\"era\":\"中古\",\"year\":1296,\"period\":\"1296-1297\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"学问·书写\",\"贸易·商业\"],\"atmos\":[\"元朝使节周达观\",\"《真腊风土记》\",\"外来者视角\",\"市场上的中国商人\",\"日常风俗记录\"],\"sensory\":\"一个中国人在集市上走，眼睛不停地转。这里做买卖的都是女人。没人用筷子，都用手抓饭吃。国王出巡，骑在象背上，头顶一柄金伞。他把看见的全记下来。\",\"note\":\"《真腊风土记》是现存唯一的吴哥日常生活一手记录。外来者视角本身就是一种母题。\"}),\n  E({\"id\":\"ck228\",\"name\":\"吴哥的衰落与丛林吞噬\",\"en\":\"Angkor Abandoned\",\"region\":\"东南亚\",\"country\":\"柬埔寨\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"末世·终结\",\"丛林·热带\",\"迁徙·流亡\"],\"atmos\":[\"暹罗入侵\",\"首都南迁金边\",\"吴哥被弃\",\"丛林开始覆盖石头\",\"巨树缠绕庙宇\"],\"sensory\":\"城市空了。人走了之后树来了。榕树的根从石缝里钻出来，慢慢把墙壁撑开。石头面孔还在微笑，但看着它们的只有猴子了。\",\"note\":\"塔布笼寺（被巨树吞噬的寺庙）的现状就是这个坐标的\\\"时间快进\\\"版本。\"}),\n  E({\"id\":\"ck229\",\"name\":\"蒲甘·万塔平原\",\"en\":\"Bagan\",\"region\":\"东南亚\",\"country\":\"缅甸\",\"era\":\"中古\",\"year\":1250,\"period\":\"11-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"万塔之城\",\"上座部佛教\",\"平原上三千座佛塔\",\"缅甸文字创制\",\"伊洛瓦底江\"],\"sensory\":\"平原上到处是塔——近处的、远处的、红色的、白色的、金色的，一直延伸到地平线。每座塔里都有佛像。有人在往一座新塔的尖顶贴金箔。伊洛瓦底江在远处闪着光。\",\"note\":\"蒲甘平原的密集佛塔景观是人类建筑史上的奇观。\\\"手艺\\\"母题——每座塔都是一次功德行为。\"}),\n  E({\"id\":\"ck230\",\"name\":\"蒲甘·蒙古入侵\",\"en\":\"Mongol Sack of Bagan\",\"region\":\"东南亚\",\"country\":\"缅甸\",\"era\":\"中古\",\"year\":1287,\"period\":\"1287\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"忽必烈南征\",\"蒲甘王朝灭亡\",\"末代王弃城南逃\",\"万塔之城的余晖\"],\"sensory\":\"北边来了骑马的人，黑压压一片。听说国王已经往南逃了。有人爬上一座塔，刮下塔尖的金箔。塔还立着，可人都要走了。\",\"note\":\"蒙古扩张拍到东南亚的余波。末代王那罗梯诃波帝弃城南逃，史书记作\\\"逃避中国人的王\\\"；蒲甘王朝由此瓦解，缅甸分裂数百年。\"}),\n  E({\"id\":\"ck231\",\"name\":\"素可泰（泰·第一王朝）\",\"en\":\"Sukhothai\",\"region\":\"东南亚\",\"country\":\"泰国\",\"era\":\"中古\",\"year\":1450,\"period\":\"13-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"泰文字创制\",\"兰甘亨大帝碑文\",\"\\\"水中有鱼稻中有米\\\"\",\"上座部佛教\",\"行走佛\"],\"sensory\":\"石碑上的文字是新创的——据说是国王自己发明的，为了让百姓能读能写。碑文说\\\"想做买卖就做买卖，想种地就种地\\\"。莲花池边有一座佛像正在行走——一只脚在前面，衣角飘动。\",\"note\":\"兰甘亨碑文是泰文化的建国文献。素可泰的\\\"行走佛\\\"是泰国佛教艺术最独特的创造。\"}),\n  E({\"id\":\"ck232\",\"name\":\"阿瑜陀耶（大城）\",\"en\":\"Ayutthaya\",\"region\":\"东南亚\",\"country\":\"泰国\",\"era\":\"近世\",\"year\":1750,\"period\":\"14-18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"城市·都会\",\"战争·军事\"],\"atmos\":[\"暹罗最强盛的王朝\",\"水上都城\",\"日本人佣兵村\",\"国际贸易中心\",\"与缅甸的反复战争\"],\"sensory\":\"三条河在这里交汇，城市浮在水上。有一个区域住的全是日本人——他们给国王当侍卫。市场上有中国瓷器、印度布、阿拉伯香水、葡萄牙火枪。这座城被缅甸军队打过很多次——但每次都重建了。\",\"note\":\"大城是17世纪东南亚最国际化的城市之一。山田长政的日本人佣兵村是一个独特的文化交叉点。\"}),\n  E({\"id\":\"ck233\",\"name\":\"阿瑜陀耶陷落（缅甸灭亡大城）\",\"en\":\"Fall of Ayutthaya\",\"region\":\"东南亚\",\"country\":\"泰国\",\"era\":\"近代\",\"year\":1767,\"period\":\"1767\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"迁徙·流亡\"],\"atmos\":[\"缅甸军队攻破大城\",\"四百年王朝灭亡\",\"佛像被斩首\",\"大城变废墟\"],\"sensory\":\"城在燃烧。缅甸士兵砸佛像——砍下佛头，刮走身上的金。四百年的积累几天里烧成灰。幸存的人往南逃，有人说一个叫郑信的人在南边收拢残兵。\",\"note\":\"大城的佛像至今保持着被斩首的状态（除了著名的树根佛头）。废墟本身就是体验。\"}),\n  E({\"id\":\"ck234\",\"name\":\"曼谷（拉达那哥信/曼谷王朝初期）\",\"en\":\"Rattanakosin Bangkok\",\"region\":\"东南亚\",\"country\":\"泰国\",\"era\":\"近代\",\"year\":-1850,\"period\":\"1782-19世纪前半\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"河流·水乡\",\"城市·都会\",\"宫廷·王权\"],\"atmos\":[\"湄南河上的新首都\",\"水上市场\",\"大皇宫与玉佛寺\",\"从大城灰烬中重建的文明\"],\"sensory\":\"新首都建在河边，到处是运河，船比路多。大皇宫金光灿灿，照着烧成灰的大城一样样重建。水上市场天没亮就开了，热带水果堆满船头。\",\"note\":\"曼谷的水上生活和从大城废墟中\\\"复活\\\"的文化意志。\"}),\n  E({\"id\":\"ck235\",\"name\":\"室利佛逝（苏门答腊）\",\"en\":\"Srivijaya\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"中古\",\"year\":1250,\"period\":\"7-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"海上帝国\",\"佛教大中心（义净留学地）\",\"控制马六甲海峡\",\"几乎没留下建筑遗迹\"],\"sensory\":\"码头上桅杆林立，货堆成山——印度的、中国的、阿拉伯的船都靠在这儿。义净从广州渡海来，住下学梵语，再往印度去。这个帝国的力气全使在海上，岸上几乎不留痕迹。\",\"note\":\"室利佛逝强大了六百年但几乎没有地面遗迹——它是一个\\\"看不见的帝国\\\"。\"}),\n  E({\"id\":\"ck236\",\"name\":\"婆罗浮屠（爪哇·夏连特拉王朝）\",\"en\":\"Borobudur\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"中古\",\"year\":800,\"period\":\"约800-900\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"世界最大的佛教建筑\",\"曼荼罗形石造阶梯金字塔\",\"五百尊佛像\",\"火山环绕\"],\"sensory\":\"一座石头山——不，是人砌的。从底层往上走，墙上的浮雕一格接一格讲佛陀的一生。越往上浮雕越少，到了顶层什么图案都没了——只剩一圈钟形的石笼，每个笼子里关着一尊佛，远处的火山在冒烟。\",\"note\":\"婆罗浮屠的建筑结构本身就是一部佛教经典——从底层的\\\"欲界\\\"到顶层的\\\"无色界\\\"。后来被火山灰掩埋数百年。\"}),\n  E({\"id\":\"ck237\",\"name\":\"满者伯夷（爪哇·最后的印度教帝国）\",\"en\":\"Majapahit\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"中古\",\"year\":1550,\"period\":\"13-16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"加查·玛达统一群岛\",\"香料贸易控制权\",\"印度教-佛教混合\",\"伊斯兰化前夜\"],\"sensory\":\"宰相发过誓——不统一所有岛屿，就不尝帕拉帕（饭里的香料），顿顿吃寡淡的。如今整个群岛都打着他的旗号。可港口城里，改信伊斯兰教的商人越来越多，旧秩序在悄悄松动。\",\"note\":\"满者伯夷是东南亚最后一个大型印度教-佛教帝国。它的衰落与伊斯兰教在群岛的扩散同步。\"}),\n  E({\"id\":\"ck238\",\"name\":\"马六甲苏丹国\",\"en\":\"Malacca Sultanate\",\"region\":\"东南亚\",\"country\":\"马来西亚\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"海峡咽喉\",\"拜里迷苏拉建国\",\"伊斯兰传播中心\",\"中国郑和到访\",\"全球贸易节点\"],\"sensory\":\"海峡是条咽喉，所有的船都得打这儿过。每天几十艘——中国的宝船、阿拉伯的三角帆船、印度的商船。街上四种语言同时在响。郑和的使团卸下丝绸瓷器，装走胡椒和丁香。\",\"note\":\"马六甲是15世纪海上贸易网的咽喉，四方商旅在此交汇。伊斯兰教靠商人（而非征服）传遍东南亚。\"}),\n  E({\"id\":\"ck239\",\"name\":\"香料群岛·摩鹿加（丁香与肉豆蔻）\",\"en\":\"Spice Islands, Maluku\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"近世\",\"year\":1650,\"period\":\"15-17世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"殖民·帝国\",\"海洋·港口\"],\"atmos\":[\"丁香原产地\",\"肉豆蔻只在这里长\",\"全世界来抢的几座小岛\",\"葡萄牙荷兰争夺\"],\"sensory\":\"整座岛的空气都泡在丁香味里，浓得发甜。这些小树上结的东西，运到世界另一头，能换等重的金子。外来的船到了——先是一群说怪话的（葡萄牙人），后来又来一群（荷兰人）。他们为这几棵树打得头破血流。\",\"note\":\"人类历史上最早的全球贸易战就是为了这几座小岛上的香料。\"}),\n  E({\"id\":\"ck240\",\"name\":\"荷属东印度·巴达维亚（雅加达）\",\"en\":\"Dutch Batavia\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"城市·都会\",\"奴役·压迫\"],\"atmos\":[\"荷兰东印度公司总部\",\"殖民都市\",\"华人街区\",\"运河系统（模仿阿姆斯特丹）\",\"奴隶贸易\"],\"sensory\":\"热带城市里挖出一条条运河，照着阿姆斯特丹的样子——可在赤道的暑气里，运河成了发臭的死水，蚊子滋生，疟疾横行。荷兰人裹着欧洲的厚呢衣裳，热得淌汗，后面跟着爪哇仆人。华人街区自有一套规矩。\",\"note\":\"殖民城市规划的荒诞案例——把温带城市的运河照搬到赤道。\"}),\n  E({\"id\":\"ck241\",\"name\":\"西班牙殖民时期的马尼拉\",\"en\":\"Spanish Manila\",\"region\":\"东南亚\",\"country\":\"菲律宾\",\"era\":\"近世\",\"year\":1850,\"period\":\"16-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"圣奥古斯丁教堂\",\"马尼拉大帆船贸易\",\"中国丝绸换墨西哥白银\",\"城中城（Intramuros）\"],\"sensory\":\"石头城墙圈起西班牙人的世界——教堂、广场、修道院。墙外是混杂的亚洲。港口里泊着开往墨西哥的大帆船，去时满舱中国丝绸，回来满舱白银。把这些货扛上船的，是菲律宾人的脊背。\",\"note\":\"马尼拉大帆船贸易是16-19世纪全球经济的重要动脉：中国丝绸 → 马尼拉 → 阿卡普尔科 → 墨西哥白银 → 马尼拉 → 中国。\"}),\n  E({\"id\":\"ck242\",\"name\":\"菲律宾·前殖民时期的巴朗盖\",\"en\":\"Pre-colonial Barangay\",\"region\":\"东南亚\",\"country\":\"菲律宾\",\"era\":\"中古\",\"year\":-1550,\"period\":\"10-16世纪（西班牙到来前）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"海洋·港口\",\"学问·书写\"],\"atmos\":[\"巴朗盖（barangay\",\"小型政治单位）\",\"达图（首领）\",\"纹身文化\",\"海洋民族\",\"口传史诗\"],\"sensory\":\"海边的村落里，达图坐在最大的屋子里裁决纠纷。他的手臂上满是纹身——每个图案都有含义。有人在唱一首很长的歌——不是为了娱乐，而是为了记住历史。远处有人在造一艘新船。\",\"note\":\"西班牙到来前的菲律宾不是\\\"蛮荒\\\"——有成熟的政治结构、贸易网络和文字系统（贝贝因文字）。\"}),\n  E({\"id\":\"ck243\",\"name\":\"缅甸·曼德勒（贡榜王朝末期）\",\"en\":\"Royal Mandalay\",\"region\":\"东南亚\",\"country\":\"缅甸\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪后半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"殖民·帝国\"],\"atmos\":[\"最后的缅甸王朝\",\"曼德勒皇宫（新建的木造宫殿）\",\"英缅战争前夜\",\"柚木建筑\"],\"sensory\":\"整座宫殿是木头建的——柚木的香气弥漫。护城河里映着金色的塔尖。但英国人已经占了下缅甸。国王还在宫里下棋。\",\"note\":\"曼德勒皇宫在二战中被烧毁。\\\"废墟之前\\\"。\"}),\n  E({\"id\":\"ck244\",\"name\":\"法属印度支那·西贡（殖民日常）\",\"en\":\"French Saigon\",\"region\":\"东南亚\",\"country\":\"越南\",\"era\":\"近代\",\"year\":-1850,\"period\":\"19世纪末-20世纪前半\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"市井·庶民\",\"奴役·压迫\"],\"atmos\":[\"东方巴黎\",\"法式咖啡馆\",\"橡胶种植园\",\"殖民者与被殖民者的两个世界\"],\"sensory\":\"法国人在河边的咖啡馆读报。越南人在老城区的巷子里卖粉。一座红色的大教堂立在广场中间——在热带的阳光下看起来有点突兀。种植园里的苦力天亮前就要起来割橡胶。\",\"note\":\"与河内的法属坐标平行——一北一南，殖民体验的两个版本。西贡的\\\"东方巴黎\\\"标签掩盖了种植园经济的残酷。\"}),\n  E({\"id\":\"ck245\",\"name\":\"英属缅甸·仰光\",\"en\":\"British Rangoon\",\"region\":\"东南亚\",\"country\":\"缅甸\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪末-1940s\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"城市·都会\",\"贸易·商业\"],\"atmos\":[\"大金塔与殖民建筑并存\",\"印度商人街区\",\"乔治·奥威尔的缅甸\",\"多族群城市\"],\"sensory\":\"大金塔在任何角度都能看到——金色的，巨大的。它的脚下是英国人建的法院和银行。印度人经营着市场，华人经营着米店。奥威尔那种英国小官僚的烦闷弥漫在殖民者的俱乐部里。\",\"note\":\"乔治·奥威尔曾在缅甸当殖民警察，他的《缅甸岁月》就是这个时空的写照。\"}),\n  E({\"id\":\"ck246\",\"name\":\"澜沧·琅勃拉邦（万象之国）\",\"en\":\"Lan Xang\",\"region\":\"东南亚\",\"country\":\"老挝\",\"era\":\"近世\",\"year\":1650,\"period\":\"14-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"河流·水乡\",\"山地·高原\"],\"atmos\":[\"法昂建国\",\"\\\"百万大象·白伞之邦\\\"\",\"湄公河畔的琅勃拉邦\",\"上座部佛教\",\"塔銮金塔\",\"勃拉邦金佛\",\"群山环抱\",\"托钵僧清晨化缘\"],\"sensory\":\"天刚亮，一列披橙袍的僧人赤脚走过街巷，沿门接受人们跪着递上的糯米饭，谁也不说话。城枕着湄公河，背后是连绵青山，河边金顶佛塔在晨雾里发亮。庙里供着一尊从外邦请来的金佛，是护国之宝。山里牵下来的大象排成队——这国号称有\\\"百万头象\\\"。\",\"note\":\"澜沧（Lan Xang，\\\"百万大象\\\"之意）由法昂于1353年建立，是老挝历史上第一个统一王国，以琅勃拉邦、后以万象为都，奉上座部佛教。塔銮金塔、勃拉邦金佛是其象征。它夹在缅、暹、越之间的群山里，18世纪初分裂为三。\"}),\n  E({\"id\":\"ck247\",\"name\":\"米南加保（世界最大的母系社会）\",\"en\":\"Minangkabau\",\"region\":\"东南亚\",\"country\":\"印尼·米南加保\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以近世最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"女性空间\",\"市井·庶民\",\"山地·高原\"],\"atmos\":[\"苏门答腊高地\",\"房产田地循母系传给女儿\",\"牛角形屋顶的\\\"大屋\\\"（rumah gadang）\",\"男子\\\"嫁入\\\"妻家\",\"男人外出闯荡的\\\"游方\\\"（merantau）\",\"母系习俗与伊斯兰并存\"],\"sensory\":\"高地上一排弯翘如水牛角的屋顶，那是女人家族的\\\"大屋\\\"，房子和田地都顺母亲一脉传给女儿。新郎是被迎进妻子娘家的，夜里来、天亮走，家里舅舅比父亲更管事。年轻男人成群离乡去外地讨生活、求学问——这叫\\\"游方\\\"，闯出名堂再回来。清真寺的宣礼声照样按时响，和这套母系规矩并行不悖。\",\"note\":\"苏门答腊高地的米南加保人是世界上现存最大的母系社会：房产、田地、祖屋（牛角顶的rumah gadang）沿女性继承，男子婚后\\\"嫁入\\\"妻家，舅权重于父权。男人有外出闯荡（merantau）的传统。难得的是，这套母系习俗与虔诚的伊斯兰信仰长期共存（\\\"习俗依于教法，教法依于经典\\\"）。\"}),\n  E({\"id\":\"ck248\",\"name\":\"托拉查（给死者换衣的悬崖葬）\",\"en\":\"Toraja\",\"region\":\"东南亚\",\"country\":\"印尼·苏拉威西\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以近世最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"宗教·信仰\",\"山地·高原\"],\"atmos\":[\"苏拉威西高地\",\"船形屋顶的\\\"东孔南\\\"祖屋\",\"隆重到拖延数月数年的葬礼\",\"宰水牛与猪\",\"崖壁上凿洞安棺\",\"悬在崖边的木雕人偶（tau-tau）\",\"每隔几年请尸体出来重新换衣（ma'nene）\"],\"sensory\":\"山谷里一排船形屋顶的祖屋，正办一场盛大的葬礼——逝者\\\"病\\\"了好几个月，今天才真正送走。一头头水牛被牵到场中宰杀，血淌一地，宾客上百。崖壁高处凿出一个个方洞安放棺木，洞外木栏上立着一排和死者面容相似的木偶，居高俯视村子。隔些年，人们还会把先人请出墓来，擦拭、换上新衣。\",\"note\":\"苏拉威西高地的托拉查人以繁复的死亡仪式著称：葬礼（Rambu Solo）耗资巨大、常拖延数月乃至数年，期间逝者被视为\\\"生病\\\"而非死亡；仪式上宰杀大量水牛与猪。死者葬于崖壁凿出的洞中，崖外立木雕人偶（tau-tau）守望；隔数年举行\\\"马内内\\\"（ma'nene），把遗体请出重新清理换衣。船形屋顶的东孔南（tongkonan）是其祖屋。\"}),\n  E({\"id\":\"ck249\",\"name\":\"苏禄海·巴瑶（一辈子在海上的人）\",\"en\":\"Sulu Sea\",\"region\":\"东南亚\",\"country\":\"菲律宾·苏禄\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"迁徙·流亡\"],\"atmos\":[\"苏禄苏丹国（珍珠·海参·玳瑁的海上贸易）\",\"对西属菲律宾的劫掠（\\\"摩洛海盗\\\"）\",\"巴瑶/沙马\\\"海上吉普赛\\\"\",\"一生住在船上·徒手深潜\",\"几乎不上岸的无国籍之民\"],\"sensory\":\"浅海上散布着一艘艘小小的船屋，一家人吃住都在船上，很少踏上陆地。男人不带任何器具就翻身潜下海去，在海底待得久得吓人，摸上来海参、珍珠和玳瑁。这些被运到苏丹的港口，换成布匹和铁。海面那头，几条快船正备着武器——要去北边西班牙人的海岸劫人掠货。\",\"note\":\"苏禄苏丹国（约15世纪起，以霍洛岛为中心）靠珍珠、海参、玳瑁的海上贸易致富，并长期劫掠西属菲律宾（西班牙人称\\\"摩洛海盗\\\"）。苏禄海的巴瑶/沙马人（Sama-Bajau）是著名的\\\"海上游牧民\\\"，世代住在船屋上、徒手深潜采捞，几乎不上岸，长期没有国籍。\"}),\n  E({\"id\":\"ck250\",\"name\":\"孟族·勃固（信桫布女王与大金塔）\",\"en\":\"Mon Pegu\",\"region\":\"东南亚\",\"country\":\"缅甸·孟族\",\"era\":\"中古\",\"year\":1550,\"period\":\"13-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"海洋·港口\",\"宫廷·王权\"],\"atmos\":[\"孟人（把上座部佛教与印度文化最早传入中南半岛）\",\"汉达瓦底/勃固王国\",\"罕见的女王信桫布（用等身黄金布施大金塔）\",\"达摩悉提的戒律改革\",\"仰光大金塔（瑞光大金塔）\"],\"sensory\":\"港城的集市上，孟人商贩卖着稻米、鱼露和棉布，说着一种和缅语不同的话。城外那座覆满金箔的大金塔越修越高，塔尖嵌着宝石——传说一位女王曾把和自己等重的黄金施出来给它贴金。塔下，僧人正按新近从锡兰请回的戒律重新受戒。\",\"note\":\"孟人是最早把上座部佛教与印度文化传入中南半岛的民族之一。汉达瓦底（勃固）王国（13-16世纪）是其鼎盛期，出过罕见的女王信桫布（Shin Sawbu，15世纪），传说她以等身黄金为仰光大金塔贴金；其继任者达摩悉提推行戒律改革。大金塔（瑞光大金塔）至今是缅甸的精神象征。\"}),\n  E({\"id\":\"ck251\",\"name\":\"斯基泰人（黑海北岸草原）\",\"en\":\"The Scythians\",\"region\":\"中亚·草原\",\"country\":\"欧亚草原\",\"era\":\"古典\",\"year\":-250,\"period\":\"前7-前3世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"工艺·手艺\",\"死亡·葬仪\"],\"atmos\":[\"骑马民族\",\"黄金饰品（动物纹）\",\"希罗多德的记载\",\"头皮战利品\",\"马奶酒\",\"库尔干墓葬\"],\"sensory\":\"风从草上一路压过来，没有一棵树挡。一队骑手掠过，马鞍上的金饰晃眼，皮衣上绣着蜷起身子的鹿、展翅的鹰。近处有人支起毡帐，毛毡一压，里头就挡住了风。远处一个巨大的土坑正挖开——人要和他的马一起埋进去，连金器带酒。\",\"note\":\"斯基泰黄金艺术（动物纹风格）是草原文明审美的源头。希罗多德的记载，是定居世界打量草原人的最早一份长篇文字。\"}),\n  E({\"id\":\"ck252\",\"name\":\"匈奴·龙城（冒顿单于时期）\",\"en\":\"Xiongnu of Modu\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"古典\",\"year\":-150,\"period\":\"前3-前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"宫廷·王权\",\"战争·军事\"],\"atmos\":[\"冒顿鸣镝弑父\",\"统一草原\",\"白登之围\",\"与汉朝的和亲与战争\",\"龙城祭天\"],\"sensory\":\"草原上一夜之间立起数不清的帐篷。龙城不是城，是逐水草的人一年一度的聚处。单于的大帐顶上包着金，老远就反光。有人开弓，箭头是空心的，离弦时尖啸一声——据说这支响箭射向哪里，所有人的箭就跟向哪里。\",\"note\":\"匈奴是第一个统一蒙古高原的游牧帝国。冒顿的\\\"鸣镝\\\"故事是草原权力政治的原型。\"}),\n  E({\"id\":\"ck253\",\"name\":\"匈奴·汉匈和亲\",\"en\":\"Han–Xiongnu Marriage\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"婚恋·求爱\",\"迁徙·流亡\",\"草原·游牧\"],\"atmos\":[\"和亲公主\",\"从长安到草原的旅程\",\"昭君出塞（后世化用）\",\"文化冲击\"],\"sensory\":\"车队出了城门，城墙在身后越来越矮，最后什么也看不见了。往后的路只有草和沙。到了地方，住进毡帐，吃羊肉，喝酸马奶。夜里风刮得帐篷绳直响，星星密得没有缝。\",\"note\":\"和亲视角——一个定居文明的人被送入游牧世界的体验。\"}),\n  E({\"id\":\"ck254\",\"name\":\"楼兰（罗布泊畔）\",\"en\":\"Loulan\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪-4世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"沙漠·绿洲\",\"贸易·商业\",\"末世·终结\"],\"atmos\":[\"罗布泊绿洲\",\"丝路南道枢纽\",\"佉卢文书\",\"楼兰美女（干尸）\",\"水源枯竭后消亡\"],\"sensory\":\"绿洲比想象的小，几道水渠引来的水养着一小片胡杨和麦田。商队在这里灌满皮囊。有人蹲在阴凉里往木牍上写字，字母圆头圆脑，一个也不认得。几百年后这里只剩沙——但此刻水还在流。\",\"note\":\"楼兰是丝路最著名的消亡城市。\\\"废墟之前\\\"的终极案例——一座因水源枯竭而消失的城。\"}),\n  E({\"id\":\"ck255\",\"name\":\"龟兹（库车·佛教王国）\",\"en\":\"Kucha\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"古典\",\"year\":750,\"period\":\"3-8世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"学问·书写\"],\"atmos\":[\"克孜尔千佛洞\",\"龟兹乐舞（传入唐朝成为宫廷乐）\",\"鸠摩罗什的故乡\",\"印度与中国的文化中转站\"],\"sensory\":\"石窟里的壁画颜色浓得发亮——那种蓝来自磨碎的青金石，石料从巴达克山翻山运来。有人弹一把弯颈琵琶，舞者拧着腰，胯一沉一送，是中原没有的舞姿。墙角一个僧人把梵文经卷一句句念成汉话。\",\"note\":\"龟兹乐舞传入中国后深刻影响了唐代音乐。鸠摩罗什是最伟大的佛经翻译家之一——龟兹人，精通梵语和汉语。\"}),\n  E({\"id\":\"ck256\",\"name\":\"于阗（和田·玉石之路）\",\"en\":\"Khotan Jade Kingdom\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪-11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"和田玉\",\"昆仑山下的佛国\",\"大乘佛教中心\",\"造纸术西传\",\"丝绸与玉石\"],\"sensory\":\"玉龙喀什河的河床里有人弯腰摸玉——白的、青的，沾了水更润。这些石头要顺着商道走上几个月，才到中原皇帝的库里。城里寺庙一座挨一座，殿门贴金——这个小国把进项几乎都供给了佛。\",\"note\":\"和田玉贸易的历史比丝绸之路还早——\\\"玉石之路\\\"可能是人类最古老的长距离贸易路线之一。\"}),\n  E({\"id\":\"ck257\",\"name\":\"高昌（吐鲁番·多元共存）\",\"en\":\"Gaochang, Turpan\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"中古\",\"year\":850,\"period\":\"5-9世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"沙漠·绿洲\",\"饮食·宴席\"],\"atmos\":[\"火焰山下的绿洲\",\"汉人王国在西域\",\"摩尼教壁画\",\"葡萄与葡萄酒\",\"玄奘路过\"],\"sensory\":\"晌午热得像站在炉口，城北那道山岭赭红，褶子一条条，远看真像在烧。坎儿井从地底把雪山的水引进来，这片绿洲才活着。城里佛寺和摩尼寺隔街相望——摩尼僧一身白衣，画的壁画跟佛寺里的全不是一路。墙根有人在踩葡萄酿酒。\",\"note\":\"高昌是汉人在西域建立的独立王国，文化上极度多元——佛教、摩尼教、景教并存。吐鲁番的坎儿井把天山雪水沿地下暗渠引来，是绿洲赖以存活的命脉。\"}),\n  E({\"id\":\"ck258\",\"name\":\"丝路商队·路上\",\"en\":\"Silk Road Caravan\",\"region\":\"中亚·草原\",\"country\":\"跨区域\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪-15世纪（通时代）\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"沙漠·绿洲\",\"迁徙·流亡\"],\"atmos\":[\"骆驼铃声\",\"沙暴\",\"星空导航\",\"驿站\",\"粟特商人\",\"没有人走完全程\"],\"sensory\":\"驼铃响了二十天，耳朵里全是它。白天晒得睁不开眼，夜里冷得骨头发疼。前面终于出现一座驿站，可以补水了。队里有人说粟特话，有人说波斯话，做买卖靠手势加几个通用词。没人会一路从长安走到罗马——同一批货，要在路上换好几手主人。\",\"note\":\"跨区域路线坐标。丝路的核心真相是\\\"没有人走完全程\\\"——货物通过接力贸易传递。\"}),\n  E({\"id\":\"ck259\",\"name\":\"突厥汗国（鄂尔浑河谷）\",\"en\":\"Göktürk Khaganate\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":750,\"period\":\"6-8世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"宫廷·王权\",\"工艺·手艺\"],\"atmos\":[\"阿史那氏\",\"狼图腾\",\"从阿尔泰山的铁匠到帝国\",\"突厥石人\",\"鄂尔浑碑文\"],\"sensory\":\"鄂尔浑河边立着一通巨大的石碑，凿满了突厥文字。碑前一列石人，据说每一尊都对应墓主生前杀过的一个敌人。不远处铁匠抡锤打铁，火星四溅——这个部族当年就是在阿尔泰山给柔然人打铁的锻奴。\",\"note\":\"突厥从阿尔泰山的铁匠奴隶崛起为横跨欧亚的帝国——\\\"从奴隶到主人\\\"的原型故事。鄂尔浑碑文是突厥语最早的文字记录。\"}),\n  E({\"id\":\"ck260\",\"name\":\"回鹘汗国/回鹘佛国\",\"en\":\"Uyghur Khaganate\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"中古\",\"year\":1250,\"period\":\"8-13世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"宗教·信仰\",\"学问·书写\"],\"atmos\":[\"从草原迁入绿洲\",\"摩尼教国教\",\"后转向佛教\",\"游牧到定居的转型\"],\"sensory\":\"这些人从前住毡帐，如今搬进了土坯房。带来的还是草原上的调子，可墙上画的是摩尼教的明尊和光明使者。有人在用回鹘字母抄经——这套字母，往后蒙古人会拿去用。\",\"note\":\"回鹘文后来被蒙古帝国采用，又演变为满文。文字的接力传承。\"}),\n  E({\"id\":\"ck261\",\"name\":\"蒙古高原（成吉思汗统一前夜）\",\"en\":\"Temüjin's Steppe\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":1150,\"period\":\"12世纪末\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"战争·军事\",\"迁徙·流亡\"],\"atmos\":[\"部落混战\",\"铁木真的少年\",\"被仇敌追杀\",\"从流亡者到统一者\"],\"sensory\":\"部落之间整年地互相劫掠。一个年轻人带着几个伙伴躲进不儿罕山的密林——父亲被塔塔儿人毒死，新婚的妻子被篾儿乞人抢走。他还没有还得起手，先把人聚起来。\",\"note\":\"成吉思汗崛起前的草原，是个没有共主、人人相互劫掠的世界——抢牛羊、抢草场、抢女人，今天的安答明天就反目。\"}),\n  E({\"id\":\"ck262\",\"name\":\"哈拉和林（蒙古帝国首都）\",\"en\":\"Karakorum\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":1250,\"period\":\"13世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"宫廷·王权\"],\"atmos\":[\"蒙古帝国的心脏\",\"世界各地的工匠被掳来建城\",\"鲁布鲁克的记载\",\"银树喷泉\"],\"sensory\":\"草原正中凭空起了一座城——城里有汉地工匠、波斯工匠、欧洲工匠，都是被掳来盖宫殿的。宫殿前立着一棵巨大的银树，四条银蛇盘在树干上，张口往银池里淌酒：马奶酒、葡萄酒、米酒、蜂蜜酒，各是一条。这树是个被掳来的巴黎金匠造的。\",\"note\":\"鲁布鲁克（受法王路易九世派遣的方济各会修士）对哈拉和林的描写是中世纪最精彩的旅行记之一。银树喷泉由巴黎金匠纪尧姆·布歇制作。\"}),\n  E({\"id\":\"ck263\",\"name\":\"蒙古西征·花剌子模的灭亡\",\"en\":\"Fall of Khwarazm\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"中古\",\"year\":1219,\"period\":\"1219-1221\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"殖民·帝国\"],\"atmos\":[\"成吉思汗亲征\",\"撒马尔罕陷落\",\"屠城\",\"一个使节被杀引发的报复\",\"中亚文明的断裂\"],\"sensory\":\"撒马尔罕的城墙又高又厚，蒙古人却驱着俘虏走在最前面填壕、挡箭。城破，工匠被一个个挑出来留下，剩下的人……随后，引水的暗渠被一道道掘断——养了几百年的绿洲，开始退回沙。\",\"note\":\"蒙古对花剌子模的报复性灭绝是中亚历史的分水岭——许多城市的灌溉系统被永久破坏，繁荣的绿洲退化为荒漠。\"}),\n  E({\"id\":\"ck264\",\"name\":\"蒙古驿站（站赤系统）\",\"en\":\"Mongol Yam Relay\",\"region\":\"中亚·草原\",\"country\":\"跨区域\",\"era\":\"中古\",\"year\":1350,\"period\":\"13-14世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"迁徙·流亡\",\"贸易·商业\"],\"atmos\":[\"遍布欧亚的邮驿系统\",\"牌符（通行证）\",\"马匹接力\",\"信息的速度\"],\"sensory\":\"走上几十里就有一座驿站。你亮出牌符——铜牌、银牌还是金牌，定了你换几匹马、吃什么住什么。换一匹脚力足的新马，扒几口热食，接着赶路。一桩急报从大都送到波斯，据说只要几周。\",\"note\":\"站赤系统是人类历史上第一个横跨欧亚的通信网络。\\\"路上\\\"母题的制度化版本。\"}),\n  E({\"id\":\"ck265\",\"name\":\"撒马尔罕（帖木儿帝国）\",\"en\":\"Timurid Samarkand\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"中古\",\"year\":1350,\"period\":\"14世纪末-15世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"宫廷·王权\"],\"atmos\":[\"帖木儿大帝\",\"比比·哈努姆大清真寺\",\"蓝色瓷砖\",\"从各地掳来的工匠重建城市\",\"蒙古屠城之后的重生\"],\"sensory\":\"比比·哈努姆大清真寺的巨穹刚封顶——蓝色和金色的瓷砖在日头下晃得睁不开眼。帖木儿把德里、大马士革、巴格达最好的工匠都掳了来，连印度的大象也牵来驮石料，要他们在这里盖出世上最大的清真寺。工匠里有人一边砌墙一边掉泪。\",\"note\":\"撒马尔罕是\\\"以掠夺创造文明\\\"的极端案例——帖木儿毁灭了半个亚洲，但用掳来的资源和人才把撒马尔罕变成了世界上最华丽的城市。\"}),\n  E({\"id\":\"ck266\",\"name\":\"撒马尔罕（兀鲁伯天文台）\",\"en\":\"Ulugh Beg's Observatory\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"近世\",\"year\":-1450,\"period\":\"15世纪前半\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宫廷·王权\"],\"atmos\":[\"帖木儿的孙子兀鲁伯\",\"中世纪最精确的天文观测\",\"巨型六分仪\",\"学者的撒马尔罕\"],\"sensory\":\"山坡上嵌着一道巨大的弧形石轨——是测量天体的六分仪，弧身大到人能弯腰走进沟里。入夜后有人沿着刻度记下星辰过中天的位置，比当时任何地方都准。这座天文台的主人，是个更想算星星、不太想当国王的王子。\",\"note\":\"兀鲁伯的星表精确度直到17世纪望远镜发明前都未被超越。他后来被自己的儿子杀了。\"}),\n  E({\"id\":\"ck267\",\"name\":\"布哈拉（学术与宗教中心）\",\"en\":\"Bukhara\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"中古\",\"year\":1550,\"period\":\"9-16世纪（通时代，取萨曼王朝或帖木儿后期）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"医疗·身体\"],\"atmos\":[\"伊斯兰学术中心\",\"经学院林立\",\"伊本·西纳（阿维森纳）的故乡\",\"丝路上的大学城\",\"地毯贸易\"],\"sensory\":\"整座城几乎就是一所学校——经学院和清真寺一座连一座。庭院里学生在辩神学、辩医理。一个年轻人捧着一部医典，据说出自本地一位前辈之手，如今连欧洲人都在把它译成拉丁文。巴扎里地毯一卷卷铺开，像在地上摊了一片花园。\",\"note\":\"伊本·西纳（阿维森纳）的《医典》是中世纪世界最重要的医学著作。布哈拉是中亚知识传统的核心。\"}),\n  E({\"id\":\"ck268\",\"name\":\"准噶尔汗国\",\"en\":\"Dzungar Khanate\",\"region\":\"中亚·草原\",\"country\":\"西域·新疆\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"战争·军事\",\"末世·终结\"],\"atmos\":[\"最后的游牧帝国\",\"与清朝的百年战争\",\"噶尔丹\",\"乾隆灭准噶尔\",\"种族灭绝\"],\"sensory\":\"天山北麓的草原上，准噶尔人的毡帐还连成片。这一仗他们和清朝打了快一百年——从康熙打到乾隆。可这一回开进来的清军，不是来打仗的，是来把人一个不剩地清掉的。\",\"note\":\"准噶尔是欧亚草原最后一个独立的游牧帝国。清朝对准噶尔的灭亡战争造成了约80%的人口消亡。极重坐标，conflict专属。\"}),\n  E({\"id\":\"ck269\",\"name\":\"大博弈时期的中亚（英俄角力）\",\"en\":\"The Great Game\",\"region\":\"中亚·草原\",\"country\":\"乌兹别克斯坦\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"殖民·帝国\",\"宫廷·王权\",\"战争·军事\"],\"atmos\":[\"英国与俄国的地缘博弈\",\"探险家和间谍\",\"布哈拉/希瓦/浩罕被吞并\",\"中亚最后的独立汗国\"],\"sensory\":\"布哈拉的埃米尔坐立不安——北面的俄国人一年年往南压，南面的英国人从印度那头悄悄探进来。市集上混进来一个穿本地长袍的人，可他眼珠的颜色不对。据说是来偷画地图的。\",\"note\":\"大博弈是19世纪英俄争夺中亚的角力。中亚各汗国成了两大帝国之间的棋子。\"}),\n  E({\"id\":\"ck270\",\"name\":\"蒙古草原的日常（通时代）\",\"en\":\"Steppe Nomad Life\",\"region\":\"中亚·草原\",\"country\":\"蒙古\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"节庆·仪式\",\"饮食·宴席\"],\"atmos\":[\"蒙古包（格尔）\",\"转场游牧\",\"马奶酒（艾日格）\",\"那达慕\",\"天地之间只有风和草\"],\"sensory\":\"天压得很低，草一直铺到天边。一家人在拆蒙古包——今天转场，跟着牛羊去下一片草场。马奶在皮囊里发着酵，倒出来一股酸气。孩子骑在一匹只比他高一点的马上，跑得比大人还快。入夜四下没有一星灯火，可星子密得发亮，像头顶上还压着另一层地面。\",\"note\":\"场所/生活方式型坐标。游牧生活的核心体验——移动本身就是存在方式，不是\\\"去某个地方\\\"，而是\\\"一直在路上\\\"。\"}),\n  E({\"id\":\"ck271\",\"name\":\"粟特商人（丝路上真正的生意人）\",\"en\":\"The Sogdians\",\"region\":\"中亚·草原\",\"country\":\"粟特\",\"era\":\"中古\",\"year\":750,\"period\":\"约4-8世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"城市·都会\",\"宗教·信仰\"],\"atmos\":[\"撒马尔罕·片治肯特的伊朗系商人\",\"粟特语是丝路的通用语\",\"沿路设商栈·在长安开\\\"胡店\\\"\",\"贩丝绸·宝石·麝香\",\"带来葡萄酒与胡旋舞\",\"祆教/摩尼/景教并行\"],\"sensory\":\"驼队歇在驿栈，卸下丝绸、香料和一袋袋亮晶晶的宝石。掌柜操着一口谁都听得懂的粟特话点货、记账——这话从这头一直通到长安。墙上画着深目高鼻、穿翻领窄袖袍的人宴饮。一个胡商解开酒囊倒出葡萄酒，又招呼伙计跳那转得人眼花的舞。\",\"note\":\"粟特人是中亚（撒马尔罕、布哈拉、片治肯特一带）的伊朗系商业民族，4-8世纪几乎垄断丝绸之路贸易，粟特语成为商路通用语。他们沿途建商栈、在唐朝都市开\\\"胡店\\\"，把葡萄酒、胡旋舞、祆教/摩尼教/景教一并带入中国。片治肯特的宴饮壁画是其遗存。安禄山即有粟特血统。\"}),\n  E({\"id\":\"ck272\",\"name\":\"大宛·汗血马（汉武帝为它发兵）\",\"en\":\"Ferghana Horses\",\"region\":\"中亚·草原\",\"country\":\"大宛·费尔干纳\",\"era\":\"古典\",\"year\":-150,\"period\":\"前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"贸易·商业\",\"山地·高原\"],\"atmos\":[\"费尔干纳谷地的\\\"大宛\\\"\",\"流汗如血的\\\"天马\\\"\",\"汉武帝两度发兵远征求马\",\"随马带回苜蓿与葡萄\",\"城里有酿葡萄酒的希腊化遗风\"],\"sensory\":\"山谷里水草丰美，骏马成群——有几匹奔跑久了，肩上沁出红色的汗，像在淌血。东边来的使者捧着金马想换种马，被回绝了，几年后东边便发来大军。城里有人会酿葡萄酒，宅院样式还带着遥远希腊的影子。最终东边的人带走了良马，也带走了苜蓿草籽和葡萄藤。\",\"note\":\"大宛位于费尔干纳谷地，以\\\"汗血马\\\"（天马，流汗带红色，或因寄生虫所致）闻名。汉武帝为求良种两度派李广利远征（前104-前101\\\"天马之战\\\"），并随之引入苜蓿、葡萄。当地受希腊化影响，有酿酒传统。这是汉与中亚直接军事接触的标志性事件。\"}),\n  E({\"id\":\"ck273\",\"name\":\"怛罗斯之战（造纸术西去的那一仗）\",\"en\":\"Battle of Talas\",\"region\":\"中亚·草原\",\"country\":\"中亚·怛罗斯\",\"era\":\"中古\",\"year\":751,\"period\":\"751\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"学问·书写\",\"迁徙·流亡\"],\"atmos\":[\"唐将高仙芝远征中亚\",\"撞上东扩的阿拉伯（阿拔斯）大军\",\"葛逻禄人临阵倒戈\",\"唐军大败\",\"被俘的工匠把造纸术传向西方\",\"唐势力退出中亚\"],\"sensory\":\"两支远道而来的大军在河边对峙——一边是翻过葱岭来的唐军，一边是从西边压来的黑衣大食。打到第五天，唐军侧翼的草原部落突然倒戈，阵脚一下垮了。溃退的尘土里，几个会造纸的随军工匠被俘往西去。几十年后，撒马尔罕开始出产洁白的纸。\",\"note\":\"751年怛罗斯之战，唐安西节度副使高仙芝率军西进，与阿拔斯王朝（黑衣大食）大军在怛罗斯河（今哈萨克/吉尔吉斯边境）激战；唐军盟军葛逻禄人临阵倒戈，唐军大败。被俘的中国工匠据传将造纸术传入撒马尔罕，再经阿拉伯世界传向欧洲。此战后唐势力渐退出中亚。\"}),\n  E({\"id\":\"ck274\",\"name\":\"喀喇汗·喀什噶尔（第一个突厥穆斯林王朝）\",\"en\":\"Kara-Khanid Kashgar\",\"region\":\"中亚·草原\",\"country\":\"喀喇汗\",\"era\":\"中古\",\"year\":1150,\"period\":\"10-12世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\",\"城市·都会\"],\"atmos\":[\"第一个皈依伊斯兰的突厥王朝\",\"萨图克·布格拉汗\",\"喀什噶尔与八剌沙衮\",\"《突厥语大词典》（马赫穆德·喀什噶里）\",\"《福乐智慧》\",\"突厥与伊斯兰的交汇\",\"丝路绿洲城\"],\"sensory\":\"绿洲城里，新起的清真寺旁还留着老佛寺的残墙——这一代人刚换了信仰。集市上突厥话、波斯话、阿拉伯话混着喊价。一位学者伏案，把各部落的突厥词一条条记下、画一张以汗廷为中心的圆形世界地图。另一处有人在用突厥语写一部讲为君之道的长诗。\",\"note\":\"喀喇汗王朝（约840-1212）是第一个皈依伊斯兰的突厥王朝（萨图克·布格拉汗约10世纪改宗），以喀什噶尔、八剌沙衮为中心。马赫穆德·喀什噶里的《突厥语大词典》（约1074，附一幅圆形世界地图）与玉素甫的《福乐智慧》是突厥-伊斯兰文化的奠基之作，标志草原突厥与伊斯兰文明的融合。\"}),\n  E({\"id\":\"ck275\",\"name\":\"巴泽雷克（阿尔泰冻土里的刺青木乃伊）\",\"en\":\"Pazyryk Tombs\",\"region\":\"中亚·草原\",\"country\":\"阿尔泰·斯基泰\",\"era\":\"古典\",\"year\":-250,\"period\":\"约前6-前3世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"工艺·手艺\",\"草原·游牧\"],\"atmos\":[\"阿尔泰山的斯基泰系游牧民\",\"永冻层封住的大墓\",\"皮肤上繁复的动物纹刺青\",\"世界最古老的打结地毯\",\"毡毯·木车·黄金马具\",\"被冰封存了两千多年\"],\"sensory\":\"高山草甸上堆着一座石冢，底下墓室早被永冻层冻成冰窖。里头一具尸身千年不腐，手臂和肩背刺满盘绕的鹿、狮鹫和卷曲怪兽。陪葬的有色彩还鲜的毡毯、一整张打结的地毯，和驾过的木车。给马戴的具上，金箔的角和兽还闪着光。\",\"note\":\"巴泽雷克（Pazyryk）是阿尔泰山区前6-前3世纪的斯基泰系游牧文化。墓室被永冻层封存，有机物保存惊人：刺满动物纹身的木乃伊（如\\\"乌科克公主\\\"/冰封少女）、世界上现存最古老的打结绒毯、毡挂毯、木车与黄金马具。这些是草原游牧艺术与生活最鲜活的实证。\"}),\n  E({\"id\":\"ck276\",\"name\":\"西伯利亚·萨满诸族（\\\"萨满\\\"一词的故乡）\",\"en\":\"Siberian Shamans\",\"region\":\"中亚·草原\",\"country\":\"西伯利亚\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以前近代最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"草原·游牧\",\"宗教·信仰\",\"迁徙·流亡\"],\"atmos\":[\"泰加林与冻土带的渔猎游牧诸族（埃文基·涅涅茨·雅库特·楚科奇）\",\"\\\"萨满\\\"（šaman）一词源自通古斯语\",\"敲鼓入神·灵魂出窍上天入地\",\"驯鹿与雪橇·圆锥帐篷（chum）\",\"世界最冷的居处\",\"被俄国以毛皮贡（yasak）征服\"],\"sensory\":\"望不到边的针叶林和冻土，冷到呼气成霜。帐篷里火塘边，一个披着挂满铁片和飘带法袍的人开始击鼓，越敲越急，身子摇晃、口中念念——人们说他的魂这会儿正离体出窍，去上界或下界替活人讨说法。外头，驯鹿在雪地里刨苔藓，雪橇套好了等天亮。\",\"note\":\"西伯利亚泰加林与冻土带的诸民族（埃文基、涅涅茨、雅库特、楚科奇等）以渔猎、驯鹿游牧为生，住圆锥帐篷（chum）。\\\"萨满\\\"（šaman）一词即源自通古斯语——萨满击鼓入神、灵魂出窍沟通三界，是这一信仰体系的原型。这里有人类居住地中最严寒之处。16-17世纪起，俄国以毛皮贡赋（yasak）将这片广袤土地纳入版图。\"}),\n  E({\"id\":\"ck277\",\"name\":\"乌鲁克（苏美尔·城市的诞生）\",\"en\":\"Uruk\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"史前\",\"year\":-3500,\"period\":\"约前3500-前3000\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"贸易·商业\"],\"atmos\":[\"世界最早的城市之一\",\"楔形文字诞生\",\"吉尔伽美什的城市\",\"伊南娜神庙\",\"泥板\"],\"sensory\":\"泥砖城墙圈住的是你见过的最大聚落——几万人挤在里面。有人蹲在一块湿泥板前，用削尖的芦苇秆压出一行行楔形符号——他在记一笔账：几头羊、几袋大麦。神庙立在夯土高台上，台阶一级级通向顶端。空气干热，城边的运河把幼发拉底河的水引了进来。\",\"note\":\"乌鲁克可能是人类历史上第一座真正的\\\"城市\\\"。楔形文字最初是记账工具——文字因商业而生。\"}),\n  E({\"id\":\"ck278\",\"name\":\"乌尔（第三王朝·苏美尔最后的辉煌）\",\"en\":\"Ur, Third Dynasty\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"上古\",\"year\":-2112,\"period\":\"约前2112-前2004\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"乌尔大塔庙（乌尔纳姆王所建）\",\"乌尔纳姆法典（已知最早成文法典）\",\"苏美尔王表\",\"月神南纳\",\"行政泥板档案\"],\"sensory\":\"塔庙一层层往上叠，最顶上是月神南纳的居所，只有祭司能上去。书吏房里泥板成排——每一头牲口、每一筐谷子都记在账上，整个王国被写进文书。集市上有人用银环称重交易，起了纠纷就引王新立的法典：伤了人该赔多少银子，都写得清清楚楚。\",\"note\":\"乌尔第三王朝是苏美尔文明最后一次复兴。乌尔纳姆王立下已知最早的成文法典——比汉谟拉比早约三百年，以赔偿银两代替血亲复仇——又建起留存至今的大塔庙。\"}),\n  E({\"id\":\"ck279\",\"name\":\"巴比伦（汉谟拉比时期）\",\"en\":\"Hammurabi's Babylon\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"上古\",\"year\":-1750,\"period\":\"前18世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"律法·审判\",\"奴役·压迫\"],\"atmos\":[\"汉谟拉比法典\",\"以眼还眼\",\"幼发拉底河上的大城\",\"阶级分明的法律\"],\"sensory\":\"城门口立着一块黑色石碑——上面刻满了法律条文。有人在争论一桩纠纷，引用石碑上的条文。\\\"如果一个人弄瞎了另一个人的眼睛……\\\"但处罚因你的身份而不同——自由人、平民、奴隶各有各的规则。\",\"note\":\"汉谟拉比法典不是最早的法典，但是保存最完整的。它揭示的阶级结构极其清晰。\"}),\n  E({\"id\":\"ck280\",\"name\":\"亚述帝国·尼尼微\",\"en\":\"Assyrian Nineveh\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"古典\",\"year\":-650,\"period\":\"前8-前7世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"学问·书写\"],\"atmos\":[\"铁血帝国\",\"亚述巴尼拔图书馆\",\"战争浮雕（围城/剥皮/刺穿）\",\"吉尔伽美什史诗在此被保存\"],\"sensory\":\"宫殿墙上的浮雕记录着征服——一座座城市被攻破，俘虏被行刑。但同一座宫殿里有一座图书馆——几万块泥板整齐排列。国王既是征服者也是藏书家。\",\"note\":\"亚述巴尼拔的图书馆保存了《吉尔伽美什史诗》——人类最古老的文学作品。暴力与知识的共存。\"}),\n  E({\"id\":\"ck281\",\"name\":\"新巴比伦（尼布甲尼撒二世）\",\"en\":\"Nebuchadnezzar's Babylon\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"古典\",\"year\":-550,\"period\":\"前7-前6世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"迁徙·流亡\",\"宗教·信仰\"],\"atmos\":[\"空中花园（如果存在的话）\",\"伊什塔尔门（蓝色琉璃砖）\",\"巴别塔原型\",\"犹太人被掳\"],\"sensory\":\"伊什塔尔门的蓝色琉璃在阳光下像天空掉到了地面。金色的龙和公牛浮雕排列在城墙上。城里有一群从远方被带来的人——他们哭泣着说起自己被毁的圣殿。据说城外有一座极高的阶梯神庙，人们说它是要通到天上去的。\",\"note\":\"巴比伦之囚（犹太人视角）是犹太教历史的关键事件——圣殿被毁、流亡巴比伦、后来返回重建。\"}),\n  E({\"id\":\"ck282\",\"name\":\"波斯波利斯（阿契美尼德帝国）\",\"en\":\"Achaemenid Persepolis\",\"region\":\"西亚·中东\",\"country\":\"伊朗·波斯\",\"era\":\"古典\",\"year\":-350,\"period\":\"前6-前4世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"殖民·帝国\"],\"atmos\":[\"大流士/薛西斯\",\"万国朝贡浮雕\",\"琐罗亚斯德教\",\"\\\"万王之王\\\"\",\"波斯御道\"],\"sensory\":\"巨大的石阶上刻满了各民族的使节——穿不同的衣服、带不同的贡品、走不同的步伐。有埃及人、巴比伦人、印度人、斯基泰人。他们都来朝贡。宫殿的柱子高到你需要仰头。空气里有乳香的气味。\",\"note\":\"波斯波利斯的万国朝贡浮雕是古代\\\"多元帝国\\\"理念的视觉化。后来被亚历山大大帝焚毁。\"}),\n  E({\"id\":\"ck283\",\"name\":\"波斯波利斯的焚毁（亚历山大）\",\"en\":\"Burning of Persepolis\",\"region\":\"西亚·中东\",\"country\":\"伊朗·波斯\",\"era\":\"古典\",\"year\":-330,\"period\":\"前330\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"亚历山大东征\",\"醉酒焚宫（传说）\",\"波斯帝国灭亡\",\"火焰中的浮雕\"],\"sensory\":\"大火。整座宫殿在燃烧——石头烧不着，木头的天花板和帘幕在烧。有人说是宴席上一个雅典女子提议放的火——为报复波斯人当年焚烧雅典卫城。浮雕上的朝贡者在火光里像是在跳舞。\",\"note\":\"文明的毁灭瞬间。\"}),\n  E({\"id\":\"ck284\",\"name\":\"萨珊波斯·泰西封\",\"en\":\"Sasanian Ctesiphon\",\"region\":\"西亚·中东\",\"country\":\"伊朗·波斯\",\"era\":\"古典\",\"year\":650,\"period\":\"3-7世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"贸易·商业\",\"宫廷·王权\"],\"atmos\":[\"琐罗亚斯德教国教\",\"泰西封拱门（世界最大砖拱）\",\"丝绸贸易\",\"与罗马/拜占庭的千年对峙\"],\"sensory\":\"泰西封的大拱门高得不可思议——整面墙只有一个拱洞，里面是王的宝座。城市横跨底格里斯河两岸。琐罗亚斯德教的圣火在火庙里日夜不灭。丝绸商人说他们的货要经过这里才能到罗马。\",\"note\":\"萨珊波斯是古代波斯文明的最后辉煌。泰西封大拱至今部分矗立。\"}),\n  E({\"id\":\"ck285\",\"name\":\"萨法维伊斯法罕（\\\"世界之半\\\"）\",\"en\":\"Safavid Isfahan\",\"region\":\"西亚·中东\",\"country\":\"伊朗·波斯\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"贸易·商业\",\"宗教·信仰\"],\"atmos\":[\"阿巴斯大帝\",\"伊玛目广场\",\"蓝色清真寺\",\"波斯地毯\",\"什叶派国教\",\"\\\"伊斯法罕是世界的一半\\\"\"],\"sensory\":\"伊玛目广场大到能在里面打马球——据说国王真的在这里打马球。广场四面是清真寺、巴扎、宫殿。清真寺的穹顶内部全是蓝色和金色的几何图案——仰头看像是在看另一个宇宙。巴扎里地毯、香料、细密画的色彩让眼睛忙不过来。\",\"note\":\"萨法维时代的伊斯法罕是伊斯兰世界最华丽的城市之一。\\\"世界之半\\\"是当时的谚语。\"}),\n  E({\"id\":\"ck286\",\"name\":\"推罗/西顿（腓尼基）\",\"en\":\"Phoenician Tyre\",\"region\":\"西亚·中东\",\"country\":\"黎巴嫩\",\"era\":\"古典\",\"year\":-550,\"period\":\"前10-前6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"工艺·手艺\"],\"atmos\":[\"推罗紫（骨螺染料）\",\"字母发明者\",\"航海民族\",\"海上贸易\",\"建造了迦太基\"],\"sensory\":\"港口的味道很特别——一种腐烂的、但又带紫色的气味。那是骨螺的味道——成千上万只螺才能染出一小块紫布，一块就值一栋房子。有船正在出发去一个他们叫\\\"西方\\\"的地方——据说他们的人已经在那里建了一座新城市。\",\"note\":\"腓尼基字母是几乎所有现代字母表的祖先。推罗紫的腥臭气味是古代世界最昂贵的奢侈品的副产品。\"}),\n  E({\"id\":\"ck287\",\"name\":\"耶路撒冷（第一圣殿时期）\",\"en\":\"First Temple Jerusalem\",\"region\":\"西亚·中东\",\"country\":\"以色列-巴勒斯坦\",\"era\":\"古典\",\"year\":-550,\"period\":\"前10-前6世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\"],\"atmos\":[\"所罗门圣殿\",\"约柜\",\"犹太教核心圣地\",\"先知的年代\",\"被巴比伦摧毁\"],\"sensory\":\"圣殿在山上，石墙闪着光。殿内最深处有一个房间——除了大祭司，任何人不得进入。有先知在街上大声说话——预言灾难。有人在听，更多人在忽略。\",\"note\":\"第一圣殿的存在主要来自圣经记载，考古证据有限。但它在犹太教/基督教/伊斯兰教中的精神地位无可替代。\"}),\n  E({\"id\":\"ck288\",\"name\":\"耶路撒冷（第二圣殿·罗马统治下）\",\"en\":\"Second Temple Jerusalem\",\"region\":\"西亚·中东\",\"country\":\"以色列-巴勒斯坦\",\"era\":\"古典\",\"year\":-50,\"period\":\"前1世纪-公元70\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"战争·军事\",\"殖民·帝国\"],\"atmos\":[\"希律王重建圣殿\",\"罗马总督\",\"耶稣时代\",\"犹太大起义\",\"圣殿被提图斯摧毁\"],\"sensory\":\"圣殿比以前更宏伟了——希律王花了几十年重建。但罗马兵在城墙上巡逻。有人在圣殿门口掀翻了钱币兑换商的桌子。城里空气紧张——有人在密谋起义。几十年后，整座圣殿只剩下西墙。\",\"note\":\"这个时空承载了太多宗教和政治意义。体验角度应尽量保持多视角——犹太人、罗马人、早期基督徒都在同一空间里。\"}),\n  E({\"id\":\"ck289\",\"name\":\"前伊斯兰的麦加\",\"en\":\"Pre-Islamic Mecca\",\"region\":\"西亚·中东\",\"country\":\"阿拉伯半岛\",\"era\":\"中古\",\"year\":550,\"period\":\"6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"贸易·商业\",\"沙漠·绿洲\"],\"atmos\":[\"克尔白（当时的多神祭祀中心）\",\"古莱什部落\",\"商队贸易\",\"蒙昧时代（贾希利亚）\",\"悬诗\"],\"sensory\":\"沙漠中的城市，围绕着一座黑色的立方体建筑。建筑内外摆满了各部落的神像——三百多座。商队在集散——乳香、皮革、枣子。有人在帐篷里朗诵一首长诗——语言像沙漠里的风，卷着尖锐的辅音。\",\"note\":\"伊斯兰教诞生之前的麦加。克尔白当时是多神教圣地。悬诗（Mu'allaqat）是阿拉伯语文学的源头。\"}),\n  E({\"id\":\"ck290\",\"name\":\"麦地那（先知时代）\",\"en\":\"Prophet's Medina\",\"region\":\"西亚·中东\",\"country\":\"阿拉伯半岛\",\"era\":\"中古\",\"year\":622,\"period\":\"622-632\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"迁徙·流亡\"],\"atmos\":[\"希吉拉（迁徙）\",\"第一个穆斯林社区\",\"先知清真寺\",\"新信仰的日常化\"],\"sensory\":\"这座城市刚刚改了名——以前叫叶斯里布，现在叫\\\"先知之城\\\"。一座简朴的清真寺刚建好——棕榈树干做柱子，棕榈叶做屋顶。有人在第一次面朝一个新方向祈祷。一切刚刚开始。\",\"note\":\"伊斯兰教的起点空间。体验角度是\\\"一个新信仰刚刚诞生时的日常\\\"——还没有帝国、没有教派分裂。\"}),\n  E({\"id\":\"ck291\",\"name\":\"倭马亚大马士革\",\"en\":\"Umayyad Damascus\",\"region\":\"西亚·中东\",\"country\":\"叙利亚\",\"era\":\"中古\",\"year\":661,\"period\":\"661-750\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"宫廷·王权\",\"工艺·手艺\"],\"atmos\":[\"倭马亚清真寺\",\"哈里发国\",\"阿拉伯帝国第一座首都\",\"罗马-拜占庭建筑的伊斯兰改造\"],\"sensory\":\"哈里发拆了原来的圣约翰教堂，在同一片地基上建起清真寺——墙上铺满金色马赛克，却没有一个人像：只有河流、树木和层叠的楼阁，一整面墙的天堂景致。院里仍立着供奉施洗者约翰头颅的圣龛。宣礼声从穹顶下传出。大马士革的老街窄到两头驴子不能并行，巴扎里的丝绸和钢刀却名满天下——大马士革钢。\",\"note\":\"倭马亚大清真寺是建筑史上\\\"宗教空间转换\\\"的经典案例——同一个空间从异教神庙变成基督教堂再变成清真寺。\"}),\n  E({\"id\":\"ck292\",\"name\":\"阿拔斯巴格达（智慧宫·黄金时代）\",\"en\":\"Abbasid Baghdad\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"中古\",\"year\":950,\"period\":\"8-10世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"城市·都会\"],\"atmos\":[\"圆形城市\",\"智慧宫（翻译运动）\",\"代数学诞生\",\"花剌子密/肯迪/拉齐\",\"一千零一夜的巴格达\"],\"sensory\":\"圆形的城市——据说是圆规在地图上画出来的。智慧宫里有人在把希腊语翻译成阿拉伯语——亚里士多德、欧几里得、盖伦的著作在这里获得新生。另一个人在用一种新方法解方程——他管这叫\\\"al-jabr\\\"。夜里底格里斯河上的船灯像星星。\",\"note\":\"阿拔斯巴格达是中世纪世界的知识中心。翻译运动保存了大量希腊典籍——后来欧洲文艺复兴从阿拉伯语翻译中重新发现了这些。\"}),\n  E({\"id\":\"ck293\",\"name\":\"巴格达的陷落（蒙古入侵）\",\"en\":\"Fall of Baghdad\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"中古\",\"year\":1258,\"period\":\"1258\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\"],\"atmos\":[\"旭烈兀\",\"阿拔斯哈里发国灭亡\",\"底格里斯河被墨水染黑（图书馆被毁）\",\"伊斯兰黄金时代的终结\"],\"sensory\":\"底格里斯河的水变了颜色——有人说是血，有人说是墨水。智慧宫的书被扔进了河里。据说用尸体在河上搭了桥。哈里发被裹在毯子里踩死了——蒙古人不愿流王室的血在地上。\",\"note\":\"伊斯兰文明史上最大的创伤。图书馆焚毁的细节虽可能被夸大，但这一事件标志着阿拔斯黄金时代的终结。\"}),\n  E({\"id\":\"ck294\",\"name\":\"十字军国家·耶路撒冷王国\",\"en\":\"Crusader Jerusalem\",\"region\":\"西亚·中东\",\"country\":\"以色列-巴勒斯坦\",\"era\":\"中古\",\"year\":1099,\"period\":\"1099-1187\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\",\"殖民·帝国\"],\"atmos\":[\"第一次十字军攻城屠杀\",\"法兰克人定居\",\"骑士团\",\"与穆斯林的邻居关系\",\"乌萨马的回忆录\"],\"sensory\":\"城墙上飘着十字旗。城内的法兰克骑士穿着铁甲在四十度的高温里走——他们还没学会穿当地的衣服。但有些已经住了两代的法兰克人开始说阿拉伯语、吃当地的食物了。穆斯林商人还在集市上做买卖——战争归战争，生意归生意。\",\"note\":\"乌萨马·伊本·蒙基兹的回忆录提供了穆斯林贵族视角——他对法兰克人的观察既有蔑视也有好奇。日常层面的文化接触远比战争复杂。\"}),\n  E({\"id\":\"ck295\",\"name\":\"萨拉丁收复耶路撒冷\",\"en\":\"Saladin's Jerusalem\",\"region\":\"西亚·中东\",\"country\":\"以色列-巴勒斯坦\",\"era\":\"中古\",\"year\":1187,\"period\":\"1187\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"哈丁战役\",\"萨拉丁的骑士精神\",\"不屠城\",\"十字架从圆顶清真寺上被移除\"],\"sensory\":\"城门开了。萨拉丁的军队进城——但没有发生八十八年前法兰克人那样的屠杀。基督徒被允许赎身离开。十字架从岩石圆顶清真寺上被取下来，换上了新月。有人在清洗被改做教堂的清真寺。\",\"note\":\"萨拉丁的\\\"不屠城\\\"在十字军历史中形成了与第一次十字军的鲜明对比。\"}),\n  E({\"id\":\"ck296\",\"name\":\"奥斯曼·伊斯坦布尔（征服后初期）\",\"en\":\"Conquest of Constantinople\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1550,\"period\":\"1453-16世纪初\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"穆罕默德二世征服者\",\"圣索菲亚变清真寺\",\"千年拜占庭的终结\",\"新帝国的开始\"],\"sensory\":\"索菲亚大教堂正变成清真寺——一座朝麦加的壁龛斜斜嵌进半圆殿，与建筑的轴线偏开一点；第一座宣礼塔在墙外立起来。但穹顶还是那个穹顶，光线从底环四十扇窗射进来，整座圆顶像悬在空中。基督教马赛克暂时还在头顶闪着金光。征服者苏丹下令保留城里的基督徒和犹太人社区。\",\"note\":\"圣索菲亚做了九百多年教堂，从这一刻起又做近五百年清真寺——同一座穹顶下，两种信仰先后更替。\"}),\n  E({\"id\":\"ck297\",\"name\":\"奥斯曼·苏莱曼大帝时期的伊斯坦布尔\",\"en\":\"Suleiman's Istanbul\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1550,\"period\":\"16世纪中\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宫廷·王权\",\"贸易·商业\"],\"atmos\":[\"苏莱曼清真寺\",\"锡南（建筑师）\",\"大巴扎\",\"后宫\",\"帝国全盛\"],\"sensory\":\"金角湾上的天际线全是穹顶和宣礼塔——建筑师锡南刚完成了他的杰作。大巴扎里有四千家铺子，顶棚下面的光线是昏暗的金色。有人在茶馆里第一次喝一种从也门来的黑色饮料——咖啡。\",\"note\":\"锡南是奥斯曼帝国最伟大的建筑师，苏莱曼清真寺是他的代表作。咖啡在这个时期传入伊斯坦布尔。\"}),\n  E({\"id\":\"ck298\",\"name\":\"奥斯曼帝国·咖啡馆文化\",\"en\":\"Ottoman Coffeehouses\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"饮食·宴席\",\"市井·庶民\",\"艺术·表演\"],\"atmos\":[\"世界上最早的咖啡馆\",\"公共辩论空间\",\"苏丹多次试图禁止（怕聚众议政）\",\"讲故事的人\"],\"sensory\":\"一间低矮的房间里烟雾缭绕。有人在煮咖啡——小铜壶在炭火上冒泡。人们坐在垫子上辩论、下棋、听故事。苏丹几次想关掉这些地方——说这里是煽动的温床。但关不掉。\",\"note\":\"咖啡馆作为\\\"公共空间\\\"的诞生。后来传到欧洲，成了启蒙运动的温床。\"}),\n  E({\"id\":\"ck299\",\"name\":\"阿拉伯的劳伦斯·汉志铁路\",\"en\":\"Lawrence of Arabia\",\"region\":\"西亚·中东\",\"country\":\"阿拉伯半岛\",\"era\":\"世纪之交\",\"year\":1916,\"period\":\"1916-1918\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"革命·变革\",\"殖民·帝国\"],\"atmos\":[\"阿拉伯大起义\",\"炸铁路\",\"沙漠游击战\",\"英国的双面承诺\",\"奥斯曼帝国崩溃\"],\"sensory\":\"沙漠里有一条铁路——奥斯曼帝国的。一群贝都因骑手在铁轨旁埋炸药。有一个穿阿拉伯白袍的英国人在指挥——他承诺打完仗之后阿拉伯人会有自己的国家。铁路被炸断了。但那个承诺后来也碎了。\",\"note\":\"阿拉伯大起义的结局（赛克斯-皮科协定瓜分中东）是当代中东政治格局的直接源头。\"}),\n  E({\"id\":\"ck300\",\"name\":\"奥斯曼帝国末期·伊斯坦布尔\",\"en\":\"Late Ottoman Istanbul\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪中-1920s\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"战争·军事\",\"末世·终结\"],\"atmos\":[\"坦志麦特改革\",\"青年土耳其党\",\"一战\",\"帝国解体\",\"加里波利\",\"凯末尔\"],\"sensory\":\"伊斯坦布尔的贝伊奥卢区有电车、有歌剧院、有欧洲式咖啡馆——看起来很现代。但帝国正在从边缘碎裂。有穿军装的年轻军官在密谈——他们说帝国需要革命。\",\"note\":\"一个六百年帝国的最后几十年。现代化与崩溃同步进行。\"}),\n  E({\"id\":\"ck301\",\"name\":\"赫梯·哈图沙（青铜时代的铁与条约）\",\"en\":\"Hittite Hattusa\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"上古\",\"year\":-1650,\"period\":\"约前1650-前1180\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"战争·军事\",\"工艺·手艺\"],\"atmos\":[\"安纳托利亚高原的石头都城\",\"狮门与斯芬克斯门\",\"亚兹勒卡亚岩壁上列队的众神\",\"与埃及签下最古老的和约（卡叠什之后）\",\"最早摸索炼铁的民族之一\",\"用楔形文字写印欧语\"],\"sensory\":\"高原上风很硬，城墙用巨石垒成，城门两侧蹲着石狮，张着嘴。城外一道岩缝里，崖壁凿满列队行进的神，戴尖帽、踩着山。宫里书吏把泥板烤干归档——里头有一份和远方埃及法老立的盟约，两家起誓不再开战。铁匠手里那把暗色的刀，比青铜还硬。\",\"note\":\"赫梯帝国（约前1650-前1180）以安纳托利亚高原的哈图沙为都，狮门与岩石圣所亚兹勒卡亚是其遗存。它是最早系统利用铁的文明之一。前1274年与埃及拉美西斯二世在卡叠什大战后，双方缔结了现存最古老的成文国际和约（联合国挂有其复制件）。青铜时代末期，赫梯随大动荡崩溃。\"}),\n  E({\"id\":\"ck302\",\"name\":\"佩特拉（玫瑰红石壁里的纳巴泰城）\",\"en\":\"Petra\",\"region\":\"西亚·中东\",\"country\":\"约旦\",\"era\":\"古典\",\"year\":-150,\"period\":\"约前2世纪-公元2世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"工艺·手艺\",\"沙漠·绿洲\"],\"atmos\":[\"纳巴泰人凿岩为城\",\"玫瑰红砂岩立面\",\"狭长的\\\"溪谷\\\"通道（Siq）\",\"藏在沙漠里的引水暗渠与蓄水池\",\"掌控乳香与没药商路\",\"阿拉伯字母的祖先\"],\"sensory\":\"穿过一道又高又窄、只容几人并行的岩缝，走好一阵，尽头豁然一亮——对面整片红砂岩崖壁上凿出一座两层高的神殿门脸，柱子、山花全从山体里抠出来。骆驼商队卸下成包的乳香。沙漠里看不见水，城里却水渠潺潺——水都被悄悄引进石凿的池子。\",\"note\":\"佩特拉是纳巴泰王国的都城（今约旦），以从玫瑰红砂岩崖壁直接凿出的建筑立面（如\\\"卡兹尼\\\"）闻名。纳巴泰人靠掌控阿拉伯乳香、没药北运的商路致富，并在干旱沙漠中建起精巧的引水蓄水系统。公元106年被罗马并为\\\"阿拉伯行省\\\"。纳巴泰字母是阿拉伯文字的前身。\"}),\n  E({\"id\":\"ck303\",\"name\":\"帕尔米拉（沙漠商城与芝诺比阿女王）\",\"en\":\"Palmyra & Zenobia\",\"region\":\"西亚·中东\",\"country\":\"叙利亚\",\"era\":\"古典\",\"year\":250,\"period\":\"1-3世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"城市·都会\",\"战争·军事\"],\"atmos\":[\"叙利亚沙漠中的绿洲商城\",\"贝尔神庙与长列柱街\",\"希腊·波斯·阿拉伯混合的装束\",\"女王芝诺比阿一度脱离罗马自立\",\"273年被奥勒良攻破\"],\"sensory\":\"沙漠正中一片绿洲，一条长长的列柱大街通向神庙，柱顶立着本城商贾的雕像。商队从波斯、从印度方向来，丝绸香料在这儿转手。街上的人穿戴混搭：希腊长袍配波斯绣裤，女子珠光宝气。城里正传大事——女王带兵向西打，连埃及都拿下了，不再听罗马的了。\",\"note\":\"帕尔米拉是叙利亚沙漠中的绿洲商城，靠转运东西方贸易致富，文化融合希腊、波斯与阿拉伯。3世纪女王芝诺比阿（Zenobia）趁罗马内乱扩张，一度占据从埃及到安纳托利亚的广大地区、宣告独立；273年被罗马皇帝奥勒良攻破，女王被俘。\"}),\n  E({\"id\":\"ck304\",\"name\":\"示巴·马里卜（乳香之国与大坝）\",\"en\":\"Saba & Marib\",\"region\":\"西亚·中东\",\"country\":\"也门·示巴\",\"era\":\"古典\",\"year\":-750,\"period\":\"约前8世纪-公元6世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"宗教·信仰\",\"沙漠·绿洲\"],\"atmos\":[\"南阿拉伯的乳香·没药王国\",\"马里卜大坝（古代工程奇迹）\",\"传说中的示巴女王（比勒基斯）\",\"沙漠绿洲的灌溉\",\"大坝最终溃决·部落星散（古兰经里的\\\"洪水\\\"）\",\"骆驼商队北运香料\"],\"sensory\":\"沙漠边缘竟是大片绿油油的田，全靠一道巨大的土石坝拦住季节的洪水，再顺沟渠分到一垄垄地里。空气里是乳香树脂的甜味——一包包白色香料正装上骆驼，要走几个月运到北边的神庙去烧。城里人说，从前有位女王带着这香料和黄金，去见远方一位智慧的王。\",\"note\":\"示巴（Saba）是南阿拉伯（今也门）的古王国，靠垄断乳香、没药贸易致富，传说中的示巴女王（比勒基斯）即出于此。马里卜大坝是古代世界著名的水利工程，灌溉出沙漠绿洲；其约公元575年的最终溃决造成农田废弃、部落迁散，《古兰经》以\\\"阿里姆的洪水\\\"记之。\"}),\n  E({\"id\":\"ck305\",\"name\":\"亚美尼亚·阿尼（千座教堂之城）\",\"en\":\"Armenian Ani\",\"region\":\"西亚·中东\",\"country\":\"亚美尼亚\",\"era\":\"中古\",\"year\":1250,\"period\":\"10-13世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"城市·都会\",\"工艺·手艺\"],\"atmos\":[\"世界第一个把基督教定为国教的国家（301年）\",\"阿拉拉特山\",\"巴格拉提德王朝的都城阿尼\",\"\\\"一千零一座教堂之城\\\"\",\"独特的亚美尼亚字母与石刻十字（khachkar）\",\"丝路要冲\",\"地震与蒙古后沦为废墟\"],\"sensory\":\"高原上一座石头城，教堂一座挨一座，圆锥顶、尖拱窗，钟声此起彼伏——人说这里有一千零一座教堂。墙上、墓碑刻满繁复的十字花纹，没有两块一样。远处地平线上，阿拉拉特山顶着雪。商队进城歇脚，这是丝路上的一个关口。后来地震和兵祸接连而至，城渐渐空了。\",\"note\":\"亚美尼亚是世界上第一个将基督教定为国教的国家（301年），并自创亚美尼亚字母（约405年）。阿尼是中世纪巴格拉提德王朝的都城，10-11世纪极盛，有\\\"一千零一座教堂之城\\\"之称，地处丝路要冲。石刻十字（khachkar）是其独特艺术。蒙古入侵与1319年大地震后阿尼渐成废墟。\"}),\n  E({\"id\":\"ck306\",\"name\":\"格鲁吉亚·塔玛拉女王（高加索的黄金时代）\",\"en\":\"Queen Tamar's Georgia\",\"region\":\"西亚·中东\",\"country\":\"格鲁吉亚\",\"era\":\"中古\",\"year\":1250,\"period\":\"12-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"饮食·宴席\"],\"atmos\":[\"塔玛拉女王的鼎盛期\",\"悬在峭壁里的瓦尔济亚洞窟城\",\"最早的基督教国家之一·独有的格鲁吉亚字母\",\"鲁斯塔维利的史诗《虎皮武士》\",\"埋在陶罐里发酵的八千年葡萄酒\",\"男声复调合唱\"],\"sensory\":\"峡谷一侧的整面崖壁里，凿出一座上下十几层、几百个洞窟的城——教堂、酒窖、住房都嵌在石头里，从外头几乎看不出。葡萄酒不装桶，是埋在地里的大陶罐（qvevri）里连皮发酵的，启封时酒香混着泥土气。教堂里几个男人开口，几条嗓子缠成一团又分开，是这里独有的复调。女王在位，诗人为她写下虎皮武士的传奇。\",\"note\":\"格鲁吉亚在塔玛拉女王（1184-1213在位）时迎来黄金时代。它是最早奉基督教为国教的国家之一，有独特的格鲁吉亚字母与文学（鲁斯塔维利史诗《虎皮武士》）。瓦尔济亚是凿入峭壁的洞窟修道城。格鲁吉亚还是葡萄酒发源地之一——埋陶罐（qvevri）带皮发酵的工艺可追溯约八千年；男声复调合唱是其非遗。\"}),\n  E({\"id\":\"ck307\",\"name\":\"亚兹德·拜火与寂静之塔\",\"en\":\"Zoroastrian Yazd\",\"region\":\"西亚·中东\",\"country\":\"伊朗·亚兹德\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代（体验上以萨珊至中古最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"死亡·葬仪\",\"沙漠·绿洲\"],\"atmos\":[\"伊斯兰征服后祆教（琐罗亚斯德教）的避难所\",\"千年不灭的圣火（Atash Behram）\",\"把死者送上\\\"寂静之塔\\\"任秃鹫啄食（不污染火与土）\",\"沙漠泥城·风塔（badgir）与坎儿井\",\"善恶二元·火光中礼拜\"],\"sensory\":\"泥砖砌的沙漠城里，一座庙堂中央的炉里燃着火——据说这火已经一千多年没熄过，祭司用木柴一代代续着，自己用布蒙住口鼻，怕呼吸玷污了它。城外秃秃的小山顶上有一圈高墙的\\\"寂静之塔\\\"，死人被抬上去，露天交给秃鹫——土和火都太洁净，不能让尸体沾污。屋顶竖着高高的风塔，把热风引下来，给屋里送一丝凉。\",\"note\":\"亚兹德是伊朗中部沙漠城市，伊斯兰征服后成为祆教（琐罗亚斯德教）的主要避难地。其圣火庙（Atash Behram）的火据传已不灭逾千年。祆教视火与土为洁净，故将逝者置于\\\"寂静之塔\\\"（dakhma）露天天葬、交由秃鹫；亚兹德的泥砖建筑、风塔（badgir）与坎儿井是沙漠生存的智慧。善恶二元是其教义核心。\"}),\n  E({\"id\":\"ck308\",\"name\":\"吉萨（古王国·金字塔建造期）\",\"en\":\"Building the Pyramids\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-2580,\"period\":\"约前2580-前2500\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宫廷·王权\",\"市井·庶民\"],\"atmos\":[\"大金字塔正在建造\",\"石灰岩采石场\",\"工人村（不是奴隶）\",\"胡夫/哈夫拉\",\"尼罗河泛滥季的劳动力调配\"],\"sensory\":\"一块比你大的石灰岩正在被一群人用木橇和湿沙拖上斜坡。工地上有人在分发面包和啤酒——工人吃得不算差。金字塔才建到一半，但已经高到遮住了太阳。空气里是石灰粉和汗水的气味。\",\"note\":\"现代考古学已经确认金字塔由受雇工人（非奴隶）建造。工人村遗址保存了面包房、医院甚至酿酒坊。\"}),\n  E({\"id\":\"ck309\",\"name\":\"底比斯·帝王谷（新王国）\",\"en\":\"Valley of the Kings\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-1050,\"period\":\"前16-前11世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"宫廷·王权\",\"艺术·表演\"],\"atmos\":[\"图坦卡蒙\",\"哈特谢普苏特\",\"拉美西斯二世\",\"墓室壁画\",\"亡灵书\",\"设计隐藏的墓穴\"],\"sensory\":\"山谷干热到灼人。石匠们在岩壁里开凿墓室——向下，向下，再向下。墙上画满了死后的世界——审判、蛇、荷花、神。颜料在干燥的空气里几乎不变色。这些画完成之后就要被封住，不让任何人看到。\",\"note\":\"帝王谷的工匠住在代尔美迪纳工人村——保存了大量工匠日常生活的记录（包括请假条和偷懒记录）。\"}),\n  E({\"id\":\"ck310\",\"name\":\"代尔美迪纳（工匠村·日常）\",\"en\":\"Deir el-Medina\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-1050,\"period\":\"前16-前11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"工艺·手艺\",\"学问·书写\"],\"atmos\":[\"墓室画师和石匠的村庄\",\"请假条\",\"离婚文书\",\"偷懒记录\",\"古代的蓝领社区\"],\"sensory\":\"村子很小，围着墙。有人在写请假条——\\\"今天不去上工，因为妻子来月事了。\\\"另一个人在投诉邻居偷了他的凿子。有人画了一幅猫给老鼠端茶的讽刺画。\",\"note\":\"代尔美迪纳的出土文物（石灰岩碎片上的笔记）是了解古埃及平民日常生活最直接的窗口——琐碎、幽默、非常人性。\"}),\n  E({\"id\":\"ck311\",\"name\":\"阿玛尔纳（阿肯那顿的异端之城）\",\"en\":\"Akhenaten's Amarna\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-1353,\"period\":\"约前1353-前1336\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"革命·变革\",\"宫廷·王权\"],\"atmos\":[\"一神教实验\",\"阿顿（太阳圆盘）崇拜\",\"新首都建了又弃\",\"纳芙蒂蒂\",\"阿玛尔纳艺术风格\"],\"sensory\":\"法老建了一座新城——从无到有，在沙漠里。他说只有一个神——太阳圆盘。旧神的名字正在被从每一座庙宇上凿掉。王后的面容被刻成了一种前所未有的写实风格——高颧骨，长脖子。但这个实验不会持续太久。\",\"note\":\"阿肯那顿的一神教革命是人类历史上最早的宗教改革尝试之一。他死后一切被推翻，阿玛尔纳被废弃。纳芙蒂蒂胸像是这个短暂时代最著名的遗物。\"}),\n  E({\"id\":\"ck312\",\"name\":\"拉美西斯二世的阿布辛贝（正在建造）\",\"en\":\"Carving Abu Simbel\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-1250,\"period\":\"约前13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"宗教·信仰\",\"宫廷·王权\"],\"atmos\":[\"四尊坐像\",\"从岩壁中凿出的神庙\",\"太阳光每年两次照进最深处\",\"法老的自我神化\"],\"sensory\":\"尼罗河上游，工匠在悬崖上凿出四尊巨大的坐像——都是同一个人的脸。每尊像有六层楼高。最深处的密室里并坐着四尊神像——每年只有两天，日出的光会穿过整条通道照进来，照亮其中三尊，最左边的冥神普塔始终留在暗处。\",\"note\":\"阿布辛贝的太阳对齐效果是古代天文工程的杰作。1960年代因阿斯旺大坝被整体搬迁。\"}),\n  E({\"id\":\"ck313\",\"name\":\"古埃及·尼罗河上的日常\",\"en\":\"Life on the Nile\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":0,\"period\":\"通时代（取新王国或托勒密时期）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"市井·庶民\",\"河流·水乡\",\"饮食·宴席\"],\"atmos\":[\"尼罗河泛滥季（农闲）\",\"纸莎草\",\"啤酒和面包\",\"眼线膏\",\"猫崇拜\",\"浣洗与沐浴\"],\"sensory\":\"河水涨了——每年都会涨。退水之后留下的黑泥可以种任何东西。有人在用纸莎草编船。有人在磨眼影——绿色的孔雀石粉。一只猫从屋顶跳下来，没人敢赶它走。晚饭是面包蘸啤酒，啤酒稠得像粥。\",\"note\":\"生活方式型坐标。叮叮猫不咬人的视频\\\"穿越到古埃及当平民\\\"就是这个切入角度。\"}),\n  E({\"id\":\"ck314\",\"name\":\"亚历山大港（托勒密时期）\",\"en\":\"Ptolemaic Alexandria\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"古典\",\"year\":-50,\"period\":\"前3-前1世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"学问·书写\",\"海洋·港口\"],\"atmos\":[\"灯塔（世界七大奇迹）\",\"大图书馆\",\"希腊化埃及\",\"克利奥帕特拉\",\"多元文化都市\"],\"sensory\":\"港口入口处矗立着一座塔——夜里顶端有火光，据说在海上很远的地方就能看到。图书馆里有来自世界各地的卷轴——规定所有停靠的船必须交出携带的书籍来抄录。希腊人、埃及人、犹太人各住各的区。\",\"note\":\"亚历山大图书馆的焚毁是人类知识史上最大的损失之一（焚毁细节有多种说法）。灯塔在14世纪地震中倒塌。\"}),\n  E({\"id\":\"ck315\",\"name\":\"罗马统治下的埃及（日常）\",\"en\":\"Roman Egypt\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"古典\",\"year\":-350,\"period\":\"前30-4世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"死亡·葬仪\",\"艺术·表演\",\"宗教·信仰\"],\"atmos\":[\"法尤姆肖像（木乃伊上的写实画像）\",\"罗马-埃及混合文化\",\"基督教传入\",\"科普特语\"],\"sensory\":\"棺木上画着死者的脸——不是古埃及风格，而是写实的。用蜡彩画的，眼睛像在看着你。这个人穿罗马式的衣服，但按埃及的方式做了木乃伊。两种文化融在同一具棺木上。\",\"note\":\"法尤姆肖像是罗马时期埃及最独特的文化混合产物——希腊罗马的写实肖像技法+埃及的木乃伊传统。\"}),\n  E({\"id\":\"ck316\",\"name\":\"开罗（法蒂玛王朝·爱资哈尔大学）\",\"en\":\"Fatimid Cairo\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"中古\",\"year\":1150,\"period\":\"10-12世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"法蒂玛哈里发\",\"什叶派首都\",\"爱资哈尔（世界最古老的大学之一）\",\"开罗老城\",\"香料与铜匠的市集\"],\"sensory\":\"一千座宣礼塔的城市——\\\"千塔之城\\\"。爱资哈尔清真寺的庭院里学生盘腿坐着，跟着老师读经。巴扎的小巷窄到太阳照不进来，空气里是铜匠的锤声和香料的气味。\",\"note\":\"爱资哈尔大学建于970年，至今仍在运作，是世界上最古老的持续运营的大学之一。\"}),\n  E({\"id\":\"ck317\",\"name\":\"马穆鲁克开罗\",\"en\":\"Mamluk Cairo\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"中古\",\"year\":1550,\"period\":\"13-16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"宫廷·王权\",\"奴役·压迫\"],\"atmos\":[\"奴隶兵变成苏丹\",\"击退蒙古（艾因贾鲁特战役）\",\"击退十字军\",\"建筑的黄金时代\"],\"sensory\":\"苏丹曾经是奴隶——从草原上被买来，训练成战士，然后推翻了主人自己当王。他的清真寺比主人的宏伟十倍。城墙外面，蒙古人的使者来了——要求投降。苏丹把使者杀了，然后出城迎战。\",\"note\":\"马穆鲁克在艾因贾鲁特击败蒙古军是世界史上的关键转折——挡住了蒙古向埃及和北非的推进。\"}),\n  E({\"id\":\"ck318\",\"name\":\"拿破仑入侵埃及\",\"en\":\"Napoleon in Egypt\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"近代\",\"year\":1798,\"period\":\"1798-1801\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"殖民·帝国\",\"学问·书写\"],\"atmos\":[\"金字塔战役\",\"法国学者团（发现罗塞塔石碑）\",\"\\\"士兵们\",\"四十个世纪在俯瞰你们\\\"\",\"现代埃及学诞生\"],\"sensory\":\"金字塔脚下有人在打仗——骑骆驼的马穆鲁克骑兵冲向方阵排列的法国步兵。学者们跟在军队后面——他们在量金字塔、画神庙、抄象形文字。有人在三角洲的要塞工地上挖出一块刻着三种文字的黑色石头。\",\"note\":\"拿破仑远征埃及的副产品是现代埃及学——罗塞塔石碑最终帮助商博良破解了象形文字。\"}),\n  E({\"id\":\"ck319\",\"name\":\"迦太基（布匿时期）\",\"en\":\"Punic Carthage\",\"region\":\"埃及·北非\",\"country\":\"突尼斯·迦太基\",\"era\":\"古典\",\"year\":-150,\"period\":\"前8-前2世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"战争·军事\"],\"atmos\":[\"腓尼基人的新城\",\"汉尼拔\",\"地中海贸易帝国\",\"与罗马的死斗\",\"托斐特（儿童祭祀？争议）\"],\"sensory\":\"港口分成军港和商港——军港是圆形的，商港是长方形的。来自整个地中海的船在这里装卸。城里有推罗紫的染坊——那个腐烂的气味飘了整条街。有人在议事厅辩论——要不要跟罗马开战。\",\"note\":\"迦太基的双港设计是古代港口工程的杰作。托斐特（婴儿祭祀场）的解读仍有学术争议。\"}),\n  E({\"id\":\"ck320\",\"name\":\"迦太基灭亡·盐碱地\",\"en\":\"Fall of Carthage\",\"region\":\"埃及·北非\",\"country\":\"突尼斯·迦太基\",\"era\":\"古典\",\"year\":-146,\"period\":\"前146\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"殖民·帝国\"],\"atmos\":[\"第三次布匿战争\",\"罗马围城三年\",\"城市被夷为平地\",\"\\\"迦太基必须毁灭\\\"\",\"传说中的撒盐\"],\"sensory\":\"城在燃烧——烧了十七天。罗马人把所有建筑推平。传说他们在废墟上撒了盐，让这片土地永远不再长出任何东西。一座存在了七百年的城市从地球上消失了。\",\"note\":\"撒盐的说法可能是后世附会，但迦太基确实被彻底摧毁。\\\"废墟之前\\\"的反面——\\\"废墟之后，什么都没有了\\\"。\"}),\n  E({\"id\":\"ck321\",\"name\":\"柏柏尔人（撒哈拉边缘·通史）\",\"en\":\"Berbers of the Sahara\",\"region\":\"埃及·北非\",\"country\":\"跨区域\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代（取伊斯兰化前后对比最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"沙漠·绿洲\",\"草原·游牧\",\"贸易·商业\"],\"atmos\":[\"北非原住民\",\"提菲纳格文字\",\"蓝色面纱（图阿雷格人）\",\"绿洲与沙漠之间\",\"骆驼商队\"],\"sensory\":\"沙漠边缘的帐篷群。有人穿着蓝色面纱——蓝得像被靛蓝染料浸透了皮肤。他们骑骆驼穿越沙漠送盐——盐在沙漠的另一边比金子值钱。图阿雷格人的文字刻在岩石上，圆圆的符号像是另一种几何。\",\"note\":\"柏柏尔人是北非最古老的原住民群体。图阿雷格人（蓝面纱的\\\"沙漠骑士\\\"）是撒哈拉商路的主要运营者。\"}),\n  E({\"id\":\"ck322\",\"name\":\"科尔多瓦/格拉纳达（安达卢西亚·摩尔人）\",\"en\":\"Moorish Andalusia\",\"region\":\"埃及·北非\",\"country\":\"西班牙\",\"era\":\"中古\",\"year\":1450,\"period\":\"8-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"学问·书写\",\"艺术·表演\"],\"atmos\":[\"欧洲的伊斯兰文明\",\"科尔多瓦大清真寺\",\"阿尔罕布拉宫\",\"三教共存（convivencia）\",\"翻译运动\"],\"sensory\":\"清真寺里的拱门是红白条纹的——一层又一层，像一片石头的森林。隔壁的犹太区里有人在翻译阿拉伯语的亚里士多德。基督徒、穆斯林和犹太人在同一条街上做买卖。阿尔罕布拉宫的水池倒映着雕花的墙壁——水流的声音比人的声音安静。\",\"note\":\"安达卢西亚的三教共存（虽然并非完美平等）是中世纪世界文化融合的标杆。科尔多瓦的翻译运动将希腊-阿拉伯知识传入欧洲。地理上属伊比利亚，文化上属伊斯兰北非，放在这个圈。\"}),\n  E({\"id\":\"ck323\",\"name\":\"格拉纳达陷落（收复失地运动终结）\",\"en\":\"Fall of Granada\",\"region\":\"埃及·北非\",\"country\":\"西班牙\",\"era\":\"近世\",\"year\":1492,\"period\":\"1492\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"末世·终结\",\"迁徙·流亡\"],\"atmos\":[\"最后的摩尔人王国\",\"费尔南多与伊莎贝拉\",\"\\\"摩尔人最后的叹息\\\"\",\"犹太人被驱逐\",\"同年哥伦布出发\"],\"sensory\":\"最后一个摩尔人苏丹在山口回头看了一眼格拉纳达——据说他哭了。他的母亲说：\\\"你不像男人一样保卫它，就像女人一样哭泣吧。\\\"同一年，一个热那亚人从旁边的港口出发去找印度——他没找到。\",\"note\":\"1492年是世界史上最密集的一年之一——格拉纳达陷落、犹太人被驱逐、哥伦布出发。三件事发生在同一个国家的同一年。\"}),\n  E({\"id\":\"ck324\",\"name\":\"凯鲁万（马格里布的圣城）\",\"en\":\"Kairouan\",\"region\":\"埃及·北非\",\"country\":\"突尼斯\",\"era\":\"中古\",\"year\":1050,\"period\":\"7-11世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"城市·都会\",\"工艺·手艺\"],\"atmos\":[\"阿拉伯人在北非建的第一座大城\",\"凯鲁万大清真寺（马格里布最古老·后世的样板）\",\"伊斯兰第四圣城\",\"阿格拉布王朝的蓄水大池\",\"地毯与古兰经学\"],\"sensory\":\"荒原上凭空起了一座城。大清真寺的院子铺着大理石，林立的石柱是从古罗马废墟搬来的，方塔粗壮厚重。城外两个巨大的圆形蓄水池盛着引来的雨水，水面平得像镜子。巷子里飘着染料和皮革味，有人盘腿织地毯。\",\"note\":\"凯鲁万（今突尼斯）由阿拉伯将领奥克巴于670年所建，是伊斯兰征服北非后的第一座大城与马格里布的宗教中心，被视为伊斯兰第四圣城。凯鲁万大清真寺是马格里布最古老的清真寺，成为后世建筑的范本；9世纪阿格拉布王朝修建的蓄水大池至今留存。\"}),\n  E({\"id\":\"ck325\",\"name\":\"非斯（最古老的大学与染坊）\",\"en\":\"Fez\",\"region\":\"埃及·北非\",\"country\":\"摩洛哥\",\"era\":\"中古\",\"year\":1450,\"period\":\"9-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"工艺·手艺\",\"城市·都会\"],\"atmos\":[\"卡鲁因大学（一位女性出资创办·世界最古老仍在办学的学府）\",\"迷宫般的老城\",\"露天皮革染坊（一格格彩色染缸）\",\"马林王朝的都城\",\"铜匠与香料\"],\"sensory\":\"老城窄得驴子过来人就得贴墙。拐过几道弯，一股冲鼻的气味扑来——一大片露天染缸，红、黄、靛蓝一格挨一格，工人光着腿站在缸里踩皮子。另一头的学府里学生围坐背诵，这地方据说是一个女人捐钱建的，几百年没断过课。\",\"note\":\"非斯（今摩洛哥）由伊德里斯王朝于8世纪末奠基。城中的卡鲁因（Qarawiyyin）清真寺-大学由女性法蒂玛·菲赫里于859年出资创办，常被列为世界上最古老的、仍在办学的学府。乔阿拉皮革染坊以一格格彩色染缸闻名，工艺数百年未变。13-15世纪为马林王朝都城。\"}),\n  E({\"id\":\"ck326\",\"name\":\"马拉喀什（撒哈拉门前的红城）\",\"en\":\"Marrakesh\",\"region\":\"埃及·北非\",\"country\":\"摩洛哥\",\"era\":\"中古\",\"year\":1250,\"period\":\"11-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"穆拉比特王朝所建\",\"库图比亚宣礼塔\",\"横跨马格里布与西班牙的穆瓦希德帝国\",\"不夜的杰马·夫纳广场（说书人·耍蛇人·夜市）\",\"雪山脚下的沙漠口岸\",\"棕榈与花园\"],\"sensory\":\"红土夯的城墙，背后是阿特拉斯山顶的雪，眼前却是通向撒哈拉的沙路。中央一座高耸的方塔在召唤礼拜。入夜，大广场点起一片摊火——说书人围着一圈人讲古，耍蛇人的笛子呜呜响，烤肉烟和薄荷茶味四下飘。骆驼商队刚从沙漠那头进城。\",\"note\":\"马拉喀什约1070年由穆拉比特（Almoravid）王朝兴建，继之的穆瓦希德（Almohad）帝国以此为都，疆域横跨马格里布与安达卢西亚，库图比亚宣礼塔即此时所建。它是跨撒哈拉贸易的北端口岸，杰马·夫纳广场的露天表演与夜市延续至今。\"}),\n  E({\"id\":\"ck327\",\"name\":\"加拉曼特（撒哈拉腹地的战车之国）\",\"en\":\"The Garamantes\",\"region\":\"埃及·北非\",\"country\":\"利比亚\",\"era\":\"古典\",\"year\":-500,\"period\":\"约前500-公元500\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"沙漠·绿洲\",\"贸易·商业\",\"城市·都会\"],\"atmos\":[\"沙漠深处的城邦\",\"挖地下暗渠（foggara）汲取化石水种地\",\"驾战车的民族\",\"跨撒哈拉贩运\",\"水用尽后湮灭\",\"希罗多德笔下的\\\"加拉曼特人\\\"\"],\"sensory\":\"四面全是沙，城却建在正中央。地底下挖着一条条暗渠，把藏在岩层里的老水引出来浇地，麦子和椰枣居然长得起来。岩壁上刻着古人驾两轮战车飞奔的样子。商队从这儿出发，穿过死亡之地，去南边换黄金和奴隶。可那地下的水，用一点少一点。\",\"note\":\"加拉曼特（Garamantes）是公元前后兴盛于今利比亚费赞沙漠腹地的城邦文明，希罗多德已提及。他们开凿地下暗渠（foggara）汲取化石地下水，在撒哈拉中心发展灌溉农业与城市，并掌控跨撒哈拉贸易。随着不可再生的地下水枯竭，约公元后期走向衰亡。\"}),\n  E({\"id\":\"ck328\",\"name\":\"巴巴里海盗（地中海上的劫掠与赎身）\",\"en\":\"Barbary Corsairs\",\"region\":\"埃及·北非\",\"country\":\"阿尔及利亚·的黎波里\",\"era\":\"近世\",\"year\":1750,\"period\":\"16-18世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"奴役·压迫\",\"战争·军事\"],\"atmos\":[\"阿尔及尔·突尼斯·的黎波里的海盗城邦\",\"名义上的奥斯曼属地\",\"掳掠基督徒卖为奴\",\"关押人质的\\\"巴尼奥\\\"牢狱\",\"赎身修会渡海来赎人\",\"连冰岛爱尔兰都遭袭\"],\"sensory\":\"港口停着快船，桅杆上的旗换来换去。市场上拍卖的不是货——是人。一批欧洲人被铁链拴着，刚从被劫的商船上押下来：掏得出赎金的等家里寄钱，掏不出的发去划桨、采石。教堂的修士漂洋过海来，一个个把人赎回去。在海这边的城里，这是一门正经买卖。\",\"note\":\"16-19世纪，阿尔及尔、突尼斯、的黎波里（及摩洛哥的萨累）是名义上臣属奥斯曼的海盗城邦，劫掠地中海乃至大西洋的船只与海岸（远及冰岛、爱尔兰），将俘获的欧洲人卖为奴或勒索赎金，数百年间累计被掳者以百万计。基督教赎身修会专事渡海赎人。1830年法国攻占阿尔及尔后渐告终结。\"}),\n  E({\"id\":\"ck329\",\"name\":\"锡瓦绿洲（阿蒙神谕与亚历山大）\",\"en\":\"Siwa Oasis\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"古典\",\"year\":-331,\"period\":\"通时代（体验上取前331年亚历山大来访最浓）\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"沙漠·绿洲\",\"宫廷·王权\"],\"atmos\":[\"埃及西部沙漠深处的绿洲\",\"阿蒙神谕所\",\"亚历山大长途跋涉来问卜被称\\\"神之子\\\"\",\"柏柏尔锡维语与独特习俗\",\"盐湖与椰枣林\",\"泥砖城堡沙利\"],\"sensory\":\"走了好些天沙漠，眼前忽然一片绿——成林的椰枣和橄榄，泉水汩汩，远处一汪盐湖白得刺眼。绿洲中央的泥砖神庙里，祭司隔着帘子传出神的话。那位远道而来的年轻征服者进去问了什么，没人知道；出来时，人们已叫他\\\"阿蒙之子\\\"。\",\"note\":\"锡瓦是埃及西部沙漠的柏柏尔人绿洲，以阿蒙神谕所闻名。前331年亚历山大大帝穿越沙漠前来求谕，据传被祭司认作\\\"阿蒙（宙斯-阿蒙）之子\\\"，强化了他的神性王权。锡瓦至今保留独特的锡维语（柏柏尔语支）与习俗，泥砖古城沙利（Shali）耸立于盐湖椰林间。\"}),\n  E({\"id\":\"ck330\",\"name\":\"阿克苏姆王国\",\"en\":\"Kingdom of Aksum\",\"region\":\"撒哈拉以南非洲\",\"country\":\"埃塞俄比亚\",\"era\":\"古典\",\"year\":650,\"period\":\"1-7世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"贸易·商业\",\"城市·都会\"],\"atmos\":[\"方尖碑（石碑群）\",\"基督教早期传入（4世纪）\",\"红海贸易\",\"象牙与黄金出口\",\"约柜传说\"],\"sensory\":\"高原上的城市，空气凉爽。巨大的石碑矗立着——雕成多层楼房的样子，凿出一排排假窗，底部还有一道假门。最高的一根本该有三十三米，立起来时就塌了，至今碎在原地。港口（阿杜利斯）有来自罗马、印度、阿拉伯的商人。国王刚刚受洗——据说从此这片土地将信仰新的神。\",\"note\":\"阿克苏姆是撒哈拉以南非洲最早的基督教国家（约330年）。其石碑雕刻技术独树一帜。\"}),\n  E({\"id\":\"ck331\",\"name\":\"拉利贝拉（岩凿教堂·埃塞俄比亚）\",\"en\":\"Lalibela Rock Churches\",\"region\":\"撒哈拉以南非洲\",\"country\":\"埃塞俄比亚\",\"era\":\"中古\",\"year\":1250,\"period\":\"12-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"从岩石中向下凿出的教堂\",\"\\\"新耶路撒冷\\\"\",\"十字形平面的圣乔治教堂\",\"埃塞俄比亚正教（Tewahedo）\"],\"sensory\":\"地面上有一个十字形的深坑——走下去才发现，坑底是一座完整的教堂，从整块岩石中凿出来的。不是从下往上建的，是从上往下挖的。石头表面被信徒的手摸得光滑。牧师穿着白袍在里面主持弥撒。\",\"note\":\"拉利贝拉的岩凿教堂是世界建筑史上最不可思议的工程之一——没有一块石头是搬来的，整座教堂从地面往下挖出来。\"}),\n  E({\"id\":\"ck332\",\"name\":\"斯瓦希里海岸·基尔瓦\",\"en\":\"Swahili Kilwa\",\"region\":\"撒哈拉以南非洲\",\"country\":\"坦桑尼亚·斯瓦希里\",\"era\":\"中古\",\"year\":1450,\"period\":\"11-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"海洋·港口\",\"贸易·商业\",\"城市·都会\"],\"atmos\":[\"珊瑚石建筑\",\"印度洋贸易网络\",\"黄金转口港\",\"阿拉伯-班图文化融合\",\"斯瓦希里语\"],\"sensory\":\"珊瑚石建造的房子面朝印度洋。港口里有来自印度的棉布商人、来自阿拉伯的香料贩子。这座城市铸造自己的钱币——铜币上有阿拉伯文。清真寺的宣礼声和非洲鼓声在同一个黄昏里响起。\",\"note\":\"斯瓦希里文明是非洲和印度洋世界交汇的产物——语言是班图语基底加阿拉伯语借词。基尔瓦曾是东非最富有的城邦。\"}),\n  E({\"id\":\"ck333\",\"name\":\"桑给巴尔（丁香与奴隶贸易）\",\"en\":\"Zanzibar Stone Town\",\"region\":\"撒哈拉以南非洲\",\"country\":\"坦桑尼亚·斯瓦希里\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"贸易·商业\",\"城市·都会\"],\"atmos\":[\"阿曼苏丹迁都于此\",\"丁香种植园\",\"东非奴隶贸易中心\",\"石头城\"],\"sensory\":\"整座岛的空气是丁香味——浓到让人头晕。石头城的巷子窄到伸手能碰到两边墙。港口旁边有一个市场——卖的不是货物，是人。有些人从大陆内陆被带来，走了几个月。\",\"note\":\"桑给巴尔是东非奴隶贸易的中心——丁香的甜香和奴隶贸易的残酷共存于同一座岛。奴隶市场遗址至今保存。\"}),\n  E({\"id\":\"ck334\",\"name\":\"加纳帝国（瓦加杜）\",\"en\":\"Ghana Empire\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马里\",\"era\":\"中古\",\"year\":1250,\"period\":\"6-13世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"贸易·商业\",\"沙漠·绿洲\",\"宫廷·王权\"],\"atmos\":[\"黄金之地\",\"跨撒哈拉贸易的南端\",\"盐换黄金\",\"\\\"国王的国王\\\"\",\"无声贸易\"],\"sensory\":\"据说这里的国王用金子拴狗。无声贸易——把盐放在地上然后走开，对方来放黄金，如果够了就拿走盐。你不需要说同一种语言来做买卖。鼓声从一个村庄传到下一个村庄——比人跑得快。\",\"note\":\"\\\"无声贸易\\\"是跨文化商业史上的经典案例——两个不通语言的文明通过物物交换达成交易。\"}),\n  E({\"id\":\"ck335\",\"name\":\"马里帝国·廷巴克图\",\"en\":\"Mali's Timbuktu\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马里\",\"era\":\"中古\",\"year\":1550,\"period\":\"13-16世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"学问·书写\",\"宗教·信仰\",\"贸易·商业\"],\"atmos\":[\"曼萨穆萨（麦加朝圣导致开罗金价崩溃）\",\"桑科雷大学\",\"泥砖清真寺\",\"跨撒哈拉学术网络\"],\"sensory\":\"泥砖清真寺的尖塔上插着木棍——不是装饰，是方便工人攀爬修补泥墙。一间简陋的房子里有人在抄写手稿——数学、天文、法律、诗歌，用阿拉伯语。据说这座城市的图书馆比任何商品都值钱。\",\"note\":\"廷巴克图的手稿传统是对\\\"非洲没有书面文化\\\"这一偏见的最直接反驳——数十万份手稿保存至今。曼萨穆萨的麦加朝圣因沿途散金导致地中海金价崩溃。\"}),\n  E({\"id\":\"ck336\",\"name\":\"曼萨穆萨的朝圣之路\",\"en\":\"Mansa Musa's Hajj\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马里\",\"era\":\"中古\",\"year\":1324,\"period\":\"1324\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"沙漠·绿洲\",\"贸易·商业\"],\"atmos\":[\"史上最富有的人\",\"六万人的朝圣队伍\",\"沿途散金\",\"开罗金价崩盘十年\",\"世界地图上出现了非洲的国王\"],\"sensory\":\"一支庞大的队伍穿越撒哈拉——前面是骑马的骑士，后面是骆驼队，驮着黄金。到了开罗，国王给每个人送金子——多到市场上的金价暴跌了。欧洲的地图师第一次在地图上画了一个非洲国王——手里举着金块。\",\"note\":\"曼萨穆萨的朝圣是跨撒哈拉贸易史和全球经济史上的标志性事件。他可能是人类历史上最富有的个人。\"}),\n  E({\"id\":\"ck337\",\"name\":\"桑海帝国·加奥\",\"en\":\"Songhai Gao\",\"region\":\"撒哈拉以南非洲\",\"country\":\"马里\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"河流·水乡\",\"贸易·商业\"],\"atmos\":[\"桑尼·阿里\",\"阿斯基亚·穆罕默德\",\"继承马里帝国的西非霸权\",\"尼日尔河\",\"最终被摩洛哥火枪队摧毁\"],\"sensory\":\"尼日尔河弯曲处的大城市。河上的独木舟来来往往——有运盐的、运黄金的、运奴隶的。远处的沙漠里来了一支军队——据说他们有一种能喷火的武器。\",\"note\":\"桑海帝国1591年被摩洛哥远征军（配备火枪）击败——冷兵器帝国遭遇热兵器入侵的经典案例。\"}),\n  E({\"id\":\"ck338\",\"name\":\"大津巴布韦\",\"en\":\"Great Zimbabwe\",\"region\":\"撒哈拉以南非洲\",\"country\":\"津巴布韦\",\"era\":\"中古\",\"year\":1450,\"period\":\"11-15世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"城市·都会\",\"工艺·手艺\",\"贸易·商业\"],\"atmos\":[\"石头围墙城市\",\"无灰浆干砌石\",\"黄金贸易内陆枢纽\",\"津巴布韦鸟（滑石雕刻）\"],\"sensory\":\"巨大的石墙——用花岗岩块干砌而成，没有灰浆，但严丝合缝。墙内有一座锥形塔，用途不明。城市比你预想的大——住着上万人。黄金从内陆矿区运到这里，然后被运往斯瓦希里海岸的港口。\",\"note\":\"大津巴布韦的建造者身份曾被殖民者否认（不愿承认非洲人能建造如此工程），现已确认为绍纳人祖先。\"}),\n  E({\"id\":\"ck339\",\"name\":\"贝宁王国（西非）\",\"en\":\"Kingdom of Benin\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚\",\"era\":\"中古\",\"year\":1850,\"period\":\"13-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"工艺·手艺\",\"艺术·表演\",\"宫廷·王权\"],\"atmos\":[\"贝宁铜雕\",\"王宫浮雕板\",\"城墙体系（比长城还长的土墙网络）\",\"与葡萄牙人的早期接触\"],\"sensory\":\"城墙很长——据说比任何人见过的墙都长。宫殿的廊柱上挂着铜板——每一块都记录着一个场景：国王、战士、葡萄牙商人。铸铜工匠在用失蜡法铸造一尊头像——技艺精湛到让欧洲人震惊。\",\"note\":\"贝宁铜雕是非洲艺术最著名的作品群。1897年英国军队掠走了大量铜雕（\\\"贝宁青铜器\\\"），近年陆续归还。城墙体系据估算总长超过16000公里。\"}),\n  E({\"id\":\"ck340\",\"name\":\"刚果王国\",\"en\":\"Kingdom of Kongo\",\"region\":\"撒哈拉以南非洲\",\"country\":\"刚果\",\"era\":\"中古\",\"year\":1850,\"period\":\"14-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宗教·信仰\",\"殖民·帝国\",\"奴役·压迫\"],\"atmos\":[\"姆班扎刚果（首都）\",\"与葡萄牙的早期外交\",\"国王受洗改信基督教\",\"贝币（nzimbu 海贝）\",\"奴隶贸易的侵蚀\"],\"sensory\":\"国王穿着葡萄牙人送来的丝绒衣服——但底下还是传统的腰布。他有一个基督教名字，也有一个刚果名字。教堂和祖先圣林隔一条街。但每年被卖到大海对岸去的人越来越多了。\",\"note\":\"刚果王国与葡萄牙的外交是非洲与欧洲最早的对等接触之一——国王阿方索一世曾用葡萄牙语给葡萄牙国王写信抗议奴隶贸易。\"}),\n  E({\"id\":\"ck341\",\"name\":\"祖鲁王国（沙卡·祖鲁）\",\"en\":\"Shaka's Zulu Kingdom\",\"region\":\"撒哈拉以南非洲\",\"country\":\"南非\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪初\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"战争·军事\",\"迁徙·流亡\"],\"atmos\":[\"沙卡军事改革\",\"iklwa 短刺矛\",\"姆菲坎（大流散）\",\"\\\"牛角阵型\\\"\",\"南非政治版图重塑\"],\"sensory\":\"战士们不再用长矛投掷——新的首领让他们用短刺近身刺杀。盾牌的颜色代表不同的军团。训练极其严酷——未经允许不得结婚。一场战斗之后，周围的部落要么加入，要么逃走。\",\"note\":\"沙卡的军事改革在短短十年内重塑了整个南非的政治版图。姆菲坎（因祖鲁扩张引发的连锁迁徙和战争）影响了整个非洲南部。\"}),\n  E({\"id\":\"ck342\",\"name\":\"戈雷岛（奴隶贸易中转站）\",\"en\":\"Gorée Island\",\"region\":\"撒哈拉以南非洲\",\"country\":\"塞内加尔\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"冲突\",\"nsfw\":false,\"themes\":[\"奴役·压迫\",\"海洋·港口\",\"迁徙·流亡\"],\"atmos\":[\"西非奴隶贸易\",\"\\\"不归之门\\\"\",\"中间通道（跨大西洋航路）\",\"达喀尔近海的小岛\"],\"sensory\":\"（此坐标感官锚点从略）\",\"note\":\"极重坐标。戈雷岛的\\\"奴隶之家\\\"是跨大西洋奴隶贸易最具象征性的遗址。体验角度限定为被贩卖者的等待视角。\"}),\n  E({\"id\":\"ck343\",\"name\":\"阿散蒂帝国·库马西\",\"en\":\"Asante Kumasi\",\"region\":\"撒哈拉以南非洲\",\"country\":\"加纳\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"工艺·手艺\",\"战争·军事\"],\"atmos\":[\"金凳子（王权象征）\",\"肯特布（编织布）\",\"黄金铸造\",\"与英国的多次战争\"],\"sensory\":\"金凳子不是用来坐的——它是从天上降下来的，代表整个民族的灵魂。没有人，包括国王，坐在它上面。织布的人在用窄幅织机编出鲜艳的几何图案——黄色是金子的颜色，绿色是森林。宫廷里有人在用金砂称重做交易。\",\"note\":\"阿散蒂的金凳子至今是阿散蒂人最神圣的象征——英国人曾试图坐上去（引发了金凳子战争）。肯特布是加纳最著名的文化符号。\"}),\n  E({\"id\":\"ck344\",\"name\":\"独立浪潮·阿克拉（加纳独立）\",\"en\":\"Ghana's Independence\",\"region\":\"撒哈拉以南非洲\",\"country\":\"加纳\",\"era\":\"战后·当代\",\"year\":1957,\"period\":\"1957\",\"tone\":\"混合\",\"nsfw\":false,\"themes\":[\"革命·变革\",\"殖民·帝国\",\"节庆·仪式\"],\"atmos\":[\"恩克鲁玛\",\"撒哈拉以南非洲第一个独立的殖民地国家\",\"\\\"非洲必须团结\\\"\",\"独立广场\"],\"sensory\":\"午夜。英国的旗降下来，一面新的旗升上去——红黄绿，中间有一颗黑星。广场上的人群在欢呼。恩克鲁玛说：\\\"我们终于自由了。\\\"但自由之后要做什么，没有人完全确定。\",\"note\":\"加纳独立开启了非洲去殖民化的多米诺骨牌。\\\"第一次\\\"母题——一个大陆的第一次独立。\"}),\n  E({\"id\":\"ck345\",\"name\":\"库施·麦罗埃（黑法老与金字塔之国）\",\"en\":\"Kush & Meroë\",\"region\":\"撒哈拉以南非洲\",\"country\":\"苏丹·努比亚\",\"era\":\"古典\",\"year\":-300,\"period\":\"约前300-公元350\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"宗教·信仰\",\"工艺·手艺\"],\"atmos\":[\"努比亚的金字塔（数量多于埃及·又瘦又陡）\",\"曾入主埃及的\\\"黑法老\\\"（第25王朝）\",\"女王坎达克\",\"炼铁\",\"自己的麦罗埃文字（至今未解）\"],\"sensory\":\"尼罗河上游，沙丘间立着成排的金字塔——比埃及的更瘦、更陡，也矮些，几十座挤在一处。城外炉火通红，铁渣堆成小山。神庙墙上刻着一位丰满的女王，举刀按住一排俘虏。墙上那些字一行行的，如今没人认得。\",\"note\":\"库施王国以纳帕塔、后以麦罗埃为都。其君主曾在前8-前7世纪入主埃及，史称第25王朝\\\"黑法老\\\"。麦罗埃以金字塔群（数量多于埃及）和炼铁著称，女性统治者称\\\"坎达克\\\"，曾与罗马交战。麦罗埃文字至今未能释读。\"}),\n  E({\"id\":\"ck346\",\"name\":\"贡德尔（埃塞俄比亚的石头城堡）\",\"en\":\"Gondar\",\"region\":\"撒哈拉以南非洲\",\"country\":\"埃塞俄比亚\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"日常\",\"nsfw\":false,\"themes\":[\"宫廷·王权\",\"宗教·信仰\",\"城市·都会\"],\"atmos\":[\"法西利德斯王建城\",\"石砌城堡群（非洲的\\\"卡美洛\\\"）\",\"德布雷·伯罕·塞拉
