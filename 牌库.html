\"。人群欢呼。旁边有人在分发莴苣——因为莴苣的白色汁液让人联想到精液。\",\"note\":\"敏神是古埃及最公开的\\\"性神\\\"——他的形象永远是勃起状态，出现在无数神庙浮雕上。丰收节上法老要在敏神像前展示自己的生殖能力（具体仪式细节有争议，但一些学者认为包含公开的性行为）。莴苣在古埃及是敏神的圣物——因为割开时流出的白色乳汁。\"}),\n  E({\"id\":\"ck489\",\"name\":\"古埃及·情诗（新王国的爱歌）\",\"en\":\"New Kingdom Love Songs\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":-1300,\"period\":\"约前1300-前1100\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"女性空间\"],\"atmos\":[\"切斯特·贝蒂纸草情诗\",\"\\\"妹妹\\\"和\\\"兄弟\\\"=爱人的称呼\",\"直白的身体描写\",\"女性视角的欲望表达\",\"\\\"我想去河边洗澡——故意让你看到\\\"\"],\"sensory\":\"她在写诗——或者说在唱。\\\"我的哥哥，你让我心跳。当你走过来，我的手臂张开想拥抱你——它们不听我的话。\\\"\\\"我想去河边，穿那件最薄的亚麻衣服，走到水里——让它湿透贴在身上。\\\"他也在写：\\\"她的嘴唇是花蕾，她的胸是苹果，她的手臂像芦苇——我想做那只停在芦苇上的鸟。\\\"\",\"note\":\"古埃及新王国时期的情诗是世界文学中最早的抒情诗传统之一——女性视角的欲望表达尤其突出。\\\"兄弟/妹妹\\\"是爱人之间的称呼（不是乱伦）。诗中的身体描写直接但优美——果实、花朵、鸟、水的比喻。这些诗显示古埃及女性在表达欲望方面没有被压抑。\"}),\n  E({\"id\":\"ck490\",\"name\":\"古埃及·女性的法律地位与性自主\",\"en\":\"Egyptian Women's Autonomy\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"上古\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"律法·审判\",\"女性空间\"],\"atmos\":[\"女性可拥有财产\",\"可主动离婚\",\"可签合同\",\"没有\\\"贞操\\\"概念（相对而言）\",\"婚姻是合同关系而非宗教圣事\",\"避孕知识（鳄鱼粪+蜂蜜）\"],\"sensory\":\"她在签一份合同——婚姻合同。上面写着如果他离开她，她得到三分之一的共同财产。如果她离开他，她退回聘礼但保留自己带来的嫁妆。没有神父。没有仪式。婚姻在这里不是神圣的——是经济的。她今天还去了一趟草药师那里——买了一种用蜂蜜和金合欢叶做的东西，放进去就不会怀孕。\",\"note\":\"古埃及女性的法律地位在古代世界中相当突出——可以拥有和继承财产、主动提出离婚、独立签署合同。婚姻是民事契约而非宗教仪式。避孕方面有两份不同的古文献：卡洪妇科纸草（Kahun Papyrus，约前1850年）记载了用鳄鱼粪和蜂蜜制成的阴道栓剂（粪便的碱性可能有杀精效果，同时作为物理屏障）；埃伯斯纸草（Ebers Papyrus，约前1550年）则记载了用金合欢叶、蜂蜜和麻布制成的\\\"栓剂\\\"——金合欢发酵后确实能产生杀精效果（乳酸），现代避孕胶中仍在使用类似成分。\"}),\n  E({\"id\":\"ck491\",\"name\":\"克利奥帕特拉·性与帝国政治\",\"en\":\"Cleopatra's Statecraft\",\"region\":\"埃及·北非\",\"country\":\"埃及\",\"era\":\"古典\",\"year\":-51,\"period\":\"前51-前30\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"殖民·帝国\"],\"atmos\":[\"不是\\\"美女\\\"而是\\\"有魅力的政治家\\\"\",\"与凯撒和安东尼的关系\",\"罗马宣传中的\\\"东方妖妇\\\"vs现实\",\"用性建立政治联盟\",\"最后的法老\"],\"sensory\":\"她不是罗马人画的那种妖妇——她会说九种语言，亲自管理国家财政。她选了凯撒不是因为爱——是因为埃及需要罗马的军队。后来凯撒死了，她选了安东尼——同样的理由。罗马人说她放荡——但罗马人也对任何不受他们控制的有权力的女人这么说。她用一条蛇结束了自己的生命。或者没有。\",\"note\":\"克利奥帕特拉的\\\"性感形象\\\"很大程度上是罗马宣传的产物——屋大维需要把她塑造成腐化安东尼的东方妖妇来合理化自己的战争。历史上的克利奥帕特拉更接近一个精明的政治家——她的两段重要关系都是深思熟虑的政治联盟。硬币上的她相貌平平，但所有文献都说她\\\"有极强的个人魅力\\\"。体验核心是\\\"当性成为国际政治工具时\\\"。\"}),\n  E({\"id\":\"ck492\",\"name\":\"安达卢西亚·《鸽子的颈环》与爱的艺术\",\"en\":\"The Ring of the Dove\",\"region\":\"埃及·北非\",\"country\":\"西班牙\",\"era\":\"中古\",\"year\":1050,\"period\":\"11世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"学问·书写\"],\"atmos\":[\"伊本·哈兹姆（Ibn Hazm）《鸽子的颈环》（Ṭawq al-Ḥamāma）\",\"穆斯林西班牙的爱情论\",\"对爱的哲学分析\",\"后宫中的同性之爱\",\"花园中的幽会\"],\"sensory\":\"一个来自科尔多瓦的流亡学者在哈蒂瓦（Játiva）写一本关于爱情的书——不是小说，是理论。他分析了爱的三十个阶段——从\\\"目光的第一次交汇\\\"到\\\"因爱而死\\\"。他用自己的经历举例：\\\"我年轻时在后宫中长大，我第一次爱上的是一个金发的女奴——她的头发像太阳。\\\"他也写了男人爱上男人的故事——在这个年代，这不需要遮掩。\",\"note\":\"《鸽子的颈环》是世界文学中最精致的爱情论之一——伊本·哈兹姆用哲学和个人经历分析爱情的本质。他是一个严肃的宗教学者，但同时坦率地讨论欲望、嫉妒、同性之爱。安达卢西亚的文化氛围使这种坦率成为可能——同样的内容在同时代的基督教欧洲不可想象。\"}),\n  E({\"id\":\"ck493\",\"name\":\"安达卢西亚·摩尔人的浴场文化\",\"en\":\"Moorish Hammam\",\"region\":\"埃及·北非\",\"country\":\"西班牙\",\"era\":\"中古\",\"year\":1450,\"period\":\"8-15世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"医疗·身体\",\"女性空间\"],\"atmos\":[\"Hammam（与奥斯曼版互补·西端版）\",\"格拉纳达的阿拉伯浴场\",\"基督徒收复后关闭浴场（\\\"洗太多澡是异教徒的行为\\\"）\",\"清洁=文明vs不洁=虔诚\"],\"sensory\":\"蒸汽从星形天窗里冒出来。石头地板被热水加温。摩尔人每周至少来一次——这是宗教义务也是社交。女人们在自己的时段来——交换消息、挑选媳妇、议论丈夫。后来基督徒攻下了这座城——他们做的第一件事之一就是关闭浴场。\\\"洗澡是摩尔人的习惯，\\\"他们说，\\\"好基督徒不需要那么干净。\\\"\",\"note\":\"基督徒收复安达卢西亚后系统性地关闭了公共浴场——\\\"清洁\\\"被认为是伊斯兰/犹太人的标志，因此是可疑的。这导致了欧洲数百年的\\\"恐水\\\"传统（直到18-19世纪才恢复公共卫浴）。摩尔人浴场和奥斯曼哈曼在功能上一致但文化语境不同——这里多了一层\\\"被征服后消失\\\"的悲剧性。\"}),\n  E({\"id\":\"ck494\",\"name\":\"图阿雷格·阿哈尔之夜（沙漠里女性的自由）\",\"en\":\"Tuareg Ahal\",\"region\":\"埃及·北非\",\"country\":\"撒哈拉·图阿雷格\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代（近代田野记录最详）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"沙漠·绿洲\"],\"atmos\":[\"图阿雷格（\\\"蓝人\\\"·靛蓝面纱把皮肤染蓝）\",\"蒙面的是男人不是女人\",\"母系继嗣·帐篷归女方\",\"婚前恋爱与轻松离婚\",\"阿哈尔（ahal·夜里的情歌聚会）\",\"女人弹独弦琴imzad\",\"提非纳格文字多由女性传承\"],\"sensory\":\"沙漠的夜里，月光下围坐着一圈年轻人。蒙着靛蓝面纱、只露出眼睛的，是男人；不蒙面、大大方方说笑的，是女人。一个女人怀里抱着独弦琴，弓子一拉，调子幽幽地起。这是阿哈尔——情歌、俏皮话、试探在烟和茶里来回传。在这里女人挑人、女人持家，帐篷是女人的；要散伙，把帐篷收了就是离婚。\",\"note\":\"图阿雷格人（撒哈拉中部的柏柏尔游牧民）以一系列\\\"反直觉\\\"的性别习俗著称：蒙面纱（tagelmust）的是男人而非女人；社会按母系继嗣，帐篷与帐内财物归女方；婚前男女恋爱自由、离婚简便（女方撤去帐篷即可）。\\\"阿哈尔\\\"（ahal）是夜间的求爱聚会，伴着女性弹奏的独弦琴（imzad）与即兴情诗。柏柏尔的提非纳格文字也多由女性保存传授。尽管信奉伊斯兰，图阿雷格女性的自主程度在周边社会中相当少见。\"}),\n  E({\"id\":\"ck495\",\"name\":\"维京·性、法律与侮辱\",\"en\":\"Viking Sex and Honor\",\"region\":\"欧洲\",\"country\":\"北欧\",\"era\":\"中古\",\"year\":1050,\"period\":\"8-11世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"律法·审判\",\"宗教·信仰\"],\"atmos\":[\"Frilla（合法的妾/情妇\",\"与妻子并存）\",\"性侮辱是最严重的法律冒犯（Níð）\",\"Ergi（指控男人是\\\"被动方\\\"=合法杀人理由）\",\"弗蕾亚（爱与战争女神）崇拜\",\"前基督教时代的相对性开放\"],\"sensory\":\"他有一个妻子，也有一个Frilla——这是合法的。Frilla的孩子也有继承权。没有人觉得这有问题——直到新来的基督教传教士开始说这是罪。在集会（Thing）上，有人指控另一个人是Ergi——\\\"像女人一样被使用\\\"。这不是闲话——这是最严重的侮辱（Níð），被指控者可以合法地杀掉指控者。或者……反证自己不是。\",\"note\":\"维京社会的性规范与基督教化后的欧洲截然不同——一夫多妻/妾是合法的，婚前性行为被容忍。但\\\"性的等级\\\"极其严格：男人是主动方=正常；男人被指控为被动方（Ergi/Ragr）=最严重的侮辱（Níð），被侮辱者有权杀人来捍卫荣誉。这个体系和罗马的penetrator/penetrated逻辑惊人地相似——关键不是和谁做，而是你是哪个角色。基督教化后，这些规范被逐渐替换为一夫一妻+婚外性行为有罪的体系。\"}),\n  E({\"id\":\"ck496\",\"name\":\"中世纪·骑士之爱（Courtly Love）\",\"en\":\"Courtly Love\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"中古\",\"year\":1350,\"period\":\"12-14世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"艺术·表演\"],\"atmos\":[\"普罗旺斯游吟诗人（Troubadour）\",\"Fin'Amors（精致之爱）\",\"爱的对象总是别人的妻子\",\"阿基坦的埃莉诺（\\\"爱之法庭\\\"）\",\"兰斯洛特与桂妮薇尔\",\"爱=永远得不到=痛苦=最高境界\"],\"sensory\":\"骑士跪在一个女人面前——她是他的领主的妻子。他为她写诗、为她比武、为她受伤。但他不能碰她——至少不能公开碰。这不是失败——这就是规则。爱的本质是渴望，不是满足。诗人唱道：\\\"我爱一个我永远不会拥有的人——这让我比拥有她更高贵。\\\"他可能私下碰了她。诗里不会说。\",\"note\":\"Courtly Love（骑士之爱/宫廷爱情）是欧洲文学对爱情最重要的发明——它把通奸升华为精神追求。发源于12世纪普罗旺斯的游吟诗人传统，核心是：骑士爱上一个不可得的贵妇人（通常是已婚的），通过诗歌、服务和苦行来表达爱——满足不是目的，渴望本身才是。阿基坦的埃莉诺（先后做过法国和英国的王后）据传在普瓦捷主持过\\\"爱之法庭\\\"——审判谁爱得更好。这种传统直接影响了后世所有\\\"浪漫爱情\\\"的概念。\"}),\n  E({\"id\":\"ck497\",\"name\":\"中世纪城市·公共浴场与性\",\"en\":\"Medieval Bathhouse Stews\",\"region\":\"欧洲\",\"country\":\"英国\",\"era\":\"中古\",\"year\":1550,\"period\":\"12-16世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"城市·都会\",\"灾变·瘟疫\"],\"atmos\":[\"Stews/Bathhouse（公共浴场·常兼营妓院）\",\"伦敦南岸的Bankside stews\",\"男女混浴\",\"教会反复禁止但禁不掉\",\"梅毒大流行后浴场关闭\"],\"sensory\":\"浴场里蒸汽弥漫——男人和女人在同一个池子里。有人在洗澡。有人在做别的事。浴场的二楼有独立的房间——那里提供的不只是热水。教会每隔几年就说要关掉这些地方——然后它们又开了。直到一种新的病从新大陆传来——全身长疮、鼻子烂掉。这一次浴场真的关了。\",\"note\":\"中世纪欧洲的公共浴场（Stews）是洗浴和性交易的混合场所——教会反复下令禁止但效果有限。伦敦南岸（Bankside）的浴场/妓院讽刺性地属于温彻斯特主教管辖（因此妓女被称为\\\"Winchester Geese\\\"）。16世纪梅毒大流行后，公共浴场被系统性关闭——欧洲进入了数百年的\\\"恐水\\\"时代（洗澡=危险）。这个浴场关闭与安达卢西亚摩尔人浴场被关闭的故事平行但原因不同——一个是宗教清洗，一个是公共卫生恐慌。\"}),\n  E({\"id\":\"ck498\",\"name\":\"文艺复兴威尼斯·Cortigiana（名妓文化）\",\"en\":\"The Venetian Cortigiana\",\"region\":\"欧洲\",\"country\":\"意大利\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"节庆·仪式\"],\"atmos\":[\"Cortigiana Onesta（\\\"高贵的妓女\\\"·与希腊Hetaira对应）\",\"Veronica Franco（诗人+名妓）\",\"威尼斯嘉年华面具下的性自由\",\"\\\"面具=匿名=可以做任何事\\\"\"],\"sensory\":\"嘉年华期间——全城戴面具。面具后面你是谁都不重要了。总督的儿子可以走进任何一间房，因为没人认得他。一个女人在写诗——她是威尼斯最著名的Cortigiana，维罗妮卡·弗兰科。她接待的客人名单包括国王。她写的诗比大多数男人都好。当局出版了一份\\\"名妓目录\\\"——列出了每个Cortigiana的姓名、地址和价格。\",\"note\":\"威尼斯在16世纪出版了官方的\\\"名妓目录\\\"（Catalogo di tutte le principal et più honorate cortigiane di Venetia），列出了约200名高级妓女的姓名、地址和价格——这可能是人类历史上第一份\\\"性服务消费指南\\\"。Veronica Franco是最著名的Cortigiana Onesta——她不仅接待贵族和国王（法国亨利三世是她的客人），还出版了自己的诗集，并在审判中成功为自己辩护。嘉年华面具制度使得匿名性交成为可能——面具期间不询问身份是规矩。\"}),\n  E({\"id\":\"ck499\",\"name\":\"凡尔赛·Maîtresse-en-titre（官方情妇制度）\",\"en\":\"Versailles Royal Mistresses\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近世\",\"year\":1750,\"period\":\"17-18世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"Maîtresse-en-titre（\\\"正式的情妇\\\"·有官方头衔和预算）\",\"蓬帕杜夫人（路易十五）\",\"蒙特斯潘夫人（路易十四·巫术丑闻）\",\"杜巴利夫人（路易十五·前妓女→最后的官方情妇）\",\"国王的性生活=国家政治\"],\"sensory\":\"她不是王后——但她的套房比王后的大，她的预算比王后的多，她见国王的时间比王后多。她是Maîtresse-en-titre——国王的正式情妇。这个头衔是公开的。她影响着大臣的任命、战争的决策、艺术的风格。蓬帕杜夫人——她资助了百科全书派、创办了塞弗尔瓷器厂、影响了路易十五的外交政策。王后对此无可奈何。整个宫廷都知道：真正的权力不在王后的卧室里。\",\"note\":\"法国宫廷的Maîtresse-en-titre是欧洲最制度化的\\\"情妇权力\\\"——她拥有官方头衔、独立的预算、宫中的套房，以及对国王的政治影响力。蓬帕杜夫人可能是这个位置上最有权力的人——她不只是情人，更像是非正式的首相。蒙特斯潘夫人（路易十四的情妇）涉入\\\"毒药事件\\\"——被怀疑用巫术维持国王的宠爱。杜巴利夫人（路易十五最后的情妇）出身妓女，在大革命中被送上断头台。这个制度在大革命后消失——不是因为道德进步，而是因为没有国王了。\"}),\n  E({\"id\":\"ck500\",\"name\":\"魏玛柏林·性的黄金时代\",\"en\":\"Weimar Sexual Revolution\",\"region\":\"欧洲\",\"country\":\"德国\",\"era\":\"世纪之交\",\"year\":1920,\"period\":\"1920s\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"革命·变革\"],\"atmos\":[\"马格努斯·赫希菲尔德（Magnus Hirschfeld·世界第一个性学研究所·1919）\",\"同性恋解放运动的第一波\",\"卡巴莱表演（变装\",\"脱衣舞）\",\"克里斯托弗·伊舍伍德《柏林故事》\",\"Eldorado夜总会（跨性别/变装·全欧洲最著名）\",\"纳粹上台后一切被摧毁\"],\"sensory\":\"Eldorado夜总会——穿男装的女人在和穿女装的男人跳舞。台上有人在唱一首关于\\\"穿着什么衣服不重要\\\"的歌。赫希菲尔德的性学研究所在几条街外——那里有关于人类性行为最全面的档案。柏林在这几年是全世界最自由的城市。一个英国小说家在角落里观察一切——他后来把这些写进了书里。但时间不多了。1933年，纳粹冲进研究所——把所有书和档案拖到歌剧院广场烧了。\",\"note\":\"魏玛柏林（1919-1933）是人类历史上第一次\\\"性解放运动\\\"的爆发——赫希菲尔德的性学研究所（Institut für Sexualwissenschaft，1919年创立）是世界上第一个性研究机构，档案包括数万份性少数人群的案例记录。Eldorado夜总会是跨性别和变装表演的圣地。1933年纳粹焚烧研究所的照片（书堆上冒烟）是二十世纪最著名的焚书画面之一——纳粹焚烧的第一批书就是性学研究的档案。克里斯托弗·伊舍伍德的《柏林故事》（后改编为音乐剧/电影《歌厅》）记录了这个时代的氛围。体验核心是\\\"自由的最后几年——你知道它将要结束但还没结束\\\"。\"}),\n  E({\"id\":\"ck501\",\"name\":\"启蒙时代·沙龙女主人与自由思想\",\"en\":\"Salons and Libertinage\",\"region\":\"欧洲\",\"country\":\"法国\",\"era\":\"近世\",\"year\":1750,\"period\":\"18世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"学问·书写\",\"女性空间\"],\"atmos\":[\"沙龙女主人（Salonnière）的文化权力\",\"情人关系作为社交网络\",\"Libertinage（自由放荡主义哲学）\",\"萨德侯爵（极端版）\",\"卡萨诺瓦的回忆录\",\"\\\"理性的性\\\"\"],\"sensory\":\"沙龙——一个女人的客厅。伏尔泰在这里和一个公爵争论。女主人决定谁能来谁不能来——她的权力比大多数男人大。她与在座的某几位有过或正在进行的情人关系——这不是丑闻，这是社交的一部分。在另一个城市，一个叫卡萨诺瓦的人在写回忆录——他声称和一百多个女人（以及一些男人）有过关系。他写得像旅行指南。\",\"note\":\"18世纪启蒙时代的沙龙是由女性主导的公共-私人空间——Salonnière（沙龙女主人）通过控制社交网络获得巨大的文化和政治影响力。情人关系在上层社会是公开的、被接受的社交工具。Libertinage不只是\\\"放荡\\\"——它是一种哲学立场，主张用理性而非宗教来看待性。极端版是萨德侯爵（他的名字变成了\\\"虐待狂/sadism\\\"这个词）。卡萨诺瓦的《我的一生》是人类历史上最详细的性自传之一——12卷，记录了他遍及欧洲的情爱冒险。\"}),\n  E({\"id\":\"ck502\",\"name\":\"俄罗斯·巴尼亚（蒸汽里的赤裸与禁忌）\",\"en\":\"Russian Banya\",\"region\":\"欧洲\",\"country\":\"俄罗斯\",\"era\":\"近世\",\"year\":1750,\"period\":\"通时代（外人记载以16-18世纪最详）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"医疗·身体\",\"市井·庶民\"],\"atmos\":[\"木造蒸汽浴室\",\"桦树枝扎的venik抽打身体\",\"历史上男女常混浴\",\"外国使节震惊的记载\",\"与生育/婚俗/异教\\\"浴室精灵\\\"（bannik）相连\",\"出大汗后扑进雪里\"],\"sensory\":\"木屋里热气蒸腾，烧红的石头一浇水，\\\"轰\\\"地腾起一片白雾。人赤条条挤在一处——历史上男女不分，外来的使节看得目瞪口呆。大家用扎成把的桦树枝互相抽打后背，抽出一身大汗，再光着身子冲出门，扑进外头的雪里。浴室在俄国人心里半是洗澡、半是另一个世界，据说角落里住着\\\"浴室精灵\\\"。\",\"note\":\"巴尼亚（баня）是俄罗斯生活的核心。历史上巴尼亚常男女混浴，令17世纪奥列阿里乌斯等外国使节大为震惊；教会与官府屡次试图分隔两性（如1743年法令）。蒸汽、桦枝鞭打（venik）、热后扑雪的循环既为洁净健康，也与求偶、婚俗、生育相连。前基督教信仰里浴室住着精灵\\\"bannik\\\"，是个介于洁净与禁忌之间的暧昧空间。\"}),\n  E({\"id\":\"ck503\",\"name\":\"佛罗伦萨·\\\"夜之官\\\"与少年之爱\",\"en\":\"Florentine Sodomy\",\"region\":\"欧洲\",\"country\":\"意大利\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"律法·审判\",\"市井·庶民\"],\"atmos\":[\"佛罗伦萨男风之盛令\\\"Florenzer\\\"在德语里成了\\\"鸡奸者\\\"的代名词\",\"专设\\\"夜之官\\\"（Ufficiali di Notte）查处\",\"年长主动/少年被动的固定模式\",\"达·芬奇曾被匿名告发\",\"美与罪的纠缠\"],\"sensory\":\"这座城以美著称，也以另一桩事远近闻名——男人之间的爱多到在德语里\\\"佛罗伦萨人\\\"干脆成了那种人的代称。城里为此专设了一个衙门\\\"夜之官\\\"，受理墙缝里塞进的匿名告发，一年记下成百上千个名字。被告发的有作坊学徒，也有日后名垂画史的人——年轻的达·芬奇就曾上过这样一张匿名状。\",\"note\":\"文艺复兴的佛罗伦萨以男性同性关系之普遍闻名，以至德语用\\\"Florenzer\\\"指称鸡奸者。市政于1432-1502年专设\\\"夜之官\\\"（Ufficiali di Notte）受理（多为匿名）举报、惩处鸡奸——据研究七十年间被牵连者达上万人。当时的模式多为年长男子与青春期少年的不对等关系。1476年青年达·芬奇曾被匿名投状（后撤案）。情欲、美与\\\"罪\\\"在这座城里纠缠难分。\"}),\n  E({\"id\":\"ck504\",\"name\":\"平安京·访妻婚之夜\",\"en\":\"Heian Marriage Visits\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1050,\"period\":\"10-11世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"婚恋·求爱\",\"性·情色\"],\"atmos\":[\"访妻婚（妻问婚）\",\"后朝（衣衣\",\"きぬぎぬ）的别离\",\"书信往来\",\"以熏香识人\",\"御帘之隔的气息\",\"衣色的层叠——一个人的教养会在寝所里显露\"],\"sensory\":\"夜。牛车的声音渐渐远去。几帐的另一侧传来衣裙摩擦的声响，和沉香的气味。看不见脸——只凭声音和气味，便知道这个人是谁。次日清晨，枕边放着一首和歌。墨迹还没有干。\",\"note\":\"平安贵族的恋爱是「不见其面而始，凭香气识人，以和歌传情」。后朝（衣衣）指共度一夜后翌晨的别离，男方回家后必须立刻送出「后朝之文」。送得迟了，便会被怀疑没有教养。比起性爱本身，其前后的礼法承载着更浓密的文化。\"}),\n  E({\"id\":\"ck505\",\"name\":\"中世·傀儡女与白拍子\",\"en\":\"Kugutsu and Shirabyōshi\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"中古\",\"year\":1250,\"period\":\"11-13世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"迁徙·流亡\"],\"atmos\":[\"傀儡女（くぐつめ\",\"操偶卖艺\",\"兼营卖身的流浪女艺人）\",\"白拍子\",\"旅行艺人与性劳动的一体化\",\"游女的原型\",\"今样（流行歌谣）\",\"祇王·佛御前\"],\"sensory\":\"驿站的边缘，女子们在歌舞。也有人操弄着人偶。旅人递过钱币，其中一人便消失在帷帐之中。她们没有定居之所——道路本身就是家。\",\"note\":\"中世日本的性劳动者与艺能不可分割。白拍子是身着男装起舞的游女艺人，受平清盛宠爱的祇王、佛御前最为有名。这是一个「靠卖艺谋生还是靠卖身谋生」的界限并不存在的世界。\"}),\n  E({\"id\":\"ck506\",\"name\":\"战国·众道之礼法\",\"en\":\"The Way of Shudō\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1550,\"period\":\"15-16世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"战争·军事\"],\"atmos\":[\"众道（しゅどう\",\"武士间的男色之道）\",\"念者与若众（年长者与少年）\",\"武田信玄的情书（实物现存）\",\"森兰丸\",\"武士的男色是一种「雅趣」\",\"义兄弟之盟与肉体关系的一体化\"],\"sensory\":\"阵幕之中，年轻的小姓正在为主君卸下甲胄。手法娴熟。帐外是篝火噼啪的声响。主君在大战前夜，选择了待在这名少年身边。明日，两人是否都还活着，谁也不知道。\",\"note\":\"武田信玄写给家臣高坂昌信（春日虎纲）的辩白情书实物尚存——内容是「我没有和那个小姓睡过，我对你发誓」。战国武将的男色并非耻辱而是一种雅趣，主从关系与恋爱关系在此重叠，构成独特的结构。当时存在这样的分工：与女性的婚姻是为了家族，众道则是为了心。\"}),\n  E({\"id\":\"ck507\",\"name\":\"安土桃山·出云阿国与歌舞伎的诞生\",\"en\":\"Okuni's Kabuki\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":-1603,\"period\":\"1603前后\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\"],\"atmos\":[\"出云阿国\",\"歌舞伎舞（かぶき踊り）\",\"游女歌舞伎→若众歌舞伎→野郎歌舞伎\",\"情色艺能的弹压与变形\"],\"sensory\":\"四条河原聚满了人。女子作男装起舞——动作妖娆撩人。看客们兴奋不已。数日后，幕府禁了这种舞。接着改由少年起舞。那也被禁了。\",\"note\":\"歌舞伎的起源是游女的情色表演。幕府禁止游女歌舞伎→转向美少年的若众歌舞伎→这也遭禁→最终落定为成年男性的野郎歌舞伎。每一次禁止都催生出新的形态，堪称讽刺。\"}),\n  E({\"id\":\"ck508\",\"name\":\"江户·大奥\",\"en\":\"The Ōoku\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"将军的后宫\",\"三千名女性\",\"大奥总取缔·春日局\",\"退褥（お褥すべり\",\"30岁便退出将军寝所）\",\"御中臈\",\"权力斗争与性的政治\"],\"sensory\":\"男子禁入。这道门之内，除将军外没有任何男人能进。走廊上行走的女子，衣装比大名的正室还要华丽。今夜由谁走过「御铃廊下」，将改变整个大奥的权力格局。\",\"note\":\"大奥既是将军的后宫，同时也是庞大的女性政治组织。将军的宠爱＝政治权力。「退褥」（30岁便退出性角色）是残酷的制度，但也有女性在退出之后凭政治手腕维持权力。这是一个性与权力完全融为一体的空间。\"}),\n  E({\"id\":\"ck509\",\"name\":\"江户·吉原的背面\",\"en\":\"Yoshiwara's Underside\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"奴役·压迫\",\"死亡·葬仪\"],\"atmos\":[\"花魁的一天\",\"从禿（かむろ\",\"侍奉花魁的幼女）到太夫之路\",\"年季奉公（债务捆绑的卖身契约）\",\"张见世（格子内陈列示客）\",\"投入寺（净闲寺）\",\"梅毒\"],\"sensory\":\"格子的另一侧，女子们一字排开。客人正在品评挑选。里间的房中，花魁身上层层叠着数件和服——每一件都各有寓意。夜深时分，一具小小的棺木从后门被抬出。运往投入寺。\",\"note\":\"与 japan.md 的吉原坐标互为表里。那边是「花魁道中」的华美，这边则是背面——在卖身期满之前便死去的游女不计其数。净闲寺（投入寺）埋葬着两万多具游女的遗骨。这是一个体验华美与剥削双重结构的坐标。\"}),\n  E({\"id\":\"ck510\",\"name\":\"江户·春画的工坊\",\"en\":\"The Shunga Workshop\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"工艺·手艺\"],\"atmos\":[\"春画（しゅんが）\",\"笑绘\",\"北斋《章鱼与海女》\",\"从歌麿的美人画到春画\",\"枕绘\",\"作为嫁妆的春画\"],\"sensory\":\"在版元（出版商）的里屋，绘师正运笔疾画。这种画摆在台面上卖不出去，私底下却卖得飞快。有人拿出一张刚印好的给我看——用色精致得令人难以置信。\",\"note\":\"春画并非「猥亵物」，而是一种文化。北斋、歌麿、国芳等一流绘师都曾创作。当时也有让新娘作为嫁妆带去的习俗，又被称作「笑绘」。版元在同一间工坊里既印台面上的浮世绘、又印私底下的春画——这种双重结构很有意思。体验的内容是「观看印刷成品的工序」。\"}),\n  E({\"id\":\"ck511\",\"name\":\"江户·澡堂与汤女\",\"en\":\"Bathhouse Yuna\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":-1650,\"period\":\"17世纪前半（禁令颁布前）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"市井·庶民\"],\"atmos\":[\"混浴\",\"汤女（ゆな\",\"澡堂女侍）\",\"搓澡→性服务\",\"幕府的禁令\",\"钱汤（公共澡堂）文化的原点\"],\"sensory\":\"蒸腾的热气之中，有男也有女。汤女正为客人冲洗后背——手离开了后背。两人消失进了单间。外头柜台的老板装作什么都没看见。\",\"note\":\"早期江户的钱汤是混浴的，「汤女」从搓澡到性服务无所不包。幕府屡次颁布禁令，却收效甚微。如果说吉原是「官方认可的游郭」，那么澡堂就是「灰色地带的风俗业」。\"}),\n  E({\"id\":\"ck512\",\"name\":\"江户·阴间茶屋\",\"en\":\"Kagema Teahouse\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"市井·庶民\",\"艺术·表演\"],\"atmos\":[\"阴间（かげま\",\"卖色的少年）\",\"若众的卖色\",\"与歌舞伎役者的兼职\",\"芳町·日本桥葭町\",\"男色的商业化\"],\"sensory\":\"被引到茶屋的二楼，一名化了妆的少年端来了茶。他穿着振袖。客人多是商人。其中也有已有妻室的——来这里并不是什么羞耻的事。\",\"note\":\"阴间茶屋是提供男性性服务的场所。客人以男性（武士、商人）为主，但也有女性客人。歌舞伎的若众役者有时会把当阴间作为副业，这是艺能与性交汇之处。这是一个展现江户性文化多层次面貌的坐标。\"}),\n  E({\"id\":\"ck513\",\"name\":\"京都·岛原与祇园\",\"en\":\"Shimabara and Gion\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\"],\"atmos\":[\"太夫（京都最高等级的游女）\",\"岛原的格式礼数\",\"祇园的艺妓与舞妓\",\"茶屋游乐\",\"「谢绝生客」（一见さんお断り）的原型\"],\"sensory\":\"穿过岛原的大门，空气与吉原不同。更为静谧。太夫的道中比江户的花魁更显格式——客人要见到太夫，必须前后造访三次。祇园那边则要柔和一些——能听见三味线与笑语声。\",\"note\":\"京都的花街比江户的吉原更重「格式」。在初次见到太夫之前需造访三次的「三回造访」礼法，是把恋爱仪式化。在京都，艺妓文化（以技艺较高下）与游女文化（以身体较高下）之间的界限更为暧昧。\"}),\n  E({\"id\":\"ck514\",\"name\":\"大正·咖啡馆的女给\",\"en\":\"Taishō Café Jokyū\",\"region\":\"东亚·日本\",\"country\":\"日本\",\"era\":\"世纪之交\",\"year\":-1920,\"period\":\"1920s-1930s前半\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"城市·都会\"],\"atmos\":[\"咖啡馆（带风俗色彩的茶座）\",\"女给（じょきゅう\",\"女招待）\",\"情色·猎奇·荒诞（エロ・グロ・ナンセンス）\",\"摩登女郎的性解放\",\"「圆本」热潮与情色读物\"],\"sensory\":\"走进银座的咖啡馆，女给挽着手臂将你引到座位。比起饮品，人们更多是为与她们的交谈付钱。邻座的客人把手搭在了她的膝上。台面上的咖啡馆与暗地里的咖啡馆，提供的服务并不相同。\",\"note\":\"大正至昭和初期的「咖啡馆」并非现代的茶座，而是贩卖与女给之间拟似恋爱的风俗空间。「情色·猎奇·荒诞」是1920年代后半的文化潮流，是一场享受性、怪奇与荒诞的运动。这是被战争扼杀之前的最后一点自由。\"}),\n  E({\"id\":\"ck515\",\"name\":\"新罗·花郎的身体与美\",\"en\":\"The Silla Hwarang\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":650,\"period\":\"6-7世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"战争·军事\",\"宗教·信仰\"],\"atmos\":[\"花郎（hwarang）\",\"美少年军团\",\"化妆尚武并存\",\"源花（wonhwa·女性首领）制度\",\"男色文化暗流\",\"\\\"以美为德\\\"\"],\"sensory\":\"一群少年在溪边洗浴。他们的脸上涂着脂粉，眉毛画过，但身体结实得像军人。有人在岸边弹伽耶琴，有人在练剑。他们之间的亲密超过了你对\\\"战友\\\"的理解。\",\"note\":\"花郎制度最初的首领是女性（源花），后改为美少年。《三国遗事》收录的新罗乡歌《慕竹旨郎歌》《赞耆婆郎歌》以浓烈情感追慕花郎首领，是同性亲密一说的诗歌依据。花郎\\\"傅粉妆饰\\\"、以容貌择人，见于《三国史记》与高丽僧觉训《海东高僧传》（1215，转引唐人令狐澄《新罗国记》：\\\"择贵人子弟美者，傅粉妆饰之，名曰花郎\\\"）。但学术界对\\\"花郎=同性恋\\\"的解读有争议——有学者认为这些诗歌是宗教性的敬慕而非性关系。《花郎世记》存伪书争议。体验设计中建议呈现\\\"暧昧性\\\"——留给玩家自己解读。\"}),\n  E({\"id\":\"ck516\",\"name\":\"高丽·妓生的诞生\",\"en\":\"Birth of the Gisaeng\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"中古\",\"year\":1350,\"period\":\"10-14世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"奴役·压迫\"],\"atmos\":[\"妓生（gisaeng）制度起源\",\"官妓\",\"教坊\",\"歌舞与性的一体\",\"贱民身份但待遇特殊\"],\"sensory\":\"教坊里有女子在练习歌舞。她们的衣着比普通女子华丽，但户籍上写着\\\"贱\\\"。一个官员来挑选今晚宴席的陪客——他看了很久，像是在选一件器物。\",\"note\":\"高丽的妓生制度始于官方——妓生隶属于国家，服务于官员宴饮和外交场合。身份是贱民，但受过当时女性中最好的艺术教育。\\\"最低的身份，最高的教养\\\"——这种矛盾是妓生文化的核心。\"}),\n  E({\"id\":\"ck517\",\"name\":\"朝鲜·黄真伊的松都\",\"en\":\"Hwang Jin-i's Songdo\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":-1550,\"period\":\"16世纪前半\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"学问·书写\",\"艺术·表演\"],\"atmos\":[\"黄真伊（Hwang Jin-i）\",\"松都（开城）名妓\",\"艺名\\\"明月\\\"\",\"时调诗人\",\"以才色倾倒士大夫\",\"让面壁三十年的知足禅师破戒\",\"儒教社会里的叛逆者\"],\"sensory\":\"开城的妓房里，一个女人在写诗。字比在座的男人都好。她刚拒绝了一个两班贵族的求见——\\\"让他再来三次。\\\"窗外松岳山的月亮很亮。她看了一眼，低头又写了一首。\",\"note\":\"黄真伊是朝鲜半岛历史上最著名的妓生，也是最杰出的时调（sijo）诗人之一。她让高僧破戒、让儒生失态，却自己始终清醒。她的时调至今是韩国文学经典。体验核心是\\\"一个身处最底层的女人，用才华把最顶层的男人踩在脚下\\\"。\"}),\n  E({\"id\":\"ck518\",\"name\":\"朝鲜·后宫与嫔御制度\",\"en\":\"Joseon Royal Concubines\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"王妃与后宫嫔御\",\"张禧嫔（Jang Hui-bin）\",\"承恩\",\"宫女到嫔的跃升\",\"后宫政治\",\"赐死\"],\"sensory\":\"交泰殿的夜。内官来传话——今晚王上要\\\"移御\\\"到哪一殿。被选中的嫔御开始梳妆。没被选中的宫女回到自己的房间，吹灭了灯。有人在那间暗屋子里已经等了十年。\",\"note\":\"朝鲜王朝的后宫比中国的小得多，但政治斗争的残酷程度不输。张禧嫔从宫女到嫔妃到王妃再到被赐死，是后宫权力与性最极端的案例。\\\"承恩\\\"（seong-eun）——被王临幸——是改变命运的唯一通道。\"}),\n  E({\"id\":\"ck519\",\"name\":\"朝鲜·赤古里与露胸文化\",\"en\":\"Jeogori and Bare Breasts\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"医疗·身体\",\"女性空间\"],\"atmos\":[\"短赤古里（jjalbeun jeogori）\",\"已婚妇女露胸\",\"哺乳展示\",\"\\\"生过儿子\\\"的骄傲\",\"西洋人的震惊\"],\"sensory\":\"街上走过一个妇人，赤古里短到只盖住肩膀，胸完全露在外面。怀里的孩子正在吃奶。没人多看一眼——这是日常。但新来的西洋传教士呆住了。\",\"note\":\"朝鲜王朝后期，已婚妇女（尤其是生过儿子的）穿极短赤古里露出乳房，是社会认可的服饰习惯。在儒教社会中这种身体暴露看似矛盾，但逻辑是\\\"哺乳是母职，母职是荣耀\\\"。十九世纪末西方人来后，这个习惯被视为\\\"未开化\\\"而逐渐消失。一种审美和身体观被另一种覆盖的过程。\"}),\n  E({\"id\":\"ck520\",\"name\":\"朝鲜·春画与性教育\",\"en\":\"Joseon Chunhwa\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"学问·书写\"],\"atmos\":[\"春画（chunhwa）\",\"嫁妆中的性教育图册\",\"枕边书\",\"申润福的风俗画中的情色暗示\",\"秘藏\"],\"sensory\":\"一个即将出嫁的女儿收到了母亲递过来的一个小册子——\\\"过门之后看。\\\"翻开是画。画得很直接。母亲的表情很平静——\\\"每个新娘都要学。\\\"\",\"note\":\"朝鲜王朝虽然是儒教社会，但春画作为性教育工具在婚嫁中合法流通。申润福（Sin Yun-bok）的风俗画中有大量情色暗示——月下偷情、溪边沐浴等——虽然不是春画但情欲流动极强。画面构图精美，是\\\"含蓄的色情\\\"。\"}),\n  E({\"id\":\"ck521\",\"name\":\"朝鲜·妓生宴（通史）\",\"en\":\"The Gisaeng Banquet\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"饮食·宴席\",\"艺术·表演\"],\"atmos\":[\"官妓侑酒\",\"地方官赴任宴\",\"妓生检阅（gisaeng jeomgo）\",\"歌舞与陪寝\",\"\\\"风流\\\"的制度化\"],\"sensory\":\"新到任的地方官坐在上座。面前是一排妓生，依次行礼报名。她们会弹琴、唱歌、作诗。今晚的宴席之后，官员会指一个名字。这是制度——不是私德问题。\",\"note\":\"朝鲜王朝的官妓制度极其系统化——地方官赴任必有妓生宴，妓生陪寝是公务的一部分。\\\"妓生检阅\\\"（jeomgo）是官方的选人仪式。儒教道德和官方性服务的共存是朝鲜社会最大的矛盾之一。\"}),\n  E({\"id\":\"ck522\",\"name\":\"近现代·京城的券番与花柳界\",\"en\":\"Gyeongseong Gwonbeon\",\"region\":\"东亚·朝鲜\",\"country\":\"朝鲜半岛\",\"era\":\"世纪之交\",\"year\":1900,\"period\":\"1900s-1940s\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"殖民·帝国\",\"艺术·表演\"],\"atmos\":[\"券番（gwonbeon·妓生管理组织）\",\"近代化的妓生\",\"留声机与妓生歌手\",\"殖民地的风月\",\"日本式遊郭的移植\"],\"sensory\":\"券番的二楼传来留声机的声音——一个妓生在灌唱片。她的歌声会传遍全朝鲜。楼下，日本人开的料亭里有另一种音乐。两种风月在同一条街上，互不往来。\",\"note\":\"日治时期的妓生文化经历了\\\"近代化\\\"——从传统的官妓变成了唱片歌手和媒体名人。同时日本的遊郭制度被移植到朝鲜。传统妓生文化与殖民地色情产业的碰撞。\"}),\n  E({\"id\":\"ck523\",\"name\":\"雅典·会饮（Symposion）\",\"en\":\"The Athenian Symposion\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-350,\"period\":\"前6-前4世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"饮食·宴席\",\"学问·书写\",\"性·情色\"],\"atmos\":[\"Symposion（会饮·贵族的私人饮酒派对）\",\"Hetaira（高级伴侣·不是\\\"妓女\\\"）\",\"Auletris（吹笛女·可能提供性服务）\",\"斜卧饮酒\",\"柏拉图《会饮篇》——在酒桌上讨论爱的本质\",\"Kylix酒杯底部的情色画\"],\"sensory\":\"男人们斜卧在长椅上——头上戴着花冠，手里是浅底的红陶酒杯。酒是葡萄酒兑水（纯饮被视为野蛮人的行为）。有一个女人在吹双管笛——她是Auletris，不属于任何人，但今晚可能属于出价最高的那个。角落里有人在亲吻一个年轻男子——没有人觉得奇怪。Kylix酒杯喝完之后，底部露出了一幅画——画的内容让你脸红。苏格拉底到得最晚，喝得最多，走得最清醒。\",\"note\":\"Symposion是古希腊贵族男性的核心社交形式——不只是喝酒，是辩论、音乐、诗歌、性的综合体验。Hetaira（复数Hetairai）是受过教育的女性伴侣，能参与哲学讨论（与pornai/普通妓女不同）。最著名的Hetaira是阿斯帕西亚（Aspasia）——伯利克里的伴侣。柏拉图的《会饮篇》就是设定在一场Symposion中——各人轮流发言讨论\\\"爱（Eros）是什么\\\"。红底黑绘/黑底红绘陶器上大量描绘了Symposion中的性场景——Kylix酒杯底部的情色画是\\\"喝完酒的惊喜\\\"。\"}),\n  E({\"id\":\"ck524\",\"name\":\"希腊·Erastes与Eromenos（制度化的少年爱）\",\"en\":\"Greek Pederasty\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-350,\"period\":\"前7-前4世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"婚恋·求爱\",\"性·情色\"],\"atmos\":[\"Pederasty（教育性的年龄差关系）\",\"Erastes（年长的追求者·成年男性）\",\"Eromenos（被追求的少年·约12-18岁）\",\"\\\"庭训\\\"（mentorship）\",\"大腿间性交（intercrural·与祖鲁的Ukusoma同类）\",\"花瓶画中的\\\"求爱场景\\\"\"],\"sensory\":\"一个成年男人在体育场边看一个少年练摔跤——少年的身体涂着橄榄油。他走过去，送了一只公鸡——这是求爱的礼物。如果少年接受，他们会建立一种关系：年长者教他政治、军事、做人——以及某些身体上的事。但有规则：少年不能表现出享受（那是被动的耻辱），年长者不能插入（那等于把少年当女人）。大腿之间——这是合适的。\",\"note\":\"⚠️ 敏感坐标。希腊pederasty是一种制度化的年龄差关系——在当时的文化中被视为教育体系的一部分，但以现代标准看涉及未成年人。体验设计中建议：(1) 不回避它的存在（它是希腊社会的核心制度之一）；(2) 以外来者/观察者视角体验而非参与者；(3) 强调其中的权力不对等和社会规则。花瓶画中的\\\"求爱场景\\\"（courting scenes）是了解这种关系最直接的视觉资料——年长者弯腰触摸少年的下巴和生殖器，少年面无表情（表情重要——表现出欲望=丢脸）。\"}),\n  E({\"id\":\"ck525\",\"name\":\"莱斯博斯·萨福的诗\",\"en\":\"Sappho of Lesbos\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-630,\"period\":\"约前630-前570\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"婚恋·求爱\",\"女性空间\",\"性·情色\"],\"atmos\":[\"萨福（Sappho）\",\"莱斯博斯岛\",\"\\\"Lesbian\\\"一词的由来\",\"写给女性的情诗\",\"\\\"第十位缪斯\\\"\",\"碎片化的传世——大部分作品已失\"],\"sensory\":\"一个女人在海岛上写诗——写给另一个女人。\\\"他坐在你对面，像神一样幸福——听着你的笑声。但我，光是看你一眼，就说不出话。舌头折断了。皮肤下面有火在跑。眼睛什么都看不见。耳朵在嗡嗡。冷汗。发抖。我觉得自己快要死了——\\\"这首诗写了两千六百年了。今天读起来仍然完全能理解。\",\"note\":\"萨福是人类文学史上最早有名字的女性诗人之一——她的诗写给女性的欲望和爱情，直白到让后世的基督教抄写员不安（大部分作品因此失传，现存多为碎片）。\\\"Lesbian\\\"（莱斯博斯人）一词因她而成为女同性恋的代名词。她被柏拉图称为\\\"第十位缪斯\\\"。上面引用的那首诗（Fragment 31）是世界文学中最早的\\\"看到心上人时的身体反应\\\"的描写——失语、发热、颤抖、濒死感。\"}),\n  E({\"id\":\"ck526\",\"name\":\"斯巴达·女性的身体与婚俗\",\"en\":\"Spartan Women's Customs\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-350,\"period\":\"前7-前4世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"女性空间\",\"婚恋·求爱\",\"性·情色\"],\"atmos\":[\"女性裸体运动（其他希腊城邦震惊）\",\"女性可以拥有财产（斯巴达约40%的土地归女性所有）\",\"婚礼仪式——新娘剃头穿男装\",\"\\\"偷婚制\\\"（丈夫夜间偷偷来·白天假装不认识）\",\"优生学——鼓励体弱丈夫让妻子和强壮的男人生孩子\"],\"sensory\":\"运动场上——女孩们在裸体奔跑。在雅典这不可想象，但在斯巴达这是规定。她们的身体和男人一样强壮——因为强壮的母亲才能生出强壮的战士。婚礼那天，新娘的头发被剃光了，穿上男人的衣服，躺在黑暗的房间里等。新郎像小偷一样溜进来——完事后溜走。第二天在公共食堂见面时，两人假装什么都没发生。\",\"note\":\"斯巴达的女性身体政策在古希腊世界独一无二——裸体运动、拥有财产（到前3世纪，斯巴达约40%的土地归女性所有）、被鼓励锻炼以生育强壮后代。婚礼的\\\"剃头穿男装\\\"仪式有多种解读：(1) 帮助新郎适应（他从小在男性集体中长大，可能对女性身体不熟悉）；(2) 避邪；(3) 模糊性别界限的过渡仪式。普鲁塔克记载了\\\"偷婚制\\\"——丈夫只能在夜间偷偷来访，白天不能公开承认婚姻关系。更极端的是\\\"优生学\\\"：体弱的丈夫被鼓励让妻子和身体更强的男人发生关系以改良后代——孩子属于丈夫。\"}),\n  E({\"id\":\"ck527\",\"name\":\"庞贝·妓院与墙上的菜单\",\"en\":\"The Pompeii Lupanar\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-79,\"period\":\"公元79之前\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"市井·庶民\",\"城市·都会\",\"性·情色\"],\"atmos\":[\"Lupanare（庞贝的妓院·至今保存）\",\"石头床铺\",\"墙上的情色壁画（=服务菜单）\",\"街道上的阳具石刻（=方向指示牌）\",\"涂鸦中的性评价——\\\"我在这里操了xxx\",\"很好\\\"\"],\"sensory\":\"跟着街道上刻在石头里的阳具走——它们指向一个方向。进了门，走廊两边是小房间——每间只有一张石头床，上面铺着垫子。门口上方画着壁画——不是装饰，是\\\"菜单\\\"：画面直白地展示了每间房提供的服务类型。墙上有涂鸦——客人的评价，像古代版的大众点评：\\\"Myrtis，你很会吸\\\"\\\"Felix在这里操了，和Fortunata\\\"。\",\"note\":\"庞贝的Lupanare（大妓院）是保存最完整的古罗马妓院——石头床铺、情色壁画和上千条涂鸦至今可见。壁画的功能有争议（菜单？装饰？兼有？），但它们是古罗马性服务最直接的视觉记录。街道上的阳具石刻既是方向标也是吉祥符号（阳具在罗马文化中是辟邪的）。涂鸦是庞贝的灵魂——有客人评价、有妓女的自我推销、有恋爱表白，也有纯粹的脏话。\"}),\n  E({\"id\":\"ck528\",\"name\":\"罗马·性的等级政治（penetrator vs. penetrated）\",\"en\":\"Roman Sexual Hierarchy\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":0,\"period\":\"共和国至帝国（通时代）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"律法·审判\",\"奴役·压迫\",\"性·情色\"],\"atmos\":[\"Vir（真正的男人=主动插入者）\",\"Cinaedus（被插入的男人=耻辱）\",\"性别不重要——角色才重要\",\"主人对奴隶有完全的性支配权\",\"Stuprum（对自由民的性侵犯=犯罪\",\"对奴隶=合法）\"],\"sensory\":\"一个罗马公民和一个男奴隶上床——没有人在意。同一个罗马公民被另一个男人上了——他的政治生涯结束了。区别不在于性别，在于谁是主动方。主动=权力=男人。被动=被支配=女人/奴隶/非人。一个元老在法庭上被指控是Cinaedus（被插入者）——这比被指控贪污更致命。\",\"note\":\"罗马性道德的核心不是\\\"异性恋vs同性恋\\\"——这个分类在罗马不存在。核心是\\\"penetrator vs. penetrated\\\"——主动插入者（不论对象性别）维护了自己的Virtus（男性气概/美德），被动接受者丧失了它。自由民男性被插入=社会性死亡。但对奴隶做任何事=主人的权利。Stuprum法只保护自由民——奴隶的身体在法律上属于主人。这个系统比\\\"开放\\\"或\\\"保守\\\"都要复杂——它是一套精密的权力-身体等级制度。\"}),\n  E({\"id\":\"ck529\",\"name\":\"哈德良与安提诺乌斯\",\"en\":\"Hadrian and Antinous\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":150,\"period\":\"2世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"死亡·葬仪\",\"性·情色\"],\"atmos\":[\"哈德良皇帝与希腊少年安提诺乌斯（Antinous）\",\"安提诺乌斯溺死尼罗河（自杀？献祭？意外？）\",\"皇帝将他封神\",\"以他的名字建了一座城\",\"古代最著名的同性爱情故事\"],\"sensory\":\"皇帝带着他的少年在埃及旅行——安提诺乌斯，来自比提尼亚的希腊青年。然后安提诺乌斯死在了尼罗河里。没人知道怎么死的——有人说是失足，有人说他为皇帝献身（埃及的占星术说皇帝需要一个牺牲品），有人说他自杀（因为自己长大了、不再年轻漂亮了）。皇帝做了一件史无前例的事——他把一个没有皇室血统的希腊少年封为神。在他溺死的地方建了一座城市——安提诺波利斯。他的雕像比任何皇帝都多。\",\"note\":\"哈德良与安提诺乌斯的关系是古代世界最著名的同性爱情故事——一个皇帝的哀悼超越了一切政治理性。安提诺乌斯之死是历史上最大的谜团之一（意外/献祭/自杀都有学者支持）。哈德良为他建的神庙遍布帝国，安提诺乌斯的雕像是罗马艺术中数量最多的个人肖像之一。讽刺的是，几个世纪后基督教兴起，这些雕像和神庙被系统性地摧毁——一段爱情的物理痕迹被信仰抹去。\"}),\n  E({\"id\":\"ck530\",\"name\":\"查士丁尼与狄奥多拉——从妓女到皇后\",\"en\":\"Theodora's Rise\",\"region\":\"地中海·古典\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"中古\",\"year\":550,\"period\":\"6世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"律法·审判\",\"性·情色\"],\"atmos\":[\"狄奥多拉（Theodora）\",\"普罗科匹厄斯《秘史》中的极端描写\",\"从马戏团演员/妓女到拜占庭皇后\",\"尼卡暴动中\\\"紫色是最好的裹尸布\\\"\",\"保护妓女的立法\"],\"sensory\":\"普罗科匹厄斯在秘密地写一本书——关于皇后的过去。他写道她在马戏团当演员时在台上脱光衣服，让鹅啄她身上撒的谷粒，做各种不堪的表演。他写得极其详细——也许太详细了，像是在发泄私怨。但同一个女人后来做了什么？她坐在皇帝旁边说\\\"宁死不逃\\\"。她推动立法禁止强迫卖淫、建了妓女收容所、赋予女性更多离婚权。普罗科匹厄斯的《秘史》——你可以把它当作事实、当作诽谤、或者当作一份关于\\\"男人如何书写不受控制的女人\\\"的文件。\",\"note\":\"狄奥多拉的故事是历史上最具争议的\\\"阶层跨越\\\"叙事之一。普罗科匹厄斯的《秘史》（Anecdota）对她过去的描写极其色情且带有明显恶意——现代学者普遍认为大量细节是夸张或虚构（用来诽谤一个他不喜欢的权贵女性）。但狄奥多拉确实出身卑微（马戏团家庭），且成为皇后后推动了一系列保护女性的立法——禁止强迫卖淫、建立前妓女的收容机构、赋予妻子更多离婚权。体验核心是\\\"同一个女人在不同男人的笔下是完全不同的人\\\"。\"}),\n  E({\"id\":\"ck531\",\"name\":\"科林斯·阿佛洛狄忒神庙\",\"en\":\"Aphrodite's Corinth\",\"region\":\"地中海·古典\",\"country\":\"希腊\",\"era\":\"古典\",\"year\":-150,\"period\":\"前8-前2世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"海洋·港口\",\"宗教·信仰\",\"性·情色\"],\"atmos\":[\"阿佛洛狄忒（爱与美之神）崇拜\",\"科林斯=\\\"古希腊性都\\\"的名声\",\"Hierodule（神庙服务人员·传说中上千人）\",\"斯特拉波的记载vs现代质疑\"],\"sensory\":\"科林斯的卫城上有一座阿佛洛狄忒神庙。据说——据说——里面有上千名女性\\\"服务于女神\\\"。据后来的地理学家斯特拉波说，水手们把钱花在她们身上，所以有谚语：\\\"不是每个人都去得了科林斯\\\"。但这到底是真的，还是斯特拉波在转述已经过时的传闻？\",\"note\":\"⚠️ 与苏美尔的\\\"神圣卖淫\\\"类似，科林斯阿佛洛狄忒神庙的\\\"千名神庙妓女\\\"说法主要来自斯特拉波（公元前1世纪的地理学家），现代学者对此持高度怀疑态度。Hierodule（神庙服务人员）确实存在，但她们的职责是否包括性服务仍有争议。科林斯作为港口城市确实有发达的性产业，但这可能是商业性的而非宗教性的。体验设计中可保留\\\"古代地中海最放纵的城市之一\\\"的氛围，但不应将\\\"神庙卖淫\\\"当作确定事实。\"}),\n  E({\"id\":\"ck532\",\"name\":\"罗马·卡图卢斯与奥维德——帝国的情诗\",\"en\":\"Catullus and Ovid\",\"region\":\"地中海·古典\",\"country\":\"意大利·罗马\",\"era\":\"古典\",\"year\":-50,\"period\":\"前1世纪-公元1世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"学问·书写\",\"婚恋·求爱\",\"性·情色\"],\"atmos\":[\"卡图卢斯（Catullus）的莱斯比亚诗\",\"奥维德《爱的艺术》（Ars Amatoria）\",\"奥维德因\\\"一首诗和一个错误\\\"被流放\",\"帝国时代的情色文学\"],\"sensory\":\"卡图卢斯在写诗——给他叫\\\"莱斯比亚\\\"的那个女人（真名克洛迪亚，有夫之妇）。\\\"让我们活着，让我们去爱——那些老头子的道德值一个铜板。给我一千个吻，再一百个，再一千个——多到我们自己都数不清，这样就没人能嫉妒我们了。\\\"另一个——奥维德——在写一本《爱的艺术》，像是一本教科书：\\\"去剧场吧，那里女人最多。坐在她旁边。如果有灰落在她裙子上，帮她掸掉——即使没有灰。\\\"奥古斯都皇帝读了这本书之后把他流放到了黑海边。\",\"note\":\"卡图卢斯的\\\"莱斯比亚诗组\\\"是拉丁文学中最激烈的爱情诗——从狂喜到嫉妒到仇恨的完整弧线。奥维德的《爱的艺术》（Ars Amatoria）是一本正经的\\\"把妹指南\\\"——教罗马男人如何追女人（第三卷教女人如何回应），文笔优雅、建议实际。奥维德最终被奥古斯都流放——官方理由是\\\"一首诗和一个错误\\\"（carmen et error），\\\"诗\\\"可能指《爱的艺术》与奥古斯都推行的道德改革法相冲突，\\\"错误\\\"至今成谜。\"}),\n  E({\"id\":\"ck533\",\"name\":\"伊特鲁里亚·宴席上的女人\",\"en\":\"Etruscan Women\",\"region\":\"地中海·古典\",\"country\":\"意大利·伊特鲁里亚\",\"era\":\"古典\",\"year\":-350,\"period\":\"约前6-前4世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"饮食·宴席\"],\"atmos\":[\"女人与男人同卧一榻饮酒作乐\",\"墓画里坦然的亲昵\",\"希腊史家泰奥彭波斯耸人听闻的记述（\\\"不知孩子父亲是谁\\\"）\",\"伊特鲁里亚女性用自己的名字·有产权\",\"地位之高令希腊罗马侧目\"],\"sensory\":\"宴会的卧榻上，女人和男人并肩斜倚，一同举杯、说笑、相互喂食，画在墓壁上毫不避讳。在只让妓女上桌的希腊人眼里，这简直伤风败俗。一位希腊史家写得更不堪：说这里的女人当众宽衣、与谁同寝都行、生下的孩子根本不知父亲是谁。真假难辨——但伊特鲁里亚女人确实用自己的名字、能继承财产，这份自在已够别人编排了。\",\"note\":\"伊特鲁里亚墓室壁画常见女性与男性同榻宴饮、亲昵自然，与希腊\\\"良家妇女不出席宴会\\\"的规范形成强烈反差。前4世纪希腊史家泰奥彭波斯（Theopompus）留下一段耸动记述，称伊特鲁里亚女性放纵、共享性伴、孩子不辨父系——多被视为带敌意的夸张。但伊特鲁里亚女性确实拥有较高地位：使用自己的名字、可继承和拥有财产，这种自主在古地中海世界已属罕见，足以招来邻人的想象与非议。\"}),\n  E({\"id\":\"ck534\",\"name\":\"古印度·《爱经》的世界\",\"en\":\"World of the Kama Sutra\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":250,\"period\":\"约2-3世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"学问·书写\",\"城市·都会\"],\"atmos\":[\"Kama Sutra（爱经）\",\"筏蹉衍那\",\"六十四艺\",\"城市公子（nagaraka）的生活指南\",\"性是人生四大目标之一\",\"不只是体位而是一整套生活美学\"],\"sensory\":\"一个富有的城市青年在他精心布置的卧室里——花环、檀香、调好的饮品、乐器。他在读一本书，教他如何谈话、如何触碰、如何辨别女人的八种叹息。这不是猥亵——这是教养。一个不懂\\\"爱的艺术\\\"的男人就像一个不会弹琴的人一样，是不完整的。\",\"note\":\"《爱经》远不只是\\\"体位指南\\\"——它用了大量篇幅讲述求偶、约会、妻子的社交生活、婚外情的类型学、妓女的商业策略。它是一部关于\\\"欲望如何被文明化\\\"的百科全书。体验角度是\\\"在一个把性当成正经学问的社会里做一个合格的情人需要学什么\\\"。\"}),\n  E({\"id\":\"ck535\",\"name\":\"卡久拉霍·情色神庙\",\"en\":\"Erotic Khajuraho\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1050,\"period\":\"10-11世纪（昌德拉王朝）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"Khajuraho神庙群\",\"外墙情色雕刻\",\"性交姿势石刻\",\"mithuna（交合像）\",\"性是通向神的路径\",\"密宗影响\"],\"sensory\":\"神庙的外墙上刻满了人——他们在做爱。各种姿势、各种组合。雕刻精美得让你忘了这是石头。但走进神庙内部——里面什么都没有，只有神像。外面是欲望，里面是超越。有朝圣者经过这些雕刻时，眼神平静得像在看风景。\",\"note\":\"卡久拉霍的情色雕刻约占全部雕刻的10%——但这10%是人类艺术史上最精致的情色创作。学术界对其含义仍有争论：密宗仪式的图解？从欲望到超越的修行路径？单纯的吉祥符号？无论哪种，核心体验是\\\"在一个性不需要被遮掩的宗教体系里\\\"。\"}),\n  E({\"id\":\"ck536\",\"name\":\"科纳克·太阳神庙\",\"en\":\"Konark Sun Temple\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1250,\"period\":\"13世纪（东恒伽王朝）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"Konark太阳神庙\",\"战车形建筑\",\"外墙情色雕刻比卡久拉霍更大胆\",\"maithuna场景\",\"太阳神苏利耶\"],\"sensory\":\"整座神庙像一辆巨大的石头战车——有轮子、有马。但墙上的雕刻让你停下了脚步：人和人、人和动物、各种你没想过的组合，刻得栩栩如生。一个当地人看到你的表情笑了——\\\"这是神的创造力。所有的结合都是神圣的。\\\"\",\"note\":\"科纳克的情色雕刻比卡久拉霍更加露骨和多样化。如果说卡久拉霍是\\\"精致的情色\\\"，科纳克是\\\"奔放的情色\\\"。体验差异值得两个坐标分开。\"}),\n  E({\"id\":\"ck537\",\"name\":\"寺庙舞女·德瓦达西（Devadasi）\",\"en\":\"The Devadasi\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":1850,\"period\":\"6-19世纪（通时代，南印度为核心）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"奴役·压迫\"],\"atmos\":[\"Devadasi（神的仆人）\",\"献给神的女人\",\"寺庙舞蹈（后来的婆罗多舞原型）\",\"神婚仪式\",\"\\\"与神结婚\\\"意味着不能与凡人结婚——但可以与凡人发生关系\"],\"sensory\":\"一个年轻女孩被带到神庙前。她穿上了婚纱——但新郎是神像。从今天起她是\\\"神的妻子\\\"。她将学习舞蹈和音乐，在神庙的仪式上表演。她不能嫁人——但寺庙的赞助人会来找她。这是\\\"服务\\\"，不是\\\"卖淫\\\"——至少理论上是这样。\",\"note\":\"Devadasi制度从最初的宗教尊崇逐渐退化为制度化的性剥削——低种姓女孩被\\\"献给神\\\"实际上成为上层种姓男人的性资源。英国殖民时期被禁止，但地下残存。古典舞蹈（婆罗多舞Bharatanatyam）的复兴运动刻意剥离了Devadasi的性元素，只保留了艺术性。一个\\\"艺术与性剥削如何共生又如何被拆分\\\"的复杂故事。\"}),\n  E({\"id\":\"ck538\",\"name\":\"密宗·性仪式（Tantra）\",\"en\":\"Tantric Rites\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":650,\"period\":\"7世纪起（通时代，取中世纪最浓）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\"],\"atmos\":[\"Tantra（密宗）\",\"五M仪式（Panchamakara：酒madya\",\"肉mamsa\",\"鱼matsya\",\"谷物mudra\",\"性交maithuna）\",\"左道密宗\",\"通过禁忌达到解脱\",\"昆达里尼能量\"],\"sensory\":\"夜晚。火葬场旁边的一个坛场。几个人围坐——有男有女。他们喝了酒，吃了肉——这些在正统印度教中是禁忌。然后最后一个仪式——男女结合。但他们的目的不是快感，而是——据说——通过打破所有禁忌来触碰禁忌背后的自由。\",\"note\":\"密宗（Tantra）是印度宗教中最被误解的传统——在西方被简化为\\\"性瑜伽\\\"，在正统印度教中被视为异端。左道密宗（Vamachara）的五M仪式故意使用所有被禁止的东西（酒、肉、性），逻辑是\\\"超越二元对立\\\"。体验角度可以从\\\"一个正统婆罗门第一次参加密宗仪式的震惊\\\"切入。\"}),\n  E({\"id\":\"ck539\",\"name\":\"莫卧儿·后宫（Zenana）\",\"en\":\"The Mughal Zenana\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1750,\"period\":\"16-18世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"Zenana（女眷区）\",\"珠帘后的世界\",\"莫卧儿细密画中的后宫场景\",\"权力女性（努尔贾汗/蒙塔兹·玛哈尔）\",\"宦官守卫\",\"后宫不是监狱也不是天堂\"],\"sensory\":\"珠帘后面是另一个世界——花园、喷泉、音乐。女人们穿着轻薄的纱丽在水池边聊天。有一个女人在听汇报——她替皇帝做了一半的决定。宦官在门口站着，看见你的目光立刻挡住了珠帘。\",\"note\":\"莫卧儿后宫不是\\\"被锁起来的女人\\\"那么简单——努尔贾汗（贾汗吉尔的皇后）在丈夫晚年实际执掌朝政十余年（自1611年封后至1627年），以自己的名义铸币、颁诏。后宫是一个独立的政治空间、经济体（后宫女性拥有自己的贸易和土地收入）和文化中心（很多细密画是在后宫内创作的）。\"}),\n  E({\"id\":\"ck540\",\"name\":\"莫卧儿·塔瓦伊夫（Tawaif·高等交际花）\",\"en\":\"The Tawaif\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"女性空间\"],\"atmos\":[\"Tawaif（类似日本太夫/中国名妓）\",\"Mujra舞蹈\",\"乌尔都语诗歌与音乐的传承者\",\"Kotha（沙龙）\",\"拿瓦布与塔瓦伊夫\"],\"sensory\":\"勒克瑙的一座Kotha（沙龙）里，一个女人在跳Mujra——脚踝的铃铛声和乌尔都语的诗句交织在一起。来的都是贵族和文人。她不只是跳舞——她在教这些男人如何说话、如何行礼、如何写诗。在这个房间里，她是老师，他们是学生。\",\"note\":\"Tawaif是莫卧儿-纳瓦布时代的高等交际花，地位类似日本的太夫或巴黎的高级交际花。她们是乌尔都诗歌、卡塔克舞和Thumri音乐的主要传承者——很多经典的乌尔都语ghazal（抒情诗）出自Tawaif之手或为她们而作。英国殖民时期被定义为\\\"卖淫者\\\"而社会地位暴跌。一种\\\"文明的载体被法律重新定义为罪犯\\\"的过程。\"}),\n  E({\"id\":\"ck541\",\"name\":\"克里希纳与牧女（Rasa Lila·宗教情欲）\",\"en\":\"Krishna's Rasa Lila\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"中古\",\"year\":0,\"period\":\"通时代（体验上以中世纪虔信运动/Bhakti时期最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"Krishna与Radha\",\"Rasa Lila（月下群舞）\",\"虔信（Bhakti）运动\",\"情欲即信仰\",\"\\\"灵魂对神的渴望就像情人对爱人的渴望\\\"\",\"Gita Govinda\"],\"sensory\":\"满月之夜。森林边的空地上有人在唱一首歌——关于一个蓝色皮肤的少年和一群牧女。牧女们抛弃了丈夫跑来找他。他分身成无数个自己，同时与每一个牧女起舞。歌里的欲望是真的，但它指向的不是肉体——或者说不只是肉体。\",\"note\":\"Krishna与Radha的爱情是印度文化中\\\"以情欲表达信仰\\\"的核心——虔信运动（Bhakti）的诗歌充满了性意象，但目的是描述灵魂对神的渴望。《牧童歌》（Gita Govinda）是12世纪的梵语诗，描写Krishna与Radha的肉体之爱——被当作宗教经典吟诵至今。\\\"这是色情诗还是圣歌？\\\"——在印度，这个问题本身就不成立。\"}),\n  E({\"id\":\"ck542\",\"name\":\"印度·第三性别（Hijra）\",\"en\":\"The Hijra\",\"region\":\"南亚\",\"country\":\"印度\",\"era\":\"古典\",\"year\":0,\"period\":\"通时代（最早记录可追溯至《爱经》）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"节庆·仪式\"],\"atmos\":[\"Hijra（海吉拉）\",\"第三性别\",\"阉割仪式\",\"在婚礼和新生儿仪式上的祝福角色\",\"既神圣又被歧视\",\"Ardhanarishvara（半男半女的湿婆）\"],\"sensory\":\"婚礼上来了几个人——穿着纱丽，化了浓妆，但声音和骨架是男性的。他们在跳舞，拍手，大声祝福新人。新人的家人恭敬地给了钱。婚礼结束后，他们走回城市边缘的社区。受人尊敬和被人排斥，发生在同一天。\",\"note\":\"Hijra是南亚独有的第三性别群体——既不是男也不是女。在印度教神话中有神圣地位（湿婆的Ardhanarishvara形象是半男半女），在婚礼和新生儿仪式上被认为拥有祝福/诅咒的力量。但日常生活中饱受歧视，大多生活在社会边缘。这种\\\"神圣+贱民\\\"的双重身份在世界文化中独一无二。\"}),\n  E({\"id\":\"ck543\",\"name\":\"桑伽姆·阿堪（泰米尔最古老的情诗）\",\"en\":\"Tamil Akam Poetry\",\"region\":\"南亚\",\"country\":\"印度·泰米尔\",\"era\":\"古典\",\"year\":-250,\"period\":\"约前3世纪-公元3世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"婚恋·求爱\"],\"atmos\":[\"泰米尔桑伽姆文学\",\"\\\"阿堪\\\"（akam·内在/情爱诗）与\\\"普攔\\\"（puram·外在/战争诗）\",\"五种风景（tinai）各对应一种爱的情境\",\"幽会·等待·争吵·别离·私奔\",\"女主角与闺密的口吻\",\"隐而不露的情色\"],\"sensory\":\"山里，野茉莉开得正盛——按古老的规矩，这种风景说的是初次幽会。诗里的女子不直说思念，只说：\\\"蜂在花上停得太久了。\\\"换一片海边的风景，便是焦灼的等待；换作旱地，便是私奔的路上。情欲从不点破，全藏在花、鸟、季节和地貌里——懂的人一读就懂。\",\"note\":\"泰米尔桑伽姆文学（约前3世纪-公元3世纪）分\\\"阿堪\\\"（akam，内在/情爱）与\\\"普攔\\\"（puram，外在/战争公共）两类。阿堪诗以五种风景（tinai：山、林、农田、海岸、旱地）各自象征爱情的一个阶段（幽会、等待、争吵、别离、私奔），借自然意象含蓄地写情欲与心绪，几乎不直陈。它是印度最古老、最精微的世俗情爱文学之一，与梵语《爱经》传统并立。\"}),\n  E({\"id\":\"ck544\",\"name\":\"吴哥·Devata与圣殿舞女\",\"en\":\"Angkor Devata Dancers\",\"region\":\"东南亚\",\"country\":\"柬埔寨\",\"era\":\"中古\",\"year\":1250,\"period\":\"9-13世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宗教·信仰\",\"艺术·表演\",\"性·情色\"],\"atmos\":[\"Devata/Apsara浮雕\",\"神庙舞女（与印度Devadasi同源）\",\"周达观记录的高棉性风俗\",\"裸胸为常态\",\"舞蹈是献祭\"],\"sensory\":\"吴哥窟的回廊墙上刻着上千个女性——Devata。她们裸露上身，头戴高冠，表情宁静。庙中有真人版的她们——舞女在内殿跳舞献给神。她们的上身不穿衣服。在这里，遮蔽才是奇怪的。\",\"note\":\"吴哥窟的Devata浮雕超过1800个，每一个的发型、首饰和表情都不同。高棉帝国的寺庙舞女制度与印度的Devadasi同源——以舞蹈和身体侍奉神灵。周达观在《真腊风土记》中详细记录了高棉人的性习俗，包括女童成婚前由僧道破身的\\\"阵毯\\\"仪式。\"}),\n  E({\"id\":\"ck545\",\"name\":\"吴哥·周达观所见的性风俗\",\"en\":\"Khmer Customs, 1296\",\"region\":\"东南亚\",\"country\":\"柬埔寨\",\"era\":\"中古\",\"year\":1296,\"period\":\"1296-1297\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"市井·庶民\",\"节庆·仪式\"],\"atmos\":[\"《真腊风土记》中的性描写\",\"\\\"阵毯\\\"（处女破身仪式）\",\"混浴\",\"女性裸胸为日常\",\"国王的后宫\",\"中国商人娶当地妻子\"],\"sensory\":\"周达观写道：这里的女人不穿上衣，赤脚走路，连王宫里的人也这样。富家女七到九岁、贫家女十一岁，要请僧人或道士\\\"去其童身\\\"，名曰\\\"阵毯\\\"，行过此礼才能嫁人。中国商人很快在本地娶了妻——他说本地买卖都由妇人经手，\\\"唐人到彼，必先纳一妇人者，兼亦利其能买卖故也\\\"。\",\"note\":\"周达观的记录是了解吴哥日常性文化的唯一一手资料。\\\"阵毯\\\"仪式（处女破身）由僧人或道士主持，是女子成婚前的必经之礼（富家女七至九岁，贫家女至十一岁）。他对高棉女性裸身行走印象极深；而中国商人娶本地妻，据他记载是图妇人善做买卖（\\\"交易皆妇人能之\\\"），并非传说中的\\\"省置装钱\\\"。两种身体观在此相遇。\"}),\n  E({\"id\":\"ck546\",\"name\":\"巴厘岛·裸胸的日常\",\"en\":\"Bare-Breasted Bali\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"世纪之交\",\"year\":-1950,\"period\":\"通时代（体验上以20世纪初殖民者到来前最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宗教·信仰\",\"女性空间\",\"性·情色\"],\"atmos\":[\"巴厘印度教\",\"女性裸胸为日常\",\"寺庙仪式中的裸胸\",\"欧洲人到来后的\\\"异域凝视\\\"\",\"\\\"最后的天堂\\\"神话\",\"沃尔特·斯皮斯\"],\"sensory\":\"女人们顶着贡品走向寺庙——水果、鲜花、香堆成塔。她们的上身是裸露的。没人注意这一点，包括她们自己。几个白人画家在旁边画速写——他们眼中这是\\\"原始的美\\\"。但对当地人来说这只是穿衣服。后来有人说应该遮起来。再后来她们遮起来了。\",\"note\":\"巴厘岛女性的裸胸在20世纪初被欧洲人\\\"发现\\\"后，变成了东方主义幻想的一部分——旅游海报、人类学照片、画家的描绘。讽刺的是，正是这些\\\"欣赏\\\"导致了裸胸的消失——印尼独立后，在国族主义和伊斯兰影响下，巴厘女性逐渐穿上了上衣。一种\\\"被凝视然后消失\\\"的过程。\"}),\n  E({\"id\":\"ck547\",\"name\":\"爪哇·宫廷舞蹈（Bedoyo/Srimpi）\",\"en\":\"Javanese Bedoyo Dance\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪（日惹/梭罗苏丹国）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"艺术·表演\",\"性·情色\"],\"atmos\":[\"Bedoyo舞（九个舞女\",\"与君主的神圣婚姻）\",\"Srimpi（四个舞女的宫廷舞）\",\"南海女王Ratu Kidul的传说\",\"舞蹈即交媾的隐喻\"],\"sensory\":\"九个舞女在宫殿大厅里缓慢移动。她们的动作慢到几乎看不出在动——但每一个手势都有意义。据说她们跳的是君主与南海女王的结合——性交的隐喻化为了艺术。只有君主和最亲近的人能看这支舞。普通人看了会遭到诅咒。\",\"note\":\"Bedoyo Ketawang是梭罗（Surakarta）苏南宫廷最神圣的宫廷舞——1755年吉扬蒂条约后归属梭罗，每年苏南登基纪念日表演一次，内容是马塔兰开国之君与南海女王Ratu Kidul的结合，历代君主被视为她的夫君。据说每次演出Ratu Kidul都会现身共舞，九名舞女须为处子。此舞至今在梭罗苏南宫廷传承，只对极少数人开放。性、权力、神话在同一支舞中。\"}),\n  E({\"id\":\"ck548\",\"name\":\"菲律宾·前殖民时期的性自由\",\"en\":\"Pre-colonial Philippine Eros\",\"region\":\"东南亚\",\"country\":\"菲律宾\",\"era\":\"中古\",\"year\":-1550,\"period\":\"10-16世纪（西班牙到来前）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"宗教·信仰\"],\"atmos\":[\"婚前性行为被允许\",\"离婚自由\",\"Babaylan（女性/跨性别萨满）\",\"阴茎穿刺装饰（tugbuk/sakra）\",\"西班牙人对此的震惊记录\"],\"sensory\":\"Babaylan——一个穿着女装的男人——在主持仪式。没人觉得奇怪，因为他/她是部落与神灵之间的中介。年轻人在结婚前可以自由恋爱和同居——离婚也很简单，退回聘礼就行。西班牙传教士来了之后写信回马德里说\\\"这些人的风俗骇人听闻\\\"。\",\"note\":\"前殖民时期菲律宾的性文化比西班牙征服后开放得多——婚前性行为被社会接受，离婚是正常的，Babaylan（通常是女性或跨性别者）是社区中最受尊敬的人。西班牙人带来了天主教的性道德，彻底改变了这一切。一些早期西班牙文献记载了菲律宾男性的阴茎穿刺装饰——据说是为了增加女性的快感。\"}),\n  E({\"id\":\"ck549\",\"name\":\"大城（阿瑜陀耶）·国际贸易港的风月\",\"en\":\"Ayutthaya Temporary Wives\",\"region\":\"东南亚\",\"country\":\"泰国\",\"era\":\"近世\",\"year\":1750,\"period\":\"15-18世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"贸易·商业\",\"海洋·港口\",\"性·情色\"],\"atmos\":[\"多国商人混居的风月场\",\"暹罗的\\\"临时妻子\\\"制度\",\"日本人町的遊女\",\"中国商人的本地妻\",\"\\\"租妻\\\"文化的制度化\"],\"sensory\":\"一个日本商人在大城的日本人町安了家——他有一个暹罗妻子。隔壁的中国商人也有一个。荷兰人的商馆里也有。\\\"妻子\\\"这个词在这里有好几种含义——有永久的，有半年的，有按次的。走的时候可以把\\\"妻子\\\"和孩子留下。下次来再找一个。\",\"note\":\"大城时期的暹罗存在一种\\\"临时妻子\\\"制度——外国商人在停留期间与本地女性建立类婚姻关系，离开时可以解除。这不是单纯的卖淫，而是一种被社区承认的灰色制度。荷兰东印度公司和日本商人的文献中对此有详细记录。这种制度在东南亚多个港口城市普遍存在。\"}),\n  E({\"id\":\"ck550\",\"name\":\"荷属东印度·Nyai制度\",\"en\":\"The Nyai System\",\"region\":\"东南亚\",\"country\":\"印度尼西亚\",\"era\":\"近世\",\"year\":1950,\"period\":\"17-20世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"殖民·帝国\",\"奴役·压迫\",\"性·情色\"],\"atmos\":[\"Nyai（殖民者的本地情妇/管家）\",\"不是妻子也不是仆人\",\"混血儿（Indo）的身份困境\",\"殖民权力的性化\"],\"sensory\":\"她管理着整座房子——厨房、仆人、花园。荷兰人叫她Nyai。她不是妻子——婚姻法不允许。她不是仆人——仆人不睡在主人的床上。她的混血孩子在这个社会里没有位置——太白了不是当地人，太黑了不是荷兰人。\",\"note\":\"Nyai制度是荷属东印度殖民社会的核心矛盾之一。早期荷兰人被公司禁止带妻子来（为了减少定居欲望），于是与本地女性建立Nyai关系。Nyai拥有实际的家庭管理权但没有法律地位。她们的混血后代（Indo）形成了殖民地社会中一个独特的阶层。普拉姆迪亚·阿南达·杜尔的小说《人世间》对Nyai有深刻的描写。\"}),\n  E({\"id\":\"ck551\",\"name\":\"布吉斯的五种性别（苏拉威西的bissu祭司）\",\"en\":\"Bugis Five Genders\",\"region\":\"东南亚\",\"country\":\"印尼·苏拉威西\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（前伊斯兰传统·延续至今）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"女性空间\"],\"atmos\":[\"布吉斯人承认五种性别\",\"makkunrai/oroané（顺性别女男）\",\"calalai/calabai（跨性别）\",\"bissu（超越男女的祭司·兼具两性）\",\"bissu曾守护王室神器\",\"主持婚礼祝福\",\"20世纪受伊斯兰原教旨迫害\"],\"sensory\":\"婚礼上主持祝福的那位，你一时分不清是男是女——他/她身上既有男人的硬挺，也有女人的柔媚，被叫做bissu，被看作同时是两者、因而能通神的人。布吉斯人说性别不止两种：有顺性别的男女，有身体女而活得像男人的、身体男而活得像女人的，还有bissu这\\\"第五种\\\"。从前王室的神器，就由bissu看守。\",\"note\":\"苏拉威西的布吉斯人传统上承认五种社会性别：makkunrai（顺性别女）、oroané（顺性别男）、calalai（女体男性气质）、calabai（男体女性气质），以及bissu——被视为兼具并超越两性的祭司，能沟通神灵，传统上主持婚礼祝福、守护王室神器。这一体系有前伊斯兰渊源，伊斯兰化后仍长期延续；20世纪中叶的伊斯兰原教旨运动（如卡哈尔·穆扎卡尔叛乱）曾严厉迫害bissu。\"}),\n  E({\"id\":\"ck552\",\"name\":\"斯瓦希里海岸·Unyago与Somo（婚前性教育）\",\"en\":\"Swahili Unyago Rites\",\"region\":\"撒哈拉以南非洲\",\"country\":\"坦桑尼亚·斯瓦希里\",\"era\":\"近代\",\"year\":1850,\"period\":\"通时代（取18-19世纪最浓，至今仍在实践）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"婚恋·求爱\"],\"atmos\":[\"Unyago（成女仪式/婚前教育）\",\"Somo/Kungwi（导师·年长女性指导者）\",\"Mwari（受教的女孩）\",\"Piko（黑色染料纹身·画到大腿内侧和胸部）\",\"Shangaa（腰珠·三种颜色代表不同女性状态）\",\"Kanga布上的隐喻格言（maneno）\",\"Chakacha舞（模拟性行为的臀部动作）\",\"\\\"siri za mambo ya ndani\\\"（内室的秘密）\"],\"sensory\":\"结婚前七天。新娘被带到Somo——一个年长女人——的家里。门关上了。房间里点着熏香。Somo开始教她\\\"内室的秘密\\\"：怎么用臀部的动作（Chakacha舞就是从这里来的）、怎么用声音、怎么让自己和丈夫都满足。有人在她的手臂和大腿内侧画Piko——黑色的花纹，让她\\\"感到自己是性感的\\\"。她的腰上系了三串Shangaa腰珠——不同颜色在不同时候戴。最后Somo送她一块Kanga布——上面印着一句话。她读了，脸红了。那句话的意思只有她和Somo知道。\",\"note\":\"Unyago是斯瓦希里文化中一套完整的女性性教育体系。Somo（导师）在新娘婚前提供为期约七天的住家教学，内容包括：性技巧（含模拟演示）、身体清洁与美化、感官按摩、性健康与高潮、如何沟通欲望。Unyago仪式可持续一天到三个月，包含Ngoma鼓乐伴奏下的\\\"感官姿态和模拟性行为\\\"舞蹈。Piko（黑色染料）纹在手、臂、大腿内侧和胸部——目的是让女性\\\"感到性感和有吸引力\\\"。Shangaa腰珠分三种颜色代表不同女性状态。Kanga布上的格言（maneno）是女性之间的\\\"情书\\\"——传递只有当事人能解码的性暗示信息，措辞模糊到\\\"送布的人可以假装只是因为花色好看而挑的\\\"。歌手Bi Kidude是桑给巴尔最著名的Unyago音乐演唱者。这个传统至今在坦桑尼亚和肯尼亚海岸地区存在。\"}),\n  E({\"id\":\"ck553\",\"name\":\"斯瓦希里·Kanga——会说话的布\",\"en\":\"The Speaking Kanga\",\"region\":\"撒哈拉以南非洲\",\"country\":\"坦桑尼亚·斯瓦希里\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪至今\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"工艺·手艺\"],\"atmos\":[\"Kanga布上的格言（maneno/jina）\",\"女性之间的秘密通讯\",\"性暗示和情感表达\",\"\\\"如果说出来不礼貌\",\"就印在布上\\\"\",\"送Kanga=传情书\"],\"sensory\":\"市场上挂满了色彩鲜艳的Kanga布——每一块上面都印着一句话。有些是祝福。有些是警告——\\\"离我的男人远一点\\\"。有些是……你需要想一想才能明白它在说什么。一个女人买了一块新Kanga送给邻居——表面上是礼物，但上面那句话的真正意思只有她们两个人知道。如果被质问，她会说\\\"我就是喜欢这个花色啊。\\\"\",\"note\":\"Kanga是东非最独特的女性通讯媒介——印在布上的格言（maneno/jina）可以传达从祝福到挑衅到性暗示的各种信息。关键在于\\\"合理推诿\\\"（plausible deniability）——送布的人可以声称只是因为图案好看。Kanga被称为\\\"会说话的布\\\"（the cloth that speaks），解读Kanga上的隐藏信息在肯尼亚和坦桑尼亚是一种\\\"文化消遣\\\"。这是一种在伊斯兰文化规范下女性找到的表达欲望和主张的方式。\"}),\n  E({\"id\":\"ck554\",\"name\":\"祖鲁·Ukusoma——大腿之间的规则\",\"en\":\"Zulu Ukusoma\",\"region\":\"撒哈拉以南非洲\",\"country\":\"南非\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪（沙卡时期）/通时代\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"律法·审判\"],\"atmos\":[\"Ukusoma/Ukuhlobonga/Ukumetsha（三个名字同一件事·非插入式股间性交）\",\"Iqhikiza（年长的同辈教育者·教你怎么做）\",\"Umhlanga芦苇舞（处女检查）\",\"\\\"你可以亲密但不能进入\\\"\",\"1861年英国传教士John Colenso的字典记录\"],\"sensory\":\"一个年长的女孩——Iqhikiza——在教年轻的女孩们规则。\\\"你可以和他在一起。你可以让他靠近。但你的腿要交叉夹紧——他只能在你大腿之间。不能进去。如果你怀孕了，整个社区会知道你违反了规则。\\\"这不是禁欲——是一种精密的身体管理。年轻的战士们也被教导同样的规则——沙卡的禁婚令使得Ukusoma成了唯一合法的性出口。\",\"note\":\"Ukusoma（也叫Ukuhlobonga或Ukumetsha）是祖鲁/恩古尼民族传统中的非插入式性行为——男性将阴茎置于女性紧闭的大腿之间，不允许阴道插入。该词最早被英国传教士John Colenso在1861年的字典中记录。实践由Iqhikiza（年长的同辈女性教育者）在青春期仪式中传授，嵌入\\\"克制、家族尊重、男性对伴侣的责任\\\"等社区价值观中。功能是：允许相互的性满足，同时保护女性处女膜和避免怀孕。沙卡时期，年轻战士被禁止结婚直到获得国王许可，Ukusoma成为禁令下的合法灰色地带。该传统随基督教传入、现代化和劳工迁移制度而衰落。芦苇舞（Umhlanga）至今在eSwatini每年举行，数万女孩赤裸上身持芦苇在国王面前舞蹈。\"}),\n  E({\"id\":\"ck555\",\"name\":\"达荷美·Agojie（女战士与国王的\\\"妻子\\\"）\",\"en\":\"The Dahomey Agojie\",\"region\":\"撒哈拉以南非洲\",\"country\":\"贝宁\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"战争·军事\",\"女性空间\"],\"atmos\":[\"Agojie/Mino（达荷美女战士/\\\"亚马逊\\\"）\",\"\\\"嫁给国王\\\"=禁欲誓言\",\"从8岁开始训练\",\"6000人的全女性军团\",\"\\\"压制情感·不惧死亡\\\"\",\"性与暴力的禁忌交换——放弃性换取战斗权\"],\"sensory\":\"她们不被允许结婚。不被允许有孩子。她们是\\\"国王的妻子\\\"——但这个\\\"妻子\\\"不意味着床笫，而意味着她们的身体属于战争而非生育。从八岁开始训练——学射击、格斗、忍痛。有六千人。她们比男性士兵更令敌人恐惧。一个欧洲观察者写道\\\"她们的勇猛超乎想象\\\"。在战场上她们砍下敌人的头颅带回给国王。回到营地——她们仍然独睡。这是一个交易：用性和生育权交换了成为战士的权利。\",\"note\":\"达荷美女战士（Agojie/Mino，意为\\\"我们的母亲\\\"）是17-19世纪达荷美王国（今贝宁共和国）的全女性军事部队。她们被视为\\\"国王的妻子\\\"，附带严格的禁欲誓言——不得与任何男性发生性关系或生育。从年幼时（有记录说8岁起）开始训练射击、格斗和情感压制。鼎盛时期（盖佐王 Ghezo·1818-1858，他把女兵正规化、配统一军装）达6000人。国王偶尔会打破规则——格莱莱娶了女战士Tata Ajachè——但这是极少数例外。体验核心是\\\"用性自由交换战斗权\\\"这个交易——在大多数前现代社会中，女性获得暴力权（武器、战斗）的唯一途径就是放弃生育权。2022年电影《The Woman King》即以此为题材。\"}),\n  E({\"id\":\"ck556\",\"name\":\"布干达·卡巴卡姆旺加与王室男色\",\"en\":\"Kabaka Mwanga's Court\",\"region\":\"撒哈拉以南非洲\",\"country\":\"乌干达\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪后半\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"宗教·信仰\"],\"atmos\":[\"卡巴卡（国王）姆旺加二世\",\"\\\"公开的秘密\\\"——国王的男性情人们\",\"王室侍从（pages）=私人后宫\",\"乌干达殉教者事件（1886）\",\"殖民前非洲的同性关系\",\"\\\"同性恋是非洲的还是西方带来的\\\"之争\"],\"sensory\":\"卡巴卡有十六个妻子——这是公开的。他也有许多年轻的男性侍从——这也是公开的秘密。侍从们不仅是宫廷的行政人手，也是国王的亲密伙伴。直到新来的基督教传教士开始教这些侍从说\\\"不\\\"。1886年——几十个拒绝国王的年轻基督徒侍从被处决。后来教会把他们封为殉教者。再后来，殖民者立法说同性恋是犯罪——用的是从英国带来的法律。\",\"note\":\"布干达王国（今乌干达）的最后一位前殖民时期国王姆旺加二世（Kabaka Mwanga II）与男性侍从的性关系是有充分历史记录的。他有16位妻子，同时也有多个男性情人。1886年，一批新皈依基督教的侍从拒绝了国王的性要求——他下令处决了约45人（即\\\"乌干达殉教者\\\"，后被天主教和圣公会封圣）。讽刺的是：这个事件后来被殖民当局用来论证\\\"非洲的性道德堕落\\\"，进而引入反同性恋立法——而事实上，殖民前的非洲对多元性取向远比殖民法律宽容。兰吉人（Langi）的mudoko dako（穿女装、嫁男人、被社区接受的男性）、40多个非洲社会中记录的\\\"女-女婚姻\\\"（woman-to-woman marriage，与性取向无关，是财产和继承制度的一部分）都说明殖民前非洲的性/性别体系远比殖民后复杂。\"}),\n  E({\"id\":\"ck557\",\"name\":\"约鲁巴·Gelede面具舞——\\\"母亲们\\\"的力量\",\"en\":\"Yoruba Gelede Masks\",\"region\":\"撒哈拉以南非洲\",\"country\":\"尼日利亚\",\"era\":\"近代\",\"year\":1850,\"period\":\"通时代（取18-19世纪最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"节庆·仪式\",\"女性空间\"],\"atmos\":[\"Gelede（面具节·纪念\\\"母亲们\\\"的力量）\",\"Iya Nla（伟大母亲）\",\"Awon Iya Wa（\\\"我们的母亲们\\\"=女性祖先+老年女性+女神）\",\"生育力=政治力\",\"\\\"母亲们可以带来丰收也可以带来旱灾\\\"\",\"母子造型\"],\"sensory\":\"面具被戴上了——上面雕刻着女性的脸、乳房、怀中的婴儿。一个男人戴着它在广场上跳舞——但他代表的是女性的力量。围观的老年女性点头——如果她们满意，今年庄稼就会好。如果不满意——\\\"母亲们\\\"可以让一切枯萎。Gelede不是取悦女人——是敬畏她们。因为生育力不只是生孩子——它是让一切生长的力量。\",\"note\":\"Gelede是约鲁巴文化中最重要的面具节之一（UNESCO非物质文化遗产）——表面上是由男性表演的面具舞蹈，实际上是对\\\"Awon Iya Wa\\\"（我们的母亲们）——女性祖先、女神和社区中年长女性——的敬畏仪式。这些\\\"母亲们\\\"被认为同时拥有建设和毁灭的力量——可以带来生育、丰收、健康，也可以带来旱灾和疾病。Gelede的母子造型不仅是对生育力的赞美，也被认为能帮助不孕女性怀孕。与Iya Nla（伟大母亲）的联系使得大量女性加入Gelede社团。这个节日展示了一种\\\"女性的性/生殖力量被整个社会系统性地敬畏\\\"的文化——与许多其他文明中\\\"女性身体被控制\\\"形成对比。\"}),\n  E({\"id\":\"ck558\",\"name\":\"埃塞俄比亚·马克达女王与所罗门（Kebra Nagast）\",\"en\":\"Makeda and Solomon\",\"region\":\"撒哈拉以南非洲\",\"country\":\"埃塞俄比亚\",\"era\":\"古典\",\"year\":-1350,\"period\":\"传说时代（文本成书14世纪，故事设定前10世纪）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"宗教·信仰\"],\"atmos\":[\"Kebra Nagast（王者的荣耀）\",\"马克达/示巴女王\",\"所罗门王的\\\"智慧诱惑\\\"\",\"\\\"那一夜\\\"之后约柜来到埃塞俄比亚\",\"雅歌（Song of Songs）——\\\"我虽黑却美丽\\\"\"],\"sensory\":\"她是一个国家的女王——来自南方，带着黄金和香料。他是以色列最有智慧的王。她来问他问题——据说是政治和哲学问题。但在那个夜晚——他设了一个局：晚宴上放了很多咸的食物，然后在她的房间旁边放了一壶水。他们有约定——她不能拿他的任何东西。夜里她渴了，拿了水。他说——你违约了。她那一夜留在了他的房间。九个月后，王子出生了。那个王子把约柜带回了阿克苏姆。\",\"note\":\"Kebra Nagast（王者的荣耀，14世纪成书）是埃塞俄比亚最重要的宗教-政治文本——叙述示巴女王（马克达/Makeda）访问所罗门王并怀孕的故事。所罗门\\\"骗\\\"马克达入房的情节是一段精巧的权力-欲望博弈——他用智慧而非武力得到了她。《雅歌》（Song of Songs）中\\\"我虽黑却美丽\\\"的女声被许多传统认为就是马克达的声音——使得《雅歌》成为世界文学中最古老的情色诗之一的同时，也被赋予了非洲的面孔。埃塞俄比亚正教和拉斯特法里运动都将Kebra Nagast视为真实历史。\"}),\n  E({\"id\":\"ck559\",\"name\":\"前殖民非洲·\\\"第三性别\\\"与女-女婚姻\",\"en\":\"African Woman-Marriage\",\"region\":\"撒哈拉以南非洲\",\"country\":\"跨区域\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"殖民·帝国\"],\"atmos\":[\"Mudoko Dako（兰吉人·穿女装嫁男人的男性）\",\"Woman-to-Woman Marriage（40+个非洲社会有记录·与性取向无关·是继承制度）\",\"巴菲亚人（Bafia·喀麦隆·把同性性行为视作\\\"性发展的一部分\\\"）\",\"\\\"同性恋不是非洲的\\\"=殖民神话\"],\"sensory\":\"一个男人穿着女人的衣服——做女人的活、嫁给一个男人。没有人嘲笑他。在兰吉人的社会里，他是Mudoko Dako——一种被承认的存在方式。在另一个村子里，一个富有的女人\\\"娶\\\"了另一个女人——不是因为她爱她（也许是），而是因为她需要一个继承人但不想嫁给男人。\\\"妻子\\\"和一个外面的男人生的孩子在法律上属于\\\"丈夫\\\"（那个女人）。这不是现代意义的LGBT——但它也不是殖民者说的\\\"非洲只有男女两种性别\\\"。\",\"note\":\"殖民前非洲的性别和性取向体系远比殖民者引入的二元框架复杂。有记录的例子包括：(1) 兰吉人（乌干达北部）的Mudoko Dako——天生阴柔的男性被视为女性，穿女装、做女工、嫁男人，被社区完全接受。(2) 超过40个非洲社会记录了Woman-to-Woman Marriage——富有或年长的女性可以\\\"娶\\\"年轻女性，后者与外部男性生的孩子在法律上属于\\\"丈夫\\\"（女性方），这主要是财产和继承制度而非性关系。(3) 喀麦隆的巴菲亚人（Bafia）视同性性行为为\\\"性发展的一部分\\\"并予以鼓励。1890年英国东非公司建立保护国后，\\\"非自然性行为\\\"（unnatural offences）被写入殖民法——一个曾承认多元性别的社会被迫噤声。\"}),\n  E({\"id\":\"ck560\",\"name\":\"沃洛夫·腰珠与情香（塞内冈比亚的闺中之术）\",\"en\":\"Wolof Bin-Bin\",\"region\":\"撒哈拉以南非洲\",\"country\":\"塞内加尔\",\"era\":\"近代\",\"year\":0,\"period\":\"通时代（近代田野记录最详）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"婚恋·求爱\"],\"atmos\":[\"bin-bin/féru（贴身腰珠·只为爱人而戴·相碰有声）\",\"thiouraye/cuuraay（熏香·烟里掺香料勾引）\",\"béthio（薄如纱的小腰布）\",\"taasu（女人之间露骨的口头诗）\",\"mokk pooj（\\\"懂得取悦\\\"的持家与床笫之术）\",\"伊斯兰规范之外女性的私密自主\"],\"sensory\":\"屋里一炉熏香袅袅——木屑里掺了丁香、麝香，烟熏进衣裙和发间，留一整天。女人腰上系着几串细巧的珠子，藏在衣服底下，只有丈夫夜里才看得见，珠子相碰沙沙作响。年长的女人压低声音，教她taasu：一段段又荤又俏的词，怎么用一条薄薄的腰布、怎么让男人离不开。这些都在闺房里、女人之间传，外头一句不提。\",\"note\":\"在塞内加尔、冈比亚的沃洛夫文化里，已婚女性的\\\"闺中之术\\\"是一套完整而隐秘的体系：贴身腰珠（bin-bin/féru）只为爱人佩戴，相碰有声、被视为极具挑逗；熏香（thiouraye/cuuraay）以香木香料熏衣熏身来勾引；薄透的小腰布（béthio）只在私密场合穿；taasu是女性之间口耳相传、措辞露骨的诗体。这一切被概括为\\\"mokk pooj\\\"——做一个既得体持家、又懂得取悦丈夫的女人。在严格的伊斯兰公共规范之外，这是女性把握自身情欲与婚姻主动权的私密空间。\"}),\n  E({\"id\":\"ck561\",\"name\":\"桑给巴尔·苏丹后宫与妾（萨尔梅公主的回忆）\",\"en\":\"Zanzibar Suria\",\"region\":\"撒哈拉以南非洲\",\"country\":\"坦桑尼亚·桑给巴尔\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"奴役·压迫\"],\"atmos\":[\"阿曼苏丹迁都桑给巴尔\",\"surias（妾·多为高加索或埃塞俄比亚的女奴）\",\"深宅后宫与一众异母兄妹\",\"妾与正妻所生子女名分平等\",\"萨尔梅公主私奔德国后写下唯一的内部回忆\",\"奴隶贸易的阴影\"],\"sensory\":\"石头城一座深宅，女人们住在最里头的院子。苏丹的正妻只一两位，妾却有几十个——多是从高加索、从埃塞俄比亚买来的女子，肤色深浅各异。孩子们满院子跑，分不清谁是妻生、谁是妾生——在这儿名分上都算王子公主。一位公主躲在屋里偷偷学写字。多年后她跟一个德国商人私奔，写下了外人从未见过的后宫内情。\",\"note\":\"1840年阿曼苏丹赛义德迁都桑给巴尔后，宫廷沿袭印度洋阿拉伯世界的后宫与蓄妾（surias）制度——妾多为经奴隶贸易购入的高加索、埃塞俄比亚女子，正妻所生与妾所生的子女名分平等。苏丹之女赛伊达·萨尔梅（Sayyida Salme）后与一名德国商人相恋私奔，皈依基督教、改名Emily Ruete，1886年写下《一位阿拉伯公主的回忆》——19世纪桑给巴尔后宫唯一的内部第一手记录。后宫的繁华与东非奴隶贸易的残酷在同一座宅院里并存。它与公开坐标\\\"桑给巴尔\\\"互为表里。\"}),\n  E({\"id\":\"ck562\",\"name\":\"原住民·青年会所（通史）\",\"en\":\"Indigenous Youth Houses\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"史前\",\"year\":0,\"period\":\"史前-近代（体验上以大航海时代前最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"节庆·仪式\"],\"atmos\":[\"青年集会所（palakuan/takuban等各族称呼不同）\",\"未婚男女的社交空间\",\"婚前性行为的社会许可\",\"通过仪式\",\"男子年龄阶级制\"],\"sensory\":\"部落边缘有一间长屋，年轻人在这里过夜。晚上有女孩来——这是被允许的，但有规矩：要得到女方同意，不能强迫。长老说，这里是变成大人的地方。\",\"note\":\"多个台湾原住民族群有青年会所制度——未婚青年在此接受训练、社交、配对。部分族群允许婚前性行为，但有明确的社区规范（如必须双方自愿、不可跨特定禁忌亲属关系）。这不是\\\"性开放\\\"，而是\\\"性被社区制度化管理的另一种方式\\\"——与儒教/基督教的禁欲框架完全不同的逻辑。\"}),\n  E({\"id\":\"ck563\",\"name\":\"日治·台湾的花柳界\",\"en\":\"Colonial Taiwan Geidan\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"世纪之交\",\"year\":1900,\"period\":\"1900s-1945\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"殖民·帝国\",\"艺术·表演\"],\"atmos\":[\"大稻埕/艋舺的酒楼与艺旦（藝旦）\",\"日本式遊郭移植\",\"万华的风化区\",\"台湾人/日本人的双轨消费\",\"艺旦的诗词教养\"],\"sensory\":\"大稻埕的江山楼里灯火通明。台湾的艺旦弹月琴唱南管——客人是台湾的富商仕绅。隔几条街是日本人的料亭——里面的规矩完全不同。两种风月，一墙之隔。\",\"note\":\"台湾日治时期的性产业呈现\\\"双轨制\\\"——台湾人有自己的艺旦文化（类似中国的歌妓，以诗词歌赋为核心），日本人有自己的遊郭系统。两者平行存在但彼此隔离。艺旦不是单纯的性工作者——顶级艺旦的文学修养极高，会作诗填词。这个传统在战后完全消失。\"}),\n  E({\"id\":\"ck564\",\"name\":\"清治·艋舺的娼寮\",\"en\":\"Bangka Brothels\",\"region\":\"东亚·台湾琉球\",\"country\":\"台湾\",\"era\":\"近代\",\"year\":1850,\"period\":\"18-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"迁徙·流亡\",\"市井·庶民\"],\"atmos\":[\"艋舺（万华）\",\"单身渡台男性的性需求\",\"平埔族女性（俗称\\\"番仔婆\\\"）\",\"闽南移民社会的性别失衡\",\"\\\"有唐山公无唐山妈\\\"\"],\"sensory\":\"艋舺的后巷暗巷里有几间门户半开的房子。来的大多是单身的闽南男人——他们渡海来台湾，没有带家眷。有人在里面抽鸦片。巷口有个平埔族女人在卖槟榔——她嫁了个漳州人，但不是正式婚礼。\",\"note\":\"清代台湾的汉人社会男女比例极度失衡（早期禁止携眷渡台），催生了大量非正式性关系——与平埔族女性通婚（\\\"有唐山公无唐山妈\\\"是台湾谚语）和性产业。艋舺的万华区至今仍有这段历史的痕迹。\"}),\n  E({\"id\":\"ck565\",\"name\":\"琉球·毛游（moashibi）\",\"en\":\"Ryukyu Moashibi\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以近世最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"艺术·表演\"],\"atmos\":[\"毛游（moashibi）\",\"野外的青年交流\",\"月夜的对歌\",\"婚前的自由恋爱\",\"村落公认的夜间交际\"],\"sensory\":\"月亮升起来了。田边的草地上聚集着年轻的男女。三线琴的声音。有人开始唱起来，对方就用歌声应和——对歌对得好的人更受欢迎。夜深了，两人两人地消失在暗处。村落里的大人都知道。这不是默许——这才是正确的规矩。\",\"note\":\"毛游（moashibi）是冲绳传统的青年夜间交流。「毛」指原野，「游」指交际。未婚男女在野外对歌，情投意合便就此发生关系。这不是「乱交」，而是共同体认可的婚前交往制度——接近欧洲中世纪的五月祭（May Day）。与日本本土的儒教/佛教道德完全不同的身体观。\"}),\n  E({\"id\":\"ck566\",\"name\":\"琉球·辻的尾类（扩展版）\",\"en\":\"Tsuji's Juri\",\"region\":\"东亚·台湾琉球\",\"country\":\"琉球\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"节庆·仪式\"],\"atmos\":[\"辻（chiiji）游郭\",\"尾类（琉球游女）\",\"尾类马（相当于花魁道中）\",\"三线与琉球舞蹈\",\"与吉原完全不同的制度\",\"赎身\"],\"sensory\":\"尾类走在辻的石板路上。虽不及吉原的花魁道中那般华丽，但红型染的衣裳在阳光下显得很美。她歌唱得好——客人弹三线琴，她来唱。与吉原的游女不同，这里的尾类可以走出街区。祭典之日，她们就像平常人一样起舞。\",\"note\":\"辻的尾类（琉球游女）与日本本土的游女在制度上大不相同。外出自由、以技艺（尤其是歌与舞）为中心、社会歧视不像本土那么强。「尾类马（jurima）」是旧历正月的活动，尾类戴上马的装饰起舞——这在今天仍作为冲绳的民俗艺能保留着。1944年的空袭使辻彻底消失。与 japan.md 中的辻坐标作区分：那边聚焦「战前文化消失前的最后一刻」，这边聚焦「尾类文化的内涵」。\"}),\n  E({\"id\":\"ck567\",\"name\":\"澳门·混血文化与夜\",\"en\":\"Macau's Creole Nights\",\"region\":\"东亚·台湾琉球\",\"country\":\"中国\",\"era\":\"近世\",\"year\":1850,\"period\":\"17-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"殖民·帝国\",\"宗教·信仰\"],\"atmos\":[\"葡萄牙人与中国人的混血（Macaense/土生葡人）\",\"天主教的罪恶感与中国纳妾文化的交错\",\"花街\",\"鸦片窟\",\"东方与西方的欲望交融之地\"],\"sensory\":\"教堂旁边是赌场。赌场旁边是昏暗的小巷——里面飘着鸦片甜腻的气味。一个葡萄牙商人和他的中国妻子走在一起。他在教堂里告解，在家中养着妾，周末则待在赌场。全都在同一座城里。\",\"note\":\"澳门是东方与西方的欲望混合的特异空间。葡萄牙人较早便认可与中国女性通婚（比其他殖民地更宽容），由此诞生了独特的混血文化「土生葡人（Macaense）」。但另一方面，天主教道德与中国式纳妾文化之间的矛盾始终存在。\"}),\n  E({\"id\":\"ck568\",\"name\":\"占婆·美山圣地（林伽与飞天）\",\"en\":\"Champa Linga & Apsara\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1450,\"period\":\"4-15世纪（体验上以7-10世纪鼎盛期最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宗教·信仰\",\"性·情色\",\"艺术·表演\"],\"atmos\":[\"占婆王国（Champa）\",\"印度教湿婆信仰\",\"林伽-优尼（Linga-Yoni）崇拜\",\"美山圣地（Mỹ Sơn）\",\"飞天（Apsara）浮雕\",\"情色石刻\",\"性与神圣不分\"],\"sensory\":\"丛林深处的砖塔群。塔身上刻满了浮雕——飞天舞女腰肢扭曲，身体的曲线毫无遮掩。塔的中央供着一根石制的柱子立在一个圆盘中——林伽和优尼。有人在向它浇水祈祷。这不是色情，这是宗教。\",\"note\":\"占婆文明深受印度教影响，林伽-优尼（男性与女性生殖器的结合体）是最核心的宗教符号。这不是\\\"情色艺术\\\"——在占婆人的世界观里，性是宇宙创造力的直接体现。美山圣地的浮雕与印度卡久拉霍（Khajuraho）神庙属于同一文化脉络。体验核心是\\\"在一个性与神圣完全不分离的文明里\\\"。\"}),\n  E({\"id\":\"ck569\",\"name\":\"占婆·舞女与宫廷\",\"en\":\"Champa Temple Dancers\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1350,\"period\":\"7-14世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"艺术·表演\",\"性·情色\"],\"atmos\":[\"占婆宫廷舞\",\"Apsara舞\",\"舞女即神职\",\"身体是祭品\",\"中国使节对占婆舞女的记录\",\"\\\"以舞事神\\\"\"],\"sensory\":\"火把照亮了砖塔前的空地。舞女们赤足，上身薄纱几乎透明，腰间金属腰链发出细碎的声响。她们的手指弯成不可能的角度。观看的人没有笑——这是仪式，不是表演。\",\"note\":\"占婆舞女是神庙的一部分——她们的舞蹈是献给神的祭品，身体的美和性感是神圣的。中国史书中对占婆舞女有大量描写，往往带着\\\"异域奇俗\\\"的惊叹。这种舞蹈传统随占婆的灭亡几乎完全消失——柬埔寨的Apsara舞是其残存。\"}),\n  E({\"id\":\"ck570\",\"name\":\"陈朝·宗室近亲婚\",\"en\":\"Trần Royal Endogamy\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"中古\",\"year\":1350,\"period\":\"13-14世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"婚恋·求爱\",\"性·情色\"],\"atmos\":[\"陈朝（Trần）宗室内婚制\",\"堂兄妹/表兄妹通婚\",\"皇族血统封闭\",\"权力与性的极端紧缩\"],\"sensory\":\"新王后进宫了——她是王的堂妹。没人觉得奇怪。上一任王后也是宗室女。据说这样可以保证皇位永远不离开陈家。但宫里的孩子越来越——虚弱。\",\"note\":\"陈朝的宗室内婚制在东亚历史中极为罕见——不是偶发的近亲婚姻，而是制度化的政策。目的是防止外戚夺权（吸取李朝灭亡教训），代价是生物学上的衰退。权力对身体的极端控制。\"}),\n  E({\"id\":\"ck571\",\"name\":\"阮朝·顺化后宫\",\"en\":\"Nguyễn Huế Harem\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近代\",\"year\":1850,\"period\":\"19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"宫廷·王权\",\"性·情色\",\"女性空间\"],\"atmos\":[\"紫禁城仿制版的后宫\",\"嫔妃制度照搬中国但规模更小\",\"明命帝（142个子女）\",\"热带宫殿的内闱\"],\"sensory\":\"皇城的内廷比北京的小得多，但更潮湿、更多花——热带的花。嫔妃们住在一排排的小院落里。明命帝据说有一百多个孩子。廊下有宫女在扇扇子——这里的热不是北京那种干热，是黏在身上的。\",\"note\":\"阮朝后宫制度几乎完全模仿中国，但越南的热带气候让一切变得更\\\"黏腻\\\"。明命帝的多产（142个子女）在东亚帝王中也名列前茅。体验角度可以是\\\"一个中国式制度在热带运行时的质感差异\\\"。\"}),\n  E({\"id\":\"ck572\",\"name\":\"法属·西贡的双重风月\",\"en\":\"Colonial Saigon Congaï\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"世纪之交\",\"year\":1880,\"period\":\"1880s-1940s\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"殖民·帝国\",\"城市·都会\",\"性·情色\"],\"atmos\":[\"法国人的妓院与越南的歌女\",\"殖民者的情妇文化（congaï）\",\"鸦片馆\",\"提岸（Chợ Lớn·华人区）的赌场与妓院\",\"东方主义的性幻想\"],\"sensory\":\"西贡的法国区有法国式的妓院——门口站着穿奥黛的越南女人。提岸的华人区有另一种——更暗，更密，鸦片的甜腻气味从门缝里飘出来。法国军官养的越南情妇被叫做\\\"congaï\\\"——介于妻子和仆人之间的灰色存在。\",\"note\":\"法属越南的性产业呈现出殖民地特有的三层结构——法国人的高端风月、越南本地的传统歌女文化、华人区的地下色情。\\\"Congaï\\\"（越南语\\\"con gái\\\"·女孩）是殖民者对越南情妇的称呼，这个词本身就凝缩了殖民权力关系。\"}),\n  E({\"id\":\"ck573\",\"name\":\"越南·嚼槟榔与婚恋\",\"en\":\"Betel and Courtship\",\"region\":\"东亚·越南\",\"country\":\"越南\",\"era\":\"近世\",\"year\":0,\"period\":\"通时代（体验上以前近代最浓）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"婚恋·求爱\",\"节庆·仪式\",\"性·情色\"],\"atmos\":[\"槟榔（trầu cau）\",\"求婚仪式\",\"嘴唇和牙齿被染红/染黑\",\"槟榔作为定情信物\",\"\\\"百件事以槟榔为先\\\"\"],\"sensory\":\"她递过来一片槟榔叶包着石灰和槟榔果——你嚼了。嘴里发热，微微发麻，唾液变成红色。她看着你的嘴笑了。这是同意的意思。你的牙齿会慢慢变黑——但在这里，黑牙是美的。\",\"note\":\"在越南传统文化中，槟榔是婚恋的核心符号——求婚送槟榔，婚礼嚼槟榔，\\\"百事以槟榔为先\\\"是越南谚语。嚼槟榔导致嘴唇变红、牙齿变黑，而黑牙（nhuộm răng đen）在传统审美中被视为美丽。一种\\\"把身体变色\\\"的情欲仪式。\"}),\n  E({\"id\":\"ck574\",\"name\":\"苏美尔·伊南娜的神圣婚姻\",\"en\":\"Inanna's Sacred Marriage\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"上古\",\"year\":-3000,\"period\":\"约前3000-前2000\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"节庆·仪式\"],\"atmos\":[\"伊南娜/伊什塔尔（爱与战争女神）\",\"神圣婚姻仪式（hieros gamos）\",\"国王与女祭司在神庙交合以保丰收\",\"性即宗教义务\"],\"sensory\":\"新年的夜晚。神庙的最高层，只有国王和女祭司。整座城在下面等待。他们的结合不是私事——这是仪式。明天庄稼会生长、河水会上涨，因为今夜女神通过女祭司的身体接受了国王。下面的人在唱赞歌——歌词非常直白：\\\"他的手触碰我的身体，像奶油一样……\\\"\",\"note\":\"苏美尔的神圣婚姻（hieros gamos）是人类历史上最早有详细文献记录的性仪式——国王在新年与代表伊南娜的女祭司交合，象征天地结合、保证来年丰收。伊南娜赞歌中的性描写极其直白，是世界文学中最古老的情色文本之一。\\\"性作为宗教义务\\\"的概念在后来的亚伯拉罕宗教中完全不可想象。\"}),\n  E({\"id\":\"ck575\",\"name\":\"乌鲁克·恩基都与莎姆哈特（人类最古老的性叙事）\",\"en\":\"Enkidu and Shamhat\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"上古\",\"year\":-1800,\"period\":\"约前1800（古巴比伦版成文）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\"],\"atmos\":[\"《吉尔伽美什史诗》\",\"野人恩基都\",\"神庙妓女莎姆哈特（Shamhat）\",\"\\\"用性文明化一个野人\\\"\",\"六天七夜\"],\"sensory\":\"荒野里有一个男人和野兽一起生活——浑身是毛，喝溪水，跑得比鹿快。猎人害怕他，去找国王想办法。国王说，派一个女人去。莎姆哈特来了——她在水边脱掉了衣服。恩基都走过来。他们在一起待了六天七夜。之后，恩基都站起来发现野兽跑了——它们不再认他了。但他会说话了。他变成了人。\",\"note\":\"这可能是人类文学中最古老的性场景——距今四千年。莎姆哈特不是\\\"妓女\\\"（现代意义的贬义词），而是伊什塔尔神庙的女祭司，用自己的身体完成了一项神圣任务：将一个野人变成文明人。\\\"性=文明化\\\"这个方程式在后世文明中被完全颠倒了。体验核心是\\\"在一个性被认为是让人成为人的关键步骤的世界里\\\"。\"}),\n  E({\"id\":\"ck576\",\"name\":\"奥斯曼·后宫（Harem）\",\"en\":\"The Topkapı Harem\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宫廷·王权\",\"女性空间\"],\"atmos\":[\"Topkapı后宫\",\"许蕾姆苏丹（Hürrem·从奴隶到皇后）\",\"瓦里德苏丹（太后·后宫真正的统治者）\",\"笼中之鸟（Kafes·被囚禁的王子）\",\"黑人太监总管\",\"后宫不是你想的那样\"],\"sensory\":\"从一扇小门进去——里面比外面大得多。庭院、浴池、花园，几百个女人住在这里。但最有权力的那个人不是苏丹的宠妃——是他的母亲。瓦里德苏丹坐在自己的套房里接见大臣——通过一扇带格子的窗户。苏丹不一定每天来后宫。但后宫每天都在运转——这是一个独立的政治机构。\",\"note\":\"奥斯曼后宫被西方东方主义严重歪曲——它不是\\\"苏丹的淫窟\\\"，而是一个复杂的政治机构。许蕾姆苏丹（Roxelana）从乌克兰奴隶成为苏莱曼大帝的合法妻子，打破了奥斯曼苏丹不正式娶妻的传统。\\\"苏丹女权时代\\\"（Sultanate of Women，16-17世纪）太后们实际统治帝国数十年。后宫里的\\\"笼子\\\"（Kafes）关着所有可能继位的王子——为了防止他们谋反，让他们在后宫长大但不接触外界。\"}),\n  E({\"id\":\"ck577\",\"name\":\"奥斯曼·哈曼（土耳其浴）\",\"en\":\"The Turkish Hammam\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"近世\",\"year\":1850,\"period\":\"15-19世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"女性空间\",\"医疗·身体\"],\"atmos\":[\"Hammam（公共浴场）\",\"女性哈曼是唯一的社交空间\",\"蒸汽中的裸体\",\"搓澡师（natır·女浴场的女搓澡工\",\"男浴场才叫tellak）\",\"选妃的场所\",\"欧洲画家的东方主义幻想vs现实\"],\"sensory\":\"蒸汽弥漫的大理石穹顶下，光从星形小孔里射进来。女人们在这里——洗浴、聊天、交换消息、暗中为儿子挑选未来的妻子。有人在被搓澡——皮肤在热水和粗布下变得通红。这是女人们唯一被允许离开家门去的地方。在这里她们什么都说。\",\"note\":\"奥斯曼时期的女性哈曼不只是洗浴场所——它是女性唯一合法的公共社交空间。婆婆在这里为儿子挑选儿媳（观察候选女孩的身体是否健康）。女人之间的信息网络、关系网络在蒸汽中运行。欧洲画家（安格尔等）画的\\\"土耳其浴\\\"是男性凝视的幻想——真实的哈曼是一个女性权力空间。\"}),\n  E({\"id\":\"ck578\",\"name\":\"阿拔斯·一千零一夜的巴格达\",\"en\":\"Baghdad of the Nights\",\"region\":\"西亚·中东\",\"country\":\"伊拉克·两河\",\"era\":\"中古\",\"year\":950,\"period\":\"8-10世纪（故事设定时代）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"城市·都会\"],\"atmos\":[\"《一千零一夜》（天方夜谭）\",\"山鲁佐德用故事换命\",\"故事中的情色场景\",\"哈里发夜访民间\",\"中世纪伊斯兰世界对性的态度比你想象的开放\"],\"sensory\":\"夜。一个女人在给国王讲故事——如果故事不够精彩，天亮她就会死。她讲的故事里有偷情的妻子、变形的精灵、裸体的公主、阉人的阴谋。国王听着听着忘了时间。天快亮了。她在最关键的地方停了下来。国王说——明天继续。她又活了一天。\",\"note\":\"《一千零一夜》中的情色内容在现代阿拉伯语版本中被大量删节——但原始版本充满了性描写、通奸、变装、同性关系。中世纪伊斯兰世界对文学中的性描写的态度比今天开放得多。山鲁佐德用\\\"故事中的性\\\"换取生存——叙事、情欲和权力的三位一体。\"}),\n  E({\"id\":\"ck579\",\"name\":\"中世纪伊斯兰·《芳香花园》\",\"en\":\"The Perfumed Garden\",\"region\":\"西亚·中东\",\"country\":\"突尼斯·迦太基\",\"era\":\"近世\",\"year\":1450,\"period\":\"15世纪（成书年代）\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"学问·书写\",\"宗教·信仰\"],\"atmos\":[\"《芳香花园》（The Perfumed Garden / Al-Rawḍ al-ʿāṭir）\",\"突尼斯谢赫·奈夫扎维著\",\"阿拉伯版\\\"爱经\\\"\",\"性技巧\",\"阴茎和阴道的分类学\",\"幽默\"],\"sensory\":\"一个学者在写一本书——他的资助人要求他写一本\\\"关于男女交合的完整指南\\\"。他在认真地分类——阴茎有多少种（他列了十几种）、阴道有多少种（也是十几种）、体位有多少种——然后一本正经地比较哪种组合最佳。他一边写一边引用先知的圣训来论证\\\"婚姻中的性快感是真主允许的\\\"。\",\"note\":\"《芳香花园》是伊斯兰世界最著名的性学著作——用学术的态度讨论性行为，引用宗教文本论证性快感的合法性。它证明伊斯兰传统中存在一条\\\"性是真主的恩赐，应在婚姻中被充分享用\\\"的线索——与现代对伊斯兰性观念的刻板印象截然不同。\"}),\n  E({\"id\":\"ck580\",\"name\":\"萨法维·伊斯法罕的男色与诗\",\"en\":\"Isfahan's Moon-Faced Boys\",\"region\":\"西亚·中东\",\"country\":\"伊朗·波斯\",\"era\":\"近世\",\"year\":1650,\"period\":\"16-17世纪\",\"tone\":\"日常\",\"nsfw\":true,\"themes\":[\"性·情色\",\"艺术·表演\",\"宗教·信仰\"],\"atmos\":[\"波斯诗歌中的\\\"少年之美\\\"（shahid-bazi）\",\"酒馆少年（saqi）\",\"苏菲派的神爱与人爱的模糊\",\"哈菲兹的双关诗\",\"\\\"月亮脸的少年\\\"\"],\"sensory\":\"酒馆里——是的，波斯人喝酒。斟酒的少年（saqi）脸很好看——好看到有人在为他写诗。诗人哈菲兹写道\\\"我愿意用撒马尔罕和布哈拉来换设拉子那个突厥少年脸上的黑痣\\\"。这首诗是在写一个男孩，还是在写真主？在波斯诗歌里，这个问题永远没有答案——也不需要答案。\",\"note\":\"波斯古典诗歌中对\\\"美少年\\\"（amrad）的赞美是一个巨大而复杂的传统——它既是对真实男性之美的欣赏，又是苏菲派\\\"以人间之美映照神之美\\\"的宗教隐喻。哈菲兹、鲁米、萨迪的诗中充满了对男性美的描写。这种传统在现代伊朗几乎不被公开讨论，但它是波斯文学的核心。\"}),\n  E({\"id\":\"ck581\",\"name\":\"前伊斯兰阿拉伯·贾希利亚时代的女性\",\"en\":\"Women of the Jahiliyyah\",\"region\":\"西亚·中东\",\"country\":\"阿拉伯半岛\",\"era\":\"中古\",\"year\":550,\"period\":\"6世纪\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"婚恋·求爱\",\"女性空间\"],\"atmos\":[\"贾希利亚（蒙昧时代）\",\"多种婚姻形式并存（包括一妻多夫\",\"临时婚姻）\",\"女诗人\",\"赫蒂彻（穆罕默德的第一任妻子——她是主动求婚的女商人）\",\"悬诗中的情欲描写\"],\"sensory\":\"市场上有一个女人在做生意——她是麦加最富的商人之一。她刚向一个比她年轻十五岁的男人求婚。他答应了。在另一个帐篷里，诗人在吟诵悬诗——开头总是一样的：站在废弃的营地前，回忆离去的爱人。诗里的欲望是赤裸的——\\\"她的唾液像混了蜂蜜的晨露\\\"。\",\"note\":\"前伊斯兰阿拉伯的性别关系比后世复杂得多——赫蒂彻（Khadijah）是独立女商人，主动向穆罕默德求婚并比他年长15岁。贾希利亚时代存在多种婚姻形式（包括短期合约婚姻mut'a）。悬诗（Mu'allaqat）的传统开头是nasib——在废弃营地前回忆爱人的离去——是阿拉伯文学中最古老的情欲叙事模式。\"}),\n  E({\"id\":\"ck582\",\"name\":\"安纳托利亚·库柏勒与加利祭司（自宫的狂热）\",\"en\":\"Cybele's Galli\",\"region\":\"西亚·中东\",\"country\":\"土耳其·安纳托利亚\",\"era\":\"古典\",\"year\":0,\"period\":\"古典（安纳托利亚崇拜源远·罗马时期记载最详）\",\"tone\":\"混合\",\"nsfw\":true,\"themes\":[\"性·情色\",\"宗教·信仰\",\"艺术·表演\"],\"atmos\":[\"大地母神库柏勒（Magna Mater）与少年神阿提斯\",\"加利（galli）祭司在狂乱中自宫\",\"此后以女性身份生活·穿女装\",\"震耳的鼓钹与旋舞\",\"\\\"血之日\\\"\",\"从安纳托利亚传入罗马\"],\"sensory\":\"神庙前鼓和钹敲得震天，香烟缭绕，一群祭司披着长发、穿着女装绕圈狂舞，越转越快。到了\\\"血之日\\\"，有人在恍惚里抄起利刃，当众把自己阉了——血溅在母神像前。从此他不再是男人，以女子的身份侍奉女神。围观的人又敬又怕：这是献给大地之母最极致的东西。这股狂热后来一路传到了罗马城。\",\"note\":\"库柏勒（Cybele/Magna Mater）是安纳托利亚的大地母神，与少年神阿提斯（Attis）相伴。她的祭司\\\"加利\\\"（galli）在鼓钹喧天的狂乱仪式中自我阉割，此后穿女装、以女性身份生活，被视为介于男女之间的存在。每年\\\"血之日\\\"（Dies Sanguinis）的自宫与哀悼是仪式高潮。该崇拜前204年被正式引入罗马，长期游走于敬畏与排斥之间。\"})\n];\n\nwindow.__CODEX_ENTRIES = ENTRIES;\n})();<\/script>\n<\/helmet>\n\n<div style=\"min-height:100vh;padding:24px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n\n  <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px\"><span style=\"font:500 10px 'Cinzel';letter-spacing:.34em;color:#9286a6;text-transform:uppercase\">Codex Card<\/span><span style=\"font:600 14px 'Noto Serif SC';color:#5a4f70\">命運牌庫 · 卡片版（與抽卡同尺寸）<\/span><\/div>\n\n  <!-- ===================== CODEX CARD 620 ===================== -->\n  <div data-screen-label=\"牌庫 · 卡片版\" style=\"width:620px;max-width:100%;height:min(860px,calc(100vh - 160px));background:#f7f4f9;border-radius:2px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 26px 64px rgba(58,46,30,.28), inset 0 0 0 1px #e0d6e6, inset 0 0 0 5px #f7f4f9, inset 0 0 0 6px #8a78a4, inset 0 0 0 7px #f7f4f9, inset 0 0 0 8px #cbbdd0\">\n    <div style=\"position:absolute;left:14px;top:14px;width:7px;height:7px;background:#8a78a4;transform:rotate(45deg);pointer-events:none;z-index:3\"><\/div>\n    <div style=\"position:absolute;right:14px;top:14px;width:7px;height:7px;background:#8a78a4;transform:rotate(45deg);pointer-events:none;z-index:3\"><\/div>\n    <div style=\"position:absolute;left:14px;bottom:14px;width:7px;height:7px;background:#8a78a4;transform:rotate(45deg);pointer-events:none;z-index:3\"><\/div>\n    <div style=\"position:absolute;right:14px;bottom:14px;width:7px;height:7px;background:#8a78a4;transform:rotate(45deg);pointer-events:none;z-index:3\"><\/div>\n    <div style=\"position:absolute;left:30px;right:30px;top:20px;height:11px;backg
